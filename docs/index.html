wrist of [an inmate] a person in custody and restrict movement.\n(c) Procedures. The procedures developed for [inmates] people in custody housed in\nhospitals in beds outside of secure medical wards must include the following:\n(1) Shackling shall be used only upon the direction of the Chief Correctional Officer\nor [his/her] their designee after a review of the individual case. Pending the receipt of\nsecurity-related information necessary to perform the review, [an inmate] a person in\ncustody may be shackled unless [he/she] they [falls] fall into categories listed in (3)(i)\nthrough (iv) below. This security-related information must be obtained promptly.\n(2) Shackling shall only be used when a Chief Correctional Officer or [his/her] their\ndesignee demonstrates with clear and articulable facts that twenty-four hour officer\ncoverage may be insufficient to protect the safety of others or to prevent escape.\n(3) [An inmate] A person in custody who is to be restrained shall be seen by a\nphysician. DOC will not shackle [an inmate] a person where a physician has determined\nthat the [inmate] person in custody is:\n(i) pregnant and admitted for delivery of a baby; or\n(ii) dependent on a ventilator or respirator; or\n(iii) in imminent danger or expectation of death (unless the [inmate] person in\ncustody while in the condition described by (i) - (iii) above attempts to escape or\nengages in violent behavior at the hospital which presents a danger of injury); or\nPage 49 of 56\n\n(iv) where shackling is medically contraindicated. Provided, however, that should\n[an inmate] a person in custody, while in a condition described by (iv) above, attempt to\nescape or engage in violent behavior at the hospital which presents a danger of injury,\n[he/she] they may be restrained pending an immediate review of [his/her] their medical\ncondition by a physician to determine whether the use of shackles threatens the\n[inmate's] person in custody’s life. DOC shall promptly make alternative security\narrangements before the restraints are removed, unless a life-threatening condition\nexists. In the case of a life-threatening condition, the shackles shall be removed\nimmediately.\n(4) At least daily, physicians shall update and review the medical condition of\nshackled [inmates] people in custody. They shall convey their findings to the\nDepartment of Correction including whether the use of mechanical restraints, while the\n[inmate] person in custody ambulates is medically contraindicated.\n(5) A shackled [inmate] person in custody shall be given the opportunity to use the\nbathroom as often as the need arises unless the physician has ordered the use of bed\npans instead.\n(6) The decision to shackle [an inmate] a person in custody shall be reviewed on a\ndaily basis by a Chief Correctional Officer or [his/her] their designee and must be\nrevised immediately if a physician determines that the shackles have become medically\ncontraindicated. In the latter case, unless a life-threatening medical emergency exists,\nDOC shall have the opportunity to make alternative security arrangements, if necessary,\nbefore the shackles are removed. These arrangements must be made promptly.\n(7) All decisions to apply mechanical restraints will be made by the Department of\nCorrection's [office of operations] Office of Operations.\n(8) Written records shall be maintained at the hospitals which indicated the reason\nfor shackling, the time and date of the approval for shackling, the name and title of the\nperson giving approval, and the [inmate's] person in custody’s name, book and case\nnumber and medical status.\n(9) Hospital-based physicians caring for [inmates] people in custody outside secure\nmedical wards at the municipal hospitals shall receive training in this standard.\n§ 57. Section 3-13 of Title 40 of the Rules of the City of New York is REPEALED and\na new section 3-13 is added to read as follows:\n§ 3-13 Variances.\nThe variance procedures set forth in 40 RCNY § 2-10 shall apply to variances from\nprovisions in this chapter.\n§ 58. Sections 3-14 and 3-15 of Title 40 of the Rules of the City of New York, relating\nto the effective and implementation dates of the original 1991 rules, are REPEALED,\nand section 3-16 is renumbered as section 3-14.\nPage 50 of 56\n\n§ 59. Section 3-14 of Title 40 of the Rules of the City of New York, as renumbered\nby this rule, is amended to read as follows:\n§ 3-14 Injury Response.\n(a) Policy. The Department of Correction and the Health Authority (\"the Agencies\")\nshall [establish] maintain policies and procedures to address and prevent injuries to\npeople in custody.\n(b) Investigations. Investigations of injuries of people in custody, including all\nsupporting documentation such as Injury-to-Inmate forms, shall be completed in a\nprompt, accurate, and objective manner. For the purposes of this section, investigations\nshall mean investigations conducted in the manner required by the Department of\nCorrection (\"Department\") including, but not limited to, investigations conducted by the\nfacility or investigations contained in Injury-to-Inmate forms.\n(c) Coordination.\n(1) Quarterly Meetings. The Agencies shall engage in regular communication and\nquarterly meetings, to review data on injuries, identify trends, and perform quality\nassurance on injury report documentation. These communications and quarterly\nmeetings shall include data-informed development of corrective action plans.\n(2) Injury Tracking System. [Within one year of the effective date of this rule, the]\nThe Agencies shall maintain a coordinated electronic injury tracking system for serious\ninjuries, which for purposes of 40 RCNY § [3-16] 3-14 are defined as injuries designated\nas serious by the Health Authority for the sole purpose of tracking injuries. [Within two\nyears of the effective date of this rule, the] The Agencies shall maintain a coordinated\nelectronic injury tracking system for all injuries, both serious and non-serious.\n(d) Reporting and Review.\n(1) [By the fourth Friday of September 2019 and on] On the fourth Friday of every\nmonth [thereafter], the Department shall provide the Board with all Injury-to-Inmate\nforms (or any other injury reporting mechanism that may replace the Injury-to-Inmate\nform) created in the previous month and any forms updated in the previous month.\n(2) The Agencies shall provide the Board with a joint, monthly, public report of data\non injuries and serious injuries to people in custody (\"Joint Monthly Injury Report\"), as\nfollows:\n(i) [Phase 1. Starting on the fourth Friday of September 2019 and on] On the\nfourth Friday of every month [thereafter], the Joint Monthly Injury Report shall include\nthe following information in a machine-readable format using both numerical values and\npercentages, for the previous month and for the year-to-date:\n(A) The Health Authority's definition of serious injuries for that reporting period;\n(B) A list of the Health Authority's injury reporting codes used during that\nreporting period;\nPage 51 of 56\n\n(C) Total number of injury reports made, overall and disaggregated by treating\nfacility;\n(D) Total number of injuries presented to and confirmed by health care\npersonnel, overall and disaggregated by treating facility, and then further disaggregated\nby serious and non-serious injuries;\n(E) Total number of injuries confirmed by heath personnel that required urgent\ncare, overall and disaggregated by treating facility, and then further disaggregated by\nserious and non-serious injuries;\n(F) Total number of injuries confirmed by heath personnel that required hospital\nemergency care, overall and disaggregated by treating facility, and then further\ndisaggregated by serious and non-serious injuries;\n(G) Age of persons with injuries confirmed by health personnel, overall and\ndisaggregated by treating facility, disaggregated by serious and non-serious injuries,\nand then re-aggregated by age group (i.e. adolescents ages 16 and 17, young adults\nages 18 to 21, and adults ages 22 and over);\n(H) Whether persons with injuries presented to health personnel received or\nrefused treatment, grouped and totaled by \"received treatment\" or \"refused treatment,\"\nand then further disaggregated by serious and non-serious injuries;\n(I) Mean, median, minimum, and maximum time between the time of\nDepartment Supervisor notification and the time of initial medical evaluation for serious\ninjuries, overall and disaggregated by treating facility;\n(J) Types of serious injuries as defined by the Health Authority, grouped and\ntotaled by serious injury type, overall and disaggregated by treating facility;\n(K) Types of non-serious injuries, including head injuries, lacerations, and\nother, grouped and totaled by injury type, overall and disaggregated by specific\ncommand;\n(L) Bodily location of injuries, grouped and totaled by bodily location, overall\nand disaggregated by specific command, and then further disaggregated by serious and\nnon-serious injuries;\n(M) Cause of injuries as reported by the injured person to Health Authority,\nincluding self-injury, grouped and totaled by reported cause of injury, overall and\ndisaggregated by treating facility, and then further disaggregated by serious and non-\nserious injuries;\n(N) Any other information deemed notable by the Agencies.\n[(ii) Phase 2. Starting one year after the effective date of this rule, and continuing\non the fourth Friday of every month thereafter for a period of one year, the Joint Monthly\nInjury Report shall also include the following information in a machine-readable format\nusing both numerical values and percentages, for the previous month and for the year-\nto-date:]\nPage 52 of 56\n\n([A]O) Locations within the commands where the serious injuries occurred,\ngrouped and totaled by location, overall and disaggregated by specific command (i.e.\nfacility, transportation, court);\n([B]P) For serious injuries occurring in housing areas, the specific locations\nwithin the housing area where the injuries occurred, overall and disaggregated by\nspecific command;\n([C]Q) Total number of pending facility investigations for serious injuries\nreported in the previous month, overall and disaggregated by specific command;\n([D]R) Total number of completed investigations for serious injuries reported in\nthe previous month, overall and disaggregated by specific command;\n([E]S) Cause of serious injuries, including self-injury, as recorded in the facility\ninvestigation, grouped and totaled by cause of injury, overall and disaggregated by\nspecific command;\n([F]T) Mean, median, minimum, and maximum time between time of\nDepartment Supervisor notification and completion of facility investigation for all serious\ninjuries reported in the previous month, overall and disaggregated by specific command;\nand\n([G]U) Whether incidents resulting in serious injuries were witnessed by the\nstaff persons who completed the Injury-to-Inmate reports, grouped and totaled by\n\"witnessed\" or \"not witnessed,\" overall and disaggregated by specific command.\n([iii]ii) [Phase 3. Starting two years after the effective date of this rule, and\ncontinuing on the fourth Friday of every month thereafter, the] The Joint Monthly Injury\nReport shall also include all information required pursuant to 40 RCNY §§ [3-\n16(d)(2)(ii)(A) - (B), (D) - (G)] 3-14(d)(2)(i)(O)-(P), (R)(V) for serious and non-serious\ninjuries, in a machine-readable format using both numerical values and percentages, for\nthe previous month and the year-to-date.\n(3) [Starting on the fourth Friday of September 2019, the] The Agencies shall\nprovide the Board with a monthly data file with injury-level information corresponding to\nthe data enumerated in the Joint Monthly Injury Report. This file shall also include all\nrelevant identifying injury-level information (e.g., injury report number, Central\nOperations Desk/Use of Force report number, injury date, date of injury report, specific\nunit and housing area, housing area type, date investigation was closed, incarcerated\nperson-identifiers, and witnessing-staff identifiers) for each injury reported. Each file\nshall be shared in an electronic, machine-readable format and shall be updated\ncumulatively from each prior data reporting period. The file shall be maintained as\nconfidential by the Board.\n(4) On at least an annual basis, [beginning on the first day of the sixth month after\nthe effective date of this Rule,] the Department shall review all Joint Monthly Injury\nReports submitted in the previous year pursuant to subdivision 40 RCNY § 3-16(d)(2).\nWithin 60 days of each such annual review, the Department shall provide the Board with\na written public report detailing:\nPage 53 of 56\n\n(i) Steps taken in its review;\n(ii) Findings, and any plans for corrective action; and\n(iii) Status of corrective actions described in prior reports submitted over the past\nfive years.\n(5) [Starting on the fourth Friday of September 2019 and on] On the fourth Friday\nof every month [thereafter], the Health Authority shall provide the Board with a monthly\npublic report on self-harm, including the following information in a machine-readable\nformat using both numerical values and percentages, for the previous month and for the\nyear-to-date:\n(A) Total number of injuries reflecting self-harm, as determined by health care\npersonnel, overall and disaggregated by serious and non-serious injuries;\n(B) Injuries reflecting self-harm, disaggregated by age (adolescents ages 16 and\n17, young adults ages 18 to 21, and adults ages 22 and older), and further\ndisaggregated serious and non-serious injuries; and\n(C) Injuries reflecting self-harm, disaggregated by housing type, and further\ndisaggregated serious and non-serious injuries.\n§ 60. Subdivision (k) of Section 6-27 of Title 40 of the Rules of the City of New York\nis amended to read as follows:\n(k) Four- and five-point restraints shall not be used other than pursuant to 40 RCNY §\n[2-06] 2-07, governing the physical restraint of [persons] people in custody being\nobserved or treated for mental or emotional [disorders] health issues.\nPage 54 of 56\n\nNEW YORK CITY LAW DEPARTMENT\nDIVISION OF LEGAL COUNSEL\n100 CHURCH STREET\nNEW YORK, NY 10007\n212-356-4028\nCERTIFICATION PURSUANT TO\nCHARTER §1043(d)\nRULE TITLE: Amendment of Rules Concerning Mental Health and Health Care\nREFERENCE NUMBER: 25 RG 094\nRULEMAKING AGENCY: Board of Correction\nI certify that this office has reviewed the above-referenced proposed rule as\nrequired by section 1043(d) of the New York City Charter, and that the above-referenced proposed\nrule:\n(i) is drafted so as to accomplish the purpose of the authorizing provisions of\nlaw;\n(ii) is not in conflict with other applicable rules;\n(iii) to the extent practicable and appropriate, is narrowly drawn to achieve its\nstated purpose; and\n(iv) to the extent practicable and appropriate, contains a statement of basis and\npurpose that provides a clear explanation of the rule and the requirements\nimposed by the rule.\n/s/ STEVEN GOULDEN Date: December 23, 2025\nSenior Counsel\nPage 55 of 56\n\nNEW YORK CITY MAYOR’S OFFICE OF OPERATIONS\n253 BROADWAY, 10th FLOOR\nNEW YORK, NY 10007\n212-788-1400\nCERTIFICATION / ANALYSIS\nPURSUANT TO CHARTER SECTION 1043(d)\nRULE TITLE: Amendment of Rules Concerning Mental Health and Health Care\nREFERENCE NUMBER: BOC-9\nRULEMAKING AGENCY: Board of Correction\nI certify that this office has analyzed the proposed rule referenced above as required by\nSection 1043(d) of the New York City Charter, and that the proposed rule referenced above:\n(i) Is understandable and written in plain language for the discrete regulated\ncommunity or communities;\n(ii) Minimizes compliance costs for the discrete regulated community or\ncommunities consistent with achieving the stated purpose of the rule; and\n(iii) Does not provide a cure period because it does not establish a violation,\nmodification of a violation, or modification of the penalties associated with a\nviolation.\n/s/ Francisco X. Navarro December 23, 2025\nMayor’s Office of Operations Date\nPage 56 of 56","21":"NEW YORK CITY\nBOARD OF CORRECTION\nMarch 10, 2026\n1:00PM\nPUBLIC MEETING AGENDA\n(subject to change)\nI. Approval of the Agenda\nII. Approval of Meeting Minutes: February 10, 2025 Meeting\nIII. Public Comment Period – People in Custody\nIV. Executive Director Remarks\nA. Condolences\nB. Census\nC. Reports\nPermissible Items\n• Board staff findings and recommendations to improve clarity, consistency, and\ndistribution of information for staff, people in custody, and loved ones.\nDe-escalation Units\n• Overview of BOC Special Investigations team findings: noncompliance with\nMinimum Standard §6-05 in intake area use (§6-05(f)), personal hygiene (§6-\n05(g)), and maintenance of designated de-escalation areas (§6-05(l))\nInjury Response\n• Presentation of Board recommendations to strengthen policy alignment with\nMinimum Standard §3-16, improve investigations and injury tracking, enhance\ninteragency transparency, and ensure timely, accurate public reporting.\nV. Department of Correction Briefings, Updates, and Discussions\nA. Permissible Items and Visits\nPermissible Items\n• Response to BOC findings and recommendations; planned corrective actions\nVisitation Process Revamp\n• Status of efforts to improve family and attorney visits\nRikers Visit Working Group\n• Plans to revive the Visit Working Group created in 2015\nB. De-escalation Units\n• Response to BOC findings and recommendations; planned corrective actions\n\nC. Injury Response Report\n• Response to BOC findings and recommendations\nD. Outposted Therapeutic Units\n• Status update on operational readiness, staffing, and anticipated openings\n• Coordination between DOC and CHS\nVI. Correctional Health Services Briefings, Updates, and Discussions\nA. Injury Response Report\n• Response to BOC findings and recommendations\nB. De-escalation Confinement\n• Overview of procedures to ensure uninterrupted care when the Department\nplaces individuals in de-escalation confinement (40 RCNY § 6-05(b)).\nC. STEP (Supportive Transitional Engagement Program)\n• Overview of a new Mental Health Therapeutic Housing Unit\nVII. General Public Comment Period\nVIII. Adjourn","22":"New York City\nBoard of Correction\nMarch 10, 2026\nPublic Meeting Minutes\nAttendees:\nMembers Present\nDwayne Sampson, Chair (virtual)1\nHelen Skipper, Vice Chair\nHon. Barry A. Cozier (Ret.), Member\nFelipe Franco, Member\nDr. Lauren Stossel, Member\nJude Torchenaud, Member\nDepartment of Correction (DOC)\nMeg Egan, First Deputy Commissioner\nJames Conroy, Deputy Commissioner of Legal Matters/General Counsel\nJames Boyd, Deputy Commissioner of Strategic Operations\nPatrick Gallahue, Deputy Commissioner of Public Information\nKathleen Zadzora, Assistant Commissioner of Health Affairs\nKyle Archie, Assistant Commissioner of Operations Research\nAlex Maldonado, Assistant Commissioner for Strategic Initiatives\nNadia Jean-Francois, Executive Director of Intergovernmental Affairs and\nSpecial Projects\nTamia Brown, Executive Director of Visit Operations\nMark Pauley, Director of Intergovernmental Affairs and Strategic Partnerships\nChelsea Chard, Senior Advisor\n1 Chair Sampson was out of the country and therefore unable to reach the meeting location.\n1\n\nNYC Health + Hospitals - Correctional Health Services (CHS)\nPatsy Yang, Dr. PH, Senior Vice President\nJeanette Merrill, Senior Assistant Vice President of Communications and\nExternal Affairs\nCarlos Castellanos, Chief Operations Officer/Deputy Executive Director\nNancy Arias, RN, Chief Nursing Officer/Deputy Executive Director\nZachary Rosner, Chief of Medical Service\nJoseph Otonichar – Chief of Service, Mental Health\nNicole Levy, Director of Communications and Intergovernmental Affairs\nOthers in Attendance\nNathaniel Evans, OPA\nAbdullah Mohiuddin, MOCJ\nCassidy Burry, Freedom Agenda\nAnna Senft, UJC\nKyriaki Vetoulis-Acevedo, UJC\nJennifer Parish, UJC\nChris Boyle, NYCDS\nCasey Dalporto, NYCDS\nMichael Klinger, Brooklyn Defenders\nChaplain Dr. Victoria A. Phillips, Visionary V Ministries and JAC\nCraig Rothfeld\nIsabella Gallo\nAmerica Canas\nRiley Doyle Evans, Legal Aid\nTarini Garimella, Osborne\nNatalie Fiorenzo, NYCDS\nRyan Acquaotta, Freedom Agenda\nApproval of March 10, 2026 meeting agenda\nChair Sampson attended this meeting remotely. Upon being moved and\nseconded, the March 10, 2026 meeting agenda was unanimously approved.\nSee this portion of the video here.\n2\n\nApproval of the February 10, 2026 public meeting minutes\nUpon being moved and seconded, the February 10, 2026 minutes were\nunanimously approved. See this portion of the video here.\nPublic comment period – People in Custody\nFour comments from people in custody were played. See this portion of the\nvideo here.\nFirst Deputy Commissioner Margaret Egan’s Welcome\nChair Sampson offered welcoming remarks to Margaret Egan, the\nDepartment’s newly appointed First Deputy Commissioner, emphasizing his\nexcitement at the opportunity for a collaborative relationship between the\nBoard and the Department. See this portion of the video here.\nExecutive Director update\nExecutive Director Georges-Yilla shared updates from Board staff regarding\nthe census, monitoring, and reporting.\nAs of March 9, 2026, the approximate total census of people in custody was\n6,797. As of January 12, the census numbers by facility were as follows:\nBHPW (67), EHPW (11), EMTC (1,397), GRVC (886), NIC (314), OBCC (1,410),\nRESH-ESH (107), RESH non-ESH (446), RMSC (434), RNDC (1,035), and WF\n(689). See this portion of the video here.\nThe Board received 224 complaints in February, with the largest share coming\nfrom OBCC (31%). The most common issues raised involved medical health\ncare (13%), visit appeals (8%), and environmental health conditions (8%).\nOverall, the complaints reflect ongoing concerns about access to health care,\nvisitation, facility conditions, and basic services within housing units. See this\nportion of the video here.\nExecutive Director Georges-Yilla then provided a brief update regarding BOC’s\noversight of compliance with certain Minimum Standards. Regarding\npermissible items, BOC staff’s review found that individual facilities maintain\nseparate conflicting permissible items lists. The Board has shared its findings\n3\n\nand recommendations with the Department. See this portion of the video\nhere.\nRegarding de-escalation units, while investigating an incident at OBCC in\nJanuary, BOC’s Special Investigations team found that a person in custody\nwas held in an OBCC intake holding pen for more than 24 hours after the\nincident for de-escalation purposes, without bedding or linens. Further in-\nperson observations revealed that correctional staff at OBCC, GRVC, RMSC,\nRNDC, West Facility, and NIC are placing individuals in intake holding pens\nimmediately following incidents for de-escalation purposes. Executive\nDirector Georges-Yilla stated that it is critical that DOC take immediate steps\nto comply with the de-escalation confinement standards so that people in\ncustody are held in appropriate housing areas with access to basic\nnecessities following incidents. See this portion of the video here.\nBoard presentation on injury response\nResearch and Compliance Associate Claire Loredan presented findings and\nrecommendations from the Board’s report on injury responses in NYC jails.\nThis assessment of DOC and CHS’s implementation of Minimum Standard §3-\n16 revealed important progress alongside persistent gaps that limit the\neffectiveness of injury response, investigation, coordination, and reporting in\nNYC jails.\nWhile both agencies maintain foundational policies and conduct\ninvestigations in compliance with basic requirements, the absence of clear\ntimelines, inconsistent data reconciliation, and incomplete reporting hinder\ntransparency and oversight. The lack of a coordinated injury tracking system\nand ongoing delays in submitting comprehensive reports reduce the ability to\nidentify trends and implement timely preventive measures.\nAddressing these challenges through strengthened policies, improved data\nintegration, and enhanced accountability mechanisms is essential to fulfill\nthe intent of the Minimum Standards and safeguard the health and safety of\npeople in custody. Sustained commitment to these improvements will better\n4\n\nposition DOC and CHS to identify and prevent injuries, ensure more timely\nand objective investigations, and ultimately promote safer conditions within\nNYC’s correctional facilities. See this portion of the video here.\nFirst Deputy Commissioner opening remarks\nFirst Deputy Commissioner Egan stated that Commissioner Richards sends\nhis regrets for having to miss this meeting, but he will attend Board meetings\nmoving forward. First Deputy Commissioner Egan shared this new\nadministration’s vision for the Department and its partnership with the Board,\nemphasizing safety, collaboration, and transparency. See this portion of the\nvideo here.\nDepartment update on permissible items and visits\nRegarding permissible items, Executive Director of Intergovernmental Affairs\nNadia Jean-Francois acknowledged that some confusion has arisen regarding\nthe current permissible items list, but the Department is currently undergoing\na review of the list to ensure it is clear, accurate, and consistent agency-wide.\nThe Department anticipates finalizing the list and disseminating it widely by\nthe end of next month. See this portion of the video here.\nBoard Member Stossel asked why thermals cannot be sent through the mail.\nAdditionally, Board Member Stossel asked about mailing contact lenses and\nother medically urgent needs. Vice Chair Skipper asked about items being\nshipped directly from manufacturers to avoid the Department’s concerns\nregarding tampering. See this portion of the video here.\nRegarding visits, Deputy Commissioner of Strategic Operations James Boyd\ngave a presentation of the digital Attorney Visit Scheduler pilot that will be\nlaunched in the coming weeks. Deputy Commissioner Boyd stated that the\nDepartment is also live tracking family visits to better monitor the stages of\nthe visiting process for loved ones. A guide for loved ones visiting Rikers Island\nwill also be coming soon. Deputy Commissioner Boyd also stated that the\nnew Executive Director of Visit Operations Tamia Brown was onboarded, and\n5\n\npresent in the audience, and would also reconvene the Visits Working Group.\nSee this portion of the video here.\nBoard Member Stossel asked about the family visits live monitor and next\nsteps for advancing tracking and scheduling tools. Chair Sampson asked if the\nDepartment will be soliciting feedback from attorneys. See this portion of the\nvideo here.\nDepartment update on de-escalation units\nGeneral Counsel James Conroy stated that intake areas should not be utilized\nas de-escalation spaces as per Department directives and policy. The\nDepartment is investigating the incidents the Board brought to the\nDepartment’s attention. General Counsel Conroy stated that the only\ndesignated de-escalation unit is located at EMTC. See this portion of the video\nhere.\nBoard Member Stossel asked about Departmental policy and directives\nregarding de-escalation in facilities other than EMTC. Board Member Stossel\nalso asked about touring and tracking de-escalation spaces. See this portion\nof the video here.\nDepartment response to injury response report\nAssistant Commissioner Kathleen Zadzora provided a response to the Board’s\ninjury response report, stating that while the Department has concerns with\nthe scope and methodology, the Department is supportive of the spirit of the\nreport. See this portion of the video.\nBoard Member Stossel asked about Departmental efforts to build trust with\npeople in custody because people in custody overwhelmingly do not\nparticipate in injury investigations. See this portion of the video here.\nDepartment update on outposted therapeutic units\nAssistant Commissioner for Strategic Initiatives Alex Maldonado provided a\nstatus update on opening the OTxHU at Bellevue Hospital. Assistant\nCommissioner Maldonado stated that staffing remains the largest hurdle to\n6\n\nopening the facility, emphasizing that the Department will share more specific\ninformation once a clear timeline is finalized. See this portion of the video\nhere.\nVice Chair Skipper asked for a more specific timeframe for opening the facility.\nBoard Member Stossel asked about the staffing requirements. See this\nportion of the video here.\nCHS response to injury response report\nChief of Medical Service Zachary Rosner and Chief of Mental Health Services\nJoseph Otonichar discussed CHS’ injury reporting systems and services. Chief\nRosner and Chief Otonichar also discussed the nuanced differences between\nself-injurious behavior and self-harm in reporting tables. See this portion of\nthe video here.\nBoard Members Stossel and Torchenaud asked for additional clarification\nbetween the difference between self-injurious behavior and self-harm. Chair\nSampson asked if CHS and/or DOC could discuss the contents of their\nquarterly meetings. The Department and CHS were not able to formulate a\nresponse. See this portion of the video here.\nCHS update on De-escalation confinement\nChief Operations Officer Carlos Castellanos stated CHS’ policies and\nprotocols regarding de-escalation situations. See this portion of the video\nhere.\nCHS update on STEP (Supportive Transitional Engagement Program)\nChief of Mental Health Services Joseph Otonichar gave a presentation on\nCHS’ new initiative STEP. Along CHS’ continuum of care, STEP helps patients\nwho do not, or no longer, require the full clinical support of a mental\nobservation unit to maintain clinic gains. Therefore, STEP is an intermediate\nlevel of care between general population and mental observation. In order to\nsupport this initiative, the number of total mental observation beds decreases\nslightly in order to be converted into STEP beds. See this portion of the video\nhere.\n7\n\nVice Chair Skipper asked about staffing and resources changes, tying her\nquestion to staffing allocations at OTxHU Bellevue. CHS then stated that CHS\nis fully staffed for the soon-to-open Bellevue unit. Board Member Stossel\nasked about the clinical differences between mental observation and STEP\nunits and in which units/facilities these STEP units will be housed. See this\nportion of the video here.\nPublic Comment\nThe Board heard in-person public comments from Dr. Victoria A. Phillips, Riley\nDoyle Evans, Natalie Fiorenzo, Michael Klinger, Anna Senft, and Kyriaki\nVetoulis-Acevedo.\nThe Board then heard virtual public comments from Mary Lynne Werlwas and\nEmily Joyce.\nThe Board’s next meeting is scheduled to take place on Tuesday, May 12, 2026\nat 1:00pm. See this portion of the video here.\n8","23":"Testimony of\nNatalie Fiorenzo\nSenior Corrections Specialist\nNew York County Defender Services\nBefore the New York City Board of Correction\nMarch 10, 2026\nI am Natalie Fiorenzo, Senior Corrections Specialist at New York County Defender Services\n(NYCDS). NYCDS is an indigent defense office that every year represents tens of thousands of\nNew Yorkers in Manhattan’s Criminal, Family, and Supreme Courts. The NYCDS Corrections\nSpecialist Team provides a direct channel of communication with and advocacy for our clients\nwho are incarcerated. Thank you for this opportunity to provide testimony.\n1. Permissible Items\nWe continue to experience significant problems with the Department of Correction’s\n(DOC) mailroom policies governing permissible items. DOC’s policy is not only overly\nrestrictive but also inconsistently applied, which has created widespread confusion for advocates\nand families attempting to send basic necessities to people in custody. We have testified about\nthis chronic issue several times before, and we are grateful to the Board for taking this issue on.\nBelow are a few recent examples of obstacles and confusion we encounter when attempting to\nsend mail to our clients at Rikers.\nAs we have repeatedly reported throughout this winter, packages containing thermal\nclothing continue to be rejected. Initially, thermals were not prohibited anywhere in the written\npolicy and would not have fallen under the category of impermissible undergarments. After\nadvocates began calling to inquire about why their client’s thermals were being rejected, DOC\nupdated its policy to explicitly prohibit thermals. Since this change, we’ve received mixed\nreplies about whether or not they are permitted, as most mail room officers have told us that\n\nwaffle-knit thermals are, in fact, permitted. However, DOC has testified to the opposite. This\nback-and-forth illustrates a puzzling dilemma: mailroom staff are willing and able to accept\nthermals, but for some reason DOC wants to prohibit them.\nThermals are not a luxury. Temperatures inside Rikers facilities’ vary widely; even during\nwarmer months some units are extremely cold due to unregulated air conditioning or\ninfrastructure issues. Despite DOC leadership touting the large amount of thermals they have on\nhand ready to give out, our clients have reported difficulty in obtaining them from staff, and long\nwait times if they ever do. There is simply no reason for this prohibition.\nWe are also encountering persistent problems with eyeglasses. Mailrooms have\nrepeatedly refused to accept glasses mailed to our clients. While DOC indicates that glasses can\nbe provided internally, the wait time is often much more than a month. During that time,\nindividuals who rely on glasses are effectively left without the ability to read, write, review legal\nor medical materials, use their tablet, or keep themselves safe. This issue is further compounded\nby DOC not allowing contact lenses to be sent to people in custody. We are not sure why glasses\nare no longer accepted by DOC, and we urge DOC to reverse course in their new rule.\nDOC also recently changed their policy regarding permissible shoes, making it\nunnecessarily strict and cost-prohibitive. As per the new policy, only name-brand Vans sneakers\nare permitted. They are rejecting identical shoes to Vans because they are not name-brand. At the\nsame time, DOC told us that only certain styles of Vans are allowed, in particular “Old Skool\nVans” and “Classic Slip-On.”1 The Old Skool style has laces, yet we have been told that no laces\nare allowed. Requiring shoes to be a specific brand, color combination, and style dramatically\nincreases the cost to organizations and families. The approved shoes cost at least $75, and they\nare difficult to find on Amazon, a significant expense and hurdle for not only our offices, but also\n1 Revised Mailing Items to Person in Custody, NYC DOC (last visited Mar. 11, 2025) at\nhttps://www.nyc.gov/site/doc/inmate-info/Revised_Mailing_Items_to_Person_In_Custody.page.\n\nfor families trying to support their loved ones.2 There is no reason why permissible shoes have to\nbe name-brand and not a more affordable version of the same shoe.\nLastly, we have observed a sharp increase in the rejection of clothing packages overall.\nOver the past several months, items that were previously accepted are now being frequently\nrejected without a consistent explanation or rationale. As a result, our office has stopped sending\nclothing packages since January, because they are repeatedly and consistently rejected. Packages\nare not returned back to sender, due to the fact that return costs are deducted from our clients’\ncommissary. This leaves people in custody without access to basic items that their advocates are\nattempting and willing to provide, while DOC is not. Taken together, these issues demonstrate\nthat the current mailroom policy is not functioning as intended. Instead of providing clear,\npredictable rules that do not harm the people in their custody, it has created nothing but\nconfusion and barriers. At the BOC meeting, DOC stated that they are re-visiting their\npermissible items list. The next iteration of their policy must address these problems we are\nraising.\n2. Legal Visitation Process\nWe are pleased to hear that DOC is developing a digital form to request legal visits,\nwhich should streamline scheduling and significantly reduce delays for legal teams seeking to\nmeet with their client. However, this digital system cannot be the only method for in-person legal\nvisits. We must retain the ability to meet with our clients, in a timely manner, without scheduling\na visit 48 hours in advance, due to the unexpected nature of the criminal legal process.\nIt is also worth noting that technological issues or website outages can occur. DOC must\nensure that the platform is consistently functional and that contingency plans are in place if the\nsystem experiences any technical problems. As this website and form are developed and\nimplemented, DOC should actively solicit feedback from legal providers who regularly navigate\nthe legal visit process to ensure that the system meets the needs of those who are using it. Finally,\n2 Vans Old Skool Unisex Sneakers, Amazon (last visited Mar. 11, 2026)\nhttps://www.amazon.com/Vans-Herren-Sk8-hi-Reissue-Sneakers/dp/B001C1FR4K/ref=sr_1_37?crid=1E5DVGFBJ\nKIZU&dib=eyJ2IjoiMSJ9.Pw9aoD4vOflKUN2s5RubTRs6kikI_awuYoeA90_LdPlPuzUEBWAGNaT0iYG2Lk8r8i\nsy3PTMwdPcwKziPfJynRTOp4Qoap23IN-2c3Xp85kvwXSIEW6o6Sz3yYyRLoAoox2OD32gpfM3em-9Xt6ms2u\nVB69XzUvbhdj4yEs2tZihRWILBbeu2DkZvFIJakCsbocTiJnaw8NXl_kwznZ3Ho38pLj-ktSm8vmsaytcFubkrPHgf5\nMD2cxR_RhqzVvTqtdT7OkcrmuZ3vWayL2Lv4R8a4L4_Q-Poyg2bT5SPMY.tPFNvTR1iZxEBB04G20Yd1N0u_F\nk0z1CR-XmVgPXYeo&dib_tag=se&keywords=old%2Bskool%2Bvans&qid=1772823191&sprefix=old%2Bskool\n%2Bvan%2Caps%2C104&sr=8-37&th=1&psc=1;\nVans Unisex Adult Classic Slip On, Amazon (last visited Mar. 11, 2026) at\namazon.com/Vans-Womens-Classic-Stackform-Sneakers/dp/B0B6QBSBT8/ref=sr_1_9?crid=3N8X17IMIN5TW&d\nib=eyJ2IjoiMSJ9.b4r9-2Xh951wkTbCmJcetu058ApOS5dA_pfGT5lD1D1iTHr8y9kCZjCLSEeWwyNlgBbn4FqGxj\nsw7os4nnfUX9juVMY3tU9U6imcK52hXcyeS17KVhbIp6KOFQqHNyx9yDTGue7LOr6G8ukk93TS1lnC2khco4y\nk_cpvV3pOeQx-d3OXgaK9xJd9isbT-cHt-_kOKFzLMyGMawQeIUXjtBqLVAyVToA_ExwxojATdaWKWgJ70EN\nPXvXjvLRWu-5Ea0CHfZlAL4a9PFXzYm3mxENxyl4XSfeiFjv9Tub8UIo.w9sd8wUN9cHwvHrjcwn-QeFpyS0gk0\nCs7KFN0Q6XjPw&dib_tag=se&keywords=slip+on+vans&qid=1773170041&sprefix=slip+on+vans%2Caps%2C1\n30&sr=8-9\n\nDOC should create public dashboards to track key metrics, such as how long wait times are for\nlegal visits, to promote transparency and accountability.\n3. De-escalation Units\nThe Board’s investigation into the DOC’s use of de-escalation units raises serious\nconcerns about the conditions under which people in custody are being held. These concerns are\nparticularly significant given the history associated with the atrocious spaces DOC has used for\nde-escalation. Individuals have previously been placed and trapped in “shower cages”, also\nknown as “decontamination units.” These are small cages that were designed for temporary\ndecontamination after pepper spray exposure. Instead of creating new spaces for de-escalation\npurposes, DOC decided to convert these shower stalls into cages. These units are dangerous and\nnotorious for self-harm incidents that have previously resulted in death.3 Inspectors recorded\nnumerous incidents where individuals were locked in these shower cages, screaming or injured.4\nSome had to be removed on stretchers after prolonged confinement or self-harm.5 Local Law 42\naddressed this troubling pattern and was intended to impose strict regulations governing the use\nof de-escalation spaces, including a strict prohibition of the usage of decontamination showers.\nWhile portions of the Board’s rules related to restrictive housing are currently subject to\nlitigation and a temporary restraining order, several provisions remain in effect. These include\nrequirements that decontamination showers cannot be used for confinement and that any\nspace used for de-escalation must comply with basic health and hygiene standards.6\nHowever, the Board’s investigation shows that DOC is not complying with these\nstandards. At yesterday’s BOC meeting, the Board found that at one facility an individual was\nheld in a holding pen for more than 24 hours without linen or bedding. Anecdotally from our\nclients, this is not unusual. Conditions like these raise serious concerns and show that individuals\nin DOC’s custody are being held in tortuous conditions.\nMoreover, only one facility, EMTC, was found to have a designated area intended for\nde-escalation that was not located within an in-take cell. This is notable because the DOC’s own\ndirectives, specifically Directive 5016, indicate that intake areas should not be used for\nde-escalation. It is unacceptable that this has been the norm on Rikers Island for years, and\nvirtually nothing has been done to create designated de-escalation areas in the remaining seven\nfacilities. It is imperative that DOC immediately makes plans to come into compliance.\n3 Chris Gelardi, Why Does Rikers Island Still Lock People in Shower Stalls (March 22, 2025) at\nhttps://nysfocus.com/2023/03/22/rikers-island-decontamination-deescalation-unit-shower-cages.\n4 Id.\n5 Id.\n6 NYC Administrative Code § 9-167(c)(1).\n\n4. Injury Response Report\nThe Board’s report on injury response highlights several persistent failures that continue\nto undermine meaningful oversight of safety conditions in New York City’s jails.7 There has been\na major increase in how long it takes for monthly injury reports to be submitted. In 2023, reports\nwere 17 days late, but this delay increased to 72 days in 2024, which is over two months.8 This is\ncompletely unacceptable. These reports are intended to allow oversight bodies to quickly identify\nemerging safety issues, patterns of violence, or dangerous conditions within the facilities. When\ninjury data is reported months late, it prevents oversight agencies from responding to problems in\nreal time and significantly weakens the accountability structure that these reporting requirements\nwere designed to create.\nOversight bodies also currently lack independent access to health data from Correctional\nHealth Services (CHS). Injury reporting relies largely on information provided by DOC, making\nit difficult to verify incidents independently or reconcile discrepancies between DOC reports and\nmedical diagnoses. The Board also has no access to the minutes or any other related\ndocumentation for these two agencies’ quarterly meetings. This limits the Board’s ability to\nverify how data is being used for corrective action. To be in compliance with Minimum Standard\n§3-16(c)(1), both agencies must maintain a coordinated electronic injury tracking system.\nThe Board additionally found that the annual injury review did not meaningfully analyze\nsafety issues. Although DOC submitted the report, the Board determined it did not identify\ncompliance problems, did not propose corrective action plans, and did not include substantive\nfindings about the causes of injuries or strategies to reduce them.9 Without this level of analysis,\nthe requirement cannot function as a meaningful tool for identifying systemic safety issues or\nimproving conditions in jails.\nLastly, the report identifies ongoing deficiencies in the reporting of self-harm incidents.\nThey are required to provide public reporting on self-harm, yet some required fields are missing\nand incidents are not consistently categorized by seriousness.10 Without providing clear\ncategorization and complete reporting, it is difficult to assess the scale of the problem or\ndetermine what interventions are reducing harm.\nThese concerns, taken together, show that while reporting does exist, it is not functioning\nin a timely or transparent manner, thereby, reducing the Board’s ability to effectuate proper\noversight.\n7 New York City Board of Correction, Injury Response in NYC Jails (Feb. 2026) at\nhttps://www.nyc.gov/assets/boc/downloads/pdf/2026-Board-of-Correction-Report-Injury-Response.pdf.\n8 Id. at 12.\n9 Id.\n10 Id. at 9.\n\n5. Outposted Therapeutic Units\nOur client’s experiences have raised concerns about how individuals with serious mental\nillness (SMI) are identified and placed in appropriate mental health units. Our organization has\nreceived conflicting information about how individuals are designated to PACE units and other\nspecialized mental health housing. In practice, access appears to depend on an active designation\nof SMI by CHS. However, this requirement can create barriers even when an individual’s\ncondition clearly warrants intensive mental health intervention.\nOur client’s experiences in this gray area show how the current system can delay safe and\nappropriate housing even when an individual’s condition is clearly severe. These challenges are\ncompounded by the broader lack of appropriate placements for people with SMIs. For years,\nplans have been discussed to create a secure treatment facility off Rikers Island for extremely\nmedically vulnerable individuals, and individuals with SMI designations who require intensive\ncare and may even be awaiting placement in Office of Mental Health (OMH) facilities. However,\nthese projects have been consistently and constantly delayed, as deadline after deadline is missed\nwith no end in sight. While some officials have stated that the facilities are ready to open, DOC\nhas indicated the opposite, claiming they have not yet verified whether the location could be\nconsidered “secure”. Yesterday, it came to light that staffing issues are at the heart of the delays.\nAs a result, seriously mentally and physically ill individuals are languishing in jails that are not\nequipped to provide the level of treatment that they need. DOC must open the Outposted\nTherapeutic Units immediately.\nWe also want to briefly address the recently announced STEP, or Supportive Transitional\nEngagement Program, units. Expanding mental health opportunities for people in custody is an\nimportant goal, and we were told that this unit would provide more mental health support for our\nclients who need more care than is provided in a general population setting, but do not quite\nrequire the care in a Mental Observation Unit. It is clear that CHS is very excited about this new\nunit, but our clients who have been placed there have no idea what kind of program they are in,\ncreating confusion and distress. It is imperative that DOC and CHS alert stakeholders, including\nadvocates, in a timely manner when they are planning large housing changes like STEP. Having\nthe ability to talk our clients through these transitions, because we are aware of them ourselves,\nwould make a more lasting impact on our clients. We want to ensure resources are used\nappropriately and are to the maximum benefit of our clients, and that we are able to help them\nnavigate this transitional period.\nThank you for holding this meeting and listening to our concerns. If you have questions\nabout this testimony, please contact me at nfiorenzo@nycds.org","24":"I grew up in East Harlem. I have been incarcerated since September of 2024. I am\ncurrently in RNDC (Robert N. Davoren Center) on Rikers Island. I have been held in RESH\n(Enhanced Supervision Housing) twice in the last year.\nIn RESH, there are different levels of lockdown. You’re on Level 1 at first. There are\nmore restrictions for people on Level 1 than on Level 2. People usually stay on a Level for thirty\ndays. The jail puts incompatible people, like people from different gangs, together on Level 3;\nit’s an experiment, and the experiment is not working out – people are getting cut in the face.\nThe first time I was in RESH, I was there for 60 days. After being on Level 1 for about a\nweek, I had a hearing. I was accused of being involved in an assault. I tried to bring in the victim\nso that he could tell the officers I wasn’t involved, but they didn't let me bring anyone in. The\nhearing officer said I was guilty.\nWhen hearings happen, you’re your own lawyer. Nobody gets representation. If you’re\ninvolved in an incident, you’re getting sent to the box. People rarely beat accusations.\nOne time, an officer accused me of being involved in an incident but he didn’t show me\nany videos or stills. I pled not guilty. They told me I was banned from contact visits indefinitely\nwhich typically only happens when there’s an incident during visitation. There’s supposed to be\npaperwork when they’re restricting visits, but the officer told me directly there was no paperwork\nabout my restriction. After a week, I was found guilty and dropped back to Level 1 for a month.\nOn Level 1, I spent most of my time in my cell alone - it felt like a cage. I was outside my\ncell for an hour each day for recreation. Sometimes the COs said we couldn’t go out for\nrecreation because of the weather. I was shackled to a chair for 4 hours a day. The COs would\nunchain us for a shower, and after the shower they wouldn’t let us come out again. I spent 19 or\n20 hours in my cell every single day. The COs strip search me every time I leave my cell -\ndoesn’t matter if it’s for a shower or recreation. It makes me not want to leave. There’ve been a\nlot of times where I’ve spent 2, 3, 4 days in the cell so that I don’t have to get strip searched.\nWhen I was on Level 1, my cell was on the second floor, the top tier. The COs don’t like\ncoming up to the top tier so it’s hard to get their attention. I had to bang on my cell door for 45\nminutes to an hour every day to get their attention so that I could use the bathroom, get a tissue,\nor ask for a pen. The officers are supposed to come around every 30 minutes. There are enough\nofficers around, but they ignore you. Someone could kill themselves and they wouldn’t know.\nIn RESH, we got visiting days once a week. I could hug my wife and son at the beginning\nand end of the visits, but I wasn’t allowed any other contact. During the visit, my leg was\nshackled to a chair. One time, after my son’s mother visited, she got banned for 180 days, and I\ndidn’t see my son the whole time.\nIn RESH, you’re away from everything. You feel out of sight and out of mind. It plays\ntricks on your mental health being in RESH. It made me feel like nobody could hear me. It took\naway any sense of control that I thought I had over my life. It made me feel hopeless and\nhelpless.\nThe way that we’re treated in RESH makes us feel like animals. Our meals were dropped\ninto our cells through a slot. Nobody actually checked in to see how we were doing.\n\nThe doctor would come by every morning for “sick visits” around 5 or 6 am, so you\nwould miss it if you weren‘t awake. One time, I put in for a sick visit for athlete's foot. When the\ndoctor came by, he didn’t even look at my feet. He just prescribed me a cream. On top of that,\nevery day, I was telling the staff that I needed to go to the dentist since I got here because my\nfilling fell out. I’d been asking to see the dentist, and I’d been repeatedly told that I’d be put on a\nlist. It took more than 5 weeks before I got an appointment.\nThere are also not enough mental health caseworkers. Most people only see them once\nduring their entire time inside. I want to tell them about what it feels like to be cut off from the\nworld. When I was in RESH a second time, I asked for an appointment but I never saw a\ncounselor. I wanted emotional support but I don’t think they’re able to offer that anyway. I got to\nspeak to someone in RNDC after a few weeks, but then at my next appointment it was a different\ncounselor; they told me it might keep being a different person every time. I think when you’re\ndealing with sensitive and confidential subjects you should be seeing the same person every time\nyou go to counseling so that you can build understanding.\nThere was nothing to do all day in RESH. The only thing you could do was read books\nand write letters – I read anything I could get my hands on to pass the time. Sometimes I couldn’t\neven write letters because I didn’t have a pen. The law library was the most consistent thing. But\non Level 1, you didn’t get to leave your cell when the law library came around – they’d just\ncome to your door and ask if there was anything you wanted to know or research.\nThere’s no programming in RESH. You might be let out of your cell and sit shackled to a\nchair for 10-15 minutes to talk to someone but there’s no curriculum. Sometimes we talked about\nthe game that was on recently. After a few minutes, they’d make you sign a book, and then\nthey’d leave and you’d go back to your cell.\nI was on Level 2 recently, and there I could sometimes go out without being shackled to a\ndesk. I was allowed in the recreation cage with other guys instead of doing rec alone. But even\non Level 2, I didn’t feel like coming out of my cell because I was being treated inhumanely. My\ncell didn’t have heating and they weren’t fixing it. They even came around with a thermometer to\ncheck how cold people’s cells were. I spent half the day under the blankets because it was too\ncold not to - I didn’t want to come out because it felt like being outdoors.\nOnce, they ran out of the allergen-friendly food I could have. I mentioned this and one of\nthe Deputy Wardens got aggressive - she grabbed my hand, which was sticking out of the slot in\nmy door, bent my wrist and pushed my hand back in. I heard her say “he thinks somebody\ncares.”\nI’ve been going through all the avenues I can to advocate for myself this whole time - I\nknow I should’ve had contact visits, the heat should’ve been on, and I should’ve been getting\nreal food, not Raisin Bran, for meals. I’ve filed grievances and 311 complaints, but it’s like they\ncan just ignore you. I think one positive change could be more frequent psych evaluations for the\njail staff - at least once every two years or ideally once a year.\nIn RESH, we were only allowed to have free calls for six minutes a day. I had to choose\nbetween calling my family and calling my lawyer, so I called my family. I have a wife and a\n\n5-year-old son. Talking to them is usually the only time I feel like I’m being heard. When I was\nin RESH last time I was locked up, we got to use the phones for 21 minutes every three hours so\nit was a big change. One time I talked to the warden about phone time, and he told me that phone\ncalls are so short to make sure that people don’t want to come back.\nI used to want to be moved to gen pop because I knew there was workout programming\nand social workers who would listen to music with you. But since I got moved out of RESH, I’ve\nrealized things are just as bad in gen pop. It’s still cold and the COs are cruel to people here too.","25":"This month, I sent two identical packages of religious materials that fit DOC’s\nrequirements to two clients housed in RESH. We recieved confirmation that both\npackages were delivered. The following week, one of the client’s packages had been\nsent back to me, the other had not. I had met with clients to confirm receipt, however\nneither of them received the items. 311 complaints were made and grievances were\nfiled.\nI called RESH directly, in order to be put in contact with the facility’s mail room. My\ngoal was to determine why the package was sent back and whether there was a\ndocumented issue. I was hoping to amend any issues in the future so that clients could\nget their packages.\nThe first officer I spoke to said they were not allowed to give me the phone number\nfor the mail room. I called the facility’s property officer, and they informed me that\nthe property officer doesn’t handle mail. They ended up transferring me to the resh\nmail officer but did not give me the phone number for future use. Once I got in contact\nwith the resh mail officer, he said he never had my client’s name in the system,\nmeaning the package never made it to RESH. The resh mail officer told me to contact\nthe Perry center mail room, because, according to him, all mail came through the\nPerry center.\nWhen I called the Perry center, the officer that picked up informed me that there was\nno mail room at the Perry center and that the information given to me was false. I\nasked about the mailing process, and he said his understanding was that a trailer that\nused to be outside the Perry Center gets mail. I was then informed that the trailer was\nno longer outside the Perry center; he had no idea where it was, and there was no way\nof contacting them by phone.\nI called the Perry Center property officer and the individual who I spoke with refused\nto give me their name, there manager’s name, or provide me with any information. I\nkept getting transferred to different people, hung up on, and would have to begin\nagain. After two hours on the phone, I am essentially left without answers.\nIt’s impossible to send mail to clients or follow internal mailing procedures if DOC\nemployees are not aware of the protocols in place. There is no way for attorneys to\ndetermine whether DOC is in compliance with their own procedures or we are unable\nto get clear answers regarding our rejected items. Legal offices are unable to verify\nwhat’s happening to there mail and are therefore unable to provide clients with\nnecessary items without a remedy in place.\n\nThank you,\nAubree Aguinaga, Esq.\nThe Bronx Defenders\n360 E 161st St.","26":"Email\nConfirmation:","27":"Introduction to CHS’ Supportive\nTransitional Engagement Program\n(STEP)\nJoseph Otonichar, DO\nChief of Mental Health\nCorrectional Health Services\nBoard of Correction meeting\nMarch 10, 2026\n\nOverview of Current Mental Health Continuum of Care\n▪ To meet the needs of the approximately 60% of CHS patients who require mental health\nservices, CHS provides a spectrum of jail-based care that ranges from individual and\ngroup counseling to medication treatment in an outpatient setting through residential-level\nmental health therapeutic housing units.\n▪ CHS assesses a patient’s therapeutic housing needs starting at jail admission and as\nappropriate throughout the period of detention.\n▪ Most patients with mental health needs can be housed in General Population (GP) and\nreceive mental health services in the clinic.\n▪ Patients with more significant mental health needs who would benefit from greater\nengagement with providers and from a more structured environment may be housed on a\nmental health therapeutic housing unit.\n\nMental Health Therapeutic Housing Units\n▪\nUntil recently, mental health therapeutic housing units have been comprised of\nMental Observation (MO) and Program for Accelerated Clinical Effectiveness\n(PACE) units.\n▪\nCHS’ mental health staff typically see these patients directly on the therapeutic\nhousing unit, as opposed to in the clinic. Patients on these units also receive\nenhanced clinical support and monitoring.\n▪\nPACE housing, more clinically intensive than MO housing, represents the\nhighest level of mental health care CHS provides in the jails.\n▪\nDepending on individual patients’ changing clinical needs, they may be\ntransitioned among GP, MO, and PACE housing.\n\nSupportive Transitional Engagement Program (STEP)\n▪\nIn its ongoing quality improvement work, CHS developed and implemented a\nnew level of care within the mental health therapeutic housing continuum.\n▪\nThis new therapeutic housing model, Supportive Transitional Engagement\nProgram (STEP), helps patients who do not, or no longer, require the full clinical\nsupport of an MO to maintain clinical gains.\n▪\nAn intermediate level between GP and MO, STEP units offer mental health\nservices, including individual counseling and therapeutic group activities, directly\non the housing units.\n▪\nSTEP also enables more targeted cohorting of clinically distinct populations\nacross the mental health therapeutic housing continuum, leading to more\neffective group and individual level interventions and improving the therapeutic\nmilieu of each type of unit.\n\nMental Health Therapeutic Housing Bed Counts\n▪\nThe number of PACE beds remains the same at 319 beds.\n▪\nThe number of MO beds decreases from 945 beds to 745 beds with the\nconversion of 200 beds to STEP.\n▪\nThe STEP units include 34 additional new beds.\n▪\nOverall, the number of mental health therapeutic housing beds is increasing\nfrom a total of 1,264 beds to 1,298 beds.\n\nChanges to Mental Health Therapeutic Housing\n▪\nUnits in NIC, RNDC, and RESH Annex opened in late February/early March.\n▪\nUnits in OBCC and GRVC are opening this week.\nPrevious MH THU continuum Revised MH THU continuum\nTotal beds: 1264 Total beds: 1298\n\nThank you to our DOC partners for helping to\nimplement STEP.\nQuestions or comments?"}};

function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function highlight(text, query) {
  if (!query) return escHtml(text);
  var re = new RegExp("(" + query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + ")", "gi");
  return escHtml(text).replace(re, "<mark>$1</mark>");
}
function snippet(text, query, radius) {
  radius = radius || 140;
  if (!query || !text) return escHtml((text||"").slice(0,180));
  var idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return escHtml(text.slice(0,180));
  var start = Math.max(0, idx - radius);
  var end = Math.min(text.length, idx + query.length + radius);
  var chunk = (start > 0 ? "…" : "") + text.slice(start, end) + (end < text.length ? "…" : "");
  return highlight(chunk, query);
}

// ── Keyword filter bar ────────────────────────────────────────────

function buildKeywordBar() {
  var freq = {};
  DATA.meetings.forEach(function(m) {
    (m.keywords||[]).forEach(function(k) { freq[k] = (freq[k]||0) + 1; });
  });
  var sorted = Object.keys(freq).sort(function(a,b) { return freq[b]-freq[a]; });
  var bar = document.getElementById("keywordBar");
  if (!sorted.length) { bar.style.display = "none"; return; }
  var html = '<span class="bar-label">Filter by topic:</span>';
  sorted.slice(0, 30).forEach(function(k) {
    html += '<span class="kw-filter" data-kw="' + escHtml(k) + '">' + escHtml(k) + '</span>';
  });
  bar.innerHTML = html;
  bar.querySelectorAll(".kw-filter").forEach(function(el) {
    el.addEventListener("click", function() {
      var kw = this.dataset.kw;
      if (activeKeyword === kw) {
        activeKeyword = "";
        this.classList.remove("active");
      } else {
        document.querySelectorAll(".kw-filter.active").forEach(function(x){x.classList.remove("active");});
        activeKeyword = kw;
        this.classList.add("active");
      }
      renderMeetings();
    });
  });
}

function runSearch() {
  currentQuery = document.getElementById("searchInput").value.trim();
  var scope = document.getElementById("searchScope").value;
  var container = document.getElementById("searchResults");
  if (!currentQuery) {
    container.innerHTML = "";
    renderMeetings();
    return;
  }
  var q = currentQuery.toLowerCase();
  var hits = [];

  DATA.meetings.forEach(function(m) {
    if (scope === "all" || scope === "captions") {
      if (m.has_caption && m.caption_text && m.caption_text.toLowerCase().indexOf(q) >= 0) {
        hits.push({ date: m.date, display: m.display, title: "Video Transcript", source: "transcript",
          text: m.caption_text, action: (function(x){ return function(){ openCaption(x); }; })(m) });
      }
    }
    m.docs.forEach(function(d) {
      if (scope !== "all" && scope !== d.doc_type) return;
      var text = DATA.doc_texts[d.id] || "";
      if (text && text.toLowerCase().indexOf(q) >= 0) {
        hits.push({ date: m.date, display: m.display, title: d.title, source: d.doc_type,
          text: text, url: d.url, action: (function(dd, tt){ return function(){ openDoc(dd, tt); }; })(d, text) });
      }
    });
  });

  hits.sort(function(a,b) { return b.date < a.date ? -1 : 1; });

  if (!hits.length) {
    container.innerHTML = '<div class="no-results">No results for &ldquo;' + escHtml(currentQuery) + '&rdquo;</div>';
    document.getElementById("meetingsList").style.display = "";
    return;
  }
  var html = '<div style="font-size:13px;color:#666;font-family:sans-serif;margin-bottom:10px">'
    + hits.length + ' result' + (hits.length===1?'':'s') + ' for &ldquo;' + escHtml(currentQuery) + '&rdquo;</div>';
  hits.forEach(function(h, i) {
    html += '<div class="search-hit" data-hit="' + i + '">';
    html += '<div class="hit-date">' + escHtml(h.display) + ' &middot; ' + escHtml(h.source) + '</div>';
    html += '<div class="hit-title">' + escHtml(h.title) + '</div>';
    html += '<div class="hit-snippet">' + snippet(h.text, currentQuery) + '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
  document.getElementById("meetingsList").style.display = "none";
  container.querySelectorAll(".search-hit").forEach(function(el) {
    el.addEventListener("click", function() { hits[parseInt(this.dataset.hit)].action(); });
  });
}

document.getElementById("searchInput").addEventListener("keydown", function(e) { if (e.key==="Enter") runSearch(); });
document.getElementById("searchInput").addEventListener("input", function() {
  if (!this.value.trim()) {
    document.getElementById("searchResults").innerHTML = "";
    document.getElementById("meetingsList").style.display = "";
    currentQuery = "";
  }
});

// ── Meetings list ────────────────────────────────────────────────

function renderMeetings() {
  var meetings = DATA.meetings.filter(function(m) {
    if (!activeKeyword) return true;
    return (m.keywords||[]).indexOf(activeKeyword) >= 0;
  });

  var html = "";
  meetings.forEach(function(m) {
    var hasContent = m.docs.length > 0 || m.has_caption;
    html += '<div class="meeting-row' + (hasContent ? '' : ' no-content') + '">';

    // Header row: date + year + YouTube link
    html += '<div class="row-head">';
    html += '<span class="row-date">' + escHtml(m.display || m.date) + '</span>';
    html += '<span class="row-year">' + m.date.slice(0,4) + '</span>';
    if (m.youtube_url) {
      html += '<a class="row-yt" href="' + escHtml(m.youtube_url) + '" target="_blank" rel="noopener">&#9654; Watch</a>';
    }
    html += '</div>';

    // Summary or placeholder
    html += '<div class="row-summary">';
    if (m.summary) {
      html += escHtml(m.summary);
    } else if (hasContent) {
      html += '<em>Summary not yet generated — run summarize.py</em>';
    } else {
      html += '<em>No materials posted yet</em>';
    }
    html += '</div>';

    // Keyword chips
    if (m.keywords && m.keywords.length) {
      html += '<div class="row-keywords">';
      m.keywords.forEach(function(k) {
        var isActive = k === activeKeyword;
        html += '<span class="kw-chip' + (isActive ? ' active' : '') + '" data-kw="' + escHtml(k) + '">' + escHtml(k) + '</span>';
      });
      html += '</div>';
    }

    // Document chips + transcript chip
    if (hasContent) {
      html += '<div class="row-docs">';
      var typeOrder = ["minutes","agenda","testimony","variance","report","other"];
      typeOrder.forEach(function(t) {
        m.docs.filter(function(d){return d.doc_type===t;}).forEach(function(d) {
          html += '<span class="doc-chip ' + d.doc_type + '" data-meeting="' + escHtml(m.date) + '" data-docid="' + d.id + '">';
          html += escHtml(d.title) + '</span>';
        });
      });
      if (m.has_caption) {
        html += '<span class="cap-chip" data-meeting="' + escHtml(m.date) + '">&#9654; Transcript</span>';
      }
      html += '</div>';
    }

    html += '</div>';
  });

  if (!html) html = '<div style="color:#888;font-family:sans-serif;padding:20px 0">No meetings match the selected filter.</div>';
  document.getElementById("meetingsList").innerHTML = html;

  // Keyword chip clicks (filter by that keyword)
  document.querySelectorAll(".kw-chip").forEach(function(el) {
    el.addEventListener("click", function() {
      var kw = this.dataset.kw;
      if (activeKeyword === kw) {
        activeKeyword = "";
      } else {
        activeKeyword = kw;
      }
      // Sync bar
      document.querySelectorAll(".kw-filter").forEach(function(x) {
        x.classList.toggle("active", x.dataset.kw === activeKeyword);
      });
      renderMeetings();
    });
  });

  // Doc chip clicks
  document.querySelectorAll(".doc-chip").forEach(function(el) {
    el.addEventListener("click", function() {
      var docId = parseInt(this.dataset.docid);
      var dateStr = this.dataset.meeting;
      var meeting = DATA.meetings.find(function(m){ return m.date===dateStr; });
      if (!meeting) return;
      var doc = meeting.docs.find(function(d){ return d.id===docId; });
      if (!doc) return;
      openDoc(doc, DATA.doc_texts[docId] || "");
    });
  });

  // Transcript chip clicks
  document.querySelectorAll(".cap-chip").forEach(function(el) {
    el.addEventListener("click", function() {
      var dateStr = this.dataset.meeting;
      var meeting = DATA.meetings.find(function(m){ return m.date===dateStr; });
      if (meeting) openCaption(meeting);
    });
  });
}

// ── Detail panel ────────────────────────────────────────────────

function openDoc(doc, text) {
  document.getElementById("panelTitle").textContent = doc.title;
  document.getElementById("panelMeta").innerHTML = '<a href="' + escHtml(doc.url) + '" target="_blank" rel="noopener">Open PDF &#8599;</a> &nbsp;&middot;&nbsp; ' + doc.doc_type;
  document.getElementById("panelSearch").value = currentQuery || "";
  renderPanelBody(text || "(No text extracted from this PDF)", currentQuery || "");
  openPanel();
}

function openCaption(meeting) {
  document.getElementById("panelTitle").textContent = (meeting.display || meeting.date) + " — Transcript";
  var meta = meeting.youtube_url
    ? '<a href="' + escHtml(meeting.youtube_url) + '" target="_blank" rel="noopener">Watch on YouTube &#8599;</a> &nbsp;&middot;&nbsp; auto-captions'
    : 'auto-captions';
  document.getElementById("panelMeta").innerHTML = meta;
  document.getElementById("panelSearch").value = currentQuery || "";
  renderPanelBody(meeting.caption_text || "", currentQuery || "");
  openPanel();
}

function renderPanelBody(text, query) {
  var body = document.getElementById("panelBody");
  if (query) {
    body.innerHTML = highlight(text, query);
    var first = body.querySelector("mark");
    if (first) first.scrollIntoView({block:"center"});
  } else {
    body.textContent = text;
    body.scrollTop = 0;
  }
}

function highlightInPanel(query) {
  renderPanelBody(document.getElementById("panelBody").textContent, query);
}

function openPanel() {
  document.getElementById("detailPanel").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closePanel() {
  document.getElementById("detailPanel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

document.addEventListener("keydown", function(e) { if (e.key==="Escape") closePanel(); });

// ── Init ──────────────────────────────────────────────────────────
buildKeywordBar();
renderMeetings();
</script>
</body>
</html>
