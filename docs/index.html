sed in the Riker's infirmaries. uh\nand they have conditions that include\ncancer, congestive heart failure, COPD,\ncerosis, endstage renal disease, and the\nmajority of our medically complex\npatients are older, so 55 plus. Uh next\nslide, please.\nUh so this is the problem that Just Home\nis seeking to resolve in part. Uh so\njust home is an innovative housing\ninitiative that will provide permanent\nhousing and supportive wraparound\nservices uh for medically complex New\nYorkers who would otherwise experience\nhomelessness after they leave jail. And\nJust Home is part of New York City\nHealth and Hospitals Housing for Health\ninitiative. Uh through this initiative,\nH&H and its development partners have\ncreated more than 1600 units of\naffordable and supportive housing\nthroughout Brooklyn, Manhattan, Queens,\nand Staten Island, but not yet the\nBronx. Uh, next slide, please.\nSo, Just Home will turn an underutilized\nbuilding on the Health and Hospitals\nJacobe campus in the Bronx into 83\nstudio apartments financed under the New\nYork City Department of Housing\nPreservation Development, HPD's uh,\nsupportive housing loan program. And you\ncan see the renderings here of the\nbuilding and then one of the apartment\nunits. Uh, so Just Home will include 58\nsupportive units for former CHS\npatients, 24 affordable units accessible\nthrough New York City Housing Connect\nfor New Yorkers who qualify by income,\nand then one larger unit for a live-in\nsuperintendent. Next slide, please.\nSo, Just Home is a 100% affordable\nhousing development. All tenants will\nhave a rent stabilized lease and\nsupportive housing tenants will be\neligible for a rental subsidy. Uh and\njust home will be financed with $1\nmillion in justice involved supportive\nhousing, JIS funding, uh for the\noperating costs. Uh many of you may be\nfamiliar with JI just uh but it is an\nevidence-driven model of permanent\nsupportive housing uh that has been\nshown to lead to fewer returns to jail,\nless shelter use, and improved health\noutcomes. And here you see a rendering\nof the uh just home lobby. Uh so now I\nwill talk briefly about the Fortune\nSociety. Again, many people here are\nlikely familiar. Uh in July of 2022, uh\nHPD designated the Fortune Society to\nserve as the nonprofit developer for\nJust Homes. This is the dream partner\nthat Paty referenced. Uh Fortune\nsupports successful re-entry from\nincarceration. Uh and they have operated\ntransitional shelter for 23 years,\npermanent housing for 10 years, and have\nprovided highquality social services for\n55 years. Next slide, please.\nUh so just home tenants will have access\nto Fortune's licensed clinical social\nworkers, dedicated peer workers and\nspecialists uh to provide intensive\nsocial services and other programming.\nUh and just home tenants will have close\naccess to the health care at Jacobe. Um\nthat's either through the hospital or in\ntheir homes and Fortunes on-site case\nmanagers will work with the Jacobe\nmedical providers to help coordinate the\ncare. Uh which is why the location on\nthe hospital camp campus is so\nessential. Next slide please.\nUh so I have a couple slides just\ntalking about the selection process. Uh\nso first CHS will identify current\npatients with medical needs who would\notherwise have nowhere to live after\nleaving jail and may be good candidates\nfor just home. Uh and CHS clinicians\nwill consider the patients entire health\nprofile including the severity of their\nillness and their level of functional\nneed. Next slide please.\nUh so then they will refer these\npatients to Fortune who will conduct\ntheir own tenant screening process. Uh\nFortune will draw upon his decades of\nexperience providing highquality social\nservices and housing and making these\ndeterminations and screen out\nindividuals uh who pose an unacceptable\nrisk for violence or may otherwise uh be\ndeemed inappropriate for this kind of\nhousing. And then finally, the courts\nwill need to release the person back to\nthe community with their case\nadjudicated in order for the person to\nmove into just home. Uh so that of\ncourse while potential just home\nresidents will complete the initial\nscreening and application process while\ndetained, they can't be in custody at\nthe time of move in. Uh and last slide\nplease. Uh so this shows some of the\njust home milestones. I won't go through\nall of them. Uh but as Paci mentioned uh\nthis process uh began in part in June of\n2021 when we secured the justice\ninvolved supportive housing funding. Uh\nwe've worked on this project for many\nyears a lot of public engagement. Uh and\nthen I will just call out that last\nmonth Mayor Mandami announced that his\nadministration is uh committed to\nadvancing just home. Uh so in terms of\nnext steps, uh we hope to finalize the\nlease, secure financing, and start\nconstruction by the end of the year,\nwhich would allow for tenant occupancy\nuh late 2027 or early 2028.\nHappy to answer any questions.\n&gt;&gt; I just have a brief question. Is this\nonly reflective of the building in the\nBronx?\n&gt;&gt; It is just the one building and 83\nunits. It's just taken us okay about\nfive years to\n&gt;&gt; get. Thank you.\n&gt;&gt; Any other questions? Board members.\n&gt;&gt; It's not a question, but I just want to\ncongratulate you guys on this. It's so\nexciting. I think it's going to be so\ngood for the city and I feel really\nexcited about it. Appreciate it. Thank\n&gt;&gt; Well, congratulations.\nWe will now hear comments from uh the\npublic. Jasmine will call the names of\nthose signed up to speak.\n&gt;&gt; First, we have Christopher Bole,\nfollowed by Natalie Fiorenzo.\nGood afternoon all. My name is\nChristopher Bole. I'm director of data\nresearch and policy and here at County\nDefender Services. I'm sure that you\nremember me on other occasions. Um I'm a\nlittle disappointed not to see the the\ncommissioner here as well as the the\nreceiver. Um, I wanted to wish them well\nas to what's going to happen at this\npoint. Um, but I do want to take this uh\nfew minutes that I have to talk about\nsomething that's happening on Riker's\nIsland that you may not be aware of. Uh,\nwe currently have litigation that's\ngoing on with the Department of uh,\nOffice of Mental Health. Uh, there are\num, as many I've heard different terms\nand this is one of the asks I'm I'm\nasking of the board. uh somewhere\nbetween two and 400 people that are on\nRiker's Island right now that have been\nfound unfit, which means that they have\nto be moved to a state mental hospital.\nUm what has happened is that there's not\nenough beds in the state mental\nhospitals right now. And so there's a\nhuge backlog uh that's happening on\nRiker's Island right now. Um the concern\nI have is that I don't know any numbers.\nSo, we've been trying to look at data\nportals to find out how many uh of these\nparticular clients are on Riker's\nIsland. Is it 200? Is it 300? Is it less\nthan 200? We can't seem to find that\nanywhere in any data portals uh for the\ncity or any dashboards for the\nDepartment of Corrections. The other\nconcern that we have is that um I can't\nalso find any data on how many beds are\nin the PACE units and how many beds are\nin the MO units because the concern I\nhave is that uh these particular clients\nwho are especially vulnerable could end\nup in general population at some point\nonce the buildup becomes so massive uh\nand the beds unavailable beds at these\nother locations um become a huge\nproblem. So, we are in the middle of\nlitigation with the office of mental\nhealth and state supreme court and uh\nthe department of corrections showed up\non one of the dates we were having these\narguments. We had didn't have a chance\nto have a discussion about uh the\ndepartment of corrections providing data\nuh for the litigation. And I think that\nit would be important for you to have\nconversations with the Department of\nCorrections about providing data for\nhow full are the PACE units and the MO\nunits. Are they full with unfit clients\nand how many unfit clients are currently\nwaiting on Riker's Island to be moved to\nthe Office of Mental Health? Um, but\nit's a it's a problem that could soon\nballoon and it's obviously causing the\npopulation on Riker's Island to\nincrease. The understanding that I have\nfrom the office of mental health is that\ntheir position is that they asked for a\nbuildout\num for more money in the fiscal year\n2026, but that the buildout isn't\nexpected to happen until sometime in\n2028, which obviously uh is not going to\nsolve the problem. Now,\n&gt;&gt; thank you,\n&gt;&gt; Natalie. Natalie Fiorenzo followed by\nMichael Clinger.\nHi, good afternoon everybody and welcome\nto the new commissioner, Mr. Richards,\nand to Mr. DML, the newly courtapp\nappointed remediation manager. Um, we\nthought you would be here today, but\nhopefully you are watching at home\nonline. Uh, my name is Natalie Fiorenzo\nand I am the senior correction\nspecialist at New York County Defender\nServices or NYC. At NYC, we represent\ntens of thousands of New Yorkers every\nyear. About eight years ago, when NYC\nmanagement realized our attorneys did\nnot have the bandwidth to meaningfully\nsupport their incarcerated clients with\ntheir issues outside of their legal\ncase, our unit was formed. We build\ntrusting relationships with our\nincarcerated clients and advocate for\ntheir rights, which on Riker's Island\nare consistently violated. Because these\nviolations arise constantly, we advocate\nnot only in our daily work with DOC, but\nalso in public forums such as this one,\nwhere we can provide the board with\ninsight that they otherwise may not\nhave. I hold hope that with this new\nleadership at DOC, our goals will become\nmore aligned than at odds. 2025 ended\nwith yet another incredibly high number\nof deaths in custody. It is so immensely\nheartbreaking to say that these deaths\nwere preventable and that someone's\nchild, someone's brother, someone's\nsomeone will never walk this earth again\ndue to the negligence, the apathy, and\nthe insidious culture of us verse them\nthat pervades Riker's Island. How would\nyou feel if your brother was being\ntreated in the hospital, unable to care\nfor himself, and required medication\nevery 30 minutes? But the nurse who's\nsupposed to do these rounds just doesn't\nshow up for hours and he dies as a\nresult. How would you feel if a medical\nprovider attending to your elderly\nparent ordered a medically necessary\nhigher level of care? But hospital\nsecurity said no, causing your parent to\npass away. That behavior would never go\nignored and would certainly not become\nthe norm. Those who work on Riker's\nIsland have an incredibly serious job\nand it needs to be treated as such\nbecause the stakes are life or death. I\nlook forward to DOC adopting\nrecommendations made by the board, thus\nprotecting the livelihood of those in\nDOC's custody. Lastly, this is a cold,\ncold winter. The past two weeks, I have\navoided going outside in any way that I\ncan, packing on two or three layers.\nEvery time I have to leave my apartment,\nincluding today, I am wearing wool\nthermals under these pants as I stand\nhere. Being stuck outside in this\nweather can be a death sentence, and\ntragically, many houseless New Yorkers\nhave died this winter because of it.\nBeing warm is not a luxury in the\nwinter. It is a vital and basic\nnecessity. It is also the law. Uh if it\nis below 55 degrees outside, as we all\nknow, dwellings have to maintain a\ntemperature of 68 degrees during the day\nand 62 at night. It's no secret that DOC\nhas been found in non-compliance over\nnumerous monitoring periods due to an\nabundance of broken windows. Not only\nhave our clients been reporting no heat\nin their housing areas, but as of last\nweek, DOC has inexplicably removed\nthermals from the permissible package\nlist. Our office sends clothes, books,\nart supplies to our clients regularly,\nand thermals is one of the most\nrequested items that we get due to DOC's\ninability to regulate temperatures in\ntheir facilities. Putting aside that\nthis should not be an issue at all in\nthe first place. Removing this item from\nthe list in the coldest month of the\nyear is indefensible. We have been told\nnot to worry because officers are\ndistributing thermals left and right.\nBut many of our clients who have\nrequested them do not have them still.\nTorres says that all you have to do is\nask. Who are they going to ask? The\nofficer who skipped out on their tour?\nThe officer who didn't bring it when\nthey asked last week?\nThis is an urgent matter and it needs to\nbe top priority for the new\nadministration. Please do not let this\nlead to another preventable death in\ncustody and never forget that that is\nexactly what's at stake here. Thank you.\n&gt;&gt; Thank you, Michael Clinger, followed by\nChaplain Dr. Victoria A. Phillips.\n&gt;&gt; Good afternoon again. Um, at the outset,\nI'd just like to thank you for your\nengagement with the well, so many of the\nissues today, but particularly constant\nsupervision. I may not be the only one\nwho finished that presentation with more\nquestions than I had at the beginning.\nUm, one of the questions Dr. also\nalluded to pretty directly is\nif one of the criteria for entering\nconstant supervision has to do with\nbehavior then how is this different from\nany enhanced supervision or indeed the\nSMU or indeed any of the other many\nnames that we've seen for situations\nwhere people are given something less\nthan due process to which they're\nentitled. Uh, and it's a concern now as\never, but especially now because local\nlaw 42, which this board has passed\nregulations to implement, would\nspecifically address increasing the\nability for people to challenge and test\nthe determination by the department to\nput them in any form of separated\nhousing. And what we're seeing here is\nan extreme form of separated housing.\nSo, uh, and also I would just note that\nif you were listening for the the people\nin custody public comments, there was a\nreport from someone who alleged they\nwere held in something like solitary\nconfinement at West facility and\nsomething that sounded an awful lot like\nit might have been constant supervision.\nSo, it came up a bunch of times today.\nThere was some confusion about its\nrelationship to suicide watch. There was\na claim that you were you would be\nplaced in there for any number of\nreasons. Behavior was one of them and\nthen it turned out behavior wasn't one\nof them. um or only in one very extreme\ninstance was. So these are the nature of\nthe questions that I think we maybe all\nstill have. So thank you for digging in\ntoday and uh and I'll be brief in the\nremainder of my comments. Um I didn't\neven introduce myself. My name is\nMichael Clinger. I'm a jail services\nattorney with Brooklyn Defenders. Um\nthank you for the opportunity to provide\nsome comment today. Um, I do want to\ntake this opportunity to welcome the\nincoming administration, the new newly\nappointed incoming commissioner and the\nremediation manager. Um,\nand especially want to draw everyone's\nattention here to comments made by\nincoming commissioner Richards in\nyesterday's Queens Daily Eagle. Um,\nwhich perhaps you saw. Um, but he\nspecifically expressed a commitment to\nreducing the population in the jails,\nwhether through increased and improved\naccess to diversion programs or to a\nfull review of the city sentence\npopulation for robust use of the\ncommissioner's 6A release powers. These\nare priorities that Brooklyn Defenders\nwholeheartedly shares with him indeed\nthat we shared with the new\nadministration and they also reflect a\ncommitment very much in line with the\nrecommendations made by this board. Um,\nmore generally though, the incoming\ncommissioner expressed the desire to\nforeground the humanity of everybody uh\nwhose lives intersect with the city\njails. And I think he was very careful\nto make sure that it was clear he meant\npeople who work there and people who\nlive there and people who visit there.\nUm, so I would just say a group of\nadvocates including Brooklyn Defenders\nrecently asked the department to\nrecommmit to a collaborative working\ngroup to examine the process of visiting\nloved ones in city jails. and incoming\ncommissioner Richard sent a statement in\nsupport of this effort and we remain so\nencouraged and so grateful for that\nsupport. We're eager to collaborate with\nthe new commissioner, with the new\nadministration, with the Nunes\nremediation manager and of course with\nthis board to reduce the population in\nthe jails, increase the health and\nwellness of the people who live and work\nthere and by doing so to obtain more\njust, more humane outcomes for the\npeople we represent, their families and\ntheir communities. Thank you.\n&gt;&gt; Thank you, Chaplain Dr. Victoria A.\nPhillips.\n&gt;&gt; Peace and blessings everyone.\n&gt;&gt; I'm Chaplain Dr. Victoria Phills.\nEveryone just calls me Dr. V. And today\nI'm representing myself, you know,\nVisionary V ministries and the Jails\nAction Coalition. And I simply just want\nto touch on a few things. Um first I\nwould like to highlight you know um this\nmeeting had two parts I believe. First\nit was the public hearing part around\nmental health and minimum standards and\nthen it was the official hearing. And I\njust wanted to say that um DOC is still\non city payroll and they did not come up\na hand here until 1:36 p.m. CHS was here\nthe beginning of the meeting. And I want\nto point that out because we were here\nto talk about mental health that occurs\non Riker's Island with detainees in the\ndepartment's custody. And once again,\nthey were not around for public comment\njust like they are not now. So they came\nlate and they left early. I want that on\nthe record for New York City to know.\nUm, and I say that because how do the\ndepartment always come with excuses to\nyour questions with no real concrete\nanswers in real time and still think\nit's okay to not hear from the voices of\nthe people directly impacted and their\nloved ones? How can we truly make change\neven in this day and age with this\nadministration if this department is\nallowed to continue to be disrespectful\nto the people of New York and the very\nlives that they are responsible for? So\nwhen we talk about mental health, mental\nhealth impacts all aspects of one's life\nand especially someone who's being\ndetained. And the officers have a union.\nSo I'm not going to talk about the\nmental health aspects of workers on\nRiker's Island. I'm going to speak for\nthe people who do not have a union, do\nnot have anyone but us advocates out\nhere in the streets to talk for them.\nAnd so I want to quickly address you\nwomen on the board. So when we talk\nabout mental health, I want you to think\nwhen you think about these minimum\nstandards, what that means for someone\nwho has a reproductive system. We've\nheard today people having no access to\nshowers for 8 days. That also occurs\nwith females. I want you to think what\nthat's like when you have your period. I\nwant you to think what that's like when\nyou are full of tumors or fibroids and\nhave excessive bleeding and don't have\naccess to a shower or pads or anything\nconnected to a medical staff in a timely\nmanner. I want you to think about what\nthat means when we talk about those\nsymptoms and it leads to someone having\nlack low doses of iron and other things\nthat might require medical care that we\nknow people are not having access to in\njail. And I just also want to highlight\nthat it was this very board that I\ntalked to last year and spoke about an\nofficer being attacked by another\nofficer. And I want to ask you, when you\nthink of mental health, what does that\nlook like for a detainee that's attacked\non the island by an officer who is\nafraid to put in a grievance? What does\nthat look like when we tell CHS it's\nokay for you to wait 14 days to come\naround and reassess somebody when we\nknow the environment in jails is forever\nchanging and someone's life can go just\nlike that. Just like that in less than\nthe three minutes that I was allowed to\nspeak. So I just want you to truly think\nwhen you think about mental health and\nminimum standards, think from a humanity\nperspective and then think about safety.\nThink from accountability perspective\nand think about implementation and true\nsolutions. This is how we will protect\nthe lives and we will not lose any more\nunder our watch. And I say our watch\nbecause whether or not I'm working in\nDOC or not, I'm still part of the\ncommunity that we are a part of. And if\nwe don't fight for us, ain't nobody else\ngoing to fight for us. Please do your\njobs and we are here to support you.\nThank you. We have one person remotely,\nKayla Simpson.\nI'm here. Just waiting for the video.\nHey, Kayla. Um,\nI'm I'm allowing the video. I don't\nknow. Can you not turn yours on?\n&gt;&gt; It says I can't.\n&gt;&gt; We can hear you.\n&gt;&gt; Turn your camera on one more time. Try.\nI'm allowing you. You're good to go.\n&gt;&gt; It won't it won't let me. Um, but but\nmaybe\n&gt;&gt; you're in the house. We can hear you in\nin um downtown.\n&gt;&gt; Wonderful. Maybe maybe it'll just have\nto be my voice today. Uh hello again\neveryone. Um I'm Kayla Simpson.\n&gt;&gt; I'm a supervisor.\n&gt;&gt; Kayla, could you hold one second?\n&gt;&gt; Yes, sir.\n&gt;&gt; Would really like to see you. Maybe we\ncan go to the next speaker.\n&gt;&gt; It's not working. Oh, this one. Okay.\nIt's just you. I'm sorry. I'm\n&gt;&gt; I'm the whole show today, chair.\nYeah, we'll try for a few more seconds\nand then we'll just continue because you\nare the last speaker.\n&gt;&gt; Hey Kayla, just check in one more time.\n&gt;&gt; Okay, we're being told it's on your end,\nso we will continue at this time.\n&gt;&gt; Okay, Kayla, you're good to go. Thank\n&gt;&gt; We'd like to see you, but we'd love to\nhear your testimony.\n&gt;&gt; Okay. Thank you. Um, sorry about that. I\nI don't know what's going on, but um, my\nname is Kayla Simpson. I'm a supervisor\nat the Prisoners Arts Project, the Legal\nAid Society. I'm also part of the\nPlaniff's Council team in Nunees. Hello\nagain. Um, first just one quick word\nabout touring. Thank you board members.\nSincerely, thank you for asking\nquestions and following up on those\nquestions. You know, I couldn't agree\nmore with Warden Caputo that touring is\nessential, that it's a bedrock of\ncorrectional practice. And that's why I\nremain so disturbed that the answer\ntoday to a board member's observation\nthat this has clearly been a serious\nproblem for years and she's observed it.\nAnd what can we do besides these steps\nthat you say you've taken was just to\ncontinue to repeat those same\ndemonstrably ineffective steps. Um, and\nwe can't be satisfied with these\nanswers. um just asking that the board\nkeep this item on the agenda because the\ncost of those failures is quite\nliterally harm and death. Uh which leads\nto the second point I wanted to raise\ntoday. I lost count of how many times\nduring this meeting that DOC told you\nthey'd get back to you or they'd follow\nup or look into something you've raised.\nAnd of course, we want them to engage\nwith you. We hope they answer those\nquestions, but it is also important that\nthose answers are provided publicly. If\nwe permit DOC to not answer questions in\nthis forum but to answer them offline,\nwe lose the important piece of oversight\nthat is public accountability. And of\ncourse, the board then loses the\nexpertise of people outside of the\nagency that can help make oversight\nbetter, too. So, we ask that those\nanswers be provided publicly. And then\nfinally,\nregarding constant supervision, uh\nagain, sincere thanks to the board and\nboard staff for identifying this issue\nand for investigating it and for\nreporting on it here today. And the\ndescriptions we heard today of how this\npolicy is being abused are extremely\ndisturbing. But I'm also compelled to\nsay that this isn't new. It sounds like\nanother name for the black holes that\nhave existed time and again in DOC. MD9\nSouth, MDC9 South, NIC second and third\nfloors. Those are just two. Time and\nagain, DOC finds corners of the jails to\nwarehouse people that they deem\nproblems. And of course, these are\ncomplex and difficult issues. Of course,\nwe must find safe ways to deal with\nthem. But we have to demand more of\nourselves than just separating these\npeople and isolating them. When there\nare severe safety concerns, when there\nare ongoing safety issues, when there\nare ongoing mental health crises, we\nneed different interventions that work.\nAnd this has been a problem for years.\nBOC rulemaking tried to answer this with\nRMAS. Local law 42 tries to answer this,\ntoo. But whatever the name of the\nsolution, it isn't this carousel of dark\ncorners for people deemed difficult and\ndangerous.\nAgain, I just want to thank you so much\nfor your thoughtful questions today. We\nlook forward to next month's agenda and\nfor the potential for progress with a\nnew administration. Welcome,\nCommissioner Richards, and the entrance\nof the remediation manager. Appreciate\nit. Thank you.\n&gt;&gt; Thank you, Kayla.\nThank you everyone who attended and\nparticipated in today's meeting. The\nboard's next meeting is scheduled to\ntake place on Tuesday, March 10th, 2026\nat 100 p.m. This time, I'll take a\nmotion to adjurnn.\n&gt;&gt; Motion to adjurnn.\n&gt;&gt; All in favor? I\n&gt;&gt; opposed.\nWithout hearing any objection, the\nmeeting is now adjourned.","summary":"The February 10, 2026 Board of Correction meeting addressed emergency preparedness, deaths in custody, and proposed rulemaking on mental health standards and access to counsel. DOC presented its response to a winter storm and power outage on Rikers Island, emphasizing emergency protocols and generator deployment. The Board released a report on seven deaths in custody with 13 recommendations to DOC and CHS on supervision, medical response, and mental health care. The Board unanimously approved a resolution to initiate rulemaking on access to counsel following a joint petition from five public defender offices citing systemic barriers to attorney-client communication. Public testimony raised concerns about the scope of proposed mental health standards amendments, inadequate heating across facilities, package policy changes restricting thermal clothing, mold conditions, and the need for comprehensive review of health and mental health standards.","keywords":["emergency preparedness","power outage","winter storm","heating systems","deaths in custody","mental health standards","psychotropic medication","constant supervision","access to counsel","mold remediation","medical care","solitary confinement","supervision practices","due process","Rikers Island","package policy","thermal clothing","rulemaking","variance process","restrictive housing"]},{"date":"2026-01-13","display":"January 13","page_url":"https://www.nyc.gov/site/boc/meetings/20260113.page","youtube_id":"PtsD0CsiHGw","youtube_url":"https://www.youtube.com/watch?v=PtsD0CsiHGw","docs":[{"id":1,"title":"Agenda","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/boc-public-meeting-agenda-final-01-13-2026.pdf","doc_type":"agenda","has_text":true},{"id":4,"title":"Meeting Minutes","url":"https://www.nyc.gov/assets/boc/downloads/pdf/january-13-2026-public-meeting-minutes.pdf","doc_type":"minutes","has_text":true},{"id":7,"title":"New York County Defender Services","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/nycds-written-testimony-january-13.pdf","doc_type":"testimony","has_text":true},{"id":5,"title":"Record of Variance – Psychotropic Medication","url":"https://www.nyc.gov s restricted. Nobody can receive my\nreset my my pass code. I've gone on two\nweeks now with no commissary\nfor no apparent reason.\n&gt;&gt; Good afternoon. My name\nis\nUm I've been housed in building number\nfive and also in building number six\num for over a period of 6 months\ningesting black mold.\nWe were removed from building five. Um\nso that was some repairs concerning a\nblack mold here that was in the air\ncenter\nand building number five, six and seven\nventilation system. That room the shower\narea inside of building number five was\ncompletely covered with black wall. They\nwent in\nand painted over the black wall. No one\never repaired their ventilation system\nin the building number six.\nUm I moved closer than number five. Um\nnow I'm housed in building number six\nand the mold is still growing due to\nventilation system. Um so the shower\narea in building number six is getting\nworse because no one ever really\ncompletely got rid of the black hole in\nthe number five. Um so this is something\nthat I've ingesting again for over six\nmonths. To this day I have been put on\ntwo different inhalers called medicine.\nI have inside of my nose. Um, I had to\nget chest. I've gotten a chest X-ray.\nUm, I had my levels tested. It came back\ncompletely high um at a 22.4.\nUm, which means I ingested\num these toxins.\nThat has to be done. I'm still here in\nRose Singer Center in building number\nsix and my health is deteriorating due\nto this black mold that is not going\naway. Building number five, six and\nseven ventilation system is connected.\nSo it's building number five that's a\nblack issue. That means four buildings\nthat's a black issue. These were closed\ndown in the past due to the same problem\nand it's not being eradicated. You have\npregnant women that's housed here. Um\nthere's a lot of women 40% capacity. 48\n45 to 47 women live here and we're all\ncongested black. It's just a cell\ndifferent than others. Um I experience\nshort of breath, shortness of breath. I\nhave swords in my nose. Um again I take\ntwo inhalers. One of the steroids\nand the cough medicine. Um, even with\nthe v window open, uh, the ventilation\nsystem with the heat, it's causing the\nblack mold to spread rapidly. The heat,\nplease do something about this. Um, I'm\nI'm only leaving a testimony to receive\nsome help. Um, because of my health\nissue that I develop.\n&gt;&gt; Hello, I'm calling and I'd like to leave\na comment regarding the serious human\nrights violations going on here. Um, I\njust want to state for the record that I\nwas kept in a locked room in a cell for\nover 60 hours, about two and a half\nthree days without being let out at all,\nwhich my understanding really that's\ncruel and usual punishment. I've also\nbeen kept here hostage as well, denied\nmy religious tray, um, and all types of\nother stuff. Have not received any\nmedication to the point that I've gotten\nsick and it's just caused more further\npain and suffering. And it doesn't seem\nthat any of the protocol is followed\nhere regarding saf.\nMy name is\nI have um reached out to my attorneys of\nwhich I have multiple regarding this so\nthey're aware. I've made sure to\ndocument everything. Um, and I have\nwitnesses well, luckily, um, that are\neither with me or around me or\ndocumented this stuff as well. And I\nplan to pursue legal action because\napparently this place doesn't want to\nchange anything, but it just seems\nextremely dangerous\nand none of this seems legal at all.\nThank you.\nThank you to all who left uh public\ncomments on our dedicated lines for\npeople in custody.\nUm uh to the board, page 11\nuh in the board book, you will see some\nof the actions taken by department or\nboard of correction\nuh staff members uh to address the\ncomments made by persons in custody.\nSo that would be uh the page 11 in your\nboard book under section four.\nSo redacted comments have been shared\nwith the department or comments uh\nassociated with a facility have been\nassigned to a BOC facility monitor and\nhave either been resolved or being\naddressed. So, at this time, I'd like to\nturn it over to Desmond for executive\ndirector updates.\n&gt;&gt; Thank you, chair. Good afternoon,\neveryone. Happy New Year. I'll begin\nwith a brief overview of the board's\nmandate, followed by updates on key\ntrends observed in 2025,\nincluding overcrowding in the special\nmanagement unit, our priorities for\n2026, an update on deaths in custody\nsince our last public meeting in\nNovember, and finally, observations from\nboard staff regarding the Department of\nCorrections clinic production dashboard\npilot.\nThe New York City Board of Correction is\nan independent oversight body\nestablished by the city charter. The\nboard's core responsibility is to\nestablish, monitor, and enforce the\nminimum standards governing conditions\nof confinement and correctional health\nservices in all city correctional\nfacilities. We fulfill this mandate\nthrough facility tours, data and\ndocument review, investigation of\ncomplaints, public reporting, and\nregular engagement with the depart\nDepartment of Correction and\nCorrectional Health Services, elected\nofficials, and the public. Our mission\nis to promote safe, humane, and lawful\nconditions for people in custody while\nadvancing accountability and\ntransparency within the city's jail\nsystem.\nThroughout 2025, the board continued to\nobserve sustained overcrowding across\nthe jail system. Population levels\nfrequently exceeded operational\ncapacity, compounding long-standing\nchallenge challenges related to staffing\nshortages, delayed movement, access to\nservices, and compliance with minimum\nstandards.\nIn 2025, the daily jail population rose\nsharply midyear before partially\ndeclining toward year end. The\npopulation increased from 6,57\non January 1st, 2025 to a peak of 7,723\non July 22nd, then fell to 6,782\nby December 31st.\nThe mid-year increase coincided with a\nsignificant rise in the number of\nsentenced individuals awaiting transfer\nto state prison, which grew from 61 at\nthe start of the year to a high of 899\nin early July before declining to 174 by\nDecember 31st.\nIn response to overcrowding, the\ndepartment requested multiple variances\nfrom the board's overcrowding minimum\nstandards between November 2024 and July\n2025 to increase bed capacity at EMTC,\nOBCC, and the West facility annex.\nIn April 2025, the department also\nexpanded the number of men housed in the\n800 bed building at the Rosem Singer\nCenter as an additional measure to\naddress overcrowding.\nIn July, the board did not grant the\ndepartment's variance request,\nreinforcing the importance of compliance\nwith the board's minimum standards.\nBetween July and November, the jail\npopulation decreased by approximately\n8.35%.\nWhile overcrowding eased at OBCC and the\nWest facility annex, dorms at EMTC\ncontinued to exceed the 50 bed limit for\nseveral months. By December,\novercrowding in those dorms had\ndeclined, and as of December 30th, no\ndormitories at the new admissions\nfacility were operating above bed\ncapacity.\nThe board will continue to closely\nmonitor population levels and facility\nconditions to ensure ongoing compliance\nwith the board's overcrowding minimum\nIn 2025, the board also raised serious\nconcerns regarding the department's\nestablishment of a special management\nunit or SMU without prior notice to the\nboard and without clear demonstration of\ncompliance with minimum standards\ngoverning restrictive housing.\nThe SMU opened on February 6, 2025 at\nOBCC.\nThe unit operates on a 7-hour daily\nlockout schedule. From February through\nNovember 2025, there were 198 placements\nand approximately 16 appeals. As of\nDecember 31st, 2025, 30 individuals\nremained housed in the unit.\nShortly after the unit opened, the board\nidentified several violations of the\nminimum standards requiring corrective\naction. In March 2025, the board issued\na notice of violation letter to the\ncommissioner citing deficiencies related\nto due process and security\nclassification, access to congregate\nreligious services, specifically Muslim\nJuma services, and access to law library\nservices.\nIn response, the department implemented\nprocedures to ensure access to religious\nservices and law library resources and\nclarified housing placement protocols,\nhearing requirements, and appeal\nmechanisms.\nWhile the board does not support the SMU\nand continues to maintain that the unit\nshould be closed, the board will\ncontinue to monitor and publicly report\non conditions within the unit.\nIndividuals housed in the SMU are still\nrequired to be placed in restraints when\nescorted throughout the facility,\nincluding for medical and other\nservices. Additionally, given the\nincreased number of lockdowns at OBCC,\nout of cell time for both the SMU\npopulation and the broader jail\npopulation remains an ongoing concern.\nOversight of restrictive confinement\nremains a critical focus for the board\ngiven the wellocumented risk associated\nwith isolation and limited out of cell\ntime particularly for individuals with\nmental health needs. The board will\ncontinue to raise these issues with\nfacility and department leadership and\nwill update the public on any\nsignificant changes affecting compliance\nwith the minimum standards.\nIn 2026,\nthe board's priorities include\nstrengthening compliance with minimum\nstandards, particularly in areas related\nto restrictive housing, sick call,\nrecreation, visits, and documentation.\nContinued oversight of the burrow-based\njail transition and the city's\ncompliance with its legal obligations to\nclose Riker's Island. Ongoing review of\ndeaths in custody with a focus on\nprevention, timely reporting and\nimplementation of board recommendations\nand ensuring meaningful public\nengagement and transparency through\npublic meetings, reporting and\nresponsiveness to stakeholder concerns.\nNext, we share our deepest conso\ncondolences with the families and loved\nones of department staff who have passed\nsince the board's November meeting.\nThe staff who have passed are civilian\ncity laborer assigned to the facility\nmaintenance repair division, Thomas\nEdward Farley,\nretired officer Paul Piskovich, Senior,\nretired officer Alpha Omega Joseph,\nretired Captain John Francis McCarthy,\nretired officer Lewis Thomas Wright,\nretired officer Michael Gonzalez,\nRetired Officer Jose Nuranho,\nretired Captain John Mclofflin,\nretired Captain Rosemary Butler,\nretired officer Daryl G. Hunter,\nretired Captain Phyllis Lewis Miles, and\nretired officer Edward Malone.\nThere were three deaths in custody\nbetween November and December 2025.\nWe extend our deepest condolences to the\nfamilies and loved ones of Edwin Ramos,\nAramis First, and Chiron Randall.\nEdwin Ramos, age 38, died on November\n21st, 2025.\nMr. Ramos collapsed in the bathroom of\nhis assigned housing area in OBCC,\nprompting a medical emergency.\nHe was transported to Mount Sinai Queens\nHospital where he was declared deceased.\nAramis first died on December 7th, 2025\nat the age of 32. Mr. first was\ntransported from OBCC to Mount Sinai\nQueen's Hospital after he was found\nunresponsive in his cell. He was\npronounced deceased at the hospital.\nKairen Randall, aged 33, died on\nDecember 22nd, 2025.\nMr. Randall became unwell in his\nassigned cell in GRVC's PACE unit. He\nwas transported to Elmherst Hospital\nwhere he was subsequently declared\ndeceased.\nWe're in the very final stages of a\nreview of the second report and\nrecommendations on 2025 deaths in\ncustody covering the deaths of Benjamin\nKelly, James Maldonado, Christian\nCollado, Edwin Kwisby, Ardit Bila, Jimmy\nAila, and Carlos Cruz. It is imperative\nfor the board that these reports are\naccurate and portray the full picture of\nthe circumstances leading up to each\ndeath, requiring careful review of\nmaterials and conversations with DOC and\nCHS to gather additional information. We\nthank you for your patience as we\nfinalize the report which we expect to\nissue within the next week.\nThe final report, the final public\nreport on the deaths of Edwin Ramos,\nAramis First, and Chiron Randall will be\nissued shortly thereafter.\nRegarding census data, as of January\n12th, 2026, there were approximately\n6,865\nindiv individuals in department custody.\nand broken down by facility as of\nJanuary 12th. in the Brook Belleview\nHospital Prison Ward 69 individuals\nElmherst Hospital Prison Ward 13\nEMTC 1,346\nGRVC\nNIC 299\nOBCC\nRES ESH\n137 R NES ASH 487,\nRMSC\n456,\nR&DC\n168, and in West facility 686.\nFinally, I'll briefly summarize board\nstaff observations related to the\ndepartment's clinic production dashboard\npilot. Board staff observed that the\nclinic production dashboard pilot at the\nNorth Infirmary Command operates in a\nrelatively controlled environment with\nlimited movement and lower sick call\nvolume in part because many housing\nareas provide medical care on unit.\nStaff noted that in larger facilities\nwhere sick call demand is higher,\non-unit care is limited and movement is\nmore complex. Reliance on fragmented\ndocumentation could result in greater\ngaps in tracking and oversight.\nThe dashboard has the potential to\nprovide the department with an\nindependent recordkeeping tool to track\nsick call requests, clinic arrivals, and\ncare provided consistent with the\nboard's minimum st standards. However,\nsignificant gaps remain. Incarcerated\nindividuals continue to rely heavily on\nthe CHS triage line to request sick\ncall, resulting in fragmented data\nbetween CHS generated lists and DOC\ndocumentation.\nThis fragmentation limits the\ndepartment's ability to maintain\ncomplete, accurate records and\neffectively monitor whether sick call\nrequests result in timely care. Staffing\nand provider availability also continue\nto affect how care is prioritized and\ndelivered. The board looks forward to\nhearing an update from the department on\nthe dashboard pilot during today's\nmeeting. The board will continue to\nmonitor this pilot closely and evaluate\nwhether it meaningfully advances\ncompliance with the sick call minimum\nThat concludes my update. Thank you.\nThank you, Executive Director Jasmine. I\nI'd like to uh just comment one section\nof your your update where you talk about\ncontinued oversight of the Buroughbased\nuh jail. I I would just like to maybe uh\nrespectfully amend that to continued and\nincreased oversight of Burbased jail uh\ntransition. Uh and I see that uh at at\nreviewing the great work done at the\nBelleview Hospital site that uh with\nsome uh input staff the transition can\nbe you know more seamless.\nI'll turn it over to CHS for\npresentation of their variance request\nfollowed by public comment on the\nvariance request and a board vote. These\nare the various requests for\npsychotropic medication and tuberculosis\nscreening process.\nGood afternoon. My name is Joseph\nOtanakar. I'm the chief of mental health\nservices,\nchief of medicine.\n&gt;&gt; Today we are again requesting a uh\nuh six-month variance from the uh board\nstandards concerning psychotropic\nmedication. Uh the requested variance\nfirst granted in 2005\nauthorizes psychiatrists to see and\nevaluate stable patients on psychotropic\nmedic general population every eight\ndays rather than every 14. As the board\nhas acknowledged in the past um this\nvariance helps to improve patient care\num and is more consistent with community\nThe second, excuse me, the second\nvariance request relates to tuberculosis\nscreening in the jails. It expands the\noptions for tuberculosis screening tests\nfrom the board standard which includes\ntuberculin skin testing to also include\na blood test which is uh consistent with\nthe standards of care in the community.\nblood test is a one-time blood draw\ndoesn't require followup in hours as the\nskin test usually does and generally the\nstandard of care in the community. So\nwe've tested this in the past uh to\nallow this use of the screening test and\nthank you. I just wanted to make a note\nthat we do the board has a scheduled\nhearing on these particular minimum\nstandards to make permanent amendments\nto the minimum standards in basically to\nalign with what you're asking for in\nyour variance request. And I just wanted\nto note for the board members that that\nhearing is scheduled for February.\nAnd so the the variance request is\nnecessary today because the hearing is\nscheduled for February and it's\nexpiring.\nDo any board members have uh questions\nfor CHS? Uhing\ngenuine\nAnd now we will hear public comment on\nCHS varants request. Each speaker is\nlimited to three minutes. Do we have a\nspeaker list?\n&gt;&gt; Nobody has signed up outside. If anybody\npresent in the room wants to speak,\nplease do come to the podium. And if\nanybody online wants to speak, please\nraise your hand in the chat.\nOkay. Hearing none,\nwill the board member move to a vote?\n&gt;&gt; So move.\n&gt;&gt; Is there a second?\n&gt;&gt; Second.\n&gt;&gt; At this time, we'll open discussion for\ndebate.\nI don't think there's you know any real\ndebate on this because looking to rule\nchange\nSo uh\nthere's no conditions to the variances.\nI think that some procedural stuff I\nhave to ask and so bear with me board\nmembers.\nSo any board member proposes a condition\nGo ahead.\n&gt;&gt; Oh. Um um I just wanted to ask once we\nhave this rule making\nsession next month, how long will it\ntake for you to fully implement the\nchanges into the new regiment? And\nthat's for both variances because I see\none of these variances has been ongoing\nsince 2005 and that is entirely too\nlong.\nBut because we've been granted uh those\nvariances, they they're already active\nimplemented.\n&gt;&gt; So there's no no changes, no policy\nprocedures, nothing like that. It will\njust be\n&gt;&gt; the new way from now on.\n&gt;&gt; Yeah.\n&gt;&gt; Okay. So by uh\nfirst I'll ask for a motion to approve\nfirst variance.\n&gt;&gt; So move\n&gt;&gt; and then by roll call vote\num I ask each other board member to\nstate uh out loud if in favor\nor against.\nSo board member June\n&gt;&gt; vote yes to both\n&gt;&gt; yes for both\n&gt;&gt; yes for both.\n&gt;&gt; Thank you Dr. Stassu.\n&gt;&gt; Yes for both.\n&gt;&gt; Judge Kier for both. Vice Chair Skipper\n&gt;&gt; And I'll vote yes for both.\nAnd the vote for first variance\nuh is approved six months variant.\nNow I'll take a motion for the second\nvariance request tuberculosis.\nA motion\nvariance\n&gt;&gt; there. Second\n&gt;&gt; second. And by roll call vote.\nStart with you. Vice chair skipper.\n&gt;&gt; Yes.\n&gt;&gt; Judge Cir.\n&gt;&gt; Dr. Staso.\n&gt;&gt; Board member Felipe.\n&gt;&gt; And board member Jude.\n&gt;&gt; And I say yes. Um\nand the vote passes\nand approved for the variance.\n&gt;&gt; We will now hear from Tanya uh uh Propet\nChaplain, Dr. Victoria A. Phillips,\nAshley Conrad, and Michael Clinger\nregarding the successes and challenges\nof the Rikers Island working group was\nactive between 2015 and 2020.\nPeace and blessings everyone. Good\nmorning.\n&gt;&gt; Oh well, good afternoon.\n&gt;&gt; Afternoon.\n&gt;&gt; Happy 2026.\nUm, thank you so much for this\nopportunity to um, speak to you a little\nbit about what I'm super excited to say\nthe Gail's Action Coalition assisted in\ngetting going many many years ago. So,\nI'm Chaplain Dr. Victoria A. Phillips\nand these are my comrades.\nUm, and um, I'll just start us off. So,\num,\nsorry, my brain picks up noise. Um, so\nin 2011,\nthe Jails Action Coalition formed. Um,\nwe were never funded. We were a\ncoalition of dedicated volunteers. And\nwe formed because of conditions on\nRiker's Island and our community\nmembers. And we knew that um if we\ndidn't take care of ourselves, no one\nwould take care of us. And so we are a\ncoalition still thriving today of\ndirectly impacted, formerly\nincarcerated, the loved ones, service\nproviders, legal um professionals, many,\nmany people, clergy members, the\ncommunity is who we are. And I say that\nbecause um we we quickly found out that\nthe incarcerated, you know,\nwe fought for many things. Testimony,\nvisiting rights, um names of the\ndeceased to be played at the meetings,\num ending of solitary for 16, 21 year\nolds. So many different things. But one\nkey thing kept coming back when we would\nmeet people at the bus stop, when we\nwould meet people on the island, when we\nwould talk to people in the community\nand that is visiting. Um and so\nwe understand how important visiting is\nand visiting is a lifeline. Um you all\nknow um upon joining the board of\ncorrections that the jail's action\ncoalition has reached out to all of you.\nWe do that with anyone in position of\npower to make change. or preserve life\nfor those on Riker's Island in any DOC\nfacility. Um, I say that because one of\nthe people that we reached out two years\nago, I'm moving along. One of the people\nthat we reached out years ago was\nCommissioner Pont. We reached out to all\nthe commissioners. Every administration\nwe want to be connected to because we\nare the people. Um, and so Commissioner\nPont had came around many moons ago. Um,\nand he met with us and upon meeting with\nus, he heard truth. He heard expertise\nthrough lived experience. He heard ideas\nthat he wanted to follow up on. And I'll\nallow my other colleagues to tell you\nabout that. But I just want to say\nbefore I walk away how important it is\nthat we understand that visiting also\nhas to have a level of accountability.\nUm\nvisiting has saved lives that were being\ndenied access to medical. Visiting has\nsaved lives when someone was um maybe\nphysically harmed. Um visiting has saved\nlives on the spiritual aspect and we\nalso know that visiting is one of the\nkey components to one's re-entry their\nsafe re-entry by keeping connected with\nthose they love family. And when we say\nfamily I just want to highlight that\ndoes not always mean blood. That does\nnot always mean blood. It means those\nwho care for you and will look out for\nyou. And so Jack has lent its hand and\nexpertise to the community, to elected\nofficials, and to the board of\ncorrections throughout the past decade.\nI don't think there's anyone um that\nwill speak to you today that should not\nbe a part of the vision moving forward\nwith visiting because they all will\nspeak from a level of expertise, a level\nof history so that those who are doing\nthe work today will know how to stay as\na hamster on the wheel. Because each\nadministration change comes with bright\nideas and and a vision, but often we\nbecome stagnant as a society and those\ndoing the work when we don't push\nourselves forward. So listen today,\nlisten to Tanya, listen to Michael,\nlisten to Liz, listen to Ashley, and\nhear them and understand why they should\nbe a part of visiting group 2.0. Peace\nand blessings.\nThank you. Thank you. Good afternoon.\nMy name is Liz Mayers. I'm a member of\nthe jail's action co coalition. I'll\nspeak briefly about how a visit work\ngroup got started. I began visiting a\nyoung man in custody at Rikers in 2013.\nLike every other visitor, I faced\ntremendous obstacles and was upset about\nhow difficult it was to make a visit to\na person in custody. Sometime after\nJoseph Pomp became commissioner of the\nDepartment of Corrections in 2014,\nwe invited the commissioner to attend a\nmeeting of the jail's action coalition.\nWe knew that he recognized the vital\nimportance of visits to people in\ncustody and we spoke of the significant\nproblems that visitors faced when\nvisiting someone in at Rikers. We\nsuggested establishing a committee of\nindividuals from concerned organizations\nto work with the department staff to\nfocus on these problems and offer ideas\nwhich might ameliorate\nvisiting conditions. Commissioner Pont\nsupported the establishment of such a\ngroup located in the office of the\ncommissioner and assigned a member of\nhis executive staff to attend our\nmeetings with an assistant to work\nclosely with us. Uniform staff members\nalso attended. Individuals from the\nOsborne Society Association, sorry,\nBrooklyn Defenders Services, the Fortune\nSociety, and the Jails Action Coalition\ncomprised the Early Work Group. As our\nfirst effort, we urged the hiring of\ngreeters to help uh arrivals as they got\noff the Q 100 city buses at the Perry\nBuilding. We developed new signage that\nwas actually helpful.\nFor example, informing a visi informing\nvisitors that being fingerprinted is\noptional.\nWe pushed corrections to establish the\nRiker's bus service to replace the\nlengthy and complicated necessity of\nusing public transportation.\nWe worked on making it easier for\nfamilies with children to enter the\njails and tried but did not succeed in\nthose early days to reduce the number of\ncheckpoints.\nWe strongly urged establishing trainings\nto visit staff. Tanya Kupat\nuh a member of the group wrote the first\ncurriculum.\nI left the group in 2018. Subsequently,\nmuch was accomplished before the group\nended in 2020. For the sake of those in\ncustody and families who visit them, I\nbelieve it is absolutely essential to\nreintroduce such a collaborative working\ngroup in the department. Thank you.\n&gt;&gt; Thank you for including visiting on the\nagenda. Thank you Dr. V and Liz and for\ngiving us this opportunity. My name is\nTanya Kupat. I'm currently the vice\npresident of policy and advocacy at the\nOsborne Association. To add what Dr. V\nand Liz have shared, I was also part of\nthe visit workg group from its inception\nand was so excited that the jail's\naction coalition created this and that\nthe department responded taking it very\nseriously. As you've heard, we met for\nmany years and only disbanded because of\nCOVID and a change in administration\nwhen this was no longer a priority. We\ncontinued to meet during COVID and to\npush the department to reopen in-person\nvisits once safe to do so. Despite our\nefforts, visit visits were suspended\nentirely for 15 months. Visiting still\nbears the scars of COVID, including one\nless in-person visiting day each week.\nThere are no longer in-person visits on\nFridays. So, it's important to know the\nhistory of all that we worked on and\nwhat the work group was able to\naccomplish, some of which is still\nvisible. As Liz shared, we created the\nvisit greeters and the doc visiting van.\nSignificant updates to the website and\nother improvements which are no longer\nvisible like improving signage\nhandbooks, repairing non-cont visit\nbooths and repairing broken lockers. As\na work group, we met in person, usually\nat the Bulla Building, but we pushed to\nmeet on Rikers so that we could be\njoined by visiting officers and visiting\ncaptains, the people on the ground.\nWe wanted to be as hands-on as possible\nand it was really important that the\nwork group included people who were\nactively visiting someone on Rikers. It\nwas also important that we had a\nrepresentative from the BOC and that the\nDOC um point people were located within\nthe office of the commissioner and had\nthe authority to act. We also worked\nvery closely with the captain of the\ncentral visit house where all visitors\nare processed. Um the community partners\nplayed a key role. We helped identify\nsolutions, track progress, do research,\nbring in examples, models, and tools. We\nhelped keep things moving, and we shared\nwhat visitors were experiencing and what\nthey needed. As Liz mentioned, we tried\nto move to one security checkpoint, uh,\nnot the two that currently exist. And\nwhen we started, Commissioner Pont\nshared that he'd never seen a jail\nsystem with two security checkpoints for\nevery visitor. And he wanted to look\ninto why this was needed. We wanted to\naddress culture to create a culture that\nsupported visiting. This included\ntraining, but not a one-time class. An\nongoing focus on supporting the visiting\nexperience and maximizing the benefits\nof visiting for everyone. I want to now\nshare a statement from former BOC\nCommissioner Stanley Richards, currently\nCEO of the Fortune Society and a member\nof the original DOC visit working group\nwho can't be here today. Stanley shared,\n\"I applaud the Department of Corrections\nrecent announcement to invest in\nimproving the visitor experience at\nRikers, including hiring the first ever\nexecutive director of visit operations.\nIn my time as BOC vice chair and then as\nfirst deputy commissioner at DOC, I\nfocused on this issue because I know\nfrom personal and professional\nexperience just how important it is for\npeople to stay connected to their loved\nones while detained and incarcerated. I\nrepresented this board on the DOC visit\nworkg group from its inception until I\nstepped down from the board. The work\ngroup accomplished a great deal due to\nits diverse membership of critical\nstakeholders, including community\nmembers and providers. One of our most\nnotable accomplishments was the\nimplementation of expedited visiting\ntimes for visitors with young children.\nI'm extremely proud of that work and I\nhope it will continue. In addition, I\nalso advocated for visiting to be a\nstanding agenda item at BOC monthly\nmeetings. I urge the current board\nmembers to reinstate this focus on\nvisiting given its significance to our\nfellow New Yorkers who are detained on\nRikers and families and community\nmembers who visit them. I also urge DOC\nto reconvene the visiting working group.\nThe Fortune Society stands ready to\nparticipate and to support these\nefforts.\nNow, I'm back to being Tanya. Um, I will\nclose with this thought. What if we had\na jail system centered around\nconnection, around making sure people\nmaintain connections to their families\nand loved ones and to a positive support\nsystem? And if they didn't have these\nconnections, what if the system helped\nto build them? What if we knew who\nwasn't receiving visits and staff met\nwith them to see who in their life they\nmight want to visit them or to build new\nconnections so they left connected to a\npositive support system? What if we\nworried about people who weren't getting\nvisits and we made sure they got them?\nGiven that the majority of people\ndetained on Rikers have either a mental\nhealth diagnosis, seek mental health\nservices, or have a trauma history, and\ncertainly everyone there needs mental\nhealth support while surviving the\ntraumatic experience of being on Rikers.\nThis is all the more important. What if\nthe whole system was recalibrated around\nthe fact that we know that isolation is\nharmful and bad for people? This\nincludes solitary confinement and it\nincludes removing barriers to visiting\nand promoting healthy relationships for\nall those in DOC custody and for all the\nchildren and families connected to them.\nThis is the moment to make this shift.\n&gt;&gt; Good afternoon board members. Uh my name\nis Ashley Santiago Conrad. Um, and I\njust want to tell you today the\nexperience of visit visiting a loved one\non Riker's Island. Um, and why it's so\nimportant to reconvene uh the working\ngroup on visitation. Um, so my nephew uh\nwho was diagnosed with developmental\ndisabilities, autism, and disruptive\nmood dysregulation disorder, sat on\nRiker's Island uh for about 2 and 1/2\nyears in dire need of mental health. Um,\nand during that time, my family and I\nmade it as much of a priority to see him\num as often as we could. Uh, Saturday\nvisitation process looked like this. It\nconsisted of arriving at around 7:00\na.m. to wait under that honest hell of a\nbus shelter to take us over the bridge.\nUm, and as soon as you're over the\nbridge, the day starts out with loads of\nrules. Waiting outdoors while papers are\nalso being thrown at you to fill out\nwhile you're also trying to take off\nyour shoes for going through metal\ndetectors. Um, putting your stuff into\nlockers that are outside, having your\nfingerprints scanned and traced for\ndrugs. Um, let me not forget that\nvisitation protocol was also always on\nvisitors like us to look up on our own.\nTraveling to Rikers with my sister and\ntwo very young nieces always made me the\nmost frustrated. I would watch guards\nyell at my three-year-old niece to hurry\nup to not touch the dogs. What did I\nsay? Stand still. Face the wall. I said\nface the wall. Even forcing my\nthree-year-old niece to shake out her\ndiaper. Finally, when you do get to the\njail, or when we got to the jail where\nmy nephew was, that didn't mean we went\nstraight into a visit. Sometimes we'd\njust be sitting in NIC or GRVC anywhere\nfrom three to five hours in cramped,\nairless waiting rooms just to see him. I\nwatched my diabetic sister hold out as\nlong as she could in hopes to see my\nnephew without her insulin or her pump.\nI've also seen mothers with their\nnewborn babies who would have to leave\nbefore even getting to their visit\nbecause their child need to eat every\ncouple of hours and no formula nor baby\nfood is allowed. No one's time is taken\nseriously until that one hour visitation\nis over. Then you can hear the yellow\nguards. That's it. Visitation is over.\nHurry up if you want to catch the bus\nbecause the next won't we won't be back\nfor another 30 minutes. That's right.\nAnother bus just to escort escort you\nsometimes literally across the street.\nOn Sundays, we'd go through this ordeal\nwithout even seeing my nephew at all.\nMany times, Department of Corrections\nwould tell us that my nephew didn't want\nto come down, even when he knew we were\ncoming and was waiting on looking\nforward to our visit. We leaved upset,\ncrushed, and when he would call us later\nupset\nthat he would let us know that the\nDepartment of Correction actually never\ncame to get him. Or on many days, we\ntravel all the way to the island just to\nbe told at the entrance, if anyone is\nhere, for example, for OBCC, please turn\nback around. The building is on lockdown\nand nobody will be getting any\nvisitation. Information that would have\nbeen helpful to have before making the\nlong trip there. Um although there is no\nreplacement for seeing your loved one in\nperson, you might have think that video\ncalls could help family members stay\nconnected when they don't have the time\nor energy to deal with the ordeal\nvisiting Rikers in person. But no,\nsetting up tele visits involve making\nmultiple requests then waiting for\nconfirmation. confirmation that could be\ndenied or improved down or approved down\nto the very minute of the scheduled\ntime. Even then, confirmation didn't\nhold any value. We still have to wait\nfor guards to bring my nephew down,\nwhich often ate up huge chunks of our\n1-hour visit slot or sometimes, again,\nthey never brought him down at all.\nAltogether, we would just stare at a\ncomputer screen waiting for uh my nephew\nto come down and never notified why or\nwhat went wrong and why he never showed\nup. Sadly, we continue to hear or I\ncontinue to hear the same traumatic\nexperiences from um my members as a\nsenior community organizer at Freedom\nAgenda on constant basis. One of our\nmembers even shared that every time she\nvisited, she was told that her hands\ntested positive for drugs. She had never\ntaken or touched drugs and um she was\nprevented from having contact visits\nwith her son. Um and then later a DOI\nreport revealed that the Department of\nCorrections drug testing produced false\nne positives around 85% of the time. Um,\nas my comrades mentioned, especially in\nthe limelight of the last three deaths\nand the deaths that we've seen from\n2021, visitations are so important, not\nonly for incarcerated individuals, but\nfor loved ones who unfortunately may not\neven get the opportunity of seeing their\nloved one again because of the uh\nconditions of Riker's Island. Um, and so\nwith that, I think it is so important to\nreconvene this working group. Thank you.\nGood afternoon.\nUh, my name is Michael Clinger. I'm a\njail services attorney with Brooklyn\nDefenders. Thank you to the board for\nthe opportunity to reflect on the past\nwork of this collaborative group and to\nshare a few thoughts about its potential\nfuture for success. Just to piggyback on\nthe excellent uh comments from my\ncolleagues,\nas I listened to my colleagues describe\nthe group's earlier efforts, which\npredate me in my role, I was struck by a\npoint made by Tanya from Osborne\nAssociation, one that holds promise not\nonly for improving the visit experience\nat the jails, but for life on Riker's\nIsland much more broadly, whether you\nlive there, work there, or are visiting\na loved one there. Tanya recalled the 10\nfullday off-site trainings that this\ngroup organized in 2019 for public-f\nfacing department staff. I think I\nexpected to hear about the challenges\ninvolved in putting that together like\nlogistical hurdles of scheduling 10 all\nday trainings at John J or finding a\nskilled facilitator or securing the\ndepartment's buyin or raising the money\nthat it might take to fund that program.\nBut that's not what I heard. Instead, I\nheard two things.\nFirst, an inspiring account of the\nprogram's successes, and second, a\nsobering acknowledgement of its failure.\nI don't want to dwell on that failure,\nthe lack of follow-through after the\ntrainings when we collectively failed to\nbuild on the momentum created in those\nrooms. It was a missed opportunity, and\nwe must do better. I want to focus on\nthe successes. Each of those eight-hour\ndays began the same way. A group of\ndepartment staff arrived in an\nunfamiliar room far from the jails\nfacing a long day's mandatory training\ntold that the topic was improving their\nempathy.\nI'm sure we can all imagine the level of\nskepticism in that room. But the day\nbuilt\non an acknowledgement of those staff\nmembers' own lives, their schedules that\npull them away from their own families\non weekends, on holidays,\nbirthdays, and anniversaries\ndouble and sometimes triple shifts with\nlong commutes and the daily stress of a\nchaotic workplace. There's no question\nthat we ask a great deal of the\ndepartment staff.\nOnly by recognizing their sacrifices\ncould the group then ask for something\nmore. That officers pause to remember\nthat a child visiting their parent in\nthe jails maybe for a sixth or seventh\nbirthday or for Mother's Day or indeed a\nparent visiting their child is\nexperiencing a moment that they have\nanticipated for weeks or maybe months. A\nmoment that matters deeply to both the\nchild and the parent.\nIt is true that department staff are\npaid and they go home at the end of\ntheir shifts. Their experience is not\nthe same as those of the people in\ncustody or of their families.\nBut what emerged in these workshops was\npowerful. The simple act of listening,\nof acknowledging staff members own\nstories and challenges\ntransformed the room. Skepticism gave\nway to understanding and by the end of\nthe day maybe even warmth. Now I'm not\nsure that everyone in those rooms was\nconvinced. But as my colleagues have\ndescribed it to me, each training ended\nthe way meaningful conferences and\nretreats always do. People exchanging\ncontact information, asking to stay in\ntouch and urging that this work\ncontinue.\nWe can get back to that moment. And more\nthan that, we believe that as a proof of\nconcept, the culture of the department\nof advocacy itself is neither fixed nor\nimmutable. So our requests today to\nparrot some of what you've already heard\nare straightforward. First, in addition\nto the department's welcome decision to\ncreate an executive position overseeing\nall visits to all of its facilities, we\nask that the department revive and\nrecommmit to this collaborative working\ngroup, including by designating a\nconsistent group of uniform and\nnon-uniform staff to participate.\nSecond,\nwe ask that this effort be situated in\nthe office of the commissioner with the\ncommissioner or a designate serving as a\npermanent participant as was done\npreviously. And finally, we ask that\nthis board request or require regular\nupdates from the work group delivered by\na designate of that group at every board\nmeeting. Visits by loved ones are\ncritically important part of this this\ndepartment's work. But what we are\ndescribing has the potential to do even\nmore than improve visits. Through this\nand similar collaborative efforts, we\nbelieve it is possible to reenter the\nhumanity of all New Yorkers who live,\nwork, or visit Riker's Island. My\ncolleagues and I would be happy to\nanswer any questions. Thank you,\n&gt;&gt; Vice Chair.\n&gt;&gt; Yes, I want to I want to thank you for\nthat. Um,\nas an academic and as also the only\nsitting member of this board who has\nlived on Riker's Island for an extensive\namount of time, I cannot begin to\nexpound upon the need for human beings\nto create community. We are social\ncreatures. We crave community. We crave\nto create community. We crave to be in\ncommunities. These communities are\nintersectional. They intertwine, they\ninterweave, they are braided together.\nBut that visit process\nis an integral part.\nI applaud your efforts. Your efforts\nfrom before. I applaud you standing here\nbefore us asking to reinstate. I am\nthrowing myself on this. I am willing to\nbe the board liaison or however we\ndecide to do this chair.\nYou know, and I think this is a vital\nvital part of a reform that needs to\ninstitute as we look at how we are\ntreating the people in custody who could\nbe members of our family, our brothers,\nour sisters, our mothers, relatives.\nWe're all connected. We're all New York\nCity.\nyou know, whether we live on Riker's\nIsland, whether we work on Riker's\nIsland, we're still connected. So, thank\nyou for that.\n&gt;&gt; Yeah. Hi, I have a couple of questions\nreg r's appointments\nour children and families affected by\ntrauma of having a loved on spend time\non Rikers\nand all the positive aspects of\nthe ripple\nWell, I can say that\nlearning\nshe\nI encourage\nme\nto\nget visits. I had visits Thanksgiving\nEve and Thanksgiving Day\ncritical areas with family and to you\nknow to speak to the family that going\nthrough the process and to understand\nsome of the high points some of the\npraise they give the department\nand some of the\nget very specific\nfacility\nstaff tours. Uh so I encourage you\nsome time.\nUh I really like to\nhear from the department have set this\nas a club.\nI'd like to not sort of too much\nthat leadership in that\nformulate\ncome back\nvisits is very important.\nI mean I sent\nhalf a day\ngiven day\nand\nI didn't have any staff with me just me\nto speak with family members stand\nat 900 p.m. time to get at your bus\nschedules. So, it is real\nand I really appreciate.\nI apologize for my voice. I got off a 15\nand a half hour flight at 5:30.\nJust a little tired.\nNo other questions. Thank you.\n&gt;&gt; Okay. Um, I'm asked to speak louder, but\nMy energy is down so I'll try to speak\nlouder. Uh we will now have uh DOC uh\nupdates.\nWe now hear updates from the department\nbriefing on clinic production dashboard\npilot at NIC in compliance with sick\ncore minimum standards.\n&gt;&gt; Good afternoon members of the board. My\nname is Kathleen Zadzora and I serve as\nthe assistant commissioner for health\naffairs. Today I will provide an update\non the department's clinic production\ndashboard pilot and compliance with sick\ncall minimum standards. The department\nremains firmly committed to ensuring\nthat persons in custody have timely and\nreliable access to healthcare services.\nAt present, clinic production, including\num sick call requests, continues to be\nmanaged pursuant to the department's\nestablished policies and procedures.\nPersons in custody who require more\nurgent same day care may speak d positively\nto the pilot and have provided helpful\nfeedback on potential enhancements to\nfurther streamline operations and\nimprove efficiency. Housing area\nofficers have also demonstrated a clear\nunderstanding of how to operate the\ndashboard and have reported little to no\ndifficulty accessing the system. At the\nsame time, the department recognizes\nthat this pilot remains a learning\nprocess and is taking a careful\niterative approach. Our partnership,\ncollaboration, and communication with\ncorrectional health services leadership\nand facility staff has been productive\nuh in this new endeavor. Full data\nintegration from CHS remains an ongoing\nmatter for both agencies and we're\nactively working to resolve any issues.\nDOC provides CHS with regular updates\nand our respective IT teams meet weekly\nin order to address and continue\nimproving the system. For next steps,\nthe department will continue to\nincorporate staff feedback, monitor\nfunctionality and connectivity, and\nrefine the system prior to expansion. We\nanticipate expanding the dashboard to an\nadditional facility in the spring. We\nappreciate the board's continued support\nand partnership and we look forward to\nproviding additional updates as this\nwork progresses. Thank you and I welcome\nany questions.\n&gt;&gt; Any board members have questions?\n&gt;&gt; Yes. Uh I' I'd like to know what what uh\nfacility will be next for this or is\nthis just a pilot to be analyzed and\nthen rolled out in the near future?\nThank you for the question. We're\nexploring and have have narrowed down,\nbut we're we're not ready to state which\nfacility next.\n&gt;&gt; Can you at least tell us which facility\nis in the running or you're looking at\nor are you looking at all facilities?\n&gt;&gt; So, we're looking at some of the larger\nfacilities. Um, as the executive\ndirector highlighted um in her update,\nNIC is a little unique uh given its um\nits clinical footprint and its size. So,\num a larger a larger facility.\n&gt;&gt; Okay. Thank you.\nOkay.\n&gt;&gt; Yes. Go ahead.\n&gt;&gt; Thank you. Uh in regards to DOC\nanalytics and statistics, what's the\nfrequency in terms of the data is\ncollected the daily, weekly, monthly?\n&gt;&gt; So the data that are going into the\ndashboard, it's happening several times\na day.\n&gt;&gt; And and would that be available in terms\nof the reports? Would that be available\nto board staff? So, we're not currently\ngenerating um reports\nin a in a way that I think that you're\nasking about, but it's certainly\nsomething that we can explore. Yeah.\n&gt;&gt; Any other questions on that topic area?\n&gt;&gt; Yes. Go ahead, Dr. St.\n&gt;&gt; Thank you. Um, so I I I'm having a\nlittle bit of trouble with the\nterminology. I guess I because it seems\nto me that the what's being tracked as\nsick call in here are the scheduled CHS\nvisits that have already come in through\nthe triage line and and been added to a\ncall down list. I think what has been\nsort of concerning to us in an ongoing\nway are the what you're calling here\nunscheduled\ncallowns, but I think to me that's sick\ncall. Like those are the visits that I\nthink when we're thinking about minimum\nstandards and we're thinking about\nwanting to make sure that folks in the\nhousing areas understand that if they\ncan't get through to the CHS triage\nline, if they're not if they don't know\nwhen their next scheduled visit is and\nthey have something urgent that it is\nyou, as you said, you know, it's always\nbeen possible for them to speak to a\nhousing area officer. But we want to\nmake sure that people really understand\nthat that is a way that they can\nactually get down and get seen that you\nknow that request made to a housing area\nis definitely going to get added into a\nsystem and result in production to the\nclinic. So I'm curious about whether\nthere's a plan to sort of zero in on on\nthat category of visits and then\nseparately whether there is\nsome point of comparison to make sure\nthat whatever is getting logged as a\nrequest for you know whatever you end up\ncalling it a sick call visit an\nunscheduled call visit to make sure that\nthe number of requests getting logged\ninto the database are representative of\nthe number of individuals actually\nasking to get seen in the housing area.\n&gt;&gt; Sure. So, thank you, Dr. Sel. I think\nthere's kind of there's two aspects to\nwhat I'm hearing you say. And so, then I\nmay ask you to remember everything you\nsaid. So, there's there's the\noperational piece which is u in the\ndashboard as far as what is being\ntracked. And so, to be clear, the\ndashboard encompasses scheduled call\ndowns requested by CHS and that's for a\nvariety of services. It also includes\nwhat we are terming unscheduled call\ndowns, unscheduled walk-ins, and that's\na little bit more of what's happening in\na moment. Um, so that might be a 311\ncall that comes in and processed through\nthe facility. An individual is brought\ndown to the clinic, but they weren't on\na scheduled list. CHS was not\nanticipating seeing them. Um, at\npresent, that's documented in the in the\nclinic a book, but it's not something\nthat we're able to track systematically.\nSo CHS obviously knows this individual\nhas been presented to them for an\nunknown reason that they weren't um\nanticipating, but on our side we we\ndon't have that we we didn't have that\npiece. Now we do. Now we're able to say\nthat. And then additionally, you have\nindividuals requesting sick call, which\nto be clear is not what's coming through\nthe health triage line because that's\nturning into a scheduled encounter. Um\nso again, we may we may say that's sick\ncall, we may not say that's sick call\nper the standard. we we've been made to\nunderstand that that's not what we're\ntalking about here. So instead, that's\nrequests made to staff that maybe in\nthat exact moment they can't be brought\ndown, but there's an expectation within\nthe confines of the standard  logged you\nknow I know not all the officers have\nbeen trained yet only trained officers\nare able to make the entries into the\ndatabase you know how are we making sure\nthat this is representative of the need\nat the housing area level\n&gt;&gt; sure so the vast majority of officers\nhave been trained. It's I don't believe\nit's exactly 100% but it's very close.\nAnd so from the perspective of our our\nonly trained staff entering that I don't\nthink is an issue um at this stage. Now\nour ability to then generate\num a a report or a form that reflects\nthese are the individuals that requested\nto be seen and then what happened that\nis built into this this dashboard\nfunctionality.\n&gt;&gt; Can can you say a little bit more about\nhow that works? So when an officer\nenters the request and it goes into the\ndashboard and then when that individual\nis brought down to the clinic, the\nclinic officer checks that person in so\nto speak, enters that they've been\nproduced to the clinic and that includes\nwe have a time stamp for that and then\nonce the individual is seen by medical\nthat is another um data point that is\nentered into the dashboard.\n&gt;&gt; Okay. So it's all dependent on recording\ninto the dashboard. Uh yes, in the same\nway that in in a paperbased system it\nwould be dependent on a person writing\ndown a disposition.\n&gt;&gt; Okay. And then in terms of sort of the\nmessaging to the folks incarcerated, it\nit sounds like based on our staff's sort\nof assessment and talking with with\nindividuals in custody on the ground\nthat people were still sort of confused.\nI know you guys have done outreach, but\nyou know, it's true that this hasn't\nreally been the main way to get to the\nclinic in several years. Um can you talk\na little bit about sort of ongoing plans\nto make sure that people are aware that\nthis is you know a system that exists?\n&gt;&gt; Sure. So I think you know we we have\nmessaging on the tablets, we have\nposters in the housing area
