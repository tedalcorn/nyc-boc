, there's\nbeen um engagement at PIC council. I\nbelieve we will continue to do all of\nthose things and to your point as this\ndoes represent a departure from what has\nbeen done previously. It will take\npeople a little bit of time you know to\nget used to it.\n&gt;&gt; Okay. Another avenue like Okay. Um, and\nthen my last question, um, I I I know\nthat health affairs sort of tracks\nproduction. Um, is it possible for\nhealth affairs to track these sick call\nrequests that are generated from the\nhousing area separately from the all\nother requests category that it's\ncurrently lumped in with?\n&gt;&gt; Oh, that we currently reported under.\nSure. Yeah. So, one of the one of the\ngreat things about this system is we\nhave service categories. So the all\nother lists um we have greater um\ngranularity and specificity for that\nitem now and then yes we would be able\nto pull out um sick call processing\nspecifically.\n&gt;&gt; Okay thank you question.\n&gt;&gt; Yes question\n&gt;&gt; could you speak further on the service\ncategories and what they entail? So I\nwould actually invite my colleagues from\nCHS to speak more specifically. But for\nexample, um nursing might be a category.\nUh direct observation therapy might be a\nservice category,\na mental health appointment.\nUm but let me ask you something. Are the\nservice categories cate categorized\nbased on medical opinion or are they\ncategorized based on the person in\ncustody's request to see whoever?\n&gt;&gt; So the categories of service themselves\nare standardized and driven by what CHS\ncalls their various service components.\nWhen it's a sick call request, that's as\ndeep as we go.\n&gt;&gt; So it's just that they're asking to be\nseen for sick call. So we would not have\ngreater detail into the specific nature\nof the request. We would reserve that\nfor the the conversation between the\nperson and and medical.\n&gt;&gt; One more.\n&gt;&gt; Yes, Dr. Stus.\n&gt;&gt; Um sorry, one more question. Uh so my I\nmay be mistaken about this but my\nunderstanding is that we had asked um\nfor the you know in the pilot in NIC the\nnumber of people who asked for sick call\nthe number of people who came for sick\ncall and then the number of people who\nwere actually seen and that for some\nreason we were not able to get that data\nlike that I I don't know if that was\nlike this system does not produce this\ndata yet or we're just not ready to\nshare this data yet but that seemed like\nsomething that should be able to sort of\ncome out of this dashboard. And I'm\ncurious if we\n&gt;&gt; So, can I follow up with you about that?\nBecause yeah, that's I'm a little I'm a\nlittle surprised to hear that. So,\n&gt;&gt; okay. And and then in terms of just\nfollowing up on board member Jude's\nquestion about reporting generally, is\nthere a plan to produce reports as you\nroll this out in more facilities that\nwould include information like that in\nthe future?\n&gt;&gt; I I would certainly think so. We're\nhappy to continue to, you know, engage\nwith you all and think about what what\nthat looks like. Okay.\n&gt;&gt; Okay. Well, thank you. We'll now uh go\non to department briefing on electronic\nlog book pilot at OBCC.\n&gt;&gt; Good afternoon, board.\n&gt;&gt; My name is Deputy Warden Prince. I serve\nas the deputy warden at the Oz Banton\nCorrectional Center, OBCC.\nI am here today to provide a brief\nupdate on the department's electronic\nlogbook pilot which was launched in\nmidocctober late last year at the\nspecial management unit SMU at OBCC and\nremain ongoing. This pilot represents a\nnew and significant operational endeavor\nfor the department and aligns with our\nstrategic plan and modernization of the\nagency.\nWith this bold and ambitious project, we\nare approaching and in is deliberately\ndeliberately focused on testing\nfunctionality and gathering staff\nfeedback and identifying operational\nchallenges. Overall, feedback from staff\nhas been positive and officers are\ngenerally able to make entries in real\ntime. To date, approximately over 100\nstaff have been trained in the system\nand has been performing well.\nStaff has indicated that the electronic\nsystem is userfriendly,\nimproves legibility, and allows for more\nefficient review across tours when\ncompared to traditional paper log books.\nThe system also allows easy retrieval of\nspecific log book information, which\nenhances oversight and supports\nsupervisors in conducting required log\nbook reviews pursuant to dep department\npolicy.\nWhile the department is eager to expand\nthis pilot, we must continue to assess\npotential challenges both seen and\nunforeseen.\nAs you know, as you all know, our\ninfrastructure was not originally\ndesigned to support this type of\ntechnology.\nThis just this month, there was a\ntemporary system outage affecting one\nterminal for several days. During this\nperiod,\nthe facility maintained continuity of\noperations by retrieving paper log books\nand consistent consistent without\nexisting procedures. Once functionality\nwas restored, staff returned to using\nthe electronic log book. With that being\nsaid, the department will continue\nassessing the pilot at SMU and we're\ncurrently discussing expansion at OBCC.\nThe department is focused on ensuring\nthat the system is functionally reliable\nand that necessary adjustments are made\nbefore establish establishing a timeline\nfor expansion.\nWhen that decision is made, we will\ncommunicate that to the board. We look\nforward to continued collaboration as a\nmodernize our agency, including the\nhistoric project. I welcome any\nquestions that the board may have.\n&gt;&gt; Well, thank you. Thank you, Deputy\nWarden. Um I'd like to uh\nbefore any questions come from the board\nuh just ask uh can a presentation\nof this pilot be given to board members\nuh because uh further questions may come\nlike I have one question like is the\nelectronic log book can it be altered uh\nand is it a supervisory checkpoints of\naltering uh entries and things of that\nnature.\nIt could be a number of different\nquestions. So,\n&gt;&gt; uh definitely serves to answer your\nquestion. Uh chair, uh the HC could\nactually arrange that with the IT board\nand we could actually collectively do\nthat and give a demonstration of the uh\nfunctionality of\n&gt;&gt; Thank you.\n&gt;&gt; Hello, Nadia Jensen, executive director\nof intergovernmental affairs. Um I just\nwanted to note that uh the uh the\ndepartment gave some members some staff\nmembers from the board a presentation on\nOctober 31st and we're happy to you know\ngive another presentation if the board\nmembers want wish to have one as well\nbut there were several members um from\nthe board staff that attended that\npresentation.\n&gt;&gt; Okay. Well, any of the board members\nhere present?\n&gt;&gt; No, it wasn't it wasn't um board\nmembers. It was other staff.\n&gt;&gt; Oh, a board staff. Exactly.\n&gt;&gt; Board members,\n&gt;&gt; we're happy to extend that from the\nboard as well.\n&gt;&gt; Yes. Thank you. Um,\n&gt;&gt; yes. Uh, vice chair skip.\n&gt;&gt; So, I just have two questions. Um,\nreally curious. What is the delivery\nmechanism for this electronic log book?\nIs this like a tablet or something?\nLike, how are people inputting? What are\nthey inputting? Do you have a whole\nmonitor with a keyboard that they're\nusing to input or is it like a tablet or\nsomething? And they want to know about\nthe security concerns of the tablet like\nis it is it permanently mounted in that\narea or is it something you can pick up\nand carry around? Just questions like\nthat. Um they might be answered when we\nhave the briefing. So I'll be sure to\nattend that. My second question because\nI realize the briefing might cover all\nof this. My second question, you talked\nabout paper log books utilized during\nthe outage. What happened to them? Were\ntheir contents, those entries then\ninputed into the electronic log book\nwhen it came back online?\n&gt;&gt; So, uh, thank you for the question,\nma'am. Uh so to answer your first\nquestion, the application is launched on\na desktop computer\n&gt;&gt; which is encased in lexan and some other\nmaterials that's fabricated from our\nFMRD division\n&gt;&gt; uh to protect the uh the device itself\nfrom any type of tampering or any type\nof damage. And it's also a lock flap to\nsecure that as well. So it's a sliding\nkeyboard. The staff member or the\nsupervisor will make the entry\naccordingly based on the services that's\nrendered in the in the housing unit.\nmake that entry, save it, and then\nsecure it accordingly uh and and respond\nback to their natural duties of the day.\nUh there's no uh tablet application or\nyou know as of yet um the agency may\nexplore that. You know, again, we'll\ntalk internally with executive staff in\nregards to that. And in regards to the\npaper log book, uh yes, so we have\nactually captured those missing entries\nvia the paper log book. Uh but we the\nsystem doesn't allow you to actually put\nthose back into it.\n&gt;&gt; Okay. Uh but we actually do secure that\npaper log book for any type of retrieval\ninformation if necessary.\n&gt;&gt; Okay. Like I would say that's like an\noversight. Um but it should be a higher\nlevel command for uh entry of paper log\nbooks into the electronic log books. In\nother words, um, someone of a high level\nshould be tasked with entering that\ninformation into the system because now\nyou have data points in two different\nareas.\n&gt;&gt; Of course,\n&gt;&gt; this can get lost.\n&gt;&gt; Of course. Um, of course, internally\nwe'll discuss it more. Of course, this\nis a private pilot program and these\nthings we actually assess and see and\nthen, you know, we're implementing and\nmakes those fixed accordingly.\n&gt;&gt; Thank you. I look forward to attending\nthe full complete board briefing.\n&gt;&gt; We welcome you, ma'am.\nYeah. And uh I I can say uh that I look\nforward to what can be extracted from\nthese electronic log books as a pilot.\nYou know what type of uh reporting that\ncan be presented in any particular line\nitems of interest of interest uh of uh\nany uh violent incidents or\njust the number of recordings that are\nmonitored on a daily basis that can be\nextracted and reported on.\n&gt;&gt; Uh are you asking or you're you is that\nwhat you what would you like?\nI'm just being hopeful but\n&gt;&gt; oh well um of course dayto-day the staff\nmembers do denote uh activities within\nthe housing area whether it be standard\nuh services such as recreation court\nreturn court production those things are\nentered the near to capture that of\ncourse um there are two terminals within\nthe housing area which is on the 4B post\nand then the A station itself um with\nofficers are trained to utilize the\nterminals in order to capture these\nservices um within in the application.\n&gt;&gt; Well, any other questions? Dr. Staceil,\nJude, I'll start with Jude first. Uh,\nDr. Stassel, please.\n&gt;&gt; Thank you. In the event of like a power\noutage or the system failing, will you\nresort to going back to a paper log\nbook?\n&gt;&gt; Yes. In order to capture um all\nactivities within the housing area. Yes.\nYes. Within the system.\n&gt;&gt; Thank you. Um, so I just want to make\nsure I understand sort of what this is.\nIt sounds like this is sort of an online\napplication that would replace, assuming\nthere's no power outage, the the same\ntypes of things that are logged in the\npaper log book that you know, you've\nlisted some here, housing area\nactivities, counts, security\ninspections, priors, maintenance tours,\nand touring also.\n&gt;&gt; Yes, ma'am.\n&gt;&gt; By officers. I I know um uh I've been\ntalking about touring here a lot. Uh and\nI know last time we were talking about\ntouring, there was a discussion of um an\nelectronic\n&gt;&gt; Sorry if I'm going to butcher this, but\nsomething that was actually on the wall\nof the housing area that touring\nofficers were meant to scan. Is that\ncompletely separate from this? Is does\nthat program talk to this program?\n&gt;&gt; That is a separate operation from the\nelectronic law book. Okay. Okay. The\ntour wand is there that's in place for\nstandard of touring of the house within\nthe housing areas between the officer\nand the captain that's there assigned.\nUm that's spread out through the agency\nthat's already in effect. Yeah. But this\nis that is separate from the electronic\nlog book function.\n&gt;&gt; Okay. And but so touring would be\nsomething that would be entered in the\nlog book, but it would be entered the\nsame way it's entered in the manual log\nbook, which is somebody comes and logs\nin. I toured at this time and it's not\nnecessarily a real time\nverified measure\n&gt;&gt; that is standard with to put that in the\nlog book um entries correction 101 entry\nokay for the staff member\n&gt;&gt; or supervisor or anybody who's visiting\nthe post you you would definitely denote\nthat in the log book um to to document\nwhomever entered that post um you don't\nnecessarily need the to1 for that but\nyou just want to ensure the staff wants\nto ensure that they document people who\nare on post\n&gt;&gt; okay and is part of this pilot Is there\nany part of this pilot that um is\nlooking at any sort of verification that\nthe entries in the log book either by\nvideo or some other mechanism are\nactually representative of what happened\non the housing area during the time\nframe designated?\n&gt;&gt; Um we we haven't explored it that far.\nIt's still in the pilot stage. Um of\ncourse there's further discussion with\nexecutive staff in regards to that to\nsee if those things could be you know\nactually integrate with one another in\ncase of an incident occurring. Uh we\nstill have an internal talks about that\nin conjunction with the pilot function.\n&gt;&gt; Yes ma'am.\n&gt;&gt; Vice skip.\n&gt;&gt; Yeah. I just have one more question. So\nI know that you said these entries are\nmade in real time. Yes.\n&gt;&gt; And am I right to assume that they\ncannot be edited, altered or anything\ninserted in before or after? Is that\nwhat you're telling me?\n&gt;&gt; You can't. We do make it in real time.\nThey cannot be altered at that function\nright then and there. You could make a\nlaw a late entry but um they cannot be\nedited\n&gt;&gt; late entry and that requires what like\nadditional language or something.\n&gt;&gt; Sorry, excuse me.\n&gt;&gt; Yeah, that's fine. General counsel Jim\nConroy. Um this will be very clear once\nwe do the presentation but there are you\nknow you would note the original entry\nand then the new entry and the time each\nwas made and who authorized that. So\nit's more it's an auditing function\nwithin the system. I mean the current\nprocess quite candidly is we have a log\nbook. If we have to change it if it's\ncorrect you draw a line through it and\nthen you see the new entry. This is now\na digitized version of that. So anything\nthat we're talking about with respect to\nthe current log books that are paper is\nnow a digitized version which uh with\nwith probably more guardrails in terms\nof auditing function seeing who makes\nthe entry and then the timing of each\nbut again that'll be made clear when\nwhen our IT department does the pilot\nfor you.\n&gt;&gt; Yeah, I'm hope so. I hope so because I'm\nkind of concerned if entries were not\nmade when they were supposed to like\nsays uh it's an officer tooured but\ndidn't tour\n&gt;&gt; and then wants to go back into the\nelectronic log book and and say they\ntooured.\n&gt;&gt; I I will call that vice chair that\nimpossible. You will see that in the\npilot that that it can't be\n&gt;&gt; I'm open for it.\n&gt;&gt; Yeah. Unless and someone has a a\ntechnical knowledge far above what we're\ncapable of but even then they can't\nenter the system. So all right I'm\nconfident that you'll be happy with\nthat. Thank you. I look forward to the\nbriefing.\n&gt;&gt; Well, Deputy Warden, uh what is your\nname again?\n&gt;&gt; Prince.\n&gt;&gt; Deputy Warden Prince, thank you very\nmuch for the presentation. Uh we\ncertainly look forward to the board\npresentations of the pilot.\n&gt;&gt; Thank you very much.\nNo. Now go to uh department briefing on\nuh revamp of family and attorney visits.\n&gt;&gt; Good afternoon everyone.\n&gt;&gt; Good afternoon.\n&gt;&gt; James Boyd, Deputy Commissioner for\nStrategic Operations. I do just want to\nacknowledge and commend um our partners\nin advocacy for sharing their feedback.\nThat's really insightful and helpful as\nwe embark on this endeavor to revamp\nvisits. You know, I have to agree with\nmy uh with Tanya, my uh ACS alum, that\nthis is the moment and we are taking the\nmoment to uh take action and improve the\nbusiness operation.\nUh good afternoon members of the board.\nMy name is James Boyd and I am the\ndeputy commissioner for strategic\noperations at the department. I am here\nto provide an update on the department's\nefforts to revamp the family and\nattorney visit process. Visitation is\ncritical to the well-being, dignity, and\nsuccessful reintegration of people in\nthe department's care, and we have been\nworking diligently to pursue every\nopportunity to improve the overall visit\nexperience.\nAs a department's initial assessment, we\nsaw the need to hire a dedicated leader\nin an executive director role to not\nonly prioritize visits but also lead our\nefforts to improve it. We anticipate the\nnew executive director will be starting\nin a few days. Among many\nresponsibilities, executive director\nwill serve as a primary point of contact\nfor all visit related matters. This\nindividual will be tasked with leading a\ncomprehensive review of the visit\noperation and continuing to develop both\nshort-term improvements as well as\nlong-term sustainable solutions. The\nexecutive director's work will build on\nfoundational initiatives that we have\nalready pursued to improve the overall\nvisit experience, several of which I\nwill highlight here. The department\nrecently expanded our long-standing\npartnership with the Children's Museum\nof Manhattan to the Brooklyn Children's\nMuseum to provide greater access to this\nimportant program. We also launched SEOM\nlearning hubs at multiple facilities\noffering children and their families\nvisiting Riker's Island and interactive\nchild-friendly spaces during their\nvisits. Beginning this month, our\nchildren has become a daily presence at\ncentral visits to provide families and\nchildren with housing resources, benefit\ninformation, and community- based\nservices. We will also continue to\npursue grant funding opportunities\nsupport additional initiatives aimed at\nstrengthening our family engagement\nwork. Our partnerships only strengthen\nour efforts.\nRevamping visits is a complex but\nessential project for us. People in\ncustody and their loved ones. The\ndepartment has taken concrete steps to\nidentify and address issues raised by\nthe board, the city council, and our own\nstaff. As of December 20th, 2025, the\ndepartment resumed accepting package\ndrop offs in person again during\nvisiting hours. The practice was paused\nfollowing the CO 19 pandemic, but after\nengaging with the board, we moved\nforward to resume this service. Visitors\ncan now drop off packages in in person\nat the reception area next door to\ncenter visits and there is visible\nsignage to help visitors locate the drop\noff location. Visitors may also still\ncontinue to mail packages. An updated\nlist of permissible items has also been\nposted on the department's website to\nprovide clear guidance to the public.\nThe department also installed new\nsignage on Riker's Island to improve the\nflow of general information to our\nvisitors once they are actually on site.\nA recommendation made by the city\ncouncil. The public can expect us to\ncontinue to be responsive to their needs\nand should be on the lookout for more\nupdates to come. To further enhance the\nvisit experience, the department also\ninstalled new benches in the front\nentrance of central visits for visitors\nto ar for visitors who arrive early\nbefore the building opens. We thank our\npartners at the New York City Department\nof Trans Transportation for the benches.\nIn addition, we replaced over 1,000\nlockers at central visits, replacing\noutdated, inoperable coinbased lockers.\nWe believe this minor change will\nsupport reducing weight times. We are\nalso partnering with Columbia University\nthrough the town and gown initiative\nwhich is a citywide university community\npartnership program. This collaboration\nis informing and supporting how we\ncreate the the most efficient and\neffective scheduling system. We\nrecognize that the visit process needs\nimprovement and we are committed to\nmaking swift, intentional, effective and\nsustainable improvements. Regarding\nattorney visits, we recognize that\ntechnology will be the solution to\nimprove this process and it is a top\npriority for us. We hope to have updates\nregarding a scheduling pilot in the\ncoming weeks. Regarding the visit uh\nworking group, this is something we can\nlook into further and we are happy to\ndiscuss with our partners once the\nexecutive director begins. On day one,\nthis individual who will be the\nexecutive director will have multiple\ntasks for them to address and of course\nengagement with partners and\nstakeholders is one of the priorities.\nWe appreciate and value the support of\nall stakeholders as we continue to\nimprove the visit operation for people\nin custody, attorneys, and the public.\nWe know there is much more work to do\nand we are working tirelessly to improve\nthis essential service. We thank you for\nyour time and I'm here to answer any\nquestions.\n&gt;&gt; Uh vice chair skip.\n&gt;&gt; Yeah. I just want to know where will\nthis person sit? Will they be based on\n&gt;&gt; Wagers Island where visits occur? Will\nthey be in boulevard?\n&gt;&gt; Currently we are looking for space for\nher in central visit so she can be right\non site.\n&gt;&gt; Thank you sir.\n&gt;&gt; Absolutely.\n&gt;&gt; Board member Jude.\n&gt;&gt; Thank you. Thank you. Um, in terms of as\nan ACS advocate, um, in terms of CHIPS\nvisits, how was how do you plan on\nintegrating CHIPS and and this new\nprocess, new visitation?\n&gt;&gt; I I think CHIPS and I can let uh DC\nCologne speak a little bit more to it. I\nthink it's pretty self-sufficient. Uh,\nCHIPS occurs on non-visit days. Today is\na CHIPS program, but I think once the ED\nstarts, we'll figure out how we can\nfully integrate the entire universe of\nvisits. I think that's the overall\nlarger plan. Um but it's gonna we got to\ngo step by step. I don't know if you\nhave anything.\n&gt;&gt; Yeah. No, I just want to emphasize that\nthe chip visits are operating currently.\nUm they happen on Tuesday non-visit days\nand we are fully committed to continuing\nour partnership with ACS and continuing\nthe chip visits. So um while right now\nthe chip visits is overseen by the\ndivision of programs. We assist with the\nclearances. We support and our partners\nwith ACS and ensuring that that\ncommunication is happening on a facility\nlevel. We will be working in tandem with\nthis executive director to make sure\nthat those visits continue.\n&gt;&gt; I just want to department also I know\nfor a fact that chips visits do go well.\nSo I just want to you know applaud that\ncollaboration\n&gt;&gt; 100%. I actually used to work on chips\nvisits back in the day. So I I I applaud\nthe work ACS was doing on that front.\n&gt;&gt; Board member Stasa. Hi. Thank you, DC\nBoyd. And I I just want to commend you\nand thank you for all of the steps that\nyou're taking to improve this process. I\nthink it's really wonderful, you know,\nbringing back the in-person packages,\nthe updated list of permissible items,\nwhich I know is causing a lot of\nconfusion. You know, whatever you can do\nto reduce the wait times. Um I think,\nyou know, bringing back the visit sort\nof working group is a great idea. Um I\njust wanted to speak for a second uh\nabout the attorney visit part and I know\nyou mentioned sort of some technological\nsolutions. I just want to just share\nbriefly my experience of sort of going\nthrough the attorney visit process which\nyou know a couple of us did um in\nNovember. Um, and I think, you know, one\nthing that was concerning to me is that\nit seems like there is infrastructure in\nplace to obtain relevant information\nabout how often we're sort of straying\nfrom the 45minute uh requirement from\nchecking in at Perry to actually getting\nan individual in the council room um\nwith the yellow cards. Um and I was very\nconcerned that it did not seem that the\nfacilities were actually tracking the\nrelevant information to get at that\ndata. So at the facility level they were\nvery focused on the fact that they were\ntracking the time that the person\narrived at the building where and the\nend point was the completion of the\ncouncil visit. So it was a totally\ndifferent metric. Um and then my other\nconcern was that the um infrastructure\nto make sure that that reporting was\naccurate was really missing. You know\nthe timestamps are the time stamp\nmachine is there but then when you look\nat the cards they don't have time stamps\nthey have handwritten data in there and\nyou know somebody said well the time\nstamp machine wasn't working. Well now\nit's working but even when it was\nworking people were writing that stuff\nin. So I just think in addition to\nwhatever technology gets used to try to\nsolve this problem, there needs to be\naccountability so that the folks on the\nfacility level really understand, you\nknow, what the minimum standards are,\nwhat needs to be tracked and where it\nneeds to go, you know, in order to make\nsure that we're keeping track of sort of\nhow we're doing with this.\n&gt;&gt; Yeah. No, I I appreciate the\ncompliments. I don't want to take all\nthe credit for us. This is a team effort\nand this did not this work of improving\nvisits did not happen by happen stance.\nRight. This was purely intentional and\njust building off the work we've been\ndoing over the years. You're exactly\nright and I think something that I said\nat the city council hearing is when the\ndepartment started using this\napplication called visitor express which\nwe track families throughout the visit\nprocess. I don't know why the decision\nwasn't made to track attorney visits in\nthe same application. And so that\nvisitor express\n&gt;&gt; visitor\n&gt;&gt; board has access to it too. when um so\nthis is something we're looking into um\nin addition to this more this scheduling\nsystem that um we're going to uh\nhopefully want to announce in the next\ncouple of weeks. So totally right here\nare those points. I mean this all of\nthis work to revamp visits is I would\nargue is decades in the making. This is\nnot a couple of years. This is not a\npre-COVID thing. This is manifested over\ndecades. And so this is systematic and\nso we really need to dive deep to really\nlook at it as a whole and this is what\nwe're doing. It's really complex but\nwe're doing a good work. So thank you\nagain\n&gt;&gt; member Franco then board member Jude I\nbelieve. Yeah.\n&gt;&gt; And and I I maybe you can help us out in\nterms of data and I know that you you\nused to manage another data at the\ndepartment. Um how we how are we\ntracking or plan to track um the\nexperience of visitors with this new\napproach?\nYeah. So, we're also having that\nconversation um through our research\nteam to start thinking about how we can\nstart an engagement with visitors to\nhear their experience directly. I also\nthink that was something that spawned\nout of the visit working group. And so,\nI think, you know, I'm having\nconversations with Tanya directly. We'll\nfigure out what that looks like. Uh\nbecause that feedback is critical and\nimportant, but also staff, right? You\nknow, I I appreciate Mr. Clinger's point\nregarding more training, but a lot of\nour staff get into the business of\ncorrection because it's the closest work\nyou have to giving back to your\ncommunity. I think we say it time and\nagain, a lot of our staff are from the\nsame communities as people in custody.\nAnd it's essential to them to pour back\ninto the people from their community,\nbut also some of our staff, including\nmyself, have family members who've been\njust as involved who have been arrested\neither on Riker's Island or in the state\nand went through the visit process. So\nfor a lot of us this is paying it\nforward. Um but there's no doubt that\nmore training and thinking about what\nthat training could look like throughout\nthe year uh is an opportunity that we\ncan certainly explore.\n&gt;&gt; But but I think that uh which I I'm sure\nyou will be thinking about is important.\nI mean those who have done it well um\ncan actually look at the issue of\nvisiting and incidents very clearly. I\nmean it was interesting when you guys\nwere talking about visiting um I think\nyou might remember this experience. We\nlearned that there were more incidents\nwhen young people didn't get visits and\nthere was a community group in the Bronx\nuh community connections for youth that\nactually were willing to get all\nvolunteers\nfor those young people who didn't get\nthat many visits so they had someone to\ncome and visit them. Um and I just\nmentioned that an example.\n&gt;&gt; Yeah. Um, also visiting is important,\nbut I think what people really want is\ncommunication,\n&gt;&gt; which I know you talk about all the work\nyou're doing with young people. But, um,\nit would be good to know what you guys\nare thinking that will be the outcomes\nthat you're going to track that this is\ngoing better than before.\n&gt;&gt; Yeah. No, I think that's that's spot on\nis looking at the data and figure out\nhow it correlates the actual operations.\nUm there are numerous variables that\nimpact the visit um wait time, you know,\nand it varies between it could be the\nperson in custody, it could be us\nopening late because of staffing issues.\nAnd so I think we all want to the\nobjective is to look into the root cause\num and not just the you know the weight\ntimes on a surface level. What's kind of\ndriving it?\n&gt;&gt; I I think you know this very well is\nmore than wait time. It's actually the\n&gt;&gt; Totally.\n&gt;&gt; So if you could capture that that would\nbe\n&gt;&gt; sure. Thank you. Board member Jill.\nU Deputy Commissioner uh Boyd. Uh my um\nthoughts were\nmeals or the vending healthy meals in\nthe vending machines\nor the visit experience. uh being past x\nnumber of hours where there's no access\nto food or healthy meals\nwith your new executive director or team\nor working group if that's established.\nIs that something that could be looked\nat? Because that was a big concern on\ntwo visits I had that uh you know uh the\naccess to healthy foods and the vending\nmachines were a problem.\n&gt;&gt; Sure. But if someone's there eight hours\nand maybe they get a meal, you know that\nif it's feasible to supply uh\n&gt;&gt; we'll be happy to look into that as\nwell.\n&gt;&gt; Okay. And then uh you do surveys on on\nvisit experience. Do you\n&gt;&gt; not yet, but we're going to ask to fully\nresponsibility. That is something we're\ngoing to be looking into.\n&gt;&gt; All right. Then uh\nthat is it for me, but we have uh Vice\nChair Skip that had a question. Uh but\nthis is not pertaining to sick call.\n&gt;&gt; It's not pertaining to sick call, but it\nis for the department.\n&gt;&gt; While I have um I'm receiving reports\nthat the PC unit at RMSC was closed. Can\nyou confirm this?\n&gt;&gt; No. Which building? the PC protective\ncustody\nunit at RMSSE was closed and to follow\nthat further that the people who were\nhoused in that unit were sent to general\npopulation.\n&gt;&gt; I don't have any updates on that, but\nI'm happy.\n&gt;&gt; Okay. Can you look into that for me? I I\nwould appreciate it.\nI mean PC is is situated for a reason\n&gt;&gt; and if you're closing it and moving\npeople into GP\n&gt;&gt; there should be a relevant reason and um\n&gt;&gt; yeah I just want to be fair to the\ndepartment and\n&gt;&gt; for them to verify that uh because that\nhas not been verified.\n&gt;&gt; Yeah. I would ask that you verify even\nconfirmed but not confirm.\nMy second question, again,\nyou know, I just have little birdies\nthat kind of tweet in my ear at times.\nUm, something about OBCC, and I believe\nthat's you, sir. Um, that you closed or\nopened more mental observation units or\nclosed them down or something like that.\nHas that happened?\n&gt;&gt; And again, I'm just asking.\n&gt;&gt; Yeah,\n&gt;&gt; I'm just asking. Are you asking if we're\nopening more units or have\n&gt;&gt; or closed or or anything like that?\n&gt;&gt; I don't know about closing any housing\nunits in OPCC, but I'm happy to look\ninto it.\n&gt;&gt; Okay.\n&gt;&gt; Well, thank you,\nDeputy Commissioner Boy. Thank you all\nfor your time. No more questions. Thank\nyou to the department. I I'd like to\nalso note that uh\nat our last uh board meeting uh at the\nconclusion of board member Jacqueline\nPittz did resign from the board. So if\nshe's you don't see a presence here, she\nhas resigned from the board. I commend\nher service. She served on numerous\ncommittees uh dedicated uh to the end\nand uh and she uh she really pushed hard\nfor the for the betterment of of the\ndepartment and the and the service that\nthis board provides.\nSo we thank her for that.\nAnd now we'll go on to uh public\ncomments. We will now hear comments from\nthe public. Uh Jasmine will call the\nnames of those who signed up to speak.\nThank you. We have three public\ncommenters. If there is anybody else who\nwants to speak, just let our staff know.\nAnd if you're online, just raise your\nhand virtually. The first person is Ryan\nAqua Aqua Aqua. I'm so sorry.\n&gt;&gt; Auad. And the next person is Chaplain\nDr. Victoria A. Phillips. Dr. V.\nGood afternoon. Um, my name is Ryan\nAquata. Uh, I work for Freedom Agenda,\nwhich is a member-ledd project at the\nUrban Justice Center. And I don't have a\nlot to to testify to today. I just\nwanted to relay some things that we're\nhearing from people on the island um to\nflag for the board to look into more.\nUm, and so yeah, Freedom Agenda, our\nmembers are people who've been\nincarcerated or who have a loved one\nwho's been incarcerated. And so we're\ncommunicating with people on the island\nwho are currently detained. We\ncommunicate with people who work on the\nisland who are visiting the island. And\nwe have we have also heard about um uh\nfrom people inside that over the course\nof December often without any warning\nthat um uh DOC was closing or opening\ndifferent MO units um shuffling people\naround um and that it was causing huge\ndisruptions in medical services on the\nisland um and it was pretty upsetting\nand dangerous for everyone. I heard that\nOBCC uh was on lockdown at times. People\nwere unable to visit um and so we were\njust curious what's going on there. Um,\nwe have also heard um that there are\nissues with staffing at CHS that um\npeople who are often relying on uh\nmedication approvals uh for to get into\nATI programs are having trouble um\ngetting basic approval of of things that\nthey need um for their treatment. Um and\nI don't know if that there's issues uh\nwith staffing. um senior staff are are\nnot available at all the facilities to\napprove um medications, but these are\njust things that we're hearing from\npeople on the island that we would like\nthe board to look into um if possible.\n&gt;&gt; Thank you. Uh Chaplain Dr. Victoria A.\nPhillips, followed by Natalie Fiorenzo.\nPeace and blessings everyone. you can\nhear me. Okay. Um, thank you once again.\nI'm chaplain Dr. Victoria A. Phillis.\nEveryone calls me Dr. V. And today I\njust want to touch on a couple of\nthings. Again, happy 2026. I'm super\nexcited to see all the great work that\nyou do this year. I have faith in y'all.\nI really do. Um, I just want to\nhighlight some things over the holidays.\nYou know, I don't really celebrate\nAmerican holidays. I'm indigenous.\nHowever, I respect all holidays. And\nover the holidays, um, several people\nhad to reach out to me for lack of\nchaplain access, lack of religious\nmaterials and access on Riker's Island.\nUm, that's a big concern of mine as a\nchaplain. Um, regardless whether I was\nspiritual, religious, or not, if anybody\non American soil and domestic soil wants\naccess to religious beliefs that they\nshould have. So, um, I am very concerned\nabout that because chaplain are some of\nthe lifelines to those incarcerated.\nI've stood before this board before and\nactually had to stop when one\ncommissioner was going to take all the\nchaplain out of the facilities and put\nthem in GMDC. Um, I say that because it\nwas very disheartening over the\nThanksgiving holiday and over the\nChristmas holiday to have people reach\nout and want me to make sure that people\nhad access to religious\npeople, to chaplain\nsometimes even because mental health\nstaff wasn't getting around to them and\nso they was relying on their spiritual\nway to help with their physical needs,\ntheir mental health needs.\nThere should never be a time when\nanyone's incarcerated that they have to\nrely on spiritual care when they are\nsupposed to be afforded medical and\nmental health care at all times. I also\nwant to highlight that\nthis visiting group that we talked about\ntoday really needs to come into\nfruition. It cannot be a hope. It cannot\nbe a maybe. I'm not even going to be a\npart of it. I don't want to be a part of\nit. I just want to make sure that it's\nbirthed and it's birthed right. Um, and\nyou've met all great people today that\npresented that should be a part of this\ngroup. So, I encourage you all to\nplease, you heard us now make that\nhappen and make sure the commissioner is\nreally a part of it. Um, anybody else\nthat might be great, but we all\nunderstand things don't tr es especially\nin DLC this paramilitary organization\nthings do not truly move forward in the\ncorrect way unless it comes from the\ndirect boss holding their entire staff\naccountable and I'll just say this as I\nend in 2019 CHS and DOC stood before\nthis board and said all the reasons why\nsick call was a flop. all the reasons\nwhy people were not being seen in 2026.\nDo not allow any mediocre excuse\nto be the reason why we allow people to\ndie in 2025. Deaths rose by\nso much three times than that than what\noccurred in 2024. Yes, I'm correct on\nthat. The deaths in DOC custody rose by\nthree times what it was in 2024.\nThat's horrendous. Please, let's all\nwork together to save a life, to save\nlives on the the incarcerated side and\non the staff side.\n&gt;&gt; Thank you. Our next caller, I'm sorry,\nour next commenter is remote and that is\nKayla Simpson followed by Tahani Dunn.\nI apologize I forgot Natalie Fiorenzo is\nin the building so she is next followed\nby Kayla Simpson remote and then Tahani\ndone.\n&gt;&gt; Thank you. Um good afternoon everybody.\nMy name is Natalie Fiorenzo. I am a\nsenior correction specialist at New York\nCounty Defender Services. Thank you for\nsuch a robust agenda to start off the\nnew year today. Seeing that the clinic\nproduction dashboard has been on the\nagenda consistently for months, that\nimproving access to counsel has been on\nthe agenda consistently for months shows\nme that this board is not shying away\nfrom real change. DOC's track record\nmakes it very clear that they are not\ninterested in improving their facilities\nor their care for the people in their\ncustody on their own. It takes diligent,\nconsistent, repeated attention and\npressure to bring them into compliance\nwith their own rules, let alone your\nminimum standards or city laws. And it\nis that compliance that will provide\nmore humane conditions to incarcerated\nNew Yorkers. A joint group of defenders\nsubmitted proposed new minimum standards\nregarding access to counsel on December\n12th. These are designed to promote\ntransparency, efficiency, and\nconfidentiality, characteristics of\nmeaningful access to counsel. These are\nminimum standards that the department\nshould welcome as the existing barriers\nto council drastically increases their\njail population by slowing down court\ncases, adding several months to any\nindividual's length of incarceration on\nRikers. If the board has any questions\nabout our proposals, please do not\nhesitate to reach out to the defenders.\nWe welcome any discussion.\nUnfortunately, rulemaking doesn't always\nmatter if not coupled with a culture\nshift. Although the Riker's visit\nworking group will focus on improving\nthe visit process for families primarily\nrather than council visit process, any\ninitiative to collaborate with DOC\nofficers on the ground. Any effort to\nfind common ground there will certainly\nimprove interactions and systems across\nthe island. We are excited to see what\nthe revamping of this group could do to\naddress what the federal federal monitor\nrefers to as a culture of dysfunction\nmarked by violence, brutality, and\nneglect.\nI need to completely switch gears here\nto discuss something that is not on the\nagenda today, but is really incredibly\nconcerning. In December, the Department\nof Correction unlawfully coordinated\nwith ICE and transferred our client into\ntheir custody. We have not been able to\ncommunicate with that client since then.\nHe is in a facility now out of state,\nnot close by, and the department\nmaintains that they have done nothing\nwrong. The New York City detainer law so\nclearly states that DOC cannot\ncoordinate with ICE unless there is a\nwarrant signed by a judge indicating as\nmuch. DOC's legal department has\nconfirmed that they did not have that\nwarrant. So why did this happen? I urge\nthe board to keep a very close eye on\nthe department on this issue\nspecifically as they are acting\nunlawfully and with perceived impunity.\nThank you very much.\nThe next speaker is Kayla Simpson.\n&gt;&gt; Hi. Can you hear me?\n&gt;&gt; Should be able to present. We see you.\n&gt;&gt; I see you. Can you hear me?\n&gt;&gt; Can you speak? Let's see.\n&gt;&gt; Hello. Hello.\n&gt;&gt; You're speaking. Hold on. Wait. Wait a\nminute.\nShe's not muted.\n&gt;&gt; I'm not muted.\n&gt;&gt; Why can't we hear\n&gt;&gt; testing?\n&gt;&gt; Hello.\n&gt;&gt; Yep, we hear you loud and clear. Thank\nyou, Kayla. Good to go.\n&gt;&gt; Wonderful.\nThank you so much. Um, and sorry, I hear\na little bit of feedback, but hopefully\nuh hopefully you don't hear that. Uh, my\nname is Kayla Simpson. I'm an attorney\nwith the Legal Aid Society's Prisoners\nRights Project, and I'm on the team that\nrepresents the plane of class in Nunes.\nUh, three things I want to touch on\ntoday, and happy new year. Good to see\neveryone. Um, first, regarding SMU, I\nreally appreciated the executive\ndirector's comments today. You let me\ncross out an entire paragraph of what I\nhad prepared to say. Um, we remain\nextremely concerned though about this\nunit, how people are placed there, the\nconditions there. Um, it has many of the\ncharacteristics of VSSH and the harms\nthat come with it. Um, but the criteria\nto be placed there are even more\nambiguous and they leave a lot of room\nfor abuse. Um, and as the board knows,\nSMU involves serious restrictions, not\nthe least of which of course is seven\nhours out of cell, which is half that of\ngeneral population. Um, and\ndisturbingly, the policy really offers\nno clear path out for people, just a\ndetermination of a DOC staff member\nunder a vague standard. Um, and I just\nwant to note that this agency has a\nhistory of taking the people that it\ndeems problems and warehousing them in\nrestrictive settings and for extended\nperiods. um you know the old NBC9 South,\nthe West facility, uh second and third\nfloors of NIC, ESH, there have never\nbeen a shortage of restrictive settings\nin the city jails. Um and this is the\nmost recent iteration, but I think we\nhave to note that this is not the\ndirection that the city council and\nfrankly the new mayor given his recent\nactions are requiring us to go. We have\nto reach for different responses to\nsecurity problems. And of course, I\nthink all of us will have much more to\nsay on that in coming weeks and months,\nbut we ask that the board uh continue to\nput SMU on the agenda, continue to\nreport on the conditions there, and that\nwe all continue to urge the department\nto work toward building the structures\nthat are necessary for more out of cell\ntime, more reliable staff deployment,\nand more effective programming for these\nfolks. Second point regarding the\nelectronic logbook pilot, I really\nappreciated hearing the update from DOC.\nUm, but it raised immediate concerns\nabout how to ensure that the information\nin that system is actually reliable. And\nI think we need look no further than\nDOC's truly years and years of\ndocumented failures to ensure that tour\none data for example is reliably used to\nsee how critical those questions are.\nYou know, DOC mentioned in the brief\nupdate today that the system allows for\noversight and supervision, but how is\nthere reliable accountability if staff\nmisuse the system or fail to log\nentries? And what evidence is there that\naccountability is actually imposed?\nWho's responsible for supervising the\nsystem? And how successful is that\nsupervision? I'm really glad to hear\nthat the board will get a demonstration\nof this technology, but we also ask that\nthose questions are answered for the\npublic, too. So, I would ask that you'd\nput it back on the agenda. Also, and\nthen third and finally,\nhonestly, what kept striking me as I\nthought about what comments might be\nhelpful today is acknowledging that\nwe're actually at a moment in the city\nand for DOC that is a crossroads. Yes,\nwe have a new mayor and we also know\nfrom Judge Swain's orders in Nunees that\nshe's going to appoint a remediation\nmanager. This moment represents an\nopportunity. Do we double down on a\nstatus quo that has produced dysfunction\nand death to oversimplify it? Or are we\nwilling to do something different, even\nif it's hard? Are we willing to reach\nfor different solutions to DOC's\nknee-jerk use of force, different\nsolutions to violence, different\nsolutions to mental health needs? Are we\nwilling to think through correctional\nproblems with a different lens that\ndoesn't view people behind the walls as\nproblems that cages can solve? And there\nare some necessary changes that are\nclear like dysfunctional staffing\ndeployment, more reliable accountability\nmechanisms, and of course some like\nelevating a culture that will take time.\nBut I think this is an opportunity to\nbreak patterns and it will require all\nof us um from behind our computers in\nthe room today to engage uh to hold\nourselves accountable, to hold others\naccountable. And it will require the\nboard to reach for the same tools that\nthe executive director began the meeting\nreviewing in the board's mandate to\nmonitor\n&gt;&gt; finish it up please\n&gt;&gt; and to publicly report\n&gt;&gt; and we really appreciate the opportunity\ntoday and look forward to next month's\nmeetings.\n&gt;&gt; Thank you. The final speaker is Tahani\nDunn.\nHi, how are you? Can everybody hear me?\nOkay, great. My name is Tahani Dunn. I\nam an attorney at the Bronx Defenders as\nwell as the director of the prisoners\nrights practice. I'm going to be\nuplifting testimony from one of our\nclients um who would like to remain\nanonymous. I am a pre-trial detainee\ncurrently incarcerated at OBCC. During\nthe months of November and December of\n2025, we were subjected to emergency\nlock-ins or TSOs more than 10 times,\neach exceeding more than 12 hours and\noften for durations of 48 hours to 56\nhours straight. During these time\nperiods, we are denied hot water for tea\nand coffee or soup and oatmeal to cook\nbecause the cos believe it is either\nbeneath them to hand out hot water or\nsimply refuses to assist the 48 men in\ntheir care, custody, and control.\nAdditionally, when the food uh arrives,\nit usually sits out for extended periods\nof time and is served to us cold.\nContrary to BOC minimum standards, the\nphones and tablet phones are in are\nintent in intentionally turned off to\nprevent us from calling 311 or the BOC\nto make complaints regarding the\ndeprivation associated with these\nexcessive emergency lockins. We are\ndenied the ability to communicate with\nour attorneys, families, and loved ones\nand denied the ability to seek medical\nattention via the sick call hotline. We\nare denied the opportunity to shower,\nshave, or breathe hot uh fresh air. The\nanxiety we and our families experience\nfrom these emergency lockins only\ncompounded by the inability to\ncommunicate. Often our families think we\nare either involved in an altercation or\nhave been hurt, assaulted, slashed, or\neven killed. Imminent death feels like a\nterrifying reality on Riker's Island\nwhen 16 to 17 people died here in 2025.\nDuring these excessive emergency\nlockins, we are also denied visitation.\nOur families are not informed that the\nfacility is on lockdown and they travel\nsometimes long distances with children\nin the cold only to be informed that\nthey cannot visit. Many of our family\nmembers who are disproportionately black\nand black and brown sacrifice time and\nand carfare only to be turned away and\nleft in a state of uncertainty as to the\nwell-being of their incarcerated loved\none. Even our our attorneys who may be\npreparing our defenses for critical\ncourt appearances are per se denied\naccess to their clients when the\nfacility or the housing areas are on\nlockdown. They may have to wait hours to\nsee their clients. We are even denied\npickup and delivery of our mail\nincluding legal mail which is often\ntimesensitive. We are denied access to\nlaw library to research and file\ntime-sensitive administrative appeals\nand motions to court not only pertaining\nto criminal proceedings but also civil\nand family court matters. As pre-trial\ndetainees, we are entitled to the\nconstitutional presumption of innocence.\nAs pre-trial detainees, we are entitled\nto minimum standards. Instead, we are\npunished as guilty absent due process of\nlaw and denied our minimum standards as\nhuman beings. The biocscho and social\nimpact of being locked into a 6 by8 ca c\nc c c c c c c c c c c c c c c c c c c c\nc c c c c c c c c c c c c c c c c c cage\nupon individuals who already suffer and\nstruggle with mental illness substance\nabuse disorder or physical disabilities\nonly exacerbates these pre these\npre-existing conditions resulting in\nfurther deterioration on December 26th\n2025 I attended an inmate council\nmeeting hosting this forum where two\ndeputies they informed the housing reps\nthat at OBCC Peter would pay for Paul\nand in in essence the action of a few\nwould determine whether the facility\nand/or the housing areas will be locked\ndown or not. These emergency lockins\nwhich affect 30 plus housing units and\n1400 PIC's cause all of us to pay for\nthe actions of a few. The problems here\nat Rikers are not bottom up but top\ndown. Thank you for the opportunity to\ntestify.\nOkay, we thank I'd like to thank uh you\nuh everyone who attended and\nparticipated in today's meeting. The\nboard's next meeting is scheduled to\ntake place on Tuesday, February 10th,\n2026,\nimmediate following the public hearing\non proposed rules, which begins at 100\np.m. At this time, I'd like to take a\nmotion to adjurnn.\nAll in favor?\nI\n&gt;&gt; meetings adjourned.","summary":"The Board of Correction met on January 13, 2026, to address multiple jail system issues. The Board unanimously approved two routine six-month variances from Correctional Health Services: one allowing psychiatrists to see stable patients on psychotropic medication every 28 days instead of 14 days, and another permitting tuberculosis screening using either interferon gamma release assays or tuberculin skin tests. The Board heard testimony on the planned revival of the Rikers Island Visit Working Group (active 2015–2020), with advocates and legal representatives emphasizing how structured collaboration improved the visitation process and offering to participate in a reconvened group. The Department of Correction briefed the Board on its clinic production dashboard pilot at North Infirmary Command, designed to electronically track sick call requests and clinic production; the Board raised concerns about data fragmentation, terminology clarity regarding what constitutes \"sick call,\" and the need to ensure the system captures all requests made to officers, not only those routed through the CHS triage line. Public comments from incarcerated individuals documented ongoing serious issues including dietary accommodations for medical allergies, black mold exposure, restricted commissary access, and alleged denial of medical care and religious services.","keywords":["psychotropic medication","tuberculosis screening","variances","visitation","Rikers Island","Visit Working Group","sick call","clinic production dashboard","health services","restrictive housing","Special Management Unit","overcrowding","deaths in custody","medical care","food/dietary accommodations","black mold","religious services","commissary","attorney visits","ICE detention","staff training","electronic records","borough-based jails"]}],"doc_texts":{"1":"NEW YORK CITY\nBOARD OF CORRECTION\nJanuary 13, 2026\nPUBLIC MEETING AGENDA\n(subject to change)\nI. Approval of the Agenda\nII. Approval of Meeting Minutes: November 13, 2025 Meeting\nIII. Public Comment Period – People in Custody\nIV. Executive Director Updates\nA. Condolences\nB. Census\nC. Reports\nV. CHS Variance Requests\n1. Variance from 40 RCNY § 2-05(b)(2)(i-ii) (psychotropic medication)\n2. Variance from 40 RCNY § 3-04(b)(2)(v)(A) (tuberculosis screening process)\nVI. Briefing: Overview of Rikers Visit Working Group (active between 2015-2020)\n1. Successes and challenges shared by advocate participant\nVII. Department of Correction Briefings, Updates, and Discussions\nA. Department Briefing on Clinic Production Dashboard Pilot at NIC and\nCompliance with Sick Call Minimum Standards (40 RCNY § 3-02(c)(5))\n1. Pilot Status\n• Findings, operational challenges, and corrective action plan\n2. Compliance Status\n• Current and planned mechanisms for daily tracking and reporting of all\ndata concerning sick call requests and clinic production across all\nfacilities\n3. Collaboration with Correctional Health Services\n• Coordination protocols for same-day or urgent requests to be escorted\nto the clinic for sick call\nB. Department Briefing on Electronic Logbook Pilot at OBCC\n1. Pilot Status\n• Findings, operational challenges, and corrective action plan\nC. Department Briefing on Revamp of Family and Attorney Visits\n1. Status of Visitation Process Revamp\n• Results of the Department’s internal review assessing process flow,\nwait times, communication and policies\n• Timeframe for hiring an Executive Director of Visit Operations\n\n• Plans to revive the Rikers Visit Working Group established by former\nCommissioner Ponte in 2015 (active 2015-2020)\nVIII. General Public Comment Period\nIX. Adjourn","2":"Joseph Otonichar, DO\nChief of Service, Mental Health\nCorrectional Health Services 55\nWater Street, 18th Floor\nNew York, NY 10004\nJanuary 6, 2026\nJasmine Georges-Yilla\nExecutive Director\nNYC Board of Correction\n2 Lafayette, Suite 1221\nNew York, NY 10007\nDear Ms. Georges-Yilla:\nIn accordance with the Board of Correction’s Mental Health Minimum Standards for New York City\nCorrectional Facilities, the Correctional Health Services (CHS) division of NYC Health +\nHospitals requests a six-month renewal of a variance from Section 2-05 (b)(2)(i-ii) concerning\npsychotropic medication. The requested variance, first granted by the Board on November 10,\n2005, authorizes psychiatrists to see and evaluate stable adult patients on psychotropic\nmedication in general population every 28 days, rather than every 14 days.\nAs the Board has acknowledged, this medication variance helps to improve patient care and make\nthe BOC psychotropic medication prescription standard more consistent with the current\ncommunity standards and practices. In the more than 20 years since the variance has been in\neffect, there have been no known cases of patients requiring hospitalization due to the 28-day\nregimen.\nThe consideration of the Board members and staff of the requested variance regarding\npsychotropic medications for a period of six months is greatly appreciated.\nRespectfully,\nJoseph Otonichar, DO\nCorrectional Health Services\ncc: Patsy Yang, DrPH","3":"Zachary Rosner, MD\nChief of Medicine\nCorrectional Health Services\n55 Water Street, 18th Floor\nNew York, NY 10041\nJanuary 6, 2026\nJasmine Georges-Yilla\nExecutive Director\nNYC Board of Correction\n2 Lafayette, Suite 1221\nNew York, NY 10007\nDear Ms. Georges-Yilla:\nIn accordance with the Board of Correction’s New York City Correctional Health Care Minimum\nStandards, Section 3-13, “Variances,” the Correctional Health Services (CHS) division of NYC Health\n+ Hospitals requests a year-long renewal of a continuing variance from Section 3-04(b)(2)(v)(a) of\nthe Minimum Standards, which requires that a tuberculin skin test (TST) be administered during\nthe intake screening process for patients who do not have a prior history of a positive reaction to\nthe test. The requested variance will authorize CHS to use interferon gamma release assays (IGRA)\nas a substitute for TST in tuberculosis screening, and to exempt from repeat screening those\npersons who have a documented negative test in the six months prior to their admission.\nSince the implementation of CHS’ tuberculosis screening program 16 years ago, IGRAs add\nnegligible time to the intake process, obviate the need for a follow-up encounter solely to obtain\nTST results, and have become the preferred method of testing for latent tuberculosis as\nrecommended by a 2017 guideline jointly issued by The American Thoracic Society, Infectious\nDiseases Society of America and Centers for Disease Control and Prevention.1\nThe consideration of the Board members and staff is greatly appreciated in this matter.\nSincerely,\nZachary Rosner, MD\nCorrectional Health Services\ncc: Patsy Yang, DrPH\n1.Lewinsohn DM et al. Official American Thoracic Society/Infectious Diseases Society of America/Centers for Disease Control and\nPrevention Clinical Practice Guidelines: Diagnosis of Tuberculosis in Adults and Children. Clin Infect Dis. 2017 Jan 15;64(2):111-115.","4":"New York City\nBoard of Correction\nJanuary 13, 2026\nPublic Meeting Minutes\nAttendees:\nMembers Present\nDwayne C. Sampson, Chair\nHelen Skipper, Vice Chair\nHon. Barry A. Cozier (Ret.), Member\nFelipe Franco, Member\nDr. Lauren Stossel, Member\nJude Torchenaud, Member\nDepartment of Correction (DOC)\nLynelle Maginley-Liddie, Commissioner\nFrancis Torres, First Deputy Commissioner\nFritz Frage, Senior Deputy Commissioner\nJames Conroy, Deputy Commissioner of Legal Matters/General Counsel\nJames Walsh, Deputy Commissioner of Security Operations\nJames Boyd, Deputy Commissioner of Strategic Operations\nPatrick Gallahue, Deputy Commissioner of Public Information\nNell Colón, Deputy Commissioner of Programs and Community Partnerships\nMusa Elbulok, Deputy Commissioner of the Office of Management Analysis and Planning\nKathleen Zadzora, Assistant Commissioner of Health Affairs\nWayne Prince, Deputy Warden\nNadia Jean-Francois, Executive Director of Intergovernmental Affairs and Special Projects\nShannon Castang-Feggins, Director of Project Management\nAlyssa Powell, Executive Assistant to the Commissioner\nCarlos Collado\nFrancisco Corden\nNYC Health + Hospitals - Correctional Health Services (CHS)\nPatsy Yang, Dr. PH, Senior Vice President\n1\n\nCarlos Castellanos, Chief Operations Officer/Deputy Executive Director\nNancy Arias, RN, Chief Nursing Officer/Deputy Executive Director\nZachary Rosner, Chief of Medical Service\nJoseph Otonichar – Chief of Service, Mental Health\nJessica Laboy, Chief Administrative and Compliance Officer\nNicole Levy, Director of Communications and Intergovernmental Affairs\nOthers in Attendance\nK. Frick, City Council\nAmisa Ratliff, City Council\nNathaniel Evans, OPA\nChaplain Dr. Victoria A. Phillips, Visionary V Ministries and JAC\nJennifer Parish, JAC/HALT\nCourtney Gross, NY1 News\nAlex Krales, The City\nRebecca Carter, NYCDS\nAshley-Anna Aboreden, NYCDS\nStephanie Bazell, NYCDS\nBernadette Rabuy, NYCLU\nGina Williams, NYCPA\nTanya Krupat, Osborne\nTarini Garimella, Osborne\nTamara Santibañez\nJonathan Kurtz\nMichael Klinger, Brooklyn Defenders\nNatalie Fiorenzo, NYCDS\nRyan Acquaotta, Freedom Agenda\nAshley Santiago, Freedom Agenda\nApproval of January 13, 2026 meeting agenda\nUpon being moved and seconded, the January 13, 2026 meeting agenda was unanimously\napproved.\nApproval of the November 13, 2025 public meeting minutes\nUpon being moved and seconded, the November 13, 2025 minutes were unanimously\napproved.\nPublic comment period – People in Custody (PIC)\nSix comments from people in custody were played. See this portion of the video here.\n2\n\nExecutive Director update\nExecutive Director Georges-Yilla began with a brief overview of the Board’s mandate.\nThroughout 2025, the Board continued to observe sustained overcrowding across the jail\nsystem. Population levels frequently exceeded operational capacity, compounding\nlongstanding challenges related to staffing shortages, delayed movement, access to\nservices, and compliance with Minimum Standards. In 2025, the Board also raised serious\nconcerns regarding the Department’s establishment of a Special Management Unit, or\nSMU, without prior notice to the Board and without clear demonstration of compliance with\nMinimum Standards governing restrictive housing. Executive Director Georges-Yilla also\nshared the Board’s 2026 priorities. See this portion of the video here.\nExecutive Director Georges-Yilla then shared condolences with the families and loved ones\nof Department staff and people in custody who have passed since the Board’s November\nmeeting.\nEdwin Ramos, age 38, died on November 21, 2025. Mr. Ramos collapsed in the bathroom\nof his assigned housing area in OBCC, prompting a medical emergency. He was\ntransported to Mount Sinai Queens Hospital, where he was declared deceased.\nAramis Furse died on December 7, 2025 at the age of 32. Mr. Furse was transported from\nOBCC to Mount Sinai Queens Hospital after he was found unresponsive in his cell. He was\npronounced deceased at the hospital.\nKyron Randall, age 33, died on December 22, 2025. Mr. Randall became unwell in his\nassigned cell in GRVC’s PACE unit. He was transported to Elmhurst Hospital, where he was\nsubsequently declared deceased.\nSee this portion of the video here.\nThe Board is in the very final stages of review of the Second Report and Recommendations\non 2025 Deaths in Custody, covering the deaths of Benjamin Kelly, James Maldonado,\nChristian Collado, Edwin Quispe, Ardit Billa, Jimmy Avila, and Carlos Cruz. The final public\nreport on the deaths of Edwin Ramos, Aramis Furse, and Kyron Randall will be issued\nshortly thereafter. See this portion of the video here.\nAs of January 12, 2026, the approximate total census of people in custody was 6,865. As of\nJanuary 12, the census numbers by facility were as follows: BHPW (69), EHPW (13), EMTC\n(1,346), GRVC (881), NIC (299), OBCC (1,421), RESH-ESH (137), RESH non-ESH (487),\nRMSC (456), RNDC (1,068), and WF (686). See this portion of the video here.\n3\n\nExecutive Director Georges-Yilla also shared Board staff observations related to the\nDepartment’s clinic production dashboard pilot. Board staff observed that the clinic\nproduction dashboard pilot at the North Infirmary Command operates in a relatively\ncontrolled environment, with limited movement and lower sick call volume, in part\nbecause many housing areas provide medical care on-unit. Staff noted that in larger\nfacilities—where sick call demand is higher, on-unit care is limited, and movement is more\ncomplex—reliance on fragmented documentation could result in greater gaps in tracking\nand oversight. See this portion of the video here.\nCHS Variance requests regarding psychotropic medication and tuberculosis screening\nprocess\nChief of Mental Health Service Joseph Otonichar and Chief of Medicine Zachary Rosner\npresented CHS’s two six month variance requests from 40 RCNY § 2-05(b)(2)(i-ii) and 40\nRCNY § 3-04(b)(2)(v)(A). These are longstanding variances that have been consistently\ngranted, as they are aligned with community standards of care. See this portion of the\nvideo here.\nExecutive Director Georges-Yilla made note that a scheduled hearing on rulemaking\nregarding these two variances is scheduled for February 10, 2026, but the variances are set\nto expire before that date. Board members had no questions for CHS, and there were no\npublic comments. See this portion of the video here.\nUpon being moved and seconded, both variances were unanimously approved. See this\nportion of the video here.\nOverview of Rikers Visit Working Group (active between 2015 and 2020)\nTanya Krupat, Chaplain Dr. Victoria A. Phillips (Dr. V.), Ashley Conrad, and Michael Klinger\nprovided a briefing on the successes and challenges of the Rikers Visit Working Group,\nwhich was active between 2015 and 2020. Information was shared regarding how the group\ncame to be created, stressing the importance of visits for maintaining roots to the\ncommunity while incarcerated. They also explained why the Visit Working Group should be\nre-established to help ameliorate ongoing visit concerns, noting that Department\nrepresentatives must have authority to enact change and be housed under the\nCommissioner. See this portion of the video here.\nVice Chair Skipper thanked the Visit Working Group members for their testimonial and\nexpressed interest in working with the group if it is re-established. Board Member Franco\nthen asked a few questions to the group and expressed his support for the group. Chair\nSampson also expressed the importance of visits for mental health and community\nsupport. See this portion of the video here.\n4\n\nDepartment briefing on clinic production dashboard pilot at NIC and compliance with\nsick call minimum standards\nAssistant Commissioner Kathleen Zadzora provided an update on the clinic production\ndashboard pilot and compliance with sick call minimum standards. Assistant\nCommissioner Zadzora gave an overview of the processes available to people in custody to\nbe seen by medical staff. She also stated that the Department is testing and monitoring\nsystem functionality and operational workflow for this new digital pilot. Assistant\nCommissioner Zadzora also explained the methods the Department is undertaking to\nensure that staff and people in custody know about this pilot program and how to engage\nwith it. The Department anticipates expanding this pilot to an additional facility in the\nspring. See this portion of the video here.\nBoard members were then given an opportunity to ask questions. Vice Chair Skipper asked\nwhich facility would be next, and Assistant Commissioner Zadzora stated that the\nDepartment is still exploring and has not chosen yet. Board Member Torchenaud asked\nabout data reporting capabilities. Board Member Stossel asked a multitude of questions to\ntry to distinguish the difference between ‘scheduled’ and ‘unscheduled’ visits in relation to\n‘sick call’ in the system. She also asked questions regarding the means of ensuring that\npeople asking for sick call services are actually getting logged into the pilot system. See\nthis portion of the video here.\nDepartment briefing on electronic logbook pilot at OBCC\nDeputy Warden Wayne Prince provided an update on the electronic logbook pilot in the\nSMU at OBCC, focusing on testing functionality, gathering staff feedback, and identifying\noperational challenges. Deputy Warden Prince described challenges that occurred during\ntemporary system outages, and the need to make the system more reliable before\nexpanding. See this portion of the video here.\nChair Sampson asked that a presentation of the pilot be given to Board members, and the\nDepartment confirmed that this could be scheduled. Vice Chair Skipper asked about the\ndelivery method and the possibility of backdating the electronic logbook system after\noutages. Board Member Stossel asked about the feasibility of incorporating wand tour\noperations with the operations of this pilot to increase touring verification and\naccountability. See this portion of the video here.\nDepartment briefing on revamp of family and attorney visits\nDeputy Commissioner of Strategic Operations James Boyd began by commending the\ntestimony of the Visits Working Group from earlier this meeting. Deputy Commissioner\nBoyd stated that the new Executive Director of Visit Operations is anticipated to start in a\n5\n\nfew days. He also stated that as of December 20, 2025, the Department resumed\naccepting package drop-offs in person during visiting hours. Regarding re-establishing the\nVisit Working Group, Deputy Commissioner Boyd stated that this is something that can be\nfurther looked into once the new Executive Director begins. See this portion of the video\nhere.\nVice Chair Skipper asked where the new position will be housed. Board Member\nTorchenaud asked about the CHIPS program oversight in lieu of a new executive staff\nmember being onboarded. Board Member Stossel shared concerns she witnessed during a\nrecent tour with the attorney visit process and time stamping. Board Member Franco\nrequested the Department’s plans to track the experience of visitors. Chair Sampson\nrequested that the Department look into food quality and access for visitors that are\nwaiting for long periods of time. See this portion of the video here.\nVice Chair Skipper stated that she received reports that the protective custody unit at\nRMSC was closed. Vice Chair Skipper also stated that she had received reports that mental\nobservation units at OBCC have been shifted around. Vice Chair Skipper asked that the\nDepartment look into these two incidents and report back to the Board, which Deputy\nCommissioner Boyd affirmed he would do. See this portion of the video here.\nPublic Comment\nChair Sampson stated that at the end of the last Board meeting, Board Member Pitts\nresigned from the Board, commending her service. See this portion of the video here.\nThe Board then heard in-person public comments from Ryan Acquaotta, Chaplain Dr.\nVictoria A. Phillips, and Natalie Fiorenzo. The Board then heard virtual public comments\nfrom Kayla Simpson and Tahanee Dunn. See this portion of the video here.\nThe Board’s next meeting is scheduled to take place on Tuesday, February 10, 2026,\nimmediately following the public hearing on proposed rules, which begins at 1:00pm.\n6","5":"Dwayne C. Sampson, Chair\nHelen Skipper, Vice Cha ir\nHon. Barry A. Cozier (Ret.) BOARD OF CORRECTION\nFelipe Franco\nCITY OF NEW YORK\nLauren Stossel, M.D.\n2 LAFAYETTE STREET, SUITE 1221\nJude Torchenaud\nNEW YORK, NY 10007\nExecutive Director 212 669-7900 (Office)\nJasmine Georges-Yilla\nRecord of Variance Action for January 13, 2026 Public Meeting\nThis variance allows psychiatrists to see and evaluate stable adult patients on psychotropic\nmedication in general population at least every 28 days, rather than every 14 days.\nType of Variance: Limited\nDate on which variance will commence: January 13, 2026\nTime period, if any: Six months, ending July 13, 2026\nMinimum Standard for which Variance is Granted: 2-05(b)(2)(i-ii)\nDate on which Board of Correction first approved variance (for renewals only): November\n10, 2005\nRequirements imposed as conditions on variance: None\n1 of 1","6":"Dwayne C. Sampson, Chair\nHelen Skipper, Vice Cha ir\nHon. Barry A. Cozier (Ret.) BOARD OF CORRECTION\nFelipe Franco\nCITY OF NEW YORK\nLauren Stossel, M.D.\n2 LAFAYETTE STREET, SUITE 1221\nJude Torchenaud\nNEW YORK, NY 10007\nExecutive Director 212 669-7900 (Office)\nJ asmine G eorges-Yilla\nRecord of Variance Action for January 13, 2026 Public Meeting\nThis variance allows the Correctional Health Services to use either interferon gamma\nrelease assays (IGRA) or tuberculin skin test (TST) for tuberculosis screening, and to\nexempt from repeat screening those prisoners who have a documented negative test in the\nsix months prior to their admission.\nType of Variance: Limited\nDate on which variance will commence: January 13, 2026\nTime period, if any: 12 months, ending July 13, 2026\nMinimum Standard for which Variance is Granted: 3-04(b)(2)(v)(A)\nDate on which Board of Correction first approved variance (for renewals only): July 22,\n2013\nRequirements imposed as conditions on variance: None\n1 of 1","7":"Testimony of\nNatalie Fiorenzo\nSenior Corrections Specialist\nNew York County Defender Services\nBefore the New York City Board of Correction\nJanuary 13, 2026\nI. Overview of Rikers Visit Working Group (active between 2015-2020)\nWe write in strong support of the Family Visitation Working Group. Just last month, the City\nCouncil released an investigation documenting systemic failures that routinely obstruct family\nvisitation,1 a right protected by the New York State Constitution.2 We see these failures regularly\nin the lives of our clients. The creation of this working group presents a meaningful opportunity\nto address them.\nToo often, reform efforts rely on the NYC Department of Correction (“DOC”) to fix itself. The\nFamily Visitation Working Group instead brings in organizations such as Osborne, which\nrepresent the interests and lived experiences of families of incarcerated people and offer a\ncritical outsider perspective. This perspective allows longstanding problems to be surfaced in a\nnonadversarial way. In the past, Osborne identified numerous logistical barriers to visitation, and\nDOC was receptive and responsive, resolving many of those issues. That experience\ndemonstrates the practical value of sustained collaboration.\n1 https://council.nyc.gov/press/2025/12/09/3025/\n2 See generally Cooper v. Morin, 49 N.Y.2d 69, at 76 (1979)(finding a detainee’s right to “contact visitation\nof reasonable duration” in the due process clause of the New York State Constitution).\n\nMore importantly, although the working group was short-lived, it offered a rare glimpse of what\nreal cultural change at Rikers could look like. As a federal monitor has observed,3 DOC suffers\nfrom an entrenched culture of dysfunction marked by violence, brutality, and neglect. This\nculture permeates daily operations and undermines even well-intentioned reforms.\nTrue culture change requires ongoing, structured engagement that builds mutual understanding\namong everyone who lives and works at Rikers. Efforts like this working group, along with\nrigorous outsider-led training and genuine listening sessions for uniformed officers, who often\nfeel unheard and unseen, create the conditions for change from the ground up. While the City\nhas taken significant steps to impose reform from the top down, including the appointment of a\nremediation manager, those efforts must be complemented by bottom-up strategies that center\nthe voices of those most directly impacted.\nIf these changes are not made now, we risk transferring the same entrenched problems from\nRikers Island to the borough-based jails. The Family Visitation Working Group is not simply\nabout improving access to visits. It is a concrete step toward transforming the culture of the\nDOC itself.\nII. Department Briefing on Clinic Production Dashboard Pilot at NIC and Compliance\nwith Sick Call Minimum Standards (40 RCNY § 3-02(c)(5)) and Electronic Logbook\nPilot at OBCC\nWe greatly appreciate that the Board is adopting digital record-keeping and bringing us into the\n21st century. For far too long, records have been kept on paper files, which slows down\nprocesses and makes them susceptible to error or loss. We applaud all initiatives in this vein\nand look forward to this work continuing.\nIII. Department Briefing on Revamp of Family and Attorney Visit\nSince our last testimony on access to counsel, delivered to the City Council on December 10,\n20254, following our testimony to this Board on September 9, 2025, we have not seen any\nmeaningful improvement in attorney-client visitation within NYC jails. Our attorneys continue to\nreport the same barriers, including excessive wait times and inconsistent access, that have long\nimpeded effective representation.\nWhile we are encouraged by the proposed appointment of a dedicated Executive Director of\nVisitation, as well as internal reviews and the possible reinstatement of the Family Visitation\nWorking Group, the BOC has repeatedly demonstrated that, absent enforceability or oversight,\n3\nhttps://www.nbcnewyork.com/news/local/rikers-conditions-getting-worse-leaders-uncooperative-federal-m\nonitor-says/3603793/\n4\nhttps://legistar.council.nyc.gov/MeetingDetail.aspx?ID=1351409&GUID=8DED04E9-767D-44FF-8859-F6\n65817189A5&Options=info|&Search=\n\nreforms often fail to materialize. These initiatives, standing alone, are insufficient without clear,\nbinding legal standards to guide implementation and ensure accountability.\nOn Friday, December 12, 2025, five defender organizations jointly submitted proposed minimum\nstandards to the Board aimed at addressing the persistent and systemic visitation failures we\nencounter daily. These minimum standards are designed to ensure transparency, confidentiality,\nand the protection of the attorney-client privilege, which are core requirements for effective\nrepresentation under the Sixth Amendment of the United States Constitution.\nIn the absence of binding laws or formal standards, we remain deeply concerned about\ncontinued noncompliance and inconsistency within the DOC. A central component of the\nproposed minimum standards is the establishment and dissemination of a clear and uniform\nvisitation protocol that applies to all impacted parties, including DOC staff, attorneys, and\nincarcerated individuals.\nIV. DOC’s unlawful cooperation with ICE in violation of NYC law\nWe additionally write to alert the Board to a serious and ongoing violation of New York City’s\ndetainer law by DOC due to their unlawful coordination with Immigration and Customs\nEnforcement (ICE). Last month, DOC unlawfully transferred our client from City custody at\nRikers into ICE custody without the judicial warrant required under New York City’s detainer law,\nAdministrative Code § 9-131(b)(1). To be clear, this was not a case of routine\ninformation-sharing between the two agencies. DOC affirmatively handed off physical custody of\na person in its care to federal immigration authorities, in direct contravention of the City’s legal\nprotections. As a result of this unlawful transfer, our client is now detained out of state,\nseparated from counsel and family, and effectively beyond the reach of meaningful legal\nadvocacy. As of submitting this testimony, despite our best efforts we have still been unable to\ncontact our client since he was transferred to ICE custody over a month ago.\nThe City’s detainer law is explicit. DOC may not honor civil immigration detainers, delay a\nperson’s release, or coordinate a transfer of custody to ICE unless federal immi
