nmethodology of the board's report and\nsome of the subsequent conclusions that\nare drawn, we are supportive of the\nspirit of the assessment. Most of the\nboard's recommendations are aimed at\nstrengthening the reporting process,\nwhich is why we believe we can find\ncommon ground to continue improving the\ninjury reporting process. While the\ndepartment understands the value of\nexamining both compliance and broader\npolicy effectiveness, evaluating these\ndistinct areas within a single\nassessment blurs the focus of the\nreporting requirements set forth in\nsection 3-16.\nThe board found DOC and CHS to largely\nbe in compliance with the reporting\nrules, but the nature of the two-fold\nassessment may make that highle takeaway\nless clear. The board's analysis, which\nwas based on a review of just 99 of more\nthan 28,000 injury investigation forms\nfrom calendar year 2024, represents a\nlimited sample size that may affect the\nextent to which conclusions can be\ngeneralized and as a result may miss\nrepresent the ongoing work to maintain\ncompliance with section 3-16.\nThe department agrees wholeheartedly\nthat injuries should be reported in an\naccurate, timely, and objective manner\nthat informs injury prevention and\nsupports the well-being of people in\ncustody. And we continue to work\ncollaboratively with our partners at CHS\ntoward that shared goal. Many of the\nboard's recommendations, namely those\nrelated to contemporaneously identifying\ntrends and improving the monthly\nreporting timeline, would be addressed\nby implementing a coordinated electronic\ninjury tracking system. The department\nis committed to exploring these\ntechnological solutions with our\npartners at CHS. We hope to have an\nupdate on these early discussions by the\ntime of the board's next public meeting\nso that we can continue to move the\nconversation forward.\nAs the board stated in its assessment,\nboth agencies maintain policies that\ngovern the reporting process, complete\ninvestigations, and work with one\nanother on a regular basis to issue each\nreport required by the minimum\nstandards. While we acknowledge that\nmore can be done to improve the joint\nreporting process, it shouldn't be lost\non us that the current process is\nworking. We thank the board for its\nfindings and recommendations as well as\nour partners at CHS for helping sustain\nthis coordinated effort. And I welcome\nany questions the board may have.\n&gt;&gt; Thank you. Uh any questions?\nYes. Uh, Dr. Stson,\n&gt;&gt; thank you. Um, I'm I'm curious about\nyour sort of understanding of this\nfinding that 98% of individuals in\ncustody are not uh participating in the\ninvestigations. I mean, I remember\nlooking through charts and seeing a lot\nof, you know, slip and falls. Um, I I\nI've never known so many young men to\nslip and fall. frequently. Um, you know,\nI think um it's concerning that there's\nnot sort of the trust um there and I'm\nwondering if the department has, you\nknow, a plan to try to address that.\n&gt;&gt; Thank you for the question. Um, I share\nyour concern. I think it's also not\nexclusive to investigations related to\num, injury investigations. And so I I\nthink that's you know a broader question\nabout\nhow do you encourage cooperation and\nengagement in an investigative process\nin an inherently unbalanced\nrelationship.\n&gt;&gt; Thanks.\nWell, thank you uh kindly. Uh we'll move\nforward and go to the next uh DOC uh\nresponse on uh\noutposted uh therapeutic units.\n&gt;&gt; Good afternoon everyone. Uh good\nafternoon members of the board. My name\nis Alex Maldonado and I serve as the\nassistant commissioner for strategic\ninitiatives. I oversee the burrowbased\njail project on behalf of the department\nwhich includes the design and\nconstruction of the outposted\ntherapeutic housing units. I'm here to\nI'm here today to provide a status\nupdate on these units also known as the\nOTHUS.\nI'll begin by providing some basic\ncontext. The OTHU facilities are small\njails currently being built within three\npublic hospitals in New York City. This\ninitiative fosters innovation and agency\ncollaboration within our criminal\njustice setting. These facilities will\nhouse persons in department of custody\ncare who have long-term or chronic\nmedical and mental health needs. The\nintent of this project is to relocate\nthis vulnerable population from Riker's\nIsland and closer to health and hospital\nspecialty care. The opening of these new\nfacilities remain a priority for the\ndepartment and our newly appointed\ncommissioner Stanley Richards. We look\nforward to continuing to advance this\nproject was just a symbol of progress\nwithin our correctional field.\nWhile the facilities are designed to\nmirror a typical therapeutic\nenvironment, the OTHU facilities will be\ncommissioned as jails by the state and\nmust comply comply with all local,\nstate, and federal correctional\nregulations. Accordingly, the department\nwill manage the daily operations of the\nfacilities, including maintaining a\nsecure perimeter, screening individuals\nentering and exiting the facility,\noperating an intake and receiving room,\nproviding visits, recreation, and all\nother essential services similar to our\ncurrent facilities on Riker's Island.\nCorrectional Health Services and H&H\nwill provide medical care within these\nhousing units, within the facility's\nmain clinic, and as needed on other\nfloors of the hospital.\nThe Wood Hole Hospital OTHU facility is\nestimated currently at 144 beds and the\nNorth Central Bronx um hospital otu\nfacility is estimated at 92 beds. Both\nprojects are currently in the design\ndevelopment phase and we are working\nwith our partners at CHS and H&H to\nfinalize these designs. In January, the\nNew York State Commission of Correction\napproved an early works construction\nproject for the Wood Hall project\nspecifically allowing exterior\nconstruction to proceed while the\ninterior floor plans are in the final\nstages of design development.\nBellevOTHU\nis a 104 bed facility and construction\nis largely complete um with the\nexception of some ongoing equipment\ntesting and coordination with Belleview\nHospital regarding our BU building\nsystems, IT programming and\nfortification of the space. But trans\ntransition planning continues as we\ndevelop policy and training for staff,\nstockpile the facility with supplies,\nand drop movement and logistics plans\nthat ensure smooth operations from the\nstart. Through these efforts, the\ndepartment is working in close\npartnership with CHS and the leadership\nat Belleview Hospital. These\npartnerships are critical as the\nsuccessful oper operation of the\nBelleview Hospital facility relies\nheavily on collaboration between these\nthree entities. The department is\nspearheading these efforts to ensure\nthat once staff are allocated and the\nindividuals are identified for transfer,\nthe facility will be ready to open. It\nmust be said, however, that staffing\nremains our primary hurdle to opening\nthe Belleview Hospital OTHU facility. As\nthe model and design require a\nsignificant number of uniform staff to\nensure all services are afforded\nto the individuals in our care and the\nfacility remains safe and secure, the\ndepartment is working to develop a\nstaffing plan that will allow the safe\nallocation of staff from our existing\nfacilities to this new jail. Given the\nscale of the staffing required and of\ncourse the national correction officer\nshortage that impacts our work on\nRiker's Island, this is a complicated\ntask. That said, this administration has\nmade very clear that the opening of the\nBelleview OTHU is a priority and we are\nworking diligently with our friends um\nat CHS, Commissioner Richards and the\nnew administration to identify a clear\npath forward.\nTo that end, once a clear timeline is\nfinalized and agreed upon by all\nparties, we'll be happy to share this\nnews with the board. As demonstrated\nwith our quarterly briefings and tours\nof the space, this department remains\ncommitted to transparency as we move to\nbring these vital housing units online.\nI thank you and of course welcome any\nquestions at this time.\n&gt;&gt; Thank you, assistant commissioner. Uh\nany questions?\n&gt;&gt; I just have one.\n&gt;&gt; Go ahead. Vice skip.\n&gt;&gt; What is the scheduled time for the\nopening of Belleview? Is it soon or in\nthe near future or you don't have a\ndefinite date yet?\n&gt;&gt; I think you'll be uh pleased to hear\nnews soon.\n&gt;&gt; Don't give me a date, but I'll take real\nsoon.\n&gt;&gt; Unfortunately, I I cannot I'm not at\nliberty to provide a date at this\nmoment, ma'am. But I promise you, uh\nnews will become forthcoming.\nC\n&gt;&gt; can you say a little bit more\nspecifically what the staffing\nrequirements are when and why they're so\nmuch more ownorous than they are, you\nknow, for this population that's\ncurrently on the island.\n&gt;&gt; Um so currently the the the general\npopulation that we're considering for\nthis unit would be located in our\ninfirmary um at the at the North\nInfirmary Command. Um uh but that is one\nsmall housing unit within a larger jail\nfacility. So that jail facility manages\nsort of all of the other things outside\nthe housing units including recreation,\nintake and the like. So there's a number\nof staff members who are assigned to the\nfacility. Only a small number are\nassigned to the infirmary itself. When\nwe when we transfer those individuals\nover to Belleview, we are actually\nopening up a whole new facility. So the\nadditional staff members we um will be\nare needed to supply all of the services\nthat the the NIC provides to those small\nhousing units separately. I don't know\nif that was a very good explanation, but\nuh that's that's the gist of it. Um the\nthe physical plan also itself requires\num several staff members on each housing\nunit um which traditionally we only have\none officer on the floor. U olutely sir. You know I I can tell\nyou and I can promise you that uh my\nteam watching today wants nothing more\nthan to open this facility. They've been\nworking on it with for several years\nwith our partners at CHS. Um and the\ngoal is to open as soon as possible. Um\nI can't provide a timeline for you today\nbut I will say that we are working again\ndiligently with the administration with\nour partners at CHS and in addition with\nour partners at the state level who who\nwe require to we are required to submit\npolicies trainings and all of those\nthings um in order for them to\ncommission the space as a jail facility.\n&gt;&gt; All right. You know, that being said, I\nI I I'd ask that you work with our\nexecutive director and our team so that\nwe can uh I don't think we have an April\nboard meeting uh but within 30 days to\nhave some report for for this board as\nto the timeline. Maybe we'll have\nsomething before that, but I wouldn't\nlike to leave this open for two months.\n&gt;&gt; Understood, sir.\n&gt;&gt; I thank you.\nUm any other questions for the on this\nmatter?\nOkay, there being none, uh thank you and\nuh I think that's really it for the\ndepartment unless there's any other\nthoughts or questions.\nWe'll now have uh CHS updates. We we\nwill now hear updates from from\ncorrectional health services on agenda\nitems uh the injury response uh report\nand deescalation\nconfinement\nand also uh step supportive transitional\nengagement program\nand I uh it also I don't know if you\nprepared but uh I would like some of\nyour thoughts and comments comments on\nthe outposted therapeutic units as well.\n&gt;&gt; Thank you. Um board members,\num Zach Rosner, chief of medicine for\ncorrectional health services, here to\ntalk briefly about the uh injury\nreporting response. Um I think\nadditional details of uh CHS's response\nis posted publicly on the website. Um\njust as the board knows, CHS has a long\nuh history of uh doing injury reporting\ndating back to prior to the board of\ncorrection regulations in 2019. Uh we\ntake this uh very seriously. We find it\nvery important for um transparency in\nthe jails, public health, understanding\nuh the situation and safety in the\njails. And so we appreciate the board's\nattention and the work around this. Um,\nI think that commitment is demonstrated\nby the over 3,000 injury visits, 1,00\num, uh, 10,00 confirmed injuries, 100\nserious injuries documented by the\nservice, the med medical services um,\neach month alone. Uh, and so uh, we're\nglad to take this on. That said, CHS is\nalso primarily a clinical agency and our\nprimary a real focus in all injury um\ncare is delivering the healthcare\nservices. And so we need to make sure\nthat our uh injury reporting systems are\naligned with our health care and meeting\nthe uh care for patients who um who have\ninjuries in the jails. Um, as the board\nnotes, uh, investigations themselves\nshould not delay the medical care and\nand hopefully that's clear in all of\nthis discussion that the medical care is\ncoming first. Um, just for for\nunderstanding the system, uh, the\ninjuries that are reported in the sort\nof injury tables come from the medical\nevaluation. So when someone comes for an\ninjury visit, it's captured in specific\nuh, injury documentation. uh self harm\ndata from the from the um uh other\nsection of the report does come from the\nmental health service primarily. Um the\ndocumentation for investigation purposes\nas I mentioned CHS not being the body\nthat does investigations is completed in\nreal time. So when a patient comes for\nthat visit the uh DOC injury report is\ncompleted at that time uh and then\ndetailed line level uh information is\nsent to the department to complete the\ninvestigation process.\nUm, I'll leave it at that for the injury\nreporting specifically, but I'm happy to\nanswer questions and uh Dr. Tanakar I\nthink is available for discussion of\nsome of the self harm protocols.\n&gt;&gt; Yeah, I just ically following\nthat report, that may not be considered\na self-injury as you would describe it\nbecause there's no sort of morbidity\nthere. uh that is likely correct if I'm\nfollowing exactly and you know there are\nmany situations where a medical person\ngets a different history and this just\ncomes to the clinical experience of\ndelivering care that something can be\ncon a concern for self harm when it's\nbrought to the medical evaluation but um\nyou know self self-injury an accidental\nself injury would fall into an\naccidental field or something like that\nthere's a lot of you know um But I do\nthink CHS worked very closely with the\nboard in 2019 to try to come up with\ncategories for this subreporting um that\nis pretty consistent and did extensive\ntraining across our healthcare services\nto make sure this data is as reliable as\npossible and I think it's some of the\nmost robust um public reporting around\ninjuries in any jail system in the\ncountry.\n&gt;&gt; I just want to add that the spirit of\nwhat you're saying Dr. is correct in\nthat uh we incorporate this information\ninto our clinical decision making\nparticularly in regards to considering\nour patients mental health risks. So\nit's really important to us.\n&gt;&gt; Yes. Go ahead, Jim.\n&gt;&gt; Thank you. Um, I had a question because\nthe the distinction between self harm\nand self-injury is sort of convoluted in\nmy mind. Could you give an example of\nwhat something in each category\n&gt;&gt; because we're both in our own\nareas. Um, uh, I will I'll let Dr.\nAtanikart speak to um, self harm. Um but\nbut I think the short version of it from\nfrom our perspective is that anything\nthat could be an injury should be\nreferred to the medical evaluation for\nan injury visit and that's generally the\nteaching. So they can be they're\noverlapping in the vast majority of\ncircumstances.\n&gt;&gt; Yeah. If if somebody does something that\nmay have may not have resulted in a\nphysical injury, but is inherently\nrisky, for instance, placing a a liature\npiece around their neck, they don't\ninjure, but that's something that is\nvery concerning to us. And so, we would\ncategorize that as a self harm behavior\nand incorporate that into our clinical\ndecision-m.\nbecause there may not have been a\nphysical injury, it may not result in uh\nmedical inter the need for further\nmedical intervention.\n&gt;&gt; Okay, just to elucidate.\nSo the distinction would be if a person\nhas the let's say blanket around their\nneck but hasn't actually attempted that\nwould be selfharm and not self-injury or\nvice versa.\n&gt;&gt; Yeah, self harm is really based in\nintentionality. So if somebody in their\nmind is wanting to hurt themselves or\nconsidering hurting themselves whereas\nself-injury is a physical phenomenon\nwhere there's some kind of physical\nresult that occurs.\n&gt;&gt; Thank you. Just needed clarity.\n&gt;&gt; Thank you. You you okay board member\nJude. Any other\n&gt;&gt; thoughts or questions? Um I had a\nquestion if you can may perhaps\ncharacterize your quarterly meetings\nsince we don't have m minutes uh with\nthe uh with the department.\nUm I'll I'll speak a little bit just to\nthe uh alignment that I think the\nclinical services are in monthly\nexecutive meetings with uh the\ndepartment very closely working aligned.\nUm I do think our public reporting group\nis in communication with DOC around the\nactual um and again this is an interdep\ndepartment um initiative with with the\nclinical services largely collecting\nlots of data and then being uh\nsynthesized. So my understanding is that\num the the sort of reporting on the\nreporting side there's also uh\nconnections and and contacts.\nAnd then the the other measure that we\ntake is uh CHS meets with our department\ncolleagues on the self injury and\nsuicide prevention task force on a\nbimonthly basis and we review uh the\nreports and have discussions about uh\nself-injuries and try to brainstorm ways\nthat we ca veloped in uh great\ncollaboration with our DOC colleagues.\nUm this is known as the supportive\ntransitional engagement program or step\nprogram.\nuh as you know around 60% of patients\nreceive mental health services from CHS\nand to those patients we provide a a\nbroad spectrum of jailbased care which\nranges from individual to group\ncounseling to medication treatment using\nan outpatient setting residential level\nmodel for many patients uh through the\nuse of mental health therapeutic housing\nunits.\nCHS throughout the entirety of a\npatient's incarceration\nuh monitors and assesses uh a patient's\nmental health needs starting from uh\ntheir points of admission\nand we assess this on an ongoing basis.\nMost of the patients that we care for\nare able to have their needs met in the\ngeneral population. Uh those patients\nreceive services in the clinics. Um,\nhowever, patients with greater mental\nhealth needs uh who benefit from greater\nengagement\nwith providers and from a more\nstructured therapeutic environment uh\nmay be housed in our mental health\ntherapeutic housing units.\nUntil\nrecently, we've had\nmental observation units and PACE units\nas our primary mental health therapeutic\nhousing units. Uh on these units, CHS\nmental health staff typically see\npatients for clinical encounters within\nthe housing area themselves as opposed\nto requiring them to be brought to the\nmain clinics.\nPatients on these units also receive\nenhanced clinical support and\nmonitoring.\nPACE housing, which entails more\nclinically intensive care than mental\nobservation housing, represents the\nhighest level of care that CHS provides\nuh for mental health services within the\njails.\nAnd depending on the individual patients\nchange in clinical needs at any point\nthroughout their incarceration they may\nbe uh transitioned among general\npopulation mo and pace level of care.\nIn an effort to uh continue to improve\nthe quality of our work, CHS developed\nand implemented a new level of care\nwithin the mental health therapeutic\nhousing cont continuum. Uh we're calling\nthis the step program and step units are\ndesigned to help patients who do not or\nno longer require the full clinical\nsupport of an MO unit to maintain\nclinical gains outside of that setting.\nStep units serve as an intermediate\nlevel between GP and MO levels of care\nand offer mental health services\nincluding individual counseling and\ntherapeutic group activities directly on\nthe housing units. STEPPP also enables\nmore targeted cohorting of clinically\ndistinct populations across the mental\nhealth therapeutic housing continuum\nwhich allows for more effective group\nand individual level interventions and\nimproves the therapeutic millu of each\nof the specific unit types.\nWith these changes, the number of pace\nbeds will not change.\nuh that will remain the same at\napproximately 319 beds. The number of MO\nbeds however will decrease from around\nby about 200 to 745\nwith 200 of these beds being converted\ninto step level of care. Additionally,\nuh approximately 34 new beds will be\nopened up as step units. So when with\nthe completion of these transitions, we\nwill have a slightly higher number of\ntotal therapeutic housing uh unit beds\navailable\nfrom about 1264 up to 1298.\nSo far we've opened um units in NIC,\nRNDC, and the Rush annex. Uh and uh we\nare anticipating opening additional\nunits in OBCC and GRVC hopefully this\nweek. Uh and this is a graphic to\ndemonstrate uh the shift in the\npopulation.\nAnd again we want to thank our DOC\npartners for really uh collaborating\nintensively uh with us on this. this has\nbeen a very big project and uh\nappreciate you know the um the teamwork\nthat they've demonstrated to us. So\nthank you for the opportunity to present\nthis. I'm happy to take any questions.\nWe're very excited to uh be able to\nimprove on the quality of care and and\nexpand the continuum that we offer our\npatients.\nQuestion.\n&gt;&gt; Tha our\nsecond question?\n&gt;&gt; Uh what what would you consider a\nmeasurement of success for participants\nof the STEP program? Yeah, you know,\nultimately the the goal and hope is that\nthis will lead to um decreased incidence\nof self harm that this will lead to um\nmore clinical stability of patients uh\nthat will be able to do really targeted\nuh clinical work for for these patients\nthat will uh allow them to experience\nless clinical distress um higher\nfunctioning\num and so uh you You know, I I I think\nconcretely some of the things that uh we\nwould hope for would be um a more\ntherapeutic environment that leads to\nless self harm incidents.\n&gt;&gt; Okay, thank you. Are there any other\nquestions?\n&gt;&gt; So, thank you hearing none. Uh thank you\nand uh for your reports.\n&gt;&gt; We'll go to public comments now. We will\nnow hear comments from the public.\nJasmine will call the names of those who\nsigned up to speak.\n&gt;&gt; First we have Chaplain Dr. Dr. Victoria\nA. Phillips, Dr. V. Followed by Riley\nDoyle Evans.\nPeace and blessings. Can you hear me?\nCuz I know it was kind of hard to hear\nsome of y'all talking. Y'all can hear\nme? Okay, very good. Peace and\nblessings, everyone. I'm Chaplain Dr.\nVictoria A. Phillips, and it's so good\nto see all of you. Um, I just have a few\nthings I want to make a comment on.\nFirst, let me just be clear. Um, I want\nto speak for the detainees when I say I\ndon't think that a detainee or\nincarcerated individual wants to see an\nofficer who could probably dress up as a\nturtle in the morning come to be their\nmindfulness facilitator in the\nafternoon. I'll just leave that. Um, I\nalso want to highlight that about four\nyears ago now, I believe, New York\nState, thanks to a lot of advocates who\nput in great work, actually had New York\nState um, change the word inmate in our\nstate law to incarcerated individuals.\nSo, please never feel afraid or\napprehensive to speak the correct\nlanguage of those you are discussing in\nthe rooms where you oversee a\ndepartment. I also want to highlight\nthat when we speak of 98%. Thank you so\nmuch for your report today. When we\nspeak of 98% of those um that do not\nagree in responding to someone coming\naround for an investigation,\nhigh hell and hot water that we just\ngoing to say that just just because a\ndetainee don't want to speak. There are\nso many things that go into why someone\ndoes not want to engage in an\ninvestigation. Many times I've mentioned\non the record the captains I've seen\nactually ripping up grievance forms.\nThere are so many things that go into\nintimidation on why someone would not\nagree to be a part of investigation. And\nI do not believe that all these people\nhave just simply said no I do not want\nto cooperate. I think the city and the\nstate should investigate that. Um, I\nalso want to say for no meeting notes,\nhow many times do I have to point out\nall these salaries on the record that\nget paid by New York City taxpayers and\nno one ever has a a question or answer\nto your questions? How is it that two\ndifferent departments,\nCHS and DOC, and no one can provide\nmeeting notes? Is the meeting even\noccurring? When's the last day they had\nactually had a quarterly meeting? I wish\none of y'all would have asked that. um\nseparate systems. For so many years,\nI've been testifying about the lack of\nengagement between departments. Dr.\nHomer Ventus, who actually used to run\nthe medical department in Rikers,\nactually used to testify as well, the\nlack of engagement. So, the\nbeautifulness that we see in the room\nisn't always what's actually played out\nin real time. Um I also want to just\nhighlight, um if there is going to be a\nsystem put together, make sure that\nwe're protecting the HIPPA rights of\nthose detained. Just because you go to\nthe island and wait for your fair day in\ncourt does not mean that you lose all\nrights on domestic soil. And I just also\nwant to remind this board, yes, hs in solitary confinement\nconditions while they await a bed. These\nare people who have mobility uh\ndisabilities. These are people have\nserious medical conditions who have been\nreferred for a higher level of care but\nwho are sitting instead in solitary\nconfinement for extended periods. Uh\nthese beds are critical to get those\npeople safely housed and to end the\ntorture of solitary confinement uh on\npeople who are already vulnerable. Um to\naddress something that DOC said today\nabout that issue, um you know, reference\nto a a nationwide correctional officer\nshortage is simply not relevant here. Uh\nDOC remains a very richly staffed uh\ncorrectional system as compared to the\nrest of the nation. Uh this is about\nallocating its resources effectively and\nthese should be choice posts. They're\noff the island. DOC can consider other\nincentives to get people to work there.\nUh this is really urgent and it sounds\nlike all the other pieces are in place.\nUh they they need to push hard to get\nthese units opened. Uh finally turning\nto step, it sounds like these uh units\nwere created with good intentions and\nperhaps a legitimate justification. Um\nbut we are really concerned about\nhousing one of them at NIC 3A. As the\nboard may be aware, this unit used to be\na unit where they housed high security\nindividuals in cages. There's not really\ncommon space there. Uh the cages\napparently were since taken out, but um\nit sounds like what remains this sort of\nhallway where people might get out to.\nUh we've received reports that access to\nprogramming is very limited. Uh that\naccess to recreation is only happening\nonce or twice a week and people seem to\nnot have clarity about why they're\nthere, how they get out. So there seems\nto be a breakdown in communication\nbetween staff and patients. So uh we\nurge uh the agencies to work with the\nboard and to work with their patients to\nmake sure that there's clarity about the\npurpose of the unit and uh make sure\nthat people have full access to\nservices. Thanks.\n&gt;&gt; Thank you. Next we have Natalie Fiorenzo\nfollowed by Michael Clinger.\n&gt;&gt; Hi, good afternoon. Um, my name is\nNatalie Fenzo. I'm a senior correction\nspecialist at New York County Defender\nServices. Thank you for today's agenda\nand your really thoughtful questions to\nDOC and CHS. Um, in regards to the\npermissible items issues, we have been\ncommunicating avidly with you guys in\nthe past few months as things have\nescalated. As it stands now, sending\npackages to Riker's Island is impossible\nto navigate. Depending who you call,\nitems that are considered permissible\nvary. Every mail room officer on the\nisland will tell you that white waffle\nnet thermals are accepted, but somehow\nDOC leadership is refusing them um when\nthey're sent in packages. Having\nthermals on hand is no reason not to\nallow other people to send thermals. Um\nand if they are so readily available,\nwhy are we still getting requests to\nsend them? What is maybe more concerning\nthan the discrepancy in what is\npermissible is what makes an item\npermissible or not. We have been sending\nglasses to our clients for as long as I\ncan remember. CHS does provide glasses,\nbut getting them can take months, not\nweeks, like months. Um, that's its own\nproblem for another day, but people need\nto see. Rikers is already an intense\nenough environment as it is. Imagine\nnavigating it without the ability to\nsee. To combat the long wait through\nCHS, we regularly send glasses to our\nclients who ask for them, and now all of\na sudden we can't. Um, this is the same\nwith colored pencils. We have been\nsending those for years. Um, there are\nso few things to do at Rikers to keep\nbusy. And it's no secret that programs\nare few and far between. What is the\ndifference between accepting a regular\npencil and a colored pencil? I do not\nknow. You tell me. And finally, what\npossible reason could DOC have for\nexclusively accepting name brand Van\nshoes? The specific styles that they\nrequire are very hard to find and they\nrun between $60 and $80 for a pair while\na knockoff pair is less than $20. This\nis a completely unnecessary hardship\ndesigned to further impoverish\nincarcerated New Yorkers and their\nfamilies.\nOn the topic of attorney visits, they\nactually have been much smoother as of\nlate. Wait times are way down. Um, and\nI'm hopeful that with the cotification\nof new minimum standards on the issue,\nthe new attorney scheduling form, and\nthe long- aaited executive director of\nvisits, this will continue in the same\ndirection. Um, one facility that\nunfortunately has not shown much\nimprovement is OBCC. Wait times do\ncontinue to be multiple hours long.\nPlease look into the council visit\nprocess at that facility and direct doc\non how they can also make improvements\nthere. As always, continue to monitor\nthese new processes, pilots, and systems\nas they get rolled out to make sure that\nthey are operating as intended. Thank\nyou again for keeping an eye on not just\nthe physical needs of our clients, such\nas safe housing, clothing, medical\naccess, but also the equally important\nintangible needs that keep our clients\nmentally well, such as human connection\nto their families and for those of us\nthat are fighting for them. Thank you.\n&gt;&gt; Thank you. Next we have Michael Clinger\nfollowed by Anna Simp.\n&gt;&gt; Good afternoon.\nMy name is Michael Clinger. I'm a jail\nservices attorney with Brooklyn\nDefenders. Thank you to the board\nmembers and staff for the opportunity to\nprovide some brief comment today. Uh we\nwelcome both the incoming department\nleadership, Commissioner Richards and\nfirst deputy commissioner Egan, as well\nas the court's recently installed\nremediation manager, Mr. Deml, and we\nlook forward to working with all of you\nto make this city a safer, healthier,\nand more righteous place for all New\nYorkers. And executive director Brown.\nWelcome. Um, the department's\nconfirmation today that it will support\na collaboration between the department,\nthe community, the board, and advocates\non the topic of visiting loved ones on\nRiker's Island presents a critical\nopportunity for progress. We want to\nemphasize that for this effort to be\nsuccessful, we believe it must include\nboth uniformed and non-uniform staff,\nthat it must meet with consistency both\nof personnel and scheduling. They must\nregularly produce updates for this board\nand it must be supported by and based in\nthe office of the commissioner just as\nit was in the past. The board's minimum\nstandards address visiting in the jails\nand the department's own policies\nimplement these standards. The rules uh\nthe rules and procedures all tend to\ngive the sense that fairness is the goal\nand that harms can be corrected. But we\ndo see harms every time a family member\nis subjected to a ban from visits or a\nperson in custody is surprised to find\nthemselves limited to booth visits\nbecause they were never told about it,\nincluding by not receiving form 143b,\nwhich is required in all cases imposing\nsuch a limitation. Although we frame\nsuch departmental errors as a lack of\ndue process or as otherwise legalistic\nand bureaucratic. And although these\nerrors feel as though they carry the\nforce of law to the people in custody\nand their family members, the harms that\nthey produce are nevertheless deeply\nhuman in scale. They lead people who\nhave waited many hours in the heat or in\nthe cold to meet through cloudy and\nscratched plexiglass when they expected\nto place a son or a daughter on their\nparents lap. They lead people who have\nwaited many hours to be turned away\nbecause the department believes a ban is\nin place, even if one was never properly\ncommunicated. They prevent the people we\nrepresent from holding their children or\nfrom reaching out to touch a partner's\nhand. While training and supervision,\nstaff responsibility and accountability\nall must be addressed,\nwe are drawn to the prospect of culture\nchange, not only by the promise of the\nrevived collaborative working group, but\nby the analysis of several experts,\nincluding now first deputy commissioner\nEgan, in their article, Beyond the\nIsland: Changing the Culture of New York\nCity jails, when they write,\n\"Comprehensive reform, the kind of\nreform that can stop endemic violence\nand truly change treatment and\nconditions in DOC facilities. ities\ninvolves more than just remaking the\nDOC's physical space.\nThe DOC must perform a deliberate\nanalysis of its current culture and the\nimpact of that culture on daily\noperations.\nA proactive and supportive environment\nfor staff and management will allow\noperational reforms to be successful. We\nagree. Thank you.\nAnna Semp followed by Keryaki Vulis\nAsavo.\n&gt;&gt; Good afternoon. My name is Anna Smp and\nI'm with the Urban Justice Cent's Mental\nHealth Project. I am presenting this\ntestimony on behalf of a client who is\ncurrently incarcerated at Rikers. I grew\nup in East Harlem. I've been\nincarcerated since September of 2024.\nI'm currently in R&DC on Rikers. I've\nbeen held in Rush, enhanced supervis\nenhanced supervision housing twice in\nthe last year. In Rush, there are\ndifferent levels of lockdown. You're on\nlevel one at first. There are more\nrestrictions for people on level one\nthan on level two. People usually stay\non a level for 30 days. The jail tends\nto put incompatible people, like people\nfrom different gangs together on level\nthree. It's an experiment, and the\nexperiment is not working out. People\nare getting cut in the face. The first\ntime I was in Rush, I was there for 60\ndays. After being on level one for a\nweek, I had a hearing. I was accused of\nbeing involved in an assault. I tried to\nbring in the victim so that he could\ntell the officers that I wasn't\ninvolved, but they didn't let me bring\nanyone in. The hearing officer said that\nI was guilty. When hearings happen,\nyou're your own lawyer. Nobody gets\nrepresentation. If you're involved in an\nincident, you're getting sent to the\nbox. People rarely beat their\naccusations. One time, an officer\naccused me of being involved in an\nincident, but he didn't show me any\nvideos or stills. I pled not guilty.\nThey told me that I was banned from\ncontact visits indefinitely, which\ntypically only happens when there's an\nincident during visitation. There's\nsupposed to be paperwork when they're\nrestricting visits, but the officer told\nme directly that there was no paperwork\nabout my restriction. After about a\nweek, I was found guilty and dropped\nback to level one for a month. On level\none, I spent most of my time in my cell\nalone. It felt like a cage. I was\noutside myself for an hour each day for\nrecreation. Sometimes the cos said we\ncouldn't go out for recreation because\nof the weather. I was often shackled to\na chair for 4 hours a day. The cos would\nunchain us for a shower and after the\nshower, they wouldn't let us come out\nagain. I spent 19 or 20 hours in my cell\nevery single day. The co strip search me\nevery time I leave my cell. It doesn't\nmatter if it's for shower or for\nrecreation. It makes me not want to\nleave my cell. There have been a lot of\ntimes where I've spent two, three, or 4\ndays in a cell so that I don't have to\nget strip searched. When I was on level\none, my cell was in the second floor,\nthe top tier. The cos don't like coming\nup to the top tier, so it was hard to\nget their attention. I had to bang on my\ncell door for 45 minutes to an hour\nevery day to get their attention so that\nI could use the bathroom, get a tissue,\nor ask for a pen. The officers are\nsupposed to come around every 30\nminutes. There are enough officers\naround, but they ignore you. Someone\ncould kill themselves and they wouldn't\neven know. In Rush, we got visiting days\nonce a week. I could hug my wife and son\nat the beginning and end of the visits,\nbut I wasn't allowed any other contact.\nDuring the visit, my leg was shackled to\na chair. One time after my son's mother\nvisited, she got banned for 180 days,\nand I couldn't see my son that whole\nentire time. In Rush, you're away from\neverything. You feel out of sight and\nout of mind. It plays tricks on your\nmental health being in rush. It made me\nfeel like nobody could hear me. It took\naway any sense of control that I thought\nI had over my life. Made me feel\nhopeless and helpless. The way we're\nbeing treated in Rush makes us feel like\nanimals. Our meals were dropped into our\ncells through a slot. Nobody actually\nchecked in to see how we were doing and\nthe next speaker we'll continue with\nthis testimony. Thank you.\n&gt;&gt; Hi, I'm Gideo.\nI'm also working with European Justice\nCenter and as Anna said, I'm continuing\nthe previous testimony.\nThe doctor would come by every morning\nfor six visits, sick visits around 5 or\n6 a.m. So, you would miss it if you\nweren't awake. One time I put in for a\nsick visit for athletes foot. When the\ndoctor came by, he didn't even look at\nmy feet. He just prescribed me a cream.\nOn top of that, every day I told the\nstaff I needed to go to the dentist\nsince I got there because my filling\nfell out. I'd been asking to see the\ndentist, and I'd been repeatedly told\nthat I'd be put on a list. It took more\nthan four weeks, 5 weeks before I got an\nappointment. There are also not enough\nmental health case workers. Most people\nonly see them once during their entire\ntime inside. I wanted to tell them about\nwhat it feels like to be cut off from\nthe world. When I was in Russia second\ntime, I asked for an appointment, but I\nnever saw a counselor. I wanted\nemotional support, but I don't think\nthey're able to offer that. I got to\nspeak with someone in R&DC after a few\nweeks, but then at my next appointment\nwas a different counselor. They told me\nit might keep being a different person\nevery time. I think when you're dealing\nwith sensitive and confidential\nsubjects, you should be seeing the same\nperson every time you go to counseling\nso that you can build understanding.\nThere was nothing to do all day in Rush.\nThe only thing you could do was read\nbooks and write letters. I read anything\nI could get my hands on to pass the\ntime. But sometimes I couldn't even\nwrite letters cuz I didn't have a pen.\nThe law library was the most consistent\nthing, but on level one, you didn't get\nto leave your cell when the law library\ncame around. They just come to your door\nand ask if there was anything you wanted\nto know or research. There is no\nprogramming in Rush. You might be led\nout of your cell and sit shackle to a\nchair for 10 to 15 minutes to talk to\nsomeone, but there's no curriculum.\nSometimes we talked about the game that\nwas on recently. After a few minutes,\nthey'd make you sign a book and they'd\nleave and you'd go back to your cell.\nI was on level two recently and there I\ncould sometimes go out without being\nshackled to a desk. I was allowed in the\nrecreation cage with the other guys\ninstead of doing wreck alone. But even\non level two, I didn't feel like coming\nout of my cell because I was being\ntreated inhumanely. My cell didn't have\nheating and they weren't fixing it. They\neven came around with a thermometer to\ncheck how cold people's cells were. I\nspent half the day under the blankets\nbecause it was too cold not to. I didn't\nwant to come out because it felt like\nbeing outdoors. Once they ran out of the\nallergen-friendly food I could have, I\nmentioned this and one of the deputy\nwardens got aggressive. She grabbed my\nhand, which was sticking out of the slot\nin my door, bent to my wrist, and pushed\nmy hand back in. I heard her say, \"He\nthinks somebody cares. I've been going\nthrough all the avenues I can to\nadvocate for myself this whole time. I\nknow I should have had contact visits.\nThe heat should have been on, and I\nshould have been getting real food, not\nraisin brand, for meals. I filed\ngrievances and 311 complaints, but it's\nlike they can just ignore you.\" I think\none positive change would be more\nfrequent psych evaluations for jail\nstaff at least once every two years or\nideally once a year. In Rush, we were\nonly allowed to have free calls for 6\nminutes a day. I had to choose between\ncalling my family and calling my lawyer.\nSo, I called my family. I have a wife\nand a 5-year-old son. Talking to them is\nusually the only time I feel like I'm\nbeing heard. When I was in rush, the\nlast time I was locked up, we got to use\nthe phone for 21 minutes every 3 hours.\nSo, it was a big change. One time I\ntalked to the warden about phone time\nand he told me that phone calls are so\nshort to make sure that people don't\nwant to come back. I used to want to be\nmoved to Genpop because I knew there was\nworkout programming and social workers\nwho would listen to music with you. But\nsince I got moved out of Rush, I've\nrealized things are just as bad in Gen\nPop. It's still cold and the cos are\ncruel to people there, too.\nUh we'll move on to our virtual speakers\nfirst. Excuse me. First we have Mary\nLynn World War.\nHi colleagues. uh Mary Lynn Roll was of\nthe Legal Aid Society Prisoners Rights\nProject. Um we've talked today about\nthermal underwear, blankets. One of the\ncallers explained to you his freezing\nconditions in the jails. And in this\nconnection, I want to use this comment\nperiod to ensure that you board members\nknow of and avail yourselves of an\nimportant source of information about\nthese and other conditions in the jails\nthat can bolster your oversight.\nYou all know of the federal monitor in\nthe Nunes litigation, but recall there's\nanother monitor at Riker's Island, the\nOffice of Compliance Consultants, which\nis tasked with ensuring compliance with\nthe consent decrees in the Benjamin\nlitigation, which addresses the physical\nconditions at DOC facilities. The\nmonitor issues reports three times a\nyear, and you should read them. They're\npublicly available on the court's docket\nand you will see there they consistently\nfind DOC out of compliance with the\ncourt's orders. This monitor also\naddresses individual complaints and here\nare a few of their recent findings after\nthe recent cold snap on February 26. The\nmonitor found that R&DC\n5 Central South was freezing cold and\nthat 14 cells in the unit lacked heat,\nthat DOC had not entered any work orders\nto fix the situation, and that the\nproblem had persisted since January. It\nwasn't until March 2nd that DOC fixed\nthe radiators in those cells, and these\ncells were occupied.\nEven in cells with working heat, DOC's\nfailure to repair broken windows has\nbrought frigid outside air inside. In\nall of its recent docketed progress\nreports, the monitor has found many\ninoperable windows about which work\norders were either not submitted or were\nsubmitted and resubmitted without\nfixing. And in recent inspections, some\nHere's what the monitor found. January\n22nd,\num the monitor found broken windows that\nwere bringing in outside air in four\noccupied cells in R&DC 5 lower south and\nno corresponding work orders. February\n3rd, OBCC 8 upper. The monitor found\nthat five windows did not close which\nprevented any heat from being felt in\nthe area. The monitor found no work\norders and the windows were fixed only\nafter the monitor reported its findings.\nThese all came to light only because\npeople complained to our office and the\nmonitor investigated and that's not\nsustainable. DOC must be held\naccountable for affirmatively\nmaintaining safe conditions and making\nrepairs and most critically moving\npeople out of these cells pending\nrepairs. The fact that these cells were\nnot repaired timely is one problem. The\nfact that they were still inhabited is\nanother. We raised this today to in the\nhopes that the board will monitor its\nown standards regarding the physical\nconditions in the facilities. We're\ngoing to be back here in May, all of us,\nand we'll need answers on preparedness\nfor hot weather to prevent suffering.\nand we look forward to hearing about\nyour investigations and to you publicly\nreporting to us what you find in the\njails. Thank you.\nThank you. Our final speaker is Emily\nJoyce.\nGood afternoon, Mr. Chairman, members of\nthe board. My name is Emily Joyce. I am\na social work intern at the Bronx\nDefenders and a secondyear MSW student\nat the Silverman School of Social Work.\nI'm pleased to hear that the Department\nof Corrections is taking steps to\naddress the ongoing confusion regarding\npermissible items. In the spirit of\nensuring that those incarcerated have\ntheir struggles heard and to ensure\nDOC's expeditious response, I'd like to\nspeak about the experience of confusion\nfor families, advocates, and our\nclients, people who are in currently\nincarcerated at Riker regarding\npermissible and impermissible items.\nNow, you might be thinking, how\nconfusing could it be? There's a list.\nWrong. There are currently several\nlists, none of them the same and\noftentimes disregarded.\nOver the past few months, our office has\nreceived numerous reports about the lack\nof heat and hot water across the jails\non Riker's Island. During a record-\nsetting cold spell with multiple\nsnowstorms and p and wide power outages,\nour clients told us they were freezing\nand that they experienced multiple\nlapses in power, which made it\nimpossible for clients to communicate\nwith their legal teams and loved ones.\nWe were told that the Department of\nCorrections was addressing these issues\nand distributing winter clothing, but\nthe reports continued and our clients\ndid not receive the thermals and winter\nitems our office sent to them to stay\nwarm. If that sounds confusing, it's\nbecause it is. On Thursday, March 6th, I\nspoke with a person in custody about\nthis issue. I showed him a list that our\noffice had received on February 20th\nreflecting the current understanding of\nwhat items are permitted. He immediately\nsaid, \"This is completely different from\nthe list we have.\" completely different.\nHe then went down the list item by item.\nThe first item was Vans, old school or\nslip-on. He told me he had back surgery\nyears ago, has a plate in his foot, and\nthat his right leg is a quarter inch\nshorter than his left. Vans provide\nalmost no sole support. He said it felt\nlike walking directly on the ground. It\ntook months for him to finally receive\nsneakers that support his feet, but he\ntold me because he has different shoes\nnow, I also have a target on my back. He\ncontinued reading, \"All white socks but\ngray soul is unacceptable. How are you\nsupposed to know what color the soul is\nwhen you buy the pack?\" Then he said,\n\"People don't have the means to be\nspending exorbitant money on new items\nand shipping over and over again when\nthings are returned or never delivered.\"\nFinally, he reached the line that made\nus both laugh out of frustration.\nColoring books allowed, but no crayons\nor colored pencils. He looked at me and\nhe asked, \"How am I supposed to color?\"\nThe confusion around permissible items\ncreates unnecessary hardship for\nfamilies trying to support their loved\nones and for people in custody trying to\nmeet basic needs. Clear, consistent, and\npublicly accessible rules and consistent\nenforcement of those rules are\nessential. I urge the board to require\ngreater transparency and uniformity from\nthe Department of Corrections regarding\npermissible items so that families,\nadvocates, and people in custody all\nhave the same information. Most of us\ncan only imagine how hard it is for\nthose who are incarcerated to find\nsources of support and comfort. Why make\nit unnecessarily harder? Thank you for\nyour time and for your continued\ndiligence and oversight.\nChair, there are no more public\ncomments.\n&gt;&gt; Thank you very much, uh, Jasmine. Um,\nat this point, we will, uh, adjourn the\nmeeting. I'd like to thank everyone who\nattended and participated in today's\nmeeting. The board's next meeting is\nscheduled to take place on Tuesday, May\n12th, 2026 at 100 p.m. At this time,\nI'll take a motion to adjurnn.\nSo moved.\n&gt;&gt; All in favor?\n&gt;&gt; I\n&gt;&gt; opposed.\nWithout hearing any objection, this\nmeeting is hereby adjourned.\n&gt;&gt; Was clear. Thank you.","summary":"The NYC Board of Correction met on March 10, 2026 to review several critical areas of jail operations. The Board presented findings on de-escalation unit compliance, revealing that correctional staff at multiple facilities (OBCC, GRVC, RMSC, RNDC, West Facility, NIC) are inappropriately using intake holding pens for de-escalation purposes without bedding or basic necessities, violating Minimum Standard §6-05. The Board also released a comprehensive injury response report documenting gaps in DOC and CHS coordination, including inconsistent data reconciliation, incomplete reporting, and chronic delays (averaging 72 days in 2024) in submitting required injury reports. On permissible items, the Department acknowledged confusion created by facility-specific lists conflicting with agency policy and committed to finalizing a unified, transparent list by end of April. The Department unveiled an attorney visit scheduling pilot launching by end of March and announced plans to reconvene the Rikers Island Visit Working Group. Multiple defense organizations testified about ongoing barriers to sending basic necessities like thermalsclothing, eyeglasses, and contact lenses to incarcerated individuals.","keywords":["de-escalation units","intake holding pens","minimum standards","injury response","data tracking","permissible items","mail policies","visitation","attorney visits","family visits","contact lenses","medical care","compliance","contraband screening","facility conditions"]},{"date":"2026-02-10","display":"February 10","page_url":"https://www.nyc.gov/site/boc/meetings/20260210.page","youtube_id":"cZIhMua3K70","youtube_url":"https://www.youtube.com/watch?v=cZIhMua3K70","docs":[{"id":8,"title":"Agenda","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/boc-public-meeting-agenda-2026-2-3.pdf","doc_type":"agenda","has_text":true},{"id":13,"title":"Meeting Minutes","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/minutes-20260210.pdf","doc_type":"minutes","has_text":true},{"id":9,"title":"Board Chair's Response to Petition for Rulemaking","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Board-Chair-Response-to-Petition-for-Rulemaking-2026.02.06.pdf","doc_type":"other","has_text":true},{"id":11,"title":"Minimum Standards Access to Counsel Proposed Changes","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Minimum-Standards-Access-to-Counsel-Proposed-Changes.pdf","doc_type":"other","has_text":true},{"id":12,"title":"Minimum Standards Explainer","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Minimum-Standards-Explainer.pdf","doc_type":"other","has_text":true},{"id":20,"title":"Proposed Rules Updating Mental Health and Health Care Standards (2026)","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/boc-proposed-amendment-of-rules-concerning-mental-health-and-health-care-preliminary-certifications-final.pdf","doc_type":"other","has_text":true},{"id":14,"title":"Resolution Concerning Proposed Rules Relating to Access to Counsel","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/2026.02.10-Resolution-on-rulemaking.pdf","doc_type":"other","has_text":true},{"id":17,"title":"Jails Action Coalition/HALT Solitary Public Comment on Mental and Health Care Standards Rulemaking","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/JAC_HALT_Comments_re_BOC_Rulemaking_Feb_2026.pdf","doc_type":"testimony","has_text":true},{"id":10,"title":"Joint Memorandum in Support of Updated Minimum Standards: Access to Counsel","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Joint-Defender-Letter-Access-to-Counsel.pdf","doc_type":"testimony","has_text":true},{"id":19,"title":"Mental Health and Health Standards Proposed Rules Public Hearing Oral Testimony","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/summary-of-rulemaking-oral-testimonies.pdf","doc_type":"testimony","has_text":true},{"id":16,"title":"New York County Defender Services Testimony","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/New-York-County-Defender-Services-Testimony_2.10.26.pdf","doc_type":"testimony","has_text":true},{"id":15,"title":"The Legal Aid Society-Criminal Defense Letter Regarding Health Care and Mental Health Minimum Standards","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/2026.02.09-LAS-Comments-to-BOC-February-2026-Proposed-Rulemaking.pdf","doc_type":"testimony","has_text":true},{"id":18,"title":"Urban Justice Center/Mental Health Project Letter Regarding Mental Health and Health Care Standards Rulemaking","url":"https://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2026/UJC-MHP-Comment-to-Board-on-MH--Health-Standards-Rulemaking-2.10.2026.pdf","doc_type":"testimony","has_text":true}],"has_caption":true,"caption_text":"Good afternoon.\nWelcome to today's public hearing\nconvened to receive testimony on the\nboard proposed rules. I will turn it\nover to the board's general counsel,\nMelissa Centron Hernandez, to summarize\nthe proposed rules.\n&gt;&gt; Thank you. Good afternoon. Thank you for\nattending today's hearing. The board is\nproposing to amend section 205B2\nRomanets 1 and two and section 34B\nto Romanet 5A of title 40 of the rules\nof the city of New York better known as\nthe minimum standards to codify\nlongstanding variances. These standards\nrelate to psychotropic medication and\ntuberculosis screening.\nThe board first approved a limited\nsix-month variance from the psychotropic\nmedication standard on November 10th,\n2005.\nThe variance authorize psychiatrists to\nsee and evaluate stable patients on\npsychotropic medication in general\npopulation at least every 28 days rather\nthan every 14 days as required by the\nstandard.\nThe board has granted this variance\nevery six months since its initial\napproval and seeks to codify it into our\nrules. The board believes that this\nproposed amendment helps improve patient\ncare and makes psychotropic medication\nprescription practices consistent with\ncurrent mental health care standards. On\ntuberculosis screening in city jails,\nthe board first approved a limited\nsix-month variance on September 13,\n2010.\nThe variance authorized the use of\ninterferum gamma relays assays instead\nof a tuberculine skin test for\ntuberculosis screening. The variance\nalso exempts persons who have a\ndocumented negative test in the six\nmonths prior to their admission from\nrepeat screening. Understanding that\nhealth care practices evolve and improve\nover time, the board granted this\nvariance every six months since 2010 and\nproposes codifying it.\nThe board also proposes to amend\nchapters two and three of title 40 of\nthe minimum standards to correct\noutdated language such as references to\ninmates and department of mental health\nmental retardation and alcoholism\nservices as well as aligning variance\nprocedures across all sections of the\nstandards and removing references to\nseclusion.\non seclusion. Section 206 authorizes DOC\nand CHS to implement procedures\ngoverning the physical restraint and\nseclusion of persons in custody being\nobserved or treated for mental or\nemotional health issues. Among other\nrequirements about the use of seclusion\nand the monitoring and release of\nindividuals in seclusion,\nsection 206 provides that physical\nrestraint or seclusion may be used only\nupon the direct written order of a\npsychiatrist which includes the reasons\nfor taking such action. However, in\ncurrent practice, CHS neither authorizes\nnor orders the use of seclusion.\nAccordingly, the board proposes removing\nreferences to the use of seclusion from\nsection 206.\nToday's public hearing is taking place\npursuant to chapter 45 of the New York\nCity Charter or the citywide\nadministrative procedure act. The\npurpose of this hearing is to hear\ncomments and feedback on the proposed\nrules from people with lived experience,\nfamily, staff, advocates, and other\nmembers of the community. Our goal is to\ngather information that will help inform\nthe board's decision on the proposed\nrules.\nIt is not our purpose today to respond\nto questions, nor will the board debate\nthe proposals. You may submit written\ncomments until the close of business\ntoday, February 10th. Thank you to those\norganizations that have already\nsubmitted written comments. We\nappreciate your thoughtful feedback,\nwhich we've already begun reviewing.\nAfter the public comment period, the\nboard will finish reviewing all comments\nsubmitted, amend the proposed rules if\nnecessary, and vote on the final rules.\nWe aim to hold a vote at the next board\nmeeting or the May board meeting\ndepending on the extensiveness of our\nreview and revisions based on your\nwritten and oral testimony.\nIf you wish to testify in person and\nhave not already done so, please sign up\nby writing your name on the signup sheet\noutside.\nAfter in-person testimony, we will turn\nto those who signed up to speak\nvirtually. Speakers are asked to limit\ncomments to three minutes.\nWe have three inerson speakers signed\nup. The first is Jennifer Parish,\nfollowed by Michael Clinger.\nGood afternoon. Thank you.\nGood afternoon. Thank you for this\nopportunity to comment on your proposed\nrules. My name is Jennifer Parish. I\nwork at the Urban Justice Center Mental\nHealth Project and I'm a member of the\nJails Action Coalition and the Halt\nSolitary Campaign. Um Jack and Halt have\nprovided comprehensive comments\nregarding um your standards, but in my\ntestimony here, I want to first start by\ntalking about the changes to mental\nhealth standard 205B2\nin the original version and you are\nrenumbering that to be 206B2.\nThe board proposes to codify um the\nlong-standing variance, but actually\nthis change goes much farther than that.\nIt would reduce the amount of time or\nexcuse me, it would extend the amount of\ntime um in which people receive their um\nre-evaluations for medication. When\ncorrectional health services asked for\nthis variance, they did so for a very\nnarrow population, and that's people who\nare in the general population and have\nbeen stabilized on their medication.\nThere's nothing in the proposed rule\nthat limits it to that population. So\nwhat we're encouraging you to do is to\nchange the language to make clear that\nthat twoe review should be happening as\nit is CHS policy every two weeks and we\nwhen people are not stabilized they\nshould have those same appointments with\ntheir psychiatrist to get um stabilized.\nNow after that in general population you\nmay want to change it to four weeks but\nthat's not what the standard does here.\nIt's much broader than that. There's\nalso a change that you make without\ncommenting on the reason why. Um, and\nthat's changing psychiatrists to\npsychiatric provider. Um, there may be a\nneed to include um, nurse practitioners\nand physicians assistants, but you\nhaven't spelled out why that is. And we\nbelieve the psychiatrists are still\nneeded in the jails and you should be\nspecifying that that's the case. maybe\nyou include in the standard staffing\nratios or requirements that they are in\nthe um mental health units or something\nlike that. Um so we hope you'll look at\nthat too. But more broadly what we're\nrecommending is that you look at the\nstandards as a whole. Look at mental\nhealth across the board because these\nstandards were adopted more than 40\nyears ago and a lot has changed since\nthen. Some of that for the positive, for\nexample, requiring discharge planning\nservices, requiring having PACE units,\nbut none of that's codified in the\nstandards. That's just a practice. And\nwe've seen over time that practice has\nbeen rolled back. Many of the deaths\nthat we've seen happened in the PACE\nunits. So, we need more protections for\npeople with mental health concerns and\nand the health standards across the\nboard. So, we hope you'll do a\ncomprehensive review that you'll include\npeople who are incarcerated, advocates,\nthe larger community, um, health, mental\nhealth care experts in this process to\nreally have a level of mental health and\nhealth care that we can all be, uh,\nproud of. So, thank you for that.\n&gt;&gt; Thank you.\nNext is Michael Clinger, followed by\nJennifer Nicole Alameda.\n&gt;&gt; Good afternoon.\n&gt;&gt; Uh my name is Michael Clinger. I'm a\njail services attorney with Brooklyn\nDefender Services. Um I'm happy to be\ngoing after uh this parish because um\nI'm picking up somewhat where she left\noff. uh as some of us advocates were\nreviewing the proposed changes to the\nmedical and mental health minimum\nstandards and based on the experiences\nof the people that we represent who are\nin department custody uh we found\nseveral additional ways in which the\nstandards may need further updating. And\nso briefly to walk through some of those\num production to medical and mental\nhealth appointments has long been a\nchallenge for this department. Past\nSeptember, the department data indicated\nthat there were nearly 16,000 missed\nmedical appointments for the month.\nRefusals by people in custody was the\nrecorded reason for nearly half of those\nmissed appointments. But even if that's\naccurate, it leaves approximately 8,000\nother missed appointments. Uh, and one\nof the most frequent reasons uh for\nfailure to produce that department staff\nreport to the people that we represent\nis lack of escorts. The minimum\nstandards provide some guidance\nregarding access to care. Section 302B\nprohibits the department from denying or\ndelaying healthcare as a form of\npunishment and requires that department\nprovide staffing levels sufficient to\nensure that all minimum standards are\nmet. Section 302G requires the\ndepartment to escort people requiring\nmedical evaluation outside of their\nhousing areas promptly. We think an\nadditional provision is needed.\nSpecifically, the department requires\nspecial escorts for people on a variety\nof statuses such as centrally monitored\ncase or CMC status, requiring a captain\nescort. CMC status is not a punishment,\nand there's no reason why requiring a\ncaptain escort should prevent someone\nfrom being produced to medical\nappointments. But over and over, that's\nexactly what the people we represent are\ntold. We represent an individual who\nrequired medical treatment at Bellev and\nthe department repeatedly over a period\nof months failed to produce them to the\npoint where on island physicians could\nno longer provide treatment because the\ntesting that they required at Belleview\nhad not been performed. The reason given\nwas lack of a captain escort. Another\nperson we spoke with yesterday has not\nreceived treatment for an injury from\nlast September as the department can't\nfind a captain to bring him from OBCC to\nWest facility.\nThe department's requirements for\nstaffing escorts cannot be permitted to\ninterfere with providing medical and\nmental health treatment. The minimum\nstandards must make this explicit.\nElsewhere in the minimum standards, the\nboard considers dental treatment. It's\nin section 306C. The board requires that\ntreatment be provided for to reasonably\naddress health or comfort concerns and\nit goes so far as to lay out a\nnon-exhaustive list of treatments\nincluding the repair of injured or\ncarious teeth. We ask that the board\nconsider including a reporting\nrequirement such that the health\nauthority report the frequency with\nwhich each of the listed treatments with\nthe critical addition of tooth\nextractions is performed. We understand\nfrom the experiences of the people that\nwe represent that tooth extractions are\na routine form of treatment. We also\nunderstand that such treatment has\nlong-term impacts on people with respect\nto job prospects upon returning to their\ncommunity as well as their ability to\nsmile without shame. The board should be\nable to ensure that the health authority\nis not relying on extractions to the\ndetriment of the long-term health and\nwell-being of the New Yorkers that it\ntreats.\nThank you.\nNext, Jennifer Nicole Alameda. Then we\ngo to virtual comments.\nHello everyone. My name is Jennifer. I'm\nintroducing myself for the first time\nhere. I am your first female federally\ntrained US president. I am here\nrepresenting New York State uh\ndepartment of mental health psychiatric\nsystem. I am a former psychiatric\nemployee. I have uh psychiatric\nexperience that was given to me for the\npresidential position to better assist\nour prison rehabilitation system. I am\nhere with the prison rehabilitation\nsystem. As of yesterday, I was in the\nstate capital of Albany advocating with\nthe Senate Congress updating the\nprisoners, you know, constitutional laws\nand the Senate Congress prison\nadministration rules. So, uh, the new\ngeneration is highly, uh, upset with the\nthings we're seeing. the new generation\nunderstands that we are uh a more mature\nuh civilians uh in leadership and that\nthe White House has to uh assist with\nadvocating defense of our prison system\nand that our prisoners be as well uh\ndefended in their constitutional laws uh\nwith the mandate of the United Nations,\nhumanitarian rights and the defense of\nthe international criminal court justice\num management of government\nadministration with our civilians in our\ncountry. I'm here to assist if I may. I\nhave spent nine years in hundreds and\nhundreds of meetings with the prison\nrehabilitation system and the Senate\nCongress uh updating these laws so that\nthe uh prisoners are defended against\nillegal uh tactics of control for um\ncases in the Supreme Court so that we uh\nrespect the human mind is not to be\nplayed with. Uh and we're not going to\nmandate psychiatric medicine. We're\ngoing to make sure that every 12 months\nuh prisoners psyche vows are reassessed\nby different a different doctor as well\nas mandating that they be given\nrehabilitative services so that they\nknow the law. They're given their school\nbooks, their education, their mental\nhealth services that are more new age\nconcerning um not touching psychotropic\nmedicines that we understand there are\nnew age medicines that are better for\nthe brain on natural plants, vegetables,\nnew age things that you guys know about\nand that we uh advocate for these things\nin the Senate Congress uh with my\nsignature as your first female\npresident. Thank you.\nThank you. We now pass to Elizabeth\nBender online and then Kayla Simpson.\nHi, Elizabeth. You should be good to go.\nHi. Hi.\nAre you ready?\nSince we look to be having some\ntechnical difficulties with Elizabeth,\nwe'll pass to Kayla Simpson and then\ncome back to Elizabeth Bender.\nHi. Can you hear me?\n&gt;&gt; Hey, Kayla. We can see you. Hi. Good.\n&gt;&gt; Good afternoon. Hey, Jarley. Thank you\nso much.\n&gt;&gt; We can't We can't hear you for some\nreason. Sorry.\n&gt;&gt; You can't hear me?\n&gt;&gt; Now we can hear you. Now we can hear\nyou.\n&gt;&gt; Thanks, Jarie. Appreciate it.\nUm, hello everyone. My name is Kayla\nSimpson. Uh I'm an attorney at the Legal\nAid Society's Prisoners Rights Project.\nUh thank you so much for this hearing.\nWe really appreciate it. Um and these\ncomments are meant to supplement our\nwritten comments which we sent to the\nboard yesterday. Um but I just want to\nhighlight a few things. Uh first, while\nwe appreciate that the board offered\nthis proposed rule in an attempt to make\nvery specific changes, uh we did want to\necho Miss Parish's comments about the\nneed for comprehensive rulemaking of the\nmental health standards. You know, as\nshe said, so much has changed in the\njails, uh since these rules were\npromulgated, and the board should\nexplore how the minimum standards can\nbetter reflect that. Um and we\nappreciate that the board has a\ncommittee to look at the minimum\nstandards and and we think this should\nbe uh on the list. And I know we don't\nneed to tell the board uh how critical\nmental health interventions are. Um, of\ncourse, we all need look no further than\nthe board's death reports to see the\ncost of failures to address mental\nhealth needs. So, we just urge the board\nto take that up. Um, and our letter\nreflects specific concerns and\nsuggestions regarding each change\nproposed by the board in this round of\nrulemaking. And I I won't recycle them\nnow. Um, and it's critical to ensure\nthat the language reflects the changes\nthe board intends to make. And that's\nthe purpose of our letter. But I did\nwant to take a moment here on changes to\nvariance procedures.\nWe appreciate the desire to synthesize\nboard procedures uh across sections, but\nwe shouldn't do that at the expense of\nspecific notice requirements, which\nunfortunately we think these proposed\nrules do. you know, the public and m\nother relevant stakeholders must have\nthe ability to meaningfully\nengage to see what variances are\nproposed and to weigh in on them. And\nuntil this rulemaking, the mental health\nstandards had specific requirements to\naccomplish that. But section one of the\nminimum standards doesn't. And when\nwe're conforming section two and section\none together, um we can see the harm\nthat can come from that. Um, you know,\nthere have been times in the past where\nDOC under section one of the minimum\nstandards has proposed a variance the\nmorning of a public meeting. And of\ncourse, that's not a recipe for\nmeaningful engagement. And it's led to\nmistakes. It's led to unnecessary harm\nand variances that have had to be\nquickly revisited. So, we shouldn't\nrecreate that problem here. And finally,\nI just wanted to advise quickly that the\nboard eliminate the continuing variance\nmechanism. that is allowing variances\nthat continue indefinitely because when\na variance continues indefinitely, it's\nnot a variance. It's a rule change and\nit hasn't undergone the process that's\nrequired of rule changes. So, uh in our\nopinion, the board should not permit\nthat because it's not consistent with\nthe meaning of a variance and it's not\nconsistent with the oversight\nobligations on the board uh set forth in\nthe city charter. Um so, that's all for\nnow. Thank you so much.\nThank you, Kayla. I understand Elizabeth\nwon't be testifying today. I wanted to\ngive everyone an opportunity online who\nsigned up to testify, but I did not call\nto testify specifically for the public\nhearing to please raise your hand on the\nteam's platform.\nSeeing none, I'll pass it over to Chair\nSamson. Thank you.\n&gt;&gt; Thank you, General Counsel Melissa,\nand thank you all who shared comments.\nUh, the hearing is concluded. The\nboard's public meeting will start in\nfive minutes.\nis one.\nAnd this kind of understand\nit wasn't\nJust update on notice. We're going to be\nwaiting uh a few more minutes for the\ndepartment to arrive. Uh there there\nwill be arriving shortly within the next\nuh 3 minutes. So we will wait so there's\nno disruption in uh testimony and other\nthings. So public comments\nTime frames for public comment.\n&gt;&gt; Afternoon.\n&gt;&gt; We have a quorum of members present this\nafternoon and the New York City Board of\nCorrection February 10th, 2026 meeting\nis now in session. Our first order of\nbusiness is a vote on the agenda for\ntoday's board meeting which board\nmembers have received.\n&gt;&gt; Will a board member move for a vote to\napprove the February 10th, 2026 meeting\nagenda?\n&gt;&gt; So move.\n&gt;&gt; Will a board member second that motion?\n&gt;&
