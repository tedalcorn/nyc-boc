gration\nauthorities present a judicial warrant issued by a judge, in addition to an individual having any\nprior qualifying convictions. Administrative warrants or detainer requests signed by ICE do not\nsatisfy this requirement. The statute deliberately and explicitly requires both elements: a judicial\nwarrant and a qualifying offense.5\nDOC is fully aware of these two requirements. Not only have they been the law of the land for\nover a decade, they have detailed an Operations Order to comply with their legal obligations,\nand have been recently questioned about their adherence to the law in multiple city council\nhearings.6 See DOC Operations Order, Interactions with Federal Immigration Authorities\n5 Administrative Code § 9-131(b)(1).\n6 The most recent hearing was held on December 8, 2025 by the Committee on Immigration about\npossibly creating a private right of action for violations of the City’s detainer laws.\n\n(Number 9/19), Section IV(B)(1)(i) (explicitly stating that a judicial warrant and qualifying offense\nare both required). DOC’s own documents state that “if the inmate does not meet [this] criteria…\nno notification to DHS of such an individual's release shall be made and the inmate shall\nbe discharged from custody in accordance with Directive 4102R-B” (emphasis added).\nAccording to their own procedures, there should have been no notification to ICE by DOC in this\ninstance. Afterwards, any actions in support of immigration enforcement must be reported to the\nMayor’s Office of Immigrant Affairs (MOIA) on a quarterly basis. Yet, when our office contacted\nDOC and MOIA, they both stated that a judicial warrant was not required, a clearly erroneous\nand unlawful read of our City’s detainer law.\nHere, neither DOC nor MOIA produced or even claimed to possess a judicial warrant\nauthorizing ICE to take our client into custody. Indeed, DOC Legal told our office that there was\nno judicial warrant for our client. When we brought this issue to MOIA they told us no warrant\nwas required, and that no further action could be taken to either remedy or investigate the\nsituation. DOC also refused to investigate if the detainer law was violated. In open defiance of\nCity law, both agencies claimed that no judicial warrant was required and then declined to\nexamine their own illegal actions once those claims were challenged.\nBoth agency responses show that DOC is willfully violating City law without any consequences.\nInstead, they are seemingly taking the legally erroneous position that the existence of a\nqualifying offense alone is sufficient to permit a transfer from DOC to ICE. This reading is flatly\ninconsistent with the text and purpose of Administrative Code § 9-131, which was enacted\nprecisely to ensure that local custody is not used to facilitate federal immigration arrests without\ncourt authorization.\nAny argument by DOC that they were simply information sharing is also misleading and\ninaccurate. DOC’s own records confirm that what occurred was a custody transfer: the PIC\n(Person in Custody) lookup page lists the client as “released to Immigration and Customs\nEnforcement,” which reflects a physical handoff to federal agents, not a release into the\ncommunity followed by an independent ICE arrest. When our office spoke to DOC Legal and\ninquired about the transfer, we were verbally informed that it was safer for ICE to take custody\nof our client rather than ICE making an arrest in the street. DOC did not simply communicate\ninformation. They coordinated and executed a transfer of custody to ICE.\nWhen we asked DOC to provide documentation relating to their communication with ICE, they\ntold us to FOIL such information. A request that is nearly impossible given that our client is no\nlonger physically in the state. It has been over a month and our office is still trying to figure out a\nway to reach our client and have them sign any relevant paperwork. Our client has been\nplunged into a legal black hole once he was unlawfully transferred to federal custody.\nThe consequences of this unlawful conduct have been severe and ongoing for our client.\nBecause DOC facilitated ICE’s warrantless and unlawful seizure of our client, they are now\ndetained out of state, making it extraordinarily difficult for counsel to reach them, obtain\nsignatures for any legal documents, such as even basic transparency requests such as FOIL.\n\nThis has significantly interfered with counsel’s ability to investigate our client’s transfer,\nchallenge its legality, and protect our client’s rights. This is precisely the harm that\nAdministrative Code § 9-131 was designed to prevent: the extrajudicial transfer of people in City\ncustody into federal immigration detention without judicial oversight and due process. Thus,\nDOC has violated City law and our client’s rights.","8":"NEW YORK CITY\nBOARD OF CORRECTION\nFebruary 10, 2026\nimmediately following rulemaking hearing\nPUBLIC MEETING AGENDA\n(subject to change)\nI. Approval of the Agenda\nII. Approval of Meeting Minutes: January 13, 2025 Meeting\nIII. Public Comment Period – People in Custody\nIV. Executive Director Remarks\nA. Condolences\nB. Census\nC. Reports\n1. Summary of BOC’s Second Report and Recommendations on 2025 Deaths in\nNYC Department of Correction Custody\n2. Summary and Impact of Mayoral Emergency Executive Orders Suspending\nBOC’s Minimum Standards\n3. Board concerns regarding DOC’s Constant Supervision Operations\nV. Board Action\n1. Board statement regarding the Remediation Manager appointment\n2. Resolution initiating rulemaking (access to counsel)\nVI. Department of Correction Briefings, Updates, and Discussions\nA. DOC Update – Emergency Preparedness – Power Outage, Service Disruptions\nand Winter Storm\n1. Emergency preparedness protocols\n• DOC’s emergency preparedness protocols for winter storms, power\noutages, and service disruptions\n2. Emergency response – power outage and service disruptions\n• Status of power, heat, water, and essential services across facilities\n• Actions taken to mitigate any harm and restore services\n• Lessons learned and steps to prevent recurrence of service disruptions\n3. Emergency response – winter storm\n• Overview of winter storm impact\n• Conditions on Rikers Island during and following the winter storm\n\nB. DOC Briefing - Implementation of Death Report Recommendations\n1. Status of implementation of past and continuing recommendations\nconcerning:\n• Video Monitoring Unit (VMU) and PACE staffing\n• Supervision, touring, and logbook compliance\n• Development of protocols to address security concerns without\nreducing mental health care or supervision\n• Prompt medical aid and emergency response protocols\n• Suicide prevention and mental-health refresher training\n• Efforts to reinforce Suicide Prevention Aide (SPA) touring practices\n• Post security and access control; assignment adherence\n• Single-cell occupancy compliance\n• De-escalation refresher training\n• OCGS referral of medical and mental-health complaints to CHS\nC. DOC Briefing - Constant Supervision Operations\n1. Corrective action plan to address identified operational challenges\n2. Incorporation of CHS clinical assessments in placement continuation and\ndiscontinuation decisions\n3. Process for facility leadership oversight, escalation, and responsiveness to\nidentified compliance concerns\nVII. Correctional Health Services Briefings, Updates, and Discussions\nA. CHS Briefing - Implementation of Death Report Recommendation\n1. Processes to ensure consistent identification, documentation, and referral of\nindividuals requiring hospital-level care\nB. CHS Briefing – Constant Supervision\n1. Role in assessment, placement, and removal decisions for individuals under\nConstant Supervision\nC. Overview of the City’s reopening of the “Just Home” program\n1. Goals and implementation plans\nVIII. General Public Comment Period\nIX. Adjourn","9":"","10":"Joint Memorandum in Support of Updated Minimum Standards: Access to Counsel\nDecember 12, 2025\nNew York City Board of Correction\n2 Lafayette Street, Suite 1221\nNew York, NY 10007\nDear New York City Board of Correction,\nWe, the public defender offices of New York City, write to urge the Board to adopt our\nproposed amendments to the minimum standards governing access to counsel. These revisions\nare urgently needed to address the longstanding and systemic barriers to attorney-client\ncommunication and legal visitation at Rikers Island, where our clients’ Sixth Amendment right\nto counsel is consistently undermined.\nOn September 9, 2025, representatives from the institutional providers appeared before the\nBoard to detail the pervasive obstacles we face in providing meaningful representation to\npeople in custody. These challenges include excessive and unpredictable wait times, visiting\nspaces that compromise confidentiality, and unsafe or unsuitable waiting areas. Taken together,\nthese conditions impede our ability to counsel, advise, and advocate for our clients, and thus\ndeny them the constitutional protections to which they are entitled.\nSince the Board’s September meeting, our offices have spent several months examining the\nexisting minimum standards and identifying changes that would most effectively support\nattorney-client visitation. At the center of our proposal is the requirement to establish a clear,\nuniform protocol—one that the Department of Correction, attorneys, and people in custody can\nfollow consistently, efficiently, and transparently. A reliable process is foundational to restoring\nthe integrity of the right to counsel.\nAdditional elements of our proposed revisions are designed to ensure confidentiality and\npreserve attorney-client privilege; permit full and timely participation by all members of the\ndefense team; and promote safe, secure conditions for attorneys, attorney assistants, and the\npeople they serve.\n\nRevising the minimum standards is essential because the Department of Correction routinely\nrelies on vague exceptions and unwritten practices to delay or restrict attorney access. A\nsystem that lacks accountability invites misuse. Clearer rules are needed to curb this pattern\nand allow for more transparency and Board oversight.\nWhile revised minimum standards alone cannot remedy every obstacle to counsel access at\nRikers Island, we have worked to advance the strongest reforms possible within the constraints\nof existing law. Collectively, our offices bring decades of experience visiting Rikers as\ninstitutional defenders. These proposed rules are grounded in our professional expertise and\nshaped by our direct, daily knowledge of the realities our clients face.\nWe respectfully urge the Board to adopt these critical amendments and reaffirm its\ncommitment to safeguarding the right to counsel for all people in New York City’s custody.\nPlease feel free to reach out to us with any questions.\nRegards,\nNew York County Defender Services\nBrooklyn Defender Services\nThe Bronx Defenders\nNeighborhood Defender Service of Harlem\nThe Legal Aid Society - Criminal Defense","11":"§ 1-08 Access to Courts and Legal Services.\n(a) Policy. People in custody are entitled to access to courts, attorneys, legal assistants\nattorney assistants and legal materials.\n(1) Attorney assistants are law students, legal paraprofessionals, social workers,\ninvestigators, interpreters, and other individuals part of a legal team working under the\nsupervision of an attorney representing a person in custody.\n(b) Judicial and administrative proceedings.\n(1) People in custody shall not be restricted in their communications with courts or\nadministrative agencies pertaining to either criminal or civil proceedings except pursuant to a\ncourt order.\n(2) Timely transportation shall be provided to people scheduled to appear before courts or\nadministrative agencies. Vehicles used to transport people in custody must meet all applicable\nsafety and inspection requirements and provide adequate ventilation, lighting and comfort.\n(c) Access to counsel.\n(1) People in custody shall not be restricted in their communication with attorneys and\nattorney assistants and shall not have their communications recorded. The fact that someone is\nrepresented by one attorney shall not be grounds for preventing that person from communicating\nwith other attorneys. Any properly identified attorney or attorney assistant may visit any person\nin custody with that person's consent. Any legal visits or legal telephone calls shall not be\nincluded in calculating the total number of visits or calls to which someone in custody is entitled.\n(i) An attorney may be required to present identification to a designated official at the\ncentral office of the Department in order to obtain a facility pass. This pass shall permit the\nattorney to visit any person in the custody of the Department.\n(ii) The Department only may require such identification as is normally possessed by an\nattorney.\n(iii) The Department shall promulgate standardized and efficient legal visit protocols,\nwhich shall be posted online, in the legal visit space, and in the counsel waiting area of each jail\nfacility. All relevant Department staff shall be trained biannually on the legal visit protocols.\na. The Department shall commence every in-person legal visit within 30 minutes of the\ntime that such attorney or attorney assistant registers at the jail facility or 45 minutes from their\narrival at a stand-alone reception building unless a change of count is in progress or a discrete\nemergency exists that prevents the person in custody from being moved. In the event that a\ncounsel visit is precluded due to an emergency lock-in, the Department shall immediately notify\nthe legal visitor, the designated contact for each defense office, and the attorney of record who\n\nrepresents the person. Routine operational delays, extraordinary staffing shortages, and\nconditions in housing units other than where the person in custody is held do not constitute an\nemergency. If the attorney or attorney assistant has multiple in-person visits on the same day,\nafter the initial visit any subsequent visits on the same day shall commence within 30 minutes of\nthe conclusion of the prior visit, or if the person in custody is in a different facility, then within\n30 minutes of the attorney or attorney assistant arriving at the next facility.\nb. Attorneys or attorney assistants shall not be required to wait outside a facility unless\nadequate shelter is provided and the requirements of 40 RCNY § 1-09(b)(4) are met. The\nDepartment shall not require attorneys or attorney assistants to wait inside locked rooms or cells\nor any other area that lacks immediate access to restrooms or Department personnel to assist\nthem. The legal visit waiting area shall be by the entrance of the facility and any attorney or\nattorney assistant shall be allowed to leave the facility from the waiting area without permission\nor escort from staff.\nc. The person in custody shall be notified that an attorney or attorney assistant has\narrived, and they shall either be provided a pass or be escorted to the legal counsel visiting area\nimmediately upon notification unless a change of count is in progress or an emergency exists that\nprevents the person in custody from being moved. Routine operational delays, extraordinary\nstaffing shortages, and conditions in housing units other than where the person in custody is held\ndo not constitute an emergency. The person in custody shall be allowed to pick up legal material\nfor the visit, and if this causes a delay, it shall be noted as a reason for the delay with the Legal\nVisit Liaison.\nd. The Department shall establish and maintain clear and consistent procedures for\ndocumenting refusals of legal visits. Any written or video-recorded refusals shall be retained as\nan agency record. The Department shall ensure that refusal documentation is logged and stored\nin a consistent manner so that records may be reliably tracked, accessed, and reviewed. Such\nrecords shall be made available, upon request, to the person in custody and their legal team,\nconsistent with applicable law.\ne. The Department shall commence legal video teleconferences within 10 minutes of their\nscheduled start time. Any delays by the Department, regardless of their reason, shall not be\ncounted towards the time allotted for video teleconferences. In the event of delay caused by the\nDepartment, the video teleconferences shall be extended by the amount of time lost due to the\ndelay. Under no circumstances shall delays associated with one individual’s video teleconference\nshorten or compromise the duration of video teleconferencing opportunities for persons\nscheduled thereafter.\n(iv) The Department shall designate amongst staff a Legal Visit Liaison at each jail\nfacility, who is responsible for addressing any issues that arise during legal visits in real time and\nwho is available and on-site to support attorneys or attorney assistants during scheduled legal\n\nvisiting hours. The Legal Visit Liaison shall have their name and contact information posted\nonline, in each legal visit space, and in the counsel waiting area of each jail facility.\n(v) The Department shall record the time when an attorney or attorney assistant arrived at\nthe counsel waiting area, and shall alert the Legal Visit Liaison after 30 minutes have elapsed\nsince the time they arrived at the jail facility or 45 minutes from the time they arrived at a\nstandalone reception building. The Legal Visit Liaison shall then expedite the legal visit process,\nand shall investigate and record the length and reason given for the delay. A written report of the\nresults of this investigation shall be submitted to the Criminal Justice Bureau, or an equivalent\nentity, and be available to the attorney or attorney assistant upon request. The Department shall\nalso submit to the Board of Correction, on a quarterly basis, a written report containing: the total\nnumber of instances in which delays occurred during the reporting period, a description of the\nreasons for each such delay, and the outcomes of any investigations related to such delay,\nincluding any corrective actions taken.\n(vi) The Department shall allow, but not require, individuals to schedule legal visits with\npersons in custody in advance of the visit pursuant to the online scheduling system outlined in\nAC § 9-170 upon its effective date.\n(2) The Department may limit visits to any attorney of record, or an attorney with a court\nnotice for individuals undergoing examination for competency pursuant to court order.\n(3) (2) Each facility shall maintain a specially-designated area to host legal visits.\n(i) Visits between people in custody and attorneys shall be kept confidential and\nprotected, in accordance with provisions of 40 RCNY § 1-09. The Department shall not monitor\ncommunications during the legal visit and shall not interrupt the legal visit.\n(ii) Legal visits shall be permitted at least eight hours per day between 8 a.m. and 8 p.m.\nDuring business days, four (4) of those hours shall be 8 a.m. to 10 a.m., and 6 p.m. to 8 p.m. The\nDepartment shall maintain and post the schedule of legal visiting hours at each facility.\n(iii) The legal visit space shall contain multiple attorney-client visiting rooms or booths,\nthat provide adequate seating, and which shall each be individually soundproofed to ensure all\ncommunications during legal visits are private and confidential in accordance with provisions of\n40 RCNY § 1-09. When there are medical concerns that require a legal visit to be conducted with\nno physical contact and only using a telephone, the legal visit space shall include at least two\ntelephone lines for attorneys and attorney assistants and provide adequate seating. Unless\nmedical concerns require such a no-contact, telephone-only visit, the Department must provide\nalternative accommodations that allow unrestricted, confidential as per 40 RCNY § 1-09, and\ndirect verbal communication without telephones to ensure confidential and effective\ncommunication.\n\n(iv) The legal visit space shall allow the person in custody to freely communicate with\nmembers of the legal team and jointly view evidence and legal documents without impediment.\n(v) The legal visit space and any booths provided to persons in custody for either\nin-person or scheduled videoconferences shall be well-ventilated and climate-controlled.\n(vi) The Department shall provide a clear, easily accessible mechanism for attorneys or\nattorney assistants to notify and request assistance from Department staff for requests such as an\nexit from a legal visit. Any such mechanism or procedure shall not infringe upon the\nconfidentiality of the legal visit.\n(4) (3) Mail between people in custody and attorneys shall not be delayed, read, or interfered\nwith in any manner, except as provided in 40 RCNY § 1-11.\n(5) (4) Telephone communications between people in custody and attorneys shall be kept\nconfidential and protected, in accordance with the provisions of 40 RCNY § 1-10.\n(5) When the Department receives a subpoena duces tecum requesting disclosure of any\nrecorded phone calls, the Department shall adhere to CPL § 610.20 and § 610.25, including any\nrequirements regarding where to send subpoenaed evidence. In accordance with these\nprovisions, the Department shall not return subpoenaed evidence directly to a requesting agency\nwithout specific instructions from the relevant local court with jurisdiction over the criminal or\ncivil matter.\n(d) Access to co-defendants. Upon reasonable request, regular visits shall be permitted\nbetween people awaiting trial and all of their co-defendants who consent to such visits. If any of\nthe co-defendants are incarcerated, the Department may require that an attorney of record be\npresent and teleconferencing shall be used, if available.\n(e) Attorney assistants.\n(1) Attorney assistant, as defined in § 1-08 (a)(1), Law students, legal paraprofessionals,\nand other attorney assistants working under the supervision of an attorney representing a person\nin custody shall be permitted to communicate with that person by mail, telephone and personal\nvisits, to the same extent and under the same conditions that the attorney may do so for the\npurpose of representing the individual, and need not be accompanied by the attorney during any\nvisit or other communication. Attorney assistants Law students, legal paraprofessionals and other\nattorney assistants working under the supervision of an attorney contacted by a person in custody\nshall be permitted to communicate with that individual by mail, telephone, or personal visits to\nthe same extent and under the same conditions that the attorney may do so.\n(2) An attorney assistant may be required to present a letter of identification from the\nattorney to a designated official at the central office of the Department in order to obtain a\n\nfacility pass. A pass shall not be denied based upon any of the reasons listed in 40 RCNY §\n1-09(h)(1).\n(3) The pass shall permit the assistant to perform the functions listed in subdivision (e) of\nthis section. It may be revoked if specific acts committed by the legal assistant demonstrate the\nlegal assistant's threat to the safety and security of a facility. This determination must be made\npursuant to the procedural requirements of paragraphs (2), (4) and (5) of subdivision (h) of 40\nRCNY § 1-09.\n(f) Law libraries. Each facility shall maintain a properly equipped and staffed law library.\n(1) The law library shall be located in a separate area sufficiently free of noise and activity\nand with sufficient space and lighting to permit sustained research.\n(2) Each law library shall be open for a minimum of five (5) days per week including at\nleast one (1) weekend day. On each day a law library is open:\n(i) in facilities housing more than six hundred (600) people, each law library shall be\noperated for a minimum of ten (10) hours, of which at least eight (8) shall be during lock-out\nhours;\n(ii) in facilities housing six hundred (600) or fewer people, each law library shall be\noperated for a minimum of eight (8) and a half hours, of which at least six (6) and a half shall be\nduring lock-out hours;\n(iii) in all facilities, the law library shall be operated for at least three (3) hours between 6\np.m. and 10 p.m.; and\n(iv) the law library will be kept open for people's use on all holidays which fall on regular\nlaw library days except New Year's Day, July 4th, Thanksgiving, and Christmas. The law library\nmay be closed on holidays other than those specified provided that law library services are\nprovided on either of the two days of the same week the law library is usually closed. On\nholidays on which the law library is kept open, it shall operate for a minimum of eight (8) hours.\nNo changes to law library schedules shall be made without written notice to the Board of\nCorrection and shall be received at least five (5) business days before the planned change(s) is to\nbe implemented.\n(3) The law library schedule shall be arranged to provide access to people in custody during\ntimes of the day when other activities such as recreation, commissary, meals, school, sick call,\netc., are not scheduled. Where such considerations cannot be made, people shall be afforded\nanother opportunity to attend the law library at a later time during the day.\n(4) Each person in custody shall be granted access to the law library for a period of at least\ntwo (2) hours per day on each day the law library is open. Upon request, extra time may be\nprovided as needed, space and time permitting. In providing extra time, people who have an\n\nimmediate need for additional time, such as people on trial and those with an impending court\ndeadline shall be granted preference.\n(5) Notwithstanding the provisions of paragraph (f)(4), people housed for medical reasons\nin the contagious disease units may be denied access to the law library. An alternative method of\naccess to legal materials shall be instituted to permit effective legal research.\n(6) The law library hours for people in restrictive housing as defined in 40 RCNY Chapter 6\nmay be reduced or eliminated, provided that an alternative method of access to legal materials is\ninstituted to permit effective legal research.\n(7) Legal research classes for people housed in general population shall be conducted at\neach facility on at least a quarterly basis. Legal research training materials shall be made\navailable upon request to people in restrictive housing.\n(8) The Department shall report annually to the Board detailing the resources available at\nthe law library at each facility, including a list of titles and dates of all law books and periodicals\nand the number, qualifications and hours of English and Spanish-speaking legal assistants.\n(g) Legal documents and supplies.\n(1) Each law library shall contain necessary research and reference materials which shall be\nkept properly updated and supplemented and shall be replaced without undue delay when\nmaterials are missing or damaged.\n(2) People in custody shall have reasonable access to typewriters, dedicated word\nprocessors, and photocopiers for the purpose of preparing legal documents. A sufficient number\nof operable typewriters, dedicated word processors, and photocopy machines will be provided\nfor people's use.\n(3) Legal clerical supplies, including pens, legal paper and pads shall be made available for\npurchase by people in custody. Such legal clerical supplies shall be provided to indigent\nindividuals at Department expense.\n(4) Unmarked legal forms which are commonly used by people in custody shall be made\navailable. Each person shall be permitted to use or make copies of such forms for the person's\nuse.\n(h) Law library staffing.\n(1) During all hours of operation, each law library shall be staffed with trained civilian legal\ncoordinator(s) to assist people with the preparation of legal materials. Legal coordinator\ncoverage shall be provided during extended absences of the regularly assigned legal\ncoordinator(s).\n\n(2) Each law library shall be staffed with an adequate number of permanently assigned\ncorrection officers knowledgeable of law library procedures.\n(3) Spanish-speaking people in custody shall be provided assistance in use of the law library\nby employees fluent in the Spanish language on an as needed basis.\n(i) Number of legal documents and research materials.\n(1) People in custody shall be permitted to purchase and receive law books and other legal\nresearch materials from any source.\n(2) Reasonable regulations governing the keeping of materials in cells and the searching of\ncells may be adopted, but under no circumstances may people's legal documents, books, and\npapers be read or confiscated by correctional personnel without a lawful warrant. Where the\nspace in a cell is limited, an alternative method of safely storing legal materials elsewhere in the\nfacility is required, provided that a person in custody shall have regular access to these materials.\n(j) Limitation of access to law library.\n(1) People in custody may be removed from the law library if they disrupt the orderly\nfunctioning of the law library or do not use the law library for its intended purposes.\n(2) Any determination to limit a person's right of access to the law library shall be made in\nwriting and shall state the specific facts and reasons underlying such determination. A copy of\nthis determination, including the appeal procedure, shall be sent to the Board and to any person\naffected by the determination within one business day of the determination.\n(3) An alternative method of access to legal materials shall be instituted to permit effective\nlegal research for any person excluded from the law library. A legal coordinator shall visit any\nexcluded person to determine his or her law library needs upon request.\n(4) Any person affected by a determination made pursuant to this subdivision (j) may appeal\nsuch determination to the Board.\n(i) The person affected by a determination shall give notice in writing to the Board and to\nthe Department of his or her intent to appeal the determination.\n(ii) The Department and any person affected by the determination may submit to the\nBoard for its consideration any relevant material in addition to the written determination.\n(iii) The Board or its designee shall issue a written decision upon the appeal within five\n(5) business days after receiving notice of the requested review.\n(Amended City Record 6/9/2021, eff. 7/9/2021; amended City Record 6/28/2024, eff. 7/28/2024)","12":"§ 1-08 Access to Courts and Legal Services.\n(a) Policy. People in custody are entitled to access to courts, attorneys, legal assistants\nattorney assistants and legal materials.\n(1) Attorney assistants are law students, legal paraprofessionals, social workers,\ninvestigators, interpreters, and other individuals part of a legal team working under the\nsupervision of an attorney representing a person in custody.\nRationale: Changing the term “legal assistant” to “attorney assistant” maintains\nconsistency with other parts of the Minimum Standards, such as § 1-08(e). Additionally, legal\nassistant is currently an undefined term. The modified definition of attorney assistant clarifies\nthat all members of an individual’s legal team are included under this term.\n(b) Judicial and administrative proceedings.\n(1) People in custody shall not be restricted in their communications with courts or\nadministrative agencies pertaining to either criminal or civil proceedings except pursuant to a\ncourt order.\n(2) Timely transportation shall be provided to people scheduled to appear before courts or\nadministrative agencies. Vehicles used to transport people in custody must meet all applicable\nsafety and inspection requirements and provide adequate ventilation, lighting and comfort.\n(c) Access to counsel.\n(1) People in custody shall not be restricted in their communication with attorneys or\nattorney assistants and shall not have their communications recorded. The fact that someone is\nrepresented by one attorney shall not be grounds for preventing that person from communicating\nwith other attorneys. Any properly identified attorney or attorney assistant may visit any person\nin custody with that person's consent. Any legal visits or legal telephone calls shall not be\nincluded in calculating the total number of visits or calls to which someone in custody is entitled.\nRationale: The Department is already prohibited from recording legal calls, yet many\ninstitutional providers report that legal counsel are often not added to the Department’s Do Not\nRecord list, or that even when they are, their calls are still unlawfully recorded. Codifying this\nrequirement is essential to ensure consistent compliance and oversight to protect attorney-client\nprivilege. Further, persons in custody have limited time with which they can communicate with\nfamily or other loved ones—one of the few privileges granted in jail. Any attorney phone call\nshould not count towards a person in custody’s permissible number of phone calls . DOC’s own\nDirective 6002 already states this but the Department is not following this directive in practice,\nwhich means they need to be held to a higher standard by an independent oversight\nbody—namely the Board.\n\n(i) An attorney may be required to present identification to a designated official at the\ncentral office of the Department in order to obtain a facility pass. This pass shall permit the\nattorney to visit any person in the custody of the Department.\n(ii) The Department only may require such identification as is normally possessed by an\nattorney.\n(iii) The Department shall promulgate standardized and efficient legal visit protocols,\nwhich shall be posted online, in the legal visit space, and in the counsel waiting area of each jail\nfacility. All relevant Department staff shall be trained biannually on the legal visit protocols.\na. The Department shall commence every in-person legal visit within 30 minutes of the\ntime that such attorney or attorney assistant registers at the jail facility or 45 minutes from their\narrival at a stand-alone reception building unless a change of count is in progress or a discrete\nemergency exists that prevents the person in custody from being moved. In the event that a\ncounsel visit is precluded due to an emergency lock-in, the Department shall immediately notify\nthe legal visitor, the designated contact for each defense office, and the attorney of record who\nrepresents the person. Routine operational delays, extraordinary staffing shortages, and\nconditions in housing units other than where the person in custody is held do not constitute an\nemergency. If the attorney or attorney assistant has multiple in-person visits on the same day,\nafter the initial visit any subsequent visits on the same day shall commence within 30 minutes of\nthe conclusion of the prior visit, or if the person in custody is in a different facility, then within\n30 minutes of the attorney or attorney assistant arriving at the next facility.\nRationale: This section addresses the extreme delays and difficulties for legal counsel to\nvisit their clients. Such delays infringe upon an individual’s right to counsel and impede an legal\ncounsel’s ability to meet with multiple clients during the hours permitted for legal visits. To that\nend, this section also creates a standardized procedure for legal visits when the legal visitor is\nvisiting multiple people in custody on the same day. The purpose of this section is to provide\nefficiency regarding legal visit procedures, and establish jail procedures for legal visits ensuring\nconsistent access to counsel, protecting constitutional rights, and promoting accountability.\nb. Attorneys or attorney assistants shall not be required to wait outside a facility unless\nadequate shelter is provided and the requirements of 40 RCNY § 1-09(b)(4) are met. The\nDepartment shall not require attorneys or attorney assistants to wait inside locked rooms or cells\nor any other area that lacks either immediate access to restrooms or Department personnel to\nassist them. The legal visit waiting area shall be by the entrance of the facility and any attorney\nor attorney assistant shall be allowed to leave the facility from the waiting area without\npermission or escort from staff.\n\nRationale: The Department has often forced attorneys and attorney assistants to wait in\nhighly problematic conditions. It is incumbent on the Board to circumscribe the basic standards\nof the waiting area. There are numerous reports of attorneys and attorney assistants being locked\ninside windowless rooms without access to either bathrooms, water, or means of communication\nwith personnel that could assist them. Reports include attorneys and attorney assistants being\nlocked in rooms for hours with no ability to leave or contact anyone within the facility. There\nhave additionally been reports of attorney and attorney assistants being forced to wait outside\nfacilities for an hour or more during extreme weather in order to visit their clients. These\nincidents have happened both before and after client visits. Attorneys and attorney assistants\nshould have access to basic needs for the entirety of their visit to a detention facility.\nc. The person in custody shall be notified that an attorney or attorney assistant has\narrived, and they shall either be provided a pass or be escorted to the legal counsel visiting area\nimmediately upon notification unless a change of count is in progress or an emergency exists that\nprevents the person in custody from being moved. Routine operational delays, extraordinary\nstaffing shortages, and conditions in housing units other than where the person in custody is held\ndo not constitute an emergency. The person in custody shall be allowed to pick up legal material\nfor the visit, and if this causes a delay, it shall be noted as a reason for the delay with the Legal\nVisit Liaison.\nRationale: People in custody have complained that they are not notified when their\nattorneys or attorney assistants arrive for a legal visit. Even though Directive 6002 lays out\nsimilar procedures, showing that the Department is able to comply with such procedures, in\npractice they are not followed. This is why it is important to codify them here.\nd. The Department shall establish and maintain clear and consistent procedures for\ndocumenting refusals of legal visits. Any written or video-recorded refusals shall be retained as\nan agency record. The Department shall ensure that refusal documentation is logged and stored\nin a consistent manner so that records may be reliably tracked, accessed, and reviewed. Such\nrecords shall be made available, upon request, to the person in custody and their legal team,\nconsistent with applicable law.\nRationale: Requiring the Department to consistently document, retain, log, and store\nrefusals in a designated and centralized location ensures that such documents remain accessible.\nStandardized recordkeeping makes refusal records easier to track and access upon request.\nCurrent procedures are opaque and the Department has previously asserted that they could not\nlocate a refusal slip. This system ensures that they will be easier to locate.\ne. The Department shall commence legal video teleconferences within 10 minutes of their\nscheduled start time. Any delays by the Department, regardless of their reason, shall not be\ncounted towards the time allotted for video teleconferences. In the event of delay caused by the\nDepartment, the video teleconference shall be extended by the amount of time lost due to the\ndelay. Under no circumstances shall delays associated with one individual’s video teleconference\n\nshorten or compromise the duration of video teleconferencing opportunities for persons\nscheduled thereafter.\nRationale: Video teleconferences are a crucial aspect of an individual’s access to counsel,\nand since they are scheduled in advance, there should be a limited window for delays. There\nhave been numerous reports of attorneys and attorney assistants waiting over an hour so that\ntheir client could be produced for their video teleconferences, as well as instances of clients not\nbeing produced at all. If there are delays, that time should not be counted towards an individual’s\ntime allotted for their legal video teleconferences. Additionally, if there are delays with an\nindividual’s video teleconference this should not impact any other person’s video teleconference\nafterwards.\n(iv) The Department shall designate amongst staff a Legal Visit Liaison at each jail\nfacility, who is responsible for addressing any issues that arise during legal visits in real time and\nwho is available and on-site to support attorneys or attorney assistants during scheduled legal\nvisiting hours. The Legal Visit Liaison shall have their name and contact information posted\nonline, in each legal visit space, and in the counsel waiting area of each jail facility.\nRationale: As has been described, issues consistently arise during legal visits. Currently,\nthere is no remediation process. To address reports of legal visits violating existing departmental\ndirectives, and any future violations of the Minimum Standards, the Department should designate\nan individual from their staff to serve as a Legal Visit Liaison at each jail facility. This will create\na point-of-contact for attorneys and attorney assistants to report any issues and shall allow for a\nmore centralized system.\n(v) The Department shall record the time when an attorney or attorney assistant arrived at\nthe counsel waiting area, and shall alert the Legal Visit Liaison after 30 minutes have elapsed\nsince the time they arrived at the jail facility or 45 minutes from the time they arrived at a\nstandalone reception building. The Legal Visit Liaison shall then expedite the legal visit process,\nand shall investigate and record the length and reason given for the delay. A written report of the\nresults of this investigation shall be submitted to the Criminal Justice Bureau, or an equivalent\nentity, and be available to the attorney or attorney assistant upon request. The Department shall\nalso submit to the Board of Correction, on a quarterly basis, a written report containing: the total\nnumber of instances in which delays occurred during the reporting period, a description of the\nreasons for each such delay, and the outcomes of any investigations related to such delay,\nincluding any corrective actions taken.\nRationale: This lays out the process to redress the aforementioned delays. Currently, the\nDepartment’s procedure appears inconsistent, if it exists at all. Institutional defenders\nconsistently have problems alerting Departmental staff to visitation problems, and often staff is\nunaware of what procedures exist or whom to contact. Therefore, this section creates a more\ncentralized, efficient, and transparent system, and allows for better oversight regarding any\naccess to counsel issues stemming from visitation problems.\n\n(vi) The Department shall allow, but not require, individuals to schedule legal visits with\npersons in custody in advance of the visit pursuant to the online scheduling system outlined in\nAC § 9-170 upon its effective date.\nRationale: AC § 9-170 establishes a procedure for scheduling in-person and video\nteleconferences with persons in custody and this section would allow, but not require, attorneys\nand attorney assistants to utilize this scheduling system for legal visits.\n(2) The Department may limit visits to any attorney of record, or an attorney with a court\nnotice for individuals undergoing examination for competency pursuant to court order.\nRationale: This rule impedes clients’ access to counsel in several common scenarios.\nMany clients will have a legal team that extends beyond the attorney of record on file with the\ncourt. It is common among institutional providers to assign a second chair attorney. That attorney\nis not the named attorney of record, but may need to visit the client without the attorney of\nrecord being present. Further, if a client’s case is reassigned to another attorney at the same office\nbetween court dates, this rule would prevent the client’s new attorney from visiting them.\nMoreover, clients seeking counsel on potential civil claims may receive visits from attorneys\nwho have not yet been retained, and therefore would not be considered an attorney of record.\nFinally, the broad wording of this rule creates the risk that Department staff may rely on it to\nrefuse visits by attorney assistants like social workers, investigators, and paralegals, when they\nare not accompanied by the attorney of record. This is a tremendous barrier to clients’ access to\ncounsel and their ability to receive robust representation by a complete legal team.\n(3) (2) Each facility shall maintain a specially-designated area to host legal visits.\nRationale: There have been numerous reports that certain facilities do not have an\nappropriate area to host legal visits. For example, the RESH legal visit area is simply two\nrepurposed adjoining cells with a plexiglass window constructed in between. It is extremely\ndifficult to hear between this partition. In addition, there is no way to alert Department staff\nwhen the visit is over, often forcing attorneys and attorney visitors to bang on the door until\nsomeone - usually a person in custody - notifies a correction officer. The text below will establish\nclear, basic standards for the attorney visit space, and will also ensure that legal visits are kept\nconfidential and protected in accordance with 40 RCNY § 1-09.\n(i) Visits between people in custody and attorneys shall be kept confidential and\nprotected, in accordance with provisions of 40 RCNY § 1-09. The Department shall not monitor\ncommunications during the legal visit and shall not interrupt the legal visit.\nRationale: In order to ensure and maintain confidentiality during a legal visit, the\nDepartment cannot be allowed to monitor or interrupt the visit.\n\n(ii) Legal visits shall be permitted at least eight hours per day between 8 a.m. and 8 p.m.\nDuring business days, four (4) of those hours shall be 8 a.m. to 10 a.m., and 6 p.m. to 8 p.m. The\nDepartment shall maintain and post the schedule of legal visiting hours at each facility.\n(iii) The legal visit space shall contain multiple attorney-client visiting rooms or booths,\nthat provide adequate seating, and which shall each be individually soundproofed to ensure all\ncommunications during legal visits are private and confidential in accordance with provisions of\n40 RCNY § 1-09. When there are medical concerns that require a legal visit to be conducted with\nno physical contact and only using a telephone, the legal visit space shall include at least two\ntelephone lines for attorneys and attorney assistants and provide adequate seating. Unless\nmedical concerns require such a no-contact, telephone-only visit, the Department must provide\nalternative accommodations that allow unrestricted, confidential as per 40 RCNY § 1-09, and\ndirect verbal communication without telephones to ensure confidential and effective\ncommunication.\n(iv) The legal visit space shall allow the person in custody to freely communicate with\nmembers of the legal team and jointly view evidence and legal documents without impediment.\nRationale: The legal visit space must provide adequate seating for multiple members of\nan individual’s legal team to consult with their client and share legal documents. If not enough\nseating is provided, people in custody will be limited in their access to counsel. In addition, in\norder to comply with requirements for confidentiality, each legal visit space must be separated\nfrom others, and be soundproofed so that conversations are private. Institutional defenders have\nreported having issues communicating with clients at the West Facility because booths only have\none phone, and therefore communication is limited to one person at a time. In order to avoid\nsuch limitations to access to counsel, the Department must provide alternative accommodations\nso that the person in custody can speak to legal counsel without obstructions.\n(v) The legal visit space and any booths provided to persons in custody for either\nin-person or scheduled videoconferences shall be well-ventilated and climate-controlled.\nRationale: The legal visit space and booth must be comfortable enough for the attorney or\nattorney assistant and the person in custody to be able to remain in the space for the duration of\nthe visit. This comes in response to complaints of spaces that are so physically uncomfortable\nthat individuals cannot remain in the space and have to shorten their legal visits. This is a\nviolation of a person’s access to counsel, as the physical space becomes an impediment for\npeople in custody to access their attorneys and legal team.\n(vi) The Department shall provide a clear, easily accessible mechanism for attorneys or\nattorney assistants to notify and request assistance from Department staff for requests such as an\nexit from a legal visit. Any such mechanism or procedure shall not infringe upon the\nconfidentiality of the legal visit.\n\nRationale: Attorney and attorney assistants have had difficulties notifying Department\nstaff to various requests, such as an exit from their legal visit.\n(4) (3) Mail between people in custody and attorneys shall not be delayed, read, or interfered\nwith in any manner, except as provided in 40 RCNY § 1-11.\n(5) (4) Telephone communications between people in custody and attorneys shall be kept\nconfidential and protected, in accordance with the provisions of 40 RCNY § 1-10.\n(5) When the Department receives a subpoena duces tecum requesting disclosure of any\nrecorded phone calls, the Department shall adhere to CPL § 610.20 and § 610.25, including any\nrequirements regarding where to send subpoenaed evidence. In accordance with these\nprovisions, the Department shall not return subpoenaed evidence directly to a requesting agency\nwithout specific instructions from the relevant local court with jurisdiction over the criminal or\ncivil matter.\nRationale: The Department needs to comply with Criminal Procedure Law § 610.20 and\n§ 610.25 in regards to disclosures of recorded phone calls. In People v. Natal, 75 N.Y.2d 379,\n385 (1990) the Court held that District Attorneys may not issue subpoenas except through the\nprocess of the court. Institutional providers have documented how the Department has\nunlawfully provided recorded phone calls directly to the District Attorney, in violation of\nrelevant laws. By circumventing the courts, the District Attorney avoids the protections against\nabuses of the subpoena process, and jail facilities should not be allowed to assist in such\nunlawful activities.\n(d) Access to co-defendants. Upon reasonable request, regular visits shall be permitted\nbetween people awaiting trial and all of their co-defendants who consent to such visits. If any of\nthe co-defendants are incarcerated, the Department may require that an attorney of record be\npresent and teleconferencing shall be used, if available.\n(e) Attorney assistants.\n(1) Attorney assistant, as defined in § 1-08 (a)(1), Law students, legal paraprofessionals,\nand other attorney assistants working under the supervision of an attorney representing a person\nin custody shall be permitted to communicate with that person by mail, telephone and personal\nvisits, to the same extent and under the same conditions that the attorney may do so for the\npurpose of representing the individual, and need not be accompanied by the attorney during any\nvisit or other communication. Attorney assistants Law students, legal paraprofessionals and other\nattorney assistants working under the supervision of an attorney contacted by a person in custody\nshall be permitted to communicate with that individual by mail, telephone, or personal visits to\nthe same extent and under the same conditions that the attorney may do so.\n\nRationale: This amendment makes clear that people in custody have the same rights to\naccess attorney assistants, as defined in §1-08(a)(1), integral members of their legal team, as\nthey do their attorney of record.\n(2) An attorney assistant may be required to present a letter of identification from the\nattorney to a designated official at the central office of the Department in order to obtain a\nfacility pass. A pass shall not be denied based upon any of the reasons listed in 40 RCNY §\n1-09(h)(1).\n(3) The pass shall permit the assistant to perform the functions listed in subdivision (e) of\nthis section. It may be revoked if specific acts committed by the legal assistant demonstrate the\nlegal assistant's threat to the safety and security of a facility. This determination must be made\npursuant to the procedural requirements of paragraphs (2), (4) and (5) of subdivision (h) of 40\nRCNY § 1-09.\n(f) Law libraries. Each facility shall maintain a properly equipped and staffed law library.\n(1) The law library shall be located in a separate area sufficiently free of noise and activity\nand with sufficient space and lighting to permit sustained research.\n(2) Each law library shall be open for a minimum of five (5) days per week including at\nleast one (1) weekend day. On each day a law library is open:\n(i) in facilities housing more than six hundred (600) people, each law library shall be\noperated for a minimum of ten (10) hours, of which at least eight (8) shall be during lock-out\nhours;\n(ii) in facilities housing six hundred (600) or fewer people, each law library shall be\noperated for a minimum of eight (8) and a half hours, of which at least six (6) and a half shall be\nduring lock-out hours;\n(iii) in all facilities, the law library shall be operated for at least three (3) hours between 6\np.m. and 10 p.m.; and\n(iv) the law library will be kept open for people's use on all holidays which fall on regular\nlaw library days except New Year's Day, July 4th, Thanksgiving, and Christmas. The law library\nmay be closed on holidays other than those specified provided that law library services are\nprovided on either of the two days of the same week the law library is usually closed. On\nholidays on which the law library is kept open, it shall operate for a minimum of eight (8) hours.\nNo changes to law library schedules shall be made without written notice to the Board of\nCorrection and shall be received at least five (5) business days before the planned change(s) is to\nbe implemented.\n(3) The law library schedule shall be arranged to provide access to people in custody during\ntimes of the day when other activities such as recreation, commissary, meals, school, sick call,\n\netc., are not scheduled. Where such considerations cannot be made, people shall be afforded\nanother opportunity to attend the law library at a later time during the day.\n(4) Each person in custody shall be granted access to the law library for a period of at least\ntwo (2) hours per day on each day the law library is open. Upon request, extra time may be\nprovided as needed, space and time permitting. In providing extra time, people who have an\nimmediate need for additional time, such as people on trial and those with an impending court\ndeadline shall be granted preference.\n(5) Notwithstanding the provisions of paragraph (f)(4), people housed for medical reasons\nin the contagious disease units may be denied access to the law library. An alternative method of\naccess to legal materials shall be instituted to permit effective legal research.\n(6) The law library hours for people in restrictive housing as defined in 40 RCNY Chapter 6\nmay be reduced or eliminated, provided that an alternative method of access to legal materials is\ninstituted to permit effective legal research.\n(7) Legal research classes for people housed in general population shall be conducted at\neach facility on at least a quarterly basis. Legal research training materials shall be made\navailable upon request to people in restrictive housing.\n(8) The Department shall report annually to the Board detailing the resources available at\nthe law library at each facility, including a list of titles and dates of all law books and periodicals\nand the number, qualifications and hours of English and Spanish-speaking legal assistants.\n(g) Legal documents and supplies.\n(1) Each law library shall contain necessary research and reference materials which shall be\nkept properly updated and supplemented and shall be replaced without undue delay when\nmaterials are missing or damaged.\n(2) People in custody shall have reasonable access to typewriters, dedicated word\nprocessors, and photocopiers for the purpose of preparing legal documents. A sufficient number\nof operable typewriters, dedicated word processors, and photocopy machines will be provided\nfor people's use.\n(3) Legal clerical supplies, including pens, legal paper and pads shall be made available for\npurchase by people in custody. Such legal clerical supplies shall be provided to indigent\nindividuals at Department expense.\n(4) Unmarked legal forms which are commonly used by people in custody shall be made\navailable. Each person shall be permitted to use or make copies of such forms for the person's\nuse.\n(h) Law library staffing.\n\n(1) During all hours of operation, each law library shall be staffed with trained civilian legal\ncoordinator(s) to assist people with the preparation of legal materials. Legal coordinator\ncoverage shall be provided during extended absences of the regularly assigned legal\ncoordinator(s).\n(2) Each law library shall be staffed with an adequate number of permanently assigned\ncorrection officers knowledgeable of law library procedures.\n(3) Spanish-speaking people in custody shall be provided assistance in use of the law library\nby employees fluent in the Spanish language on an as needed basis.\n(i) Number of legal documents and research materials.\n(1) People in custody shall be permitted to purchase and receive law books and other legal\nresearch materials from any source.\n(2) Reasonable regulations governing the keeping of materials in cells and the searching of\ncells may be adopted, but under no circumstances may people's legal documents, books, and\npapers be read or confiscated by correctional personnel without a lawful warrant. Where the\nspace in a cell is limited, an alternative method of safely storing legal materials elsewhere in the\nfacility is required, provided that a person in custody shall have regular access to these materials.\n(j) Limitation of access to law library.\n(1) People in custody may be removed from the law library if they disrupt the orderly\nfunctioning of the law library or do not use the law library for its intended purposes.\n(2) Any determination to limit a person's right of access to the law library shall be made in\nwriting and shall state the specific facts and reasons underlying such determination. A copy of\nthis determination, including the appeal procedure, shall be sent to the Board and to any person\naffected by the determination within one business day of the determination.\n(3) An alternative method of access to legal materials shall be instituted to permit effective\nlegal research for any person excluded from the law library. A legal coordinator shall visit any\nexcluded person to determine his or her law library needs upon request.\n(4) Any person affected by a determination made pursuant to this subdivision (j) may appeal\nsuch determination to the Board.\n(i) The person affected by a determination shall give notice in writing to the Board and to\nthe Department of his or her intent to appeal the determination.\n(ii) The Department and any person affected by the determination may submit to the\nBoard for its consideration any relevant material in addition to the written determination.\n\n(iii) The Board or its designee shall issue a written decision upon the appeal within five\n(5) business days after receiving notice of the requested review.\n(Amended City Record 6/9/2021, eff. 7/9/2021; amended City Record 6/28/2024, eff. 7/28/2024)","13":"New York City\nBoard of Correction\nFebruary 10, 2026\nPublic Meeting Minutes\nAttendees:\nMembers Present\nDwayne C. Sampson, Chair\nHelen Skipper, Vice Chair\nHon. Barry A. Cozier (Ret.), Member\nFelipe Franco, Member\nDr. Lauren Stossel, Member\nJude Torchenaud, Member\nDepartment of Correction (DOC)\nFrancis Torres, First Deputy Commissioner\nFritz Frage, Senior Deputy Commissioner\nJames Conroy, Deputy Commissioner of Legal Matters/General Counsel\nJames Boyd, Deputy Commissioner of Strategic Operations\nKevin Doherty, Deputy Commissioner of Facilities Maintenance\nPatrick Gallahue, Deputy Commissioner of Public Information\nRobert Van Pelt, Assistant Commissioner of Preparedness and Resilience\nJoseph Caputo, Acting Assistant Chief of Facility Operations\nNadia Jean-Francois, Executive Director, Intergovernmental Affairs & Special\nProjects\nNYC Health + Hospitals - Correctional Health Services (CHS)\nPatsy Yang, Dr. PH, Senior Vice President\nJeanette Merrill, Senior Assistant Vice President of Communications and\nExternal Affairs\n1\n\nCarlos Castellanos, Chief Operations Officer/Deputy Executive Director\nNancy Arias, RN, Chief Nursing Officer/Deputy Executive Director\nZachary Rosner, Chief of Medical Service\nJoseph Otonichar – Chief of Service, Mental Health\nNicole Levy, Director of Communications and Intergovernmental Affairs\nOthers in Attendance\nChaplain Dr. Victoria A. Phillips, Visionary V Ministries and JAC\nJennifer Parish, JAC/HALT\nChantelle Williams, NYCLU\nCasey Dalporto, NYCDS\nKhari Jenkins, NYCDS\nChristopher Boyle, NYCDS\nRoya Touran, NYCDS\nNatalie Fiorenzo, NYCDS\nJack Beck, HALT\nRichenda Kramer, HALT\nGabriella Fusaro, Hour Children\nVeronica Palma, Hour Children\nEmily Horowitz, Hour Children\nNickie Phillips, Hour Children\nVanessa Gutierrez, Hour Children\nAlexi Santander, Hour Children\nMargaret Camilletti, Disabled in Action\nAmerica Canas\nAlessandra Talabong\nBailey Hand\nAnna Kim\nMichael Klinger, Brooklyn Defenders\nApproval of February 10, 2026 meeting agenda\nChair Sampson stated that he would wait to start the meeting until the\nDepartment arrived. Upon being moved and seconded, the February 10, 2026\n2\n\nmeeting agenda was unanimously approved. See this portion of the video\nhere.\nApproval of the January 13, 2026 public meeting minutes\nUpon being moved and seconded, the January 13, 2026 minutes were\nunanimously approved. See this portion of the video here.\nPublic comment period – People in Custody (PIC)\nFive comments from people in custody were played. Chair Sampson stated\nthat he had personally witnessed some of the colder temperatures in West\nFacility, and Vice Chair Skipper requested the results of mold testing in\nRMSC’s Building 5. See this portion of the video here.\nExecutive Director updates\nExecutive Director Georges-Yilla shared condolences with the families and\nloved ones of Department staff who have passed since the Board’s January\nmeeting.\nRegarding census data, as of February 9, 2026, the approximate total census\nof people in custody was 6,817. As of February 9th, the census numbers by\nfacility were as follows: BHPW (59), EHPW (10), EMTC (1,379), GRVC (869),\nNIC (296), OBCC (1,413), RESH-ESH (116), RESH non-ESH (488), RMSC (449),\nRNDC (1,048), and WF (689). Please see this portion of the video here.\nRegarding reports, on January 21, 2026, the Board released a report detailing\nfindings and recommendations concerning the deaths of Benjamin Kelly,\nJames Maldonado, Christian Collado, Edwin Quispe, Ardit Billa, Jimmy Avila,\nand Carlos Cruz. The Board's report highlights 10 key findings and makes 13\nrecommendations to DOC and CHS regarding their policies and practices.\nDOC’s response is appended to the report. See this portion of the video here.\nThe full report can be viewed on the Board’s website.\nRegarding the suspension of the Board’s Minimum Standards, while some\nstandards remain suspended by court order in the Nunez litigation, additional\nprovisions are currently suspended by executive order. These prolonged\n3\n\nsuspensions have coincided with serious operational challenges, including\nthe opening of new restrictive housing units without full alignment with\nestablished oversight, due process, and notification requirements. When\nstandards are suspended—whether by executive order or court order—the\nBoard’s enforcement tools, particularly the variance process, are largely\nunavailable. Oversight continues, but without an enforceable regulatory\nbaseline for certain conditions of confinement.\nThe Board acknowledges and appreciates the Administration’s decision to\nmove away from the extended use of emergency executive orders suspending\nthe Board’s Minimum Standards and to focus instead on achieving full\ncompliance. The Board looks forward to working with the Department, the\nAdministration, and the Remediation Manager to restore and strengthen the\nMinimum Standards, support systemwide compliance, and advance a safe\nand lawful transition away from Rikers Island. See this portion of the video\nhere.\nRegarding Board concerns of DOC’s Constant Supervision operations, during\nthe week of December 4, 2025, the Board received information raising\nconcerns about conditions in the West Facility Contagious Disease Unit,\nknown as the CDU Sprungs. In response, Board staff conducted an\nindependent review that raised significant concerns about how constant\nsupervision was being applied and reviewed. Constant supervision is an\nimportant safety tool when used as intended.\nWhat the Board observed in December 2025 highlights the need for clearer\nstandards, regular review, meaningful clinical input, and stronger due process\nprotections. The Board shared the following recommendations with the\nDepartment in December:\n· Constant supervision must be time-limited and subject to regular,\ndocumented review\n· Directive 4021 should be clarified, particularly with respect to cell-\nbased housing\n4\n\n· Clinical input must meaningfully inform decisions about continuation or\nremoval\n· Basic due process and access to mandated services must be ensured\nSee this portion of the video here.\nBoard statements regarding the Remediation Manager appointment,\nincoming and former DOC Commissioner\nVice Chair Skipper read prepared statements acknowledging and welcoming\nNicholas Deml as the incoming Remediation Manager. Vice Chair Skipper also\nwelcomed incoming DOC Commissioner Stanley Richards and thanked\nformer Commissioner Lynelle Maginley-Liddie for her service to the\nDepartment. See this portion of the video here.\nResolution initiating rulemaking (access to counsel)\nOn December 12, 2025, the Board received a joint petition for rulemaking\nconcerning proposed rules relating to access to counsel from New York\nCounty Defender Services, Brooklyn Defender Services, The Bronx Defenders,\nNeighborhood Defender Service of Harlem, and The Legal Aid Society -\nCriminal Defense. Please see here to read the joint memorandum.\nExecutive Director Georges-Yilla read the draft resolution out loud for the\nBoard’s consideration. Upon being moved and seconded, the Board\nunanimously voted to approve the resolution. See this portion of the video\nhere.\nPlease see here for the approved resolution concerning proposed rules\nrelating to access to counsel.\nDOC update on emergency preparedness—power outage, service\ndisruptions, and winter storm\nFirst Deputy Commissioner Francis Torres explained preemptive measures\nthe Department took to prepare for the winter storm and other weather-\nrelated possible issues. First Deputy Commissioner Torres did express that\n5\n\nunforeseen challenges did arise from the severe weather conditions, but the\nDepartment acted quickly to ensure stable operations continued on Rikers\nIsland. See this portion of the video here.\nBoard Member Stossel requested additional information about continuous\ntemperature monitoring and data tracking when temperatures have fallen\nbelow legally acceptable temperatures. Board Members Stossel and Franco\nand Vice Chair Skipper asked questions about the Department’s recent\nchange in thermal policy. Board Member Stossel also inquired about the\nnumber of inoperable windows in the facilities, as this has a negative impact\non temperature. See this portion of the video here.\nDOC briefing on the implementation of death report recommendations\nActing Assistant Chief of Facility Operations Joseph Caputo discussed touring\nprocedures, trainings, staffing levels, and the potential for disciplinary\nmeasures when things go awry. Acting Assistant Chief Caputo stated that the\nDepartment acknowledges that there is more work to be done, but the\nDepartment is committed to running well-maintained and well-managed jails.\nSee this portion of the video here.\nBoard Member Stossel stressed that touring has not been happening\nconsistently or adequately for years, stating that she isn’t sure if it is a\nsupervisory issue or an accountability issue, but a robust corrective action\nplan needs to be put in place. Vice Chair Skipper requested specific data\nregarding how often discipline is being imposed on staff members for not\ntouring. General Counsel James Conroy noted on record that there is not\nalways a direct causal relationship between touring issues and deaths in\ncustody. Executive Director Georges-Yilla asked General Counsel Conroy if the\nDepartment was asked not to investigate itself, and General Counsel Conroy\nstated that they are awaiting a notification that the investigation has been\ncompleted or will require a further investigation. See this portion of the video\nhere.\nDOC briefing on Constant Supervision operations\n6\n\nSenior Deputy Commissioner Fritz Frage stated that the Department took\nBoard concerns seriously and after conducting a review, the Department\ndetermined that the individuals on Constant Supervision status should not\nhave been issued smocks and corrective actions were taken. Senior Deputy\nCommissioner Frage stated that the Department has determined that the\ncurrent directive does not adequately distinguish between procedures for\nconstant supervision and suicide watch, so the directive will undergo updates\nonce leadership has finished transitioning. See this portion of the video here.\nBoard Member Stossel asked about the number of individuals on Constant\nSupervision status and where they are housed. She also asked questions\nabout instances where general population individuals would be housed in\nSprungs units in West Facility. After Senior Deputy Commissioner Frage stated\nthat it could occur for a totality of circumstances, including violence, Board\nMember Stossel stated that she was concerned that this meant that the\nSprungs were being used as restrictive housing. Board Member Stossel also\nrequested that the Board be included in the Directive revision process. See\nthis portion of the video here.\nCHS briefing on the implementation of death report recommendations\nChief of Mental Health Service Joseph Otonichar shared a presentation\noutlining the current CHS systems, procedures, and policies utilized for\nhospital-level care referrals. However, Chief Otonichar made it clear that\nhospital admission is ultimately determined by hospital providers, not CHS\nstaff. See this portion of the video here.\nVice Chair Skipper asked for a more detailed explanation of why admission is\nup to the hospital and how this impacts mental health service for individuals\non Rikers Island. Senior Vice President Patsy Yang then gave an overview of\nthe relationship between CHS and NYC Health and Hospitals. See this portion\nof the video here.\nCHS briefing on Constant Supervision\n7\n\nChief of Mental Health Service Joseph Otonichar continued his presentation\nto share information about suicide watch assessments, policies, and\nprocedures. See this portion of the video here.\nVice Chair Skipper voiced confusion about the similarities or differences\nbetween Constant Supervision and Suicide Watch, which was later clarified\nthat Constant Supervision is a Department term. See this portion of the video\nhere.\nCHS’ overview of the City’s reopening of the “Just Home” program\nSenior Vice President Patsy Yang expressed excitement at the potential of the\ngroundbreaking “Just Home” program to aid people with a range of severe\nmedical issues in permanent supportive housing. Senior Assistant Vice\nPresident of Communications and External Affairs Jeanette Merrill then\npresented on the “Just Home” program, highlighting how this program can\nhelp CHS’ medically complex patients spend less time on Rikers Island\nbecause there is a stable housing plan available upon their release. “Just\nHome” is projected to open for tenant occupancy in late 2027 or early 2028.\nSee this portion of the video here.\nBoard Member Stossel shared her excitement about this project and its\npotential for New York City. See this portion of the video here.\nPublic Comment\nDepartment staff departed the meeting at this time. The Board then heard in-\nperson public comments from Christopher Boyle, Natalie Fiorenzo, Michael\nKlinger, and Victoria A. Phillips. The Board heard a virtual public comment\nfrom Kayla Simpson. See this portion of the video here.\nThe Board’s next meeting is scheduled to take place on Tuesday, March 10,\n2026 at 1:00pm.\n8","14":"BOARD OF CORRECTION\nCITY OF NEW YORK\nRESOLUTION OF THE BOARD OF CORRECTION\nFEBRUARY 10, 2026 PUBLIC MEETING\nWHEREAS, New York City Charter § 626(e) authorizes the Board to “establish minimum\nstandards for the care, custody, correction, treatment, supervision, and discipline of all\npersons held or confined under the jurisdiction” of the Department of Correction (“DOC”\nor the “Department”);\nWHEREAS, Chapter 4 of Title 40 of the Rules of the City of New York (“RCNY”) allows\nfor any person or entity to petition the Board to consider the adoption of a rule and sets\nforth the procedures for submission, consideration, and disposition of such petitions;\nWHEREAS, on December 12, 2025, the Board received a joint petition for rulemaking\nconcerning proposed rules relating to access to counsel from New York County Defender\nServices, Brooklyn Defender Services, The Bronx Defenders, Neighborhood Defender\nService of Harlem, and The Legal Aid Society - Criminal Defense;\nWHEREAS, on February 6, 2026, the Board’s Chair notified the petitioners of the Board’s\nintention to initiate rulemaking at its regular meeting on February 10, 2026 with regard to\nthe petition submitted;\nNOW, THEREFORE, BE IT RESOLVED that the Board authorizes Board staff to draft\nthese proposed rules for the Board’s consideration and undertake all aspects of rulemaking\npursuant to the Citywide Administrative Procedure Act; and\nIT IS FURTHER RESOLVED that the Board shall not be bound by the language\nproposed, but may amend or modify such proposed language, and neither shall the Board\nbe bound to enact the substance of the submitted petition; and\nIT IS FURTHER AND FINALLY RESOLVED that a copy of this resolution be posted\nconspicuously on the Board’s website.\nAt the Board’s February 10, 2026 meeting, the Board voted unanimously to approve\nthe Resolution.","15":"49 Thomas Street, 10th Fl\nNew York, NY 10013\n(212) 577-3300\nwww.legal-aid.org\nAlan Levine\nPresident\nTwyla Carter\nFebruary 9, 2026 Attorney-in-Chief\nChief Executive Officer\nVia email Justine M. Luongo\nDwayne Sampson, Chair Attorney-in-Charge\nCriminal Practice\nJasmine Georges-Yilla, Executive Director\nThe New York City Board of Correction Mary Lynne Werlwas\n2 Lafayette, Ste 1221 Director\nPrisoners’ Rights Project\nNew York, NY 10007\nDear Chair Sampson, Executive Director Georges-Yilla, and Members of the Board:\nThe Legal Aid Society submits this comment on the Board of Correction’s proposal to amend §§2-\n05(b)(2)(i-ii) and 3-04(b)(2)(v)(A) of Title 40 of the Rules of the City of New York (“RCNY”), on\npsychotropic medication and tuberculosis screening, respectively; and to amend Chapters 2 and 3 of\nTitle 40 of the RCNY (hereinafter referred to as the Board’s “Minimum Standards” or “Standards”)\nto correct language and align variance procedures across all sections of the Standards, and remove\nreferences to seclusion.\nThe Legal Aid Society is the nation’s oldest and largest non-profit criminal defense and civil rights\nlaw firm. Legal Aid’s Criminal Defense Practice, which serves as the primary defender of low-income\npeople in New York City prosecuted in the state court system, hears daily from incarcerated people\nand their families about their experiences in DOC custody. In addition, since its inception 50 years\nago, the Prisoners’ Rights Project has investigated and remedied unconstitutional\nand unlawful conditions in the city jails through individual and class action lawsuits and\nadministrative advocacy. Our litigation has included reform of the systems for oversight of use\nof force and violence in the jails; relief from dangerous conditions such as fire risks, overcrowding,\nand unsafe sanitation; successful efforts to bring high school education to youth held in these adult\nfacilities; and redress of the failures of medical and mental health care systems that result in needless\ndeaths in custody. We routinely engage with the Board of Correction to ensure that they perform their\noversight role in promulgating and monitoring Minimum Standards for correctional practices in the\njails.\nWe welcome the Board’s initiative to update the minimum standards. Below, we offer comments\non the proposed rule changes which we believe will better effectuate the Board’s stated objectives and\nmore fully protect the rights of people in custody to adequate mental health treatment.\nMore broadly, we urge the Board to undertake a comprehensive rulemaking process concerning\nthe Health Care Minimum Standards. As the Board is well aware, thousands of people with complex\nmedical and mental health needs pass through the city jails each year. A majority of people on Rikers\nhave mental health conditions, with nearly a quarter of the jail population diagnosed with serious\nmental illness and an even higher proportion diagnosed with substance abuse disorders. Many people\nin the jails also live with serious and chronic medical conditions. In the time since the current rules\nwere adopted, new units have come online that were not explicitly contemplated by the minimum\n\nPage 2\nstandards and may warrant regulation. More urgently, DOC routinely fails to facilitate access to care\nresulting in unnecessary suffering and death. We urge the Board to engage with directly impacted\npeople and communities, advocates and healthcare experts in a fulsome rulemaking process focused\non improving access to quality medical and mental health treatment for New Yorkers in custody.\n1. Mental Health Standard § 2-06(b)(2)(i-ii); Psychotropic Medication\nLegal Aid welcomes the Board’s initiative to codify longstanding variances via rulemaking\nand supports aligning the cadence of psychiatry visits with current mental healthcare standards.\nHowever, the proposed rule lacks sp
