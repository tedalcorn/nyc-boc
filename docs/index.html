Health Authority must maintain a written plan [developed\nby the Department of Health and approved by the Department of Mental Health, Mental\nRetardation and Alcoholism Services] for the orientation, continuing education and\ntraining of all mental health services staff;\n(ii) in-service training shall include regular individual supervision of not less than\none hour per week and not less than one hour per week of continuing education to be\nprorated for part-time staff.\n(d) Observation aides.\nPage 9 of 56\n\n(1) There is to be an organized program of observation aides trained to monitor\nthose [inmates] people in custody identified as potential suicide risks as well as to\nrecognize warning signals of suicidal behavior in those [inmates] people not previously\nidentified as potential suicide risks. [the warning signals of suicidal behavior. Inmates]\nPeople in custody, including those housed in mental observation areas, may be\nemployed as observation aides and shall be paid for their services.\n(2) [Written] The Health Authority shall maintain written procedures [shall be\ndeveloped by the Department of Correction and Health, to be approved by the\nDepartment of Mental Health, Mental Retardation and Alcoholism Services] defining the\nselection criteria for observation aides, the training they shall receive, the procedures\nthey shall follow and the criteria for the evaluation of their performance as well as for\nterminating their employment where necessary:\n(i) in [developing] maintaining a program of observation aides, the Department of\nCorrection shall consult with the [Department of Health] Health Authority in order to\nprovide for coordination of effort between the two agencies;\n(ii) observation aides shall be trained to promptly inform correction or mental\nhealth services staff when they believe [an inmate] a person in custody poses a suicide\nrisk, presents an immediate danger of suicide or is engaging in bizarre behavior. This\ninformation shall be recorded in a systematic manner.\n(3) Observation aides shall operate in all correctional facilities in the following\nhousing areas: mental observation, [punitive segregation] restrictive housing,\nadministrative segregation or protective custody housing areas, intake areas, and new\nadmission. They shall be employed in other areas as required.\n§ 5. Section 2-04 of Title 40 of the Rules of the City of New York, as renumbered by\nthis rule, is amended to read as follows:\n§ 2-04 Diagnosis and Referral.\n(a) Policy. The [Departments] Department of Correction and [Health, with the\napproval of the Department of Mental Health, Mental Retardation and Alcoholism\nServices,] the Health Authority shall [develop] maintain procedures to provide for the\nprompt evaluation and appropriate referral of [inmates] people in custody whose\nbehavior suggests that they are suffering from a mental or emotional [disorder] health\nissue, as well as the immediate evaluation and treatment of those in need of emergency\npsychiatric care.\n(b) Access.\n(1) There is to be non-emergency access to mental health services. [Inmates]\nPeople in custody may refer themselves for preliminary evaluation, and they shall be\nseen by a member of mental health services staff as soon as possible but in no instance\nlater than three working days after receipt of referral by mental health services staff. The\nDepartment of Correction shall ensure that notice of the request is received by mental\nhealth services staff within twenty-four hours.\nPage 10 of 56\n\n(2) [Inmates] People in custody shall have twenty-four hour access to mental\nhealth services personnel for emergency psychiatric care and the management of acute\npsychiatric episodes:\n(i) all [inmates] people in custody who report having been sexually assaulted\nshall be referred for emergency assessment;\n(ii) [inmates] people in custody awaiting emergency evaluation are to be housed\nin a specially designated area with close staff supervision and nt of Mental Health, Mental Retardation and Alcoholism Services defining in\naccordance with current professional standards the mental health staff, supplies and\nequipment necessary to provide adequate mental health care.] The Health Authority\nshall maintain the mental health staff, supplies, and equipment necessary to provide\nadequate mental health care in accordance with current professional standards.\nPage 11 of 56\n\n(2) [The Departments of Health and Correction shall develop written criteria to be\napproved by the Department of Mental Health, Mental Retardation and Alcoholism\nServices defining in accordance with current professional standards the space\nnecessary to provide adequate and appropriate housing and treatment of inmates under\nthe care of mental health services.] The Health Authority shall maintain the space\nnecessary to provide adequate and appropriate housing and treatment for people in\ncustody under the care of mental health services in accordance with current\nprofessional standards.\n[(3) No later than ninety days from the effective date of these standards, the written\ncriteria shall be submitted to the Board of Correction for promulgation as an amendment\nto these standards.]\n(c) Programs.\n(1) Special housing shall be provided to those [inmates] people in custody in need\nof close supervision due to mental or emotional [disorders] health issues, and to those\n[inmates] people in custody in the process of being evaluated for such [disorders] health\nissues:\n(i) twenty-four hour observation aides shall be assigned to special housing areas;\n(ii) correction officers who have received not less than thirty-five hours of special\ntraining within the first year of their assignment shall be assigned to steady posts within\nthese areas. These officers shall receive annual training enhancement. The\n[Departments] Department of [Health and] Correction shall [develop] maintain a written\ncurriculum [to be approved by the Department of Mental Health, Mental Retardation and\nAlcoholism Services] specifying the components and hours of the training programs, in\ncollaboration with the Health Authority;\n(iii) [inmates] people in custody placed in special housing areas shall be seen\nand interviewed by mental health services staff at least once per week;\n(iv) an individual member of mental health services staff shall be directly\nresponsible for mental health services in each special housing area;\n(v) the Department of Correction shall make provision for the allocation of\ndormitory space as special housing for the observation of potentially suicidal [inmates]\npeople in custody.\n(2) The [Departments] Department of Correction and [Health] the Health Authority\nshall [develop] maintain specific written criteria and procedures for the admission to and\nthe discharge from special housing areas for mental observation:\n(i) it shall be the prerogative of mental health services to admit and discharge\n[inmates] people in custody from special housing areas for mental observation;\n(ii) the placement of [an inmate] a person in custody in special housing shall be\nreviewed by mental health services at least once per week.\nPage 12 of 56\n\n(3) An individualized written treatment plan based upon the evaluation of the\ntreatment team shall be developed for each [inmate] person in custody placed in special\nhousing for mental observation and for all [inmates] people in custody to whom\nmedication for mental or emotional [disorders] health issues is prescribed:\n(i) the treatment team must include a [psychiatrist] psychiatric provider who shall\npersonally examine each [inmate] person in custody evaluated by the treatment team;\n(ii) those members of the treatment team who are providing care to [an inmate] a\nperson in custody shall prepare a treatment plan, which shall be signed by the\n[psychiatrist] psychiatric provider;\n(iii) the Chief of Service or [his or her] their designee shall approve all treatment\nplans;\n(iv) the [Department of Health] Health Authority shall [develop] maintain written\ncriteria [to be approved by the Department of Mental Health, Mental Retardation and\nAlcoholism Services] defining the nature and the specificity of the treatment plan;\n(v) there shall be documented evidence of initial treatment planning within three\ndays of the [inmate] person in custody being placed in special housing, and a treatment\nplan shall be prepared no later than one week after placement;\n(vi) treatment plans shall be reviewed and assessed for effectiveness by\nprofessional mental health services staff at least every two weeks. Both the review and\nthe [inmate's] person in custody’s progress shall be recorded in the medical chart;\n(vii) a range of treatment modalities other than the provision of medication shall\nbe made available.\n(4) There shall be facilities appropriate for the observation, evaluation and\ntreatment of acute psychiatric episodes.\n(5) Where required, [an inmate] a person in custody shall be transferred to a\nmunicipal hospital prison ward in accordance with New York State Correction Law §§\n402 and 508.\n(6) [Inmates identified as developmentally disabled] People in custody who have a\ndevelopmental disability shall be evaluated within seventy-two hours and mental health\nservices staff shall make a recommendation to the Department of Correction as to\nwhether such developmental disability makes it necessary for the [inmate] person to be\nplaced in special housing or otherwise separated from the general [inmate] population:\n(i) [inmates who suffer from] people in custody with developmental disabilities\nshall be housed in areas sufficient to ensure their safety;\n(ii) if it is determined by mental health services that [an inmate's] a person in\ncustody’s developmental disability makes it clinically contraindicated that the [inmate]\nperson be housed in a correctional facility, then the Department of Correction shall\nimmediately notify the court and a written notice shall be filed in the [inmate's] person’s\ncourt papers.\nPage 13 of 56\n\n(7) The [Departments] Department of [Health and] Correction and the Health\nAuthority shall use mechanisms [approved by the Department of Mental Health, Mental\nRetardation and Alcoholism Services] to identify [inmates who are suffering from drug\naddiction or the disease of alcoholism] people in custody who have drug or alcohol use\nissues. [Inmates] People in custody so identified shall be referred to available programs\napproved by the [Departments] Department of Correction and [Health] the Health\nAuthority. Detoxification shall take place in a setting appropriate to the level of care\nrequired.\n(d) Informed consent. Except as otherwise provided herein, mental health treatment\nmay be administered only upon the informed consent of the [inmate] person in custody\nafter a disclosure of the risks and benefits of the proposed treatment in accordance with\ngood clinical practice. The [Departments of Health and Mental Health, Mental\nRetardation and Alcoholism Services] Health Authority shall [develop] maintain\nprocedures for the implementation of this section, which shall include the use of a\nwritten form to document the informed consent of the [inmate] person in custody.\n(e) Right to refuse treatment. The city may not require treatment of [an inmate] a\nperson in custody without the [inmate's] person’s consent unless, in an emergency, that\nperson, by reason of [mental disability or mental illness] a mental health condition,\nposes a clear and present danger of serious physical injury to self or others. Then and\nonly then may [an inmate] a person in custody be examined, treated or medicated\nagainst [the inmate's] their will, subject to the following conditions:\n(1) the attending physician shall use only those measures which in [his or her] their\nbest professional judgment are deemed appropriate in response to the\nemergency;\n(2) these measures may be used only with a  must be reviewed\nby a psychiatrist within twenty-four hours;\n(ii) except in an emergency, medication for mental and emotional [disorders]\nhealth issues may not be prescribed to [an inmate] a person in custody unless that\n[inmate] person has had a physical examination including a detailed clinical history\nwithin the previous six months; in all cases the prescribing physician must first review\nthe medical chart and all other medicine the [inmate] person is receiving;\n(iii) medication [is to] must be administered only by appropriately trained medical\nor health services personnel.\n(2) Psychotropic medication shall be dispensed only when clinically indicated,\nconsistent with the treatment plan:\n(i) all prescriptions for psychotropic medication must include a stop order; no\nprescription for psychotropic medication shall be valid for longer than [two] four weeks;\n(ii) every [inmate] person in custody receiving psychotropic medication shall be\nseen and evaluated by the prescribing [psychiatrist] psychiatric provider, or, in cases of\nemergency when a physician other than a [psychiatrist] psychiatric provider prescribes\nmedication under 40 RCNY § [2-05(b)(1)(i)] 2-06(b)(1)(i) by the reviewing psychiatrist, at\nleast once a week until stabilized and thereafter at least every [two] four weeks by\nmedical personnel;\n(iii) female [inmates] people in custody who are prescribed psychotropic\nmedication shall be informed of the potential risk of taking such drugs while pregnant\nand shall be given the opportunity to be tested for pregnancy.\n(c) Pharmacy.\n(1) When stock medications are maintained within a correctional facility, the\nagency providing medical services shall [develop and] maintain a formulary of\nmedications stored in that facility.\n(2) The [Departments] Department of [Health and] Correction and the Health\nAuthority shall [develop and implement] maintain a written policy to provide for the\nPage 15 of 56\n\n[maximum security] maximum-security storage and weekly inventory of all controlled\nsubstances, syringes, needles and surgical instruments:\n(i) \"controlled substances\" are defined as those so listed by the Drug\nEnforcement Administration of the United States Department of Justice;\n(ii) written notice of this policy shall be given to all staff with potential access to\nany controlled substances or items under maximum security storage.\n(d) Research. Biomedical or behavioral research involving any [inmate] person in the\ncustody of the New York City Department of Correction is prohibited, except insofar as it\nmeets the requirements for approval of research which is subject to the United States\nDepartment of Health and Human Services' regulations[, and in addition, has the\napproval of the Department of Mental Health, Mental Retardation and Alcoholism\nServices].\n§ 8. Section 2-07 of Title 40 of the Rules of the City of New York, as renumbered by\nthis rule, is amended to read as follows:\n§ 2-07 Restraints[ and Seclusion].\n(a) Policy. The [Departments] Department of Correction and [Health] the Health\nAuthority shall [develop and implement] maintain procedures [subject to the review of\nthe Department of Mental Health, Mental Retardation and Alcoholism Services]\ngoverning the physical restraint [and seclusion of inmates] of people in custody being\nobserved or treated for mental or emotional [disorders] health issues. Consistent with\nthe New York State Mental Hygiene Law, restraints [or seclusion] shall not be used as\npunishment, for the convenience of staff, or as a substitute for treatment programs.\n(b) Definitions.\nPhysical restraint. \"Physical restraint\" is the deliberate use of a device to interfere\nwith the free movement of [an inmate's] a person in custody’s arms and/or legs, or\nwhich totally immobilizes the [inmate] person, and which the [inmate] person is unable\nto remove without assistance:\n(i) the [Departments of Health and Mental Health, Mental Retardation and\nAlcoholism Services] Health Authority shall [develop] maintain procedures defining\npermissible forms of physical restraints, in accordance with relevant provisions of 40\nRCNY § 6-27;\n(ii) in no instance shall metal handcuffs be used to restrain [an inmate] a person\nin custody; however, this proscription shall not preclude the application of appropriate\nsecurity precautions during the transportation of [inmates] people in custody;\n(iii) in an emergency, when [an inmate presents a clear and present danger to\nhimself or others,] an individualized determination is made that restraints are necessary\nto prevent an imminent risk of self-injury or injury to other people, the [inmate] person in\ncustody may be restrained, including with metal handcuffs, pending the arrival of a\n[psychiatrist] psychiatric provider. Correction personnel shall immediately notify the\nPage 16 of 56\n\nmental health staff for response. The [psychiatrist] psychiatric provider shall respond\nimmediately, but in no event more than one hour after notification. When there is no\ninstitutional psychiatrist on duty, correction personnel shall immediately transport the\n[inmate] person in custody to a facility where a [psychiatrist] psychiatric provider is\npresent.\n[Seclusion. \"Seclusion\" is the placing of inmates in their cells, or a seclusion room\nfrom which they cannot leave at will, during a normal lock-out period when other\ninmates in the housing area are given the option to lock out of their cells:\n(i) seclusion shall be used only if the cells or seclusion rooms available allow\nadequate observation of the inmate by staff;\n(ii) nothing in this Section shall restrict the ability of the Department of Correction\nto limit the lock-out rights of inmates for disciplinary purposes (punitive segregation).]\n(c) Procedures.\n(1) The use of physical restraint [or seclusion of inmates] of people in custody\nbeing observed or treated for mental or emotional [disorders] health issues shall be\npermitted only where there is on-duty psychiatric coverage.\n(2) Physical restraint [or seclusion] may be used only upon the direct written order\nof a [psychiatrist] psychiatric provider which includes the reasons for taking such action.\n(3) Physical restraint [or seclusion] shall be used only when the [psychiatrist]\npsychiatric provider has examined the [inmate] person in custody and determined in\nlight of all available mental health data that:\n(i) the [inmate] person in custody presents an immediate danger of injury to self\nor others;\n(ii) this potential for violence is the result of a mental health [disorder] condition\nfor which the [inmate] person is receiving treatment; and\n[(iii) these measures are absolutely necessary to avert the danger and will be\ntherapeutically beneficial; and]\n[(iv)] (iii) all other available alternatives are ineffective in preventing injury.\n(4) [An inmate] A person in custody put in restraints [or seclusion] shall be kept\nunder constant observation and the need for continued restrictive measures shall be\nassessed by nursing or mental health staff:\n(i) use of restraints shall be assessed every fifteen minutes [and seclusion shall\nbe reviewed every thirty minutes];\n(ii) written findings of such reviews shall be noted on the [inmate's] person in\ncustody’s medical chart;\n(iii) vital signs (temperature, pulse, blood pressure and respiration) shall be\nrecorded every hour.\nPage 17 of 56\n\n(5) [An inmate] A person in custody subjected to restraints [or seclusion] shall be\nreleased every two hours and given the opportunity to [go to the toilet] use the\nbathroom.\n(6) A [psychiatrist] psychiatric provider shall evaluate [an inmate] a person in\ncustody in restraints [or seclusion] at least once every two hours to determine whether\ncontinued restrictive measures are warranted.\n(7) No order to place [an inmate] a person in custody in restraints [or seclusion]\nshall be valid longer than two hours, and such an order shall be renewable only once,\nby a [psychiatrist] psychiatric provider after evaluation of the [inmate's] person in\ncustody’s condition.\n(8) After four hours, if [an inmate] a person in custody remains too agitated to be\nreleased, [the inmate] they shall be moved to a municipal hospital prison ward.\n§ 9. Section 2-08 of Title 40 of the Rules of the City of New York, as renumbered by\nthis rule, is amended to read as follows:\n§ 2-08 Confidentiality.\n(a) Policy. The principle of confidentiality of information obtained in the course of\ntreatment is to be upheld. The [Departments] Department of Correction and [Health,\nwith the approval of the Department of Mental Health, Mental Retardation and\nAlcoholism Services] the Health Authority shall [develop and] implement a written policy\ngoverning the dissemination of information.\n(b) Sharing of information.\n(1) Mental health services shall promptly inform correction personnel when [an\ninmate] a person in custody is identified as:\n(i) suicidal;\n(ii) homicidal;\n(iii) posing a clear and present danger or injury to self or to others;\n(iv) presenting a clear and immediate risk of escape or riot;\n(v) receiving psychotropic medication; or\n(vi) requiring transfer for mental health reasons.\n(2) The [Departments] Department of Correction and [Health] the Health Authority\nshall [develop and implement] maintain an explicit written procedure specifying which\ncorrection personnel are to be notified of information as described in 40 RCNY § [2-\n07(b)(1)] 2-08(b)(1) above, and the method of notification.\n(c) Records.\nPage 18 of 56\n\n(1) Mental health records are to be maintained separately from the confinement\nrecord and kept in a secure file. Each significant [inmate] contact with a person in\ncustody shall be reflected by a substantive progress note on the chart.\n(2) Mental health records [are to] must be transferred with [an inmate] a person in\ncustody when [the inmate is] they are transferred from one facility to another within the\nNew York City Department of Correction. A record summary shall accompany each\n[inmate] person transferred to a municipal hospital prison ward. When a request is\nreceived to transfer mental health records outside the jurisdiction of the Department of\nCorrection, written authorization of the [inmate] person in custody is required unless\notherwise provided by law.\n§ 10. Section 2-09 of Title 40 of the Rules of the City of New York, as renumbered\nby this rule, is amended to read as follows:\n§ 2-09 Coordination.\n(a) Policy. The [Departments] Department of Correction and [Health] the Health\nAuthority shall consult and coordinate their activities on a regular basis in order to\nprovide for the continued delivery of quality mental health care.\n(b) Discipline.\n(1) The [Departments] Department of [Health and] Correction and the Health\nAuthority shall [develop] maintain written procedures to provide for mental health\nservices to be informed whenever [an inmate] a person in custody in a special housing\narea for mental observation is charged with an infraction, and to be permitted to\nparticipate in the infraction hearing and to review any punitive measures to be taken.\n(2) When placement in [punitive segregation] restrictive housing would pose a\nserious threat to [an inmate's] a person in custody’s physical or mental health, medical\nstaff shall have the authority to determine that the [inmate] person shall be barred from\nsuch placement or shall be moved from [punitive segregation] restrictive housing to a\nmore appropriate housing unit. This determination may be made at any time during the\n[inmate's] person in custody’s placement in [punitive segregation] restrictive housing.\n[All inmates in punitive segregation] As required by 40 RCNY § 6-20(b), all people in\ncustody in restrictive housing shall be seen at least once each day by medical staff who\nshall make referrals to medical and mental health services where appropriate.\n(c) Meetings. Monthly meetings including the facility administrator, the chief\nrepresentative of mental health services to that facility and representatives of the\nmedical and nursing staff shall be held to discuss the delivery of mental health services.\nMeetings shall include a written agenda as well as the taking and distribution of\nminutes.\n(d) Evaluation. [The Department of Mental Health, Mental Retardation and\nAlcoholism Services] The Health Authority shall [annually conduct a formal evaluation\nof] regularly evaluate the quality, effectiveness and level of performance of mental\nPage 19 of 56\n\nhealth services provided to [inmates] people confined in New York City correctional\nfacilities.\n§ 11. Section 2-10 of Title 40 of the Rules of the City of New York, as renumbered\nby this rule, is amended to read as follows:\n§ 2-10 Variances.\n(a) Policy. [Any Department affected by these minimum standards] The Department\nof Correction or the Health Authority may apply for a variance from a specific\nsubdivision or [Section] section of these standards when compliance cannot be\nachieved or continued. [A \"variance\" is an exemption granted by the Board from full\ncompliance with a particular subdivision or Section for a specified period of time.] The\nBoard may grant the following types of variances:\n(1) A \"limited variance\" is an exemption granted by the Board from full compliance\nwith a particular subdivision or section for a specified period of time up to six months.\n(2) A \"continuing variance\" is an exemption granted by the Board from full\ncompliance with a particular subdivision or section for an indefinite period of time.\n(3) An \"emergency variance\" as defined in 40 RCNY § 1-15(b)(3) is an exemption\ngranted by the Board from full compliance with a particular subdivision or section for no\nmore than 30 days.\n[(b) Variance prior to implementation date. A Department may apply to the Board for\na variance prior to the implementation date of a particular subdivision or Section when:\n(1) despite its best efforts and the best efforts of other New York City officials and\nagencies, full compliance with the subdivision or Section cannot be achieved by the\nimplementation date; or\n(2) compliance is to be achieved in a manner other than specified in the\nsubdivision or Section.\n(c)](b) Variance application. An application for a variance must be made in writing to\nthe Board by the Commissioner of the Department of Correction or the Health Authority\n[at least forty-five days prior to the implementation date] as soon as a determination is\nmade that continued compliance will not be possible and shall state:\n(1) the type of variance requested;\n(2) the particular subdivision or [Section] section at issue;\n(3) the requested commencement date of the variance;\n([2]4) the efforts undertaken by the Department of Correction or the Health\nAuthority to achieve compliance [by the implementation date];\n([3]5) the specific facts or reasons making full compliance [by the implementation\ndate] impossible, and when those facts and reasons became apparent;\nPage 20 of 56\n\n([4]6) the specific plans, projections and timetables for achieving full compliance;\n([5]7) the specific plans for serving the purpose of the subdivision or [Section]\nsection for the period that strict compliance is not possible; [and]\n([6]8) [the time period for which the variance is requested, provided that this shall\nbe no more than six months.] if the application is for a limited variance, the time period\nfor which the variance is requested, provided that this shall be no more than six months;\n(9) if the application is for a continuing variance, the additional information set forth\nin 40 RCNY § 1-15(c)(2); and\n(10) if the application is for an emergency variance, the additional information set\nforth in 40 RCNY § 1-15(c)(3).\n[(d) Variance procedure.\n(1) Prior to a decision on a variance application, the Board shall consider the\npositions of all interested parties.\n(2) In order to receive this input the Board shall publicize the variance\napplication in its entirety in a manner reasonably calculated to reach all interested\nparties, including direct mail. This shall occur at least thirty days prior to the\nimplementation date of the subdivision or Section.\n(3) The Board shall hold a public meeting or hearing on the variance application\nand hear testimony from all interested parties at least twenty-one days prior to the\nimplementation date.\n(4) The Board's decision on a variance application shall be in writing and shall\ninclude the specific facts and reasons underlying the decision.\n(5) The Board's decision shall be publicized in the manner provided by 40\nRCNY § 2-09(d)(2) at least ten days prior to the implementation date.\n(e) Granting of variance.\n(1) The Board shall grant a variance only if it is convinced that the variance is\nnecessary and justified.\n(2) Upon granting a variance, the Board shall state:\n(i) the time period of the variance; and\n(ii) any requirements imposed as conditions on the variance.\n(f) Renewal of variance. An application for a renewal of a variance shall be\ntreated in the same manner as an original application as provided in 40 RCNY §§ 2-\n09(b), 2-09(c), 2-09(d) and 2-09(e). The Board shall not grant renewal of a variance\nunless it finds that, in addition to the requirements for approving an original application,\na good faith effort has been made to comply with the subdivision or Section within the\npreviously prescribed time limitation.\nPage 21 of 56\n\n(g) Emergency variance after implementation date. A Department may apply to\nthe Board for a variance after the implementation date of a particular subdivision or\nSection when an emergency prevents continued compliance with the subdivision or\nSection.\n(h) Emergency variance application.\n(1) A variance for a period of less than twenty-four hours may be declared by\nthe Department or a designee when an emergency prevents continued compliance with\na particular subdivision or Section. The Board or a designate shall be immediately\nnotified of the emergency and the variance.\n(2) An application for an emergency variance for a period of twenty-four hours\nor more, or for a renewal of an emergency variance, must be made by the\nCommissioner of the Department or a designee to the Board and shall state:\n(i) the particular subdivision or Section at issue;\n(ii) the specific facts or reasons making continued compliance impossible;\n(iii) the specific plans, projections and timetables for achieving full\ncompliance; and\n(iv) the time period for which the variance is requested, provided that this\nshall be no more than five days.\n(i) Granting of emergency variance.\n(1) The Board shall grant an emergency variance only if it is convinced that the\nvariance is necessary and justified.\n(2) A renewal of an emergency variance previously granted by the Board may\nbe granted only if the requirements of 40 RCNY §§ 2-09(g), 2-09(h)(2) and 2-09(i)(1)\nhave been met.\n(3) The Board shall not grant more than two consecutive renewals of an\nemergency variance.]\n(c) The procedures for variances, including the procedures for granting, renewal\nand review of variances, set forth in 40 RCNY § 1-15(d), (e), and (f) shall apply to\nvariances from provisions in this chapter.\n§ 12. Section 3-01 of Title 40 of the Rules of the City of New York is amended to\nread as follows:\n§ 3-01 Service Goals and Purpose.\n(a) Purpose.\n(1) The following minimum health care standards are intended to [insure] ensure\nthat the quality of health care services provided to [inmates] people in custody in New\nYork City correctional facilities is maintained at a level consistent with legal\nPage 22 of 56\n\nrequirements, accepted professional standards and sound professional judgment and\npractice.\n(2) These standards shall apply to health services for all [inmates] people in\ncustody in the care and custody of the New York City Department of Correction [(DOC)],\nwhether in City Correction facilities or at other health care facilities.\n(b) Service goals. Services for the detection, diagnosis and treatment of medical and\ndental [disorders] health issues shall be provided to all [inmates] people in custody in\nthe care and custody of the New York City Department of Correction. The Department\nof Correction and the Health [Authorities in consultation with the Department of Health\n(DOH) and the Health and Hospitals Corporation (HHC)] Authority shall [design and\nimplement] maintain a health care program to provide the following:\n(1) Medical and dental diagnosis, treatment and appropriate follow-up care\nconsistent with professional standards and sound professional judgment and\nprofessional practice;\n(2) Management and administration of emergency medical and dental care;\n(3) Regular training and development of health care personnel and correctional\nstaff as appropriate to their respective roles in the health care delivery system; and\n(4) Review and assessment of the quality of health service delivery on an ongoing\nbasis.\n(c) Definitions.\n(1) [Chief Correctional Officer.] \"Chief Correctional Officer\" [refers to] means the\n[highest ranking] highest-ranking correctional official assigned to a facility[ (usually a\nwarden)].\n(2) [Chronic Care.] \"Chronic care\" [is] means service rendered to [an inmate] a\nperson in custody over a long period of time. Treatment for diabetes, hypertension,\nasthma, and epilepsy are examples thereof.\n(3) [Convalescent Care.] \"Convalescent care\" [refers to] means services\nrendered to [an inmate] a person in custody to assist in the recovery from illness or\ninjury.\n(4) [Emergency.] \"Emergency care\" [medical or dental care refers to] means care\nfor an acute illness or an unexpected health need that cannot be deferred until the next\nscheduled sick call or clinic without jeopardy to the [inmate's] person in custody’s health\nor causing undue suffering.\n(5) [Facility.] \"Facility\" [refers to] means any jail which operates as its own\ncommand or to any jail annex which is not within walking distance of the parent facility.\n(6) [Flow Sheet.] \"Flow sheet\" [refers to] means a document which contains all\nclinical and laboratory variables on a problem in which data and time relationships are\ncomplex (e.g., sequential fasting blood sugars in [the diabetic inmate] diabetics).\nPage 23 of 56\n\n(7) [Health Authority.] \"Health Authority\" [shall refer to any] means a health care\nbody designated by New York City as the agency or agencies responsible for health\nservices for [inmates] people in custody in the care and custody of the New York City\nDepartment of Correction. [When the responsibility is contractually shared with an\noutside provider this term shall also apply.] This term applies regardless of whether this\nresponsibility is contractually shared with an outside provider.\n(8) [Health Care Personnel.] \"Health care personnel\" [refers to] means\nprofessionals who meet qualifications stipulated by their profession and who possess all\ncredentials and licenses required by New York State law. Medical personnel [refers to]\nmeans physicians, physician assistants and nurse practitioners.\n(9) [Health Record.] \"Health record\" [refers to] means a single medical record that\ncontains all available information pertaining to [an inmate's] a person in custody’s\nmedical, mental health and dental care. [Unless otherwise specified this record refers to\na jail-based health record, not the hospital record, which is separate.] Unless otherwise\nspecified, a health record refers to a record maintained by a jail, not a record maintained\nby a hospital.\n(10) [Sick-Call.] \"Sick-call\" [refers to] means an encounter between [an inmate] a\nperson in custody and health care personnel for the purpose of assessing and/or treating\n[an inmate's] a person’s medical complaint.\n(11) [Special Needs.] \"Person with special needs\" [refers to inmates] means\npeople in custody requiring chronic care (see definition [6] 2), convalescent care\n(definition [7] 3) or skilled nursing care.\n§ 13. Section 3-02 of Title 40 of the Rules of the City of New York is amended to\nread as follows:\n§ 3-02 Access to Health Care Services.\n(a) Policy. The Department of Correction and the Health Authority shall be\nresponsible for the design and implementation of written policies and procedures which\nensure that all [inmates] people in custody have prompt and adequate access to all\nhealth care services. Services must be available, consistent with § 1-01 of the Minimum\nStandards for New York City Correctional Facilities.\n(b) Access to Care.\n(1) Every facility must inform all [inmates] people in custody of their right to health\ncare and the procedures for obtaining medical attention, as described in 40 RCNY § 3-\n04(b)(6).\n(2) No [inmate] person in custody may be punished for requesting medical care or\nfor refusing it.\n(3) Under no circumstances shall [an inmate's] a person in custody’s access to any\nhealth care service, including but not limited to those services described in these\nstandards, be denied or postponed as punishment.\nPage 24 of 56\n\n(4) Correctional personnel shall never prohibit, delay, or cause to prohibit or delay\n[an inmate's] a person in custody’s access to care or appropriate treatment. All\ndecisions regarding need for medical attention shall be made by health care personnel.\n(5) [Inmates] People in custody shall not be discriminated against, with regard to\ntreatment, on the basis of their medical diagnoses.\n(6) Any correctional personnel who knows or has reason to believe that [an inmate]\na person in custody may be in need of health services shall promptly notify the medical\nstaff and a uniformed supervisor.\n(7) Staffing levels in the jail clinics, jail infirmaries and prison hospital wards shall\nbe adequate in numbers and types to [insure] ensure that all standards described here\nare met. Staffing levels refers to both clinical and correctional personnel.\n(8) The Health Authority shall [develop] maintain policies and procedures to\n[insure] ensure that [inmates] people in custody have access to second medical\nopinions regarding clinical recommendations.\n(c) Sick-Call.\n(1) Sick-call shall be available at each facility to all [inmates] people in custody at a\nminimum of five days per week within 24 hours of a request or at the next regularly\nscheduled sick-call. Sick-call need not be held on City holidays or weekends. Facilities\nwith capacities of over 100 people, must provide sick-call services on-site in medical\ntreatment areas. (As defined in 40 RCNY § 3-06(b)).\n(2) Sick-call is to be conducted by [a physician] health care personnel or under the\nsupervision of [a physician] health care personnel.\n(i) Correctional personnel shall not prevent or delay or cause to prevent or delay\n[an inmate's] a person in custody’s access to medical or dental services.\n(ii) Correctional personnel [will] may not diagnose any illness or injury, prescribe\ntreatment, administer medication other than that described in 40 RCNY § 3-05(b)(2)(iii),\n[or] nor screen sick-call requests.\n(3) Requests for access to health services shall not be denied based on any prior\nrequests.\n(4) The Department of Correction shall provide sufficient security for [inmate]\nmovement of people in custody to and from health service areas.\n(5) Adequate records shall be maintained daily which are distinguishable by\nhousing area on a form developed by the Department of Correction. These records shall\nbe maintained for at least three (3) years. The form shall include the following:\n(i) the names and number of [inmates] people in custody requesting sick call;\n(ii) the names and numbers of [inmates] people in custody arriving in the clinic;\nand\nPage 25 of 56\n\n(iii) the names and number of [inmates] people in custody seen by health care\npersonnel.\n(6) The use of a sick-call [sign up] sign-up sheet shall not preclude the use of sick-\ncall by [inmates] people in custody who are not on the list.\n(d) Emergency Services.\n(1) All [inmate] requests by people in custody for emergency medical or dental\nattention shall be responded to promptly by medical personnel. This shall include a\nface-to-face encounter between the [inmate] person requesting attention and\nappropriate health care personnel. All health care and correctional personnel must be\nfamiliar with the procedures for obtaining emergency medical or dental care, with the\nnames and telephone numbers of people to be notified and/or contacted readily\naccessible.\n(2) Correctional personnel who know or have reason to believe that [an inmate] a\nperson in custody is in need of emergency health services shall make the appropriate\nnotifications pursuant to 40 RCNY § 3-02(d)(5).\n(3) The Department of Correction, with the advice and agreement of the Health\nAuthority, shall [prepare and implement] maintain written policies and defined\nprocedures which shall be posted in every facility and include arrangements for, at\nleast, the following:\n(i) emergency evacuation of [an inmate] a person in custody from the facility\nwhen required;\n(ii) use of an appropriate emergency medical vehicle;\n(iii) use of a designated hospital emergency unit;\n(iv) security procedures for the immediate transfer of [inmates] people in custody\nwhen necessary; and\n(v) procedures for providing for transfer of [inmates] people in custody within time\nguidelines established by the Health Authority.\n(4) Any correctional facility with a rated capacity of less than 100 [inmates] people\nin custody must have an agreement with one or more health care providers to provide\nemergency medical services and must have at least one correctional personnel on each\nhousing unit certified in Cardio-pulmonary resuscitation (CPR).\n(5) All uniformed correctional personnel shall be informed of and familiar with all\nwritten procedures pertaining to emergency health services.\n(6) In each facility, the telephone numbers of the control room and the medical\nclinic shall be posted prominently at each correctional officer station.\n(7) [Medical] Health care personnel, with current CPR certification, trained in the\nprovision of emergency health care shall be present at all times in each facility that has\nPage 26 of 56\n\na rated capacity of 100 or more [inmates] people in custody. Whenever possible, health\ncare personnel should be trained and certified in CPR.\n(8) In the case of serious illness or injury to [an inmate] a person in custody, all\nreasonable attempts shall be made by the Department of Correction to notify the next of\nkin or legal guardian of the [inmate] person in custody within the time frames\nestablished for reporting unusual incidents.\n(9) The Health Authority shall determine the types and quantities of emergency\nequipment and supplies required to be available within each correctional facility in order\nto provide adequate emergency services and shall have written protocols regarding\nemergency care. An inventory shall be [submitted to the Board of Correction within 90\ndays of implementation of the standards and] updated annually or more frequently as\ndetermined by the Health Authority.\n(i) all emergency health equipment and supplies shall be inventoried and\ninspected by health services personnel at least twice each year, or more frequently as\ndetermined necessary by the Health Authority to ensure that such equipment and\nsupplies are in good working order.\n(ii) all emergency equipment and supplies shall be easily accessible to\nappropriate personnel.\n(10) A uniform logbook shall be designed and used by the Department of\nCorrection to document all requests for emergency health care. This logbook shall be\nmaintained in the clinic and shall contain, but not be limited to the following information:\n(i) name, commitment number/book and case number, housing location of the\n[inmate] person in custody, and the location of the incident;\n(ii) the date and time of referral and the referring officer;\n(iii) the time of [inmate] the person in custody’s arrival in clinic or in the event that\nmedical personnel respond to an area outside of the clinic, the time medical personnel\nleave the clinic; and\n(iv) the time the [inmate] person in custody is examined by health care\npersonnel.\n(e) Infirmaries.\n(1) Infirmaries, with discrete nursing stations and treatment area(s), shall be\nutilized to provide overnight accommodations and health care services of limited\nduration to [inmates] people in custody in need of close observation or treatment of\nhealth conditions which do not require hospitalization. Housing areas [shall not] must\nnever be used for a combination of general population and infirmary housing [at any one\ntime].\n(2) At designated facilities, [The] the Health Authority and Department of\nCorrection shall [develop and implement] maintain written policies and procedures for\nPage 27 of 56\n\nthe management of infirmaries that are consistent with professional standards and legal\nrequirements. Such procedures shall incorporate at least the following;\n(i) allocation of space and beds to meet the needs of [the inmates] people in\n[DOC] custody of the Department of Correction as determined by the Health Authority\nand other applicable regulatory agencies;\n(ii) accommodations for providing appropriate emergency services and the timely\ntransfer of [inmates] people in custody to hospital and specialty services as consistent\nwith 40 RCNY § 3-02(d)(3) and § 3-02(f)(1) and § 3-02(f)(2); and\n(iii) provision of 40 RCNY § 3-02 adequate space and physical plant to operate\ninfirmary related services (such as communicable disease isolation where applicable).\n(3) The Health Authority shall [develop and implement] maintain written policies\nthat incorporate the following:\n(i) maintenance and inventory of su  health record in accordance with all applicable laws.\n(6) Informed consent policies shall be consistent with the informed consent policies\ndescribed in [The] the Board of Correction Mental Health Minimum Standards for New\nYork City Correctional Facilities.\n§ 43. Subdivisions (k), (l) and (m) of section 3-06 of Title 40 of the Rules of the City\nof New York are amended to read as follows:\n(k) Drug and Alcohol Treatment.\n(1) All [inmates] people in custody who [give empirical] demonstrate evidence of\naddiction to alcohol, drugs or both, must be observed and offered treatment to prevent\ncomplications resulting from intoxication, withdrawal and associated conditions, as\nappropriate and according to written protocols approved by the Health Authority.\n(2) Education and referral services should be available to [inmates] people in\ncustody with alcohol or drug addiction(s) who request assistance.\n(l) Right to Refuse Treatment.\n(1) [An inmate] A person in custody may refuse a medical examination or any\nmedical treatment except when medical personnel or a dentist has determined that\nimmediate medical, surgical or dental treatment is required to treat a condition or injury\nthat may cause death, serious bodily harm, or disfigurement to such [inmate] person\nand at least one of the following applies:\n(i) the [inmate] person in custody has been determined in accordance with all\napplicable laws to be legally incompetent to consent to the specific procedure at the\ntime it is offered;\n(ii) consistent with the provision of applicable law the [inmate] person in custody\nis a minor; or\n(iii) it is demonstrated that the parent or legal guardian of legally incompetent\n[inmates] people in custody or minors cannot be reached.\n(2) When [an inmate] a person in custody refuses treatment for a health condition\nthat is infectious, contagious, or otherwise poses a threat to the health, safety, or well-\nbeing of others, such [inmate] person may, in accordance with determi
