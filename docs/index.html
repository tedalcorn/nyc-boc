t\nthey did say it was being tested. So,\nI'd like to know the outcome of that,\nplease.\n&gt;&gt; Hi, good afternoon, Vice Chair Francis\nTorres. I serve as first deputy\ncommissioner for the department. We'll\nbe more than happy to share our um\nresults with the board. I do tell you\nthat a complaint similar to this had\nbeen received in the past and we\nimmediately took action to actually\nabate the situation. If you recall, we\nactually transfer the population out of\na given area in order for us to do and\ndo the work. Not only did we take all of\nthe necessary action in abading the\nmold, we also went into the docks to\nensure that we abaded. So, we'll be more\nthan happy to share the information with\nyou, meaning the board.\n&gt;&gt; Thank you. First up, uh, Torres. But it\nsaid that the mold was painted over. Is\nthat the necessary remediation?\n&gt;&gt; No, it was a complete remediation\nwith followed by an independent company\nto come in and evaluate the work that we\nhad done.\n&gt;&gt; You're welcome.\nThank you, First Step. Uh, I'd like to\nturn it over to, uh, Jasmine for\nexecutive director updates.\nThank you. Good afternoon, everyone.\nThank you for joining us today. We share\nour deepest condolences with the\nfamilies of department staff who have\npassed since the board's January\nmeeting. The staff who have passed are\nretired officer Philip Campbell, retired\nofficer Janette J. Francis Faren,\nretired Captain Arthur Chitham, retired\nofficer Jeffrey R. Miller, retired\nofficer Linda Campbell, retired Captain\nRoseanne Tartaro O'Donnell, retired\nCaptain Steve Kachenski, and retired\nofficer Darthy Newman.\nRegarding census data, as of February\n9th, 2000, 2026, there were\napproximately 6,817\nindividuals in department custody. And\nbroken down by facility as of February\n9th in Belleview Hospital Prison Ward,\n59 individuals. Elmherst Hospital Prison\nWard, 10 individuals. EMTTC,\n1,379.\nGRVC 869,\nNIC 296,\nOBCC,\n1413,\nRES, RES, ESH 116,\nRES nonESH488,\nRMSC\n449,\nR&DC48,\nand in West facility 689.\nRegarding reports, on January 21st,\n2026, the board released a report\ndetailing findings and recommendations\nconcerning the deaths of Benjamin Kelly,\nJames Maldonado, Christian Colado, Edwin\nKwisby, Ardit Bilah, Jimmy Aila, and\nCarlos Cruz. The board's report\nhighlights 10 key findings and makes 13\nrecommendations to DOC and CHS regarding\ntheir policies and practices.\nDOC's response is appended to the\nreport.\nRegarding CHS, the board recommends that\nclinical records clearly reflect when a\nhigher level of psychiatric care is\nconsidered, including hospital care for\nindividuals presenting with acute mental\nhealth needs. The board's\nrecommendations to the department\naddress supervision, housing, training,\npostmanagement practices, and mental\nhealth housing determinations\nunder administrative code section 9-171\nsubdivision H unless the commissioner of\ninvestigation, the attorney general, or\nthe district attorney investigates a\ndeath and requests or direct DOC or CHSS\nnot to investigate.\nDOC and CHS are required to respond to\neach recommendation issued in the\nboard's death reports indicating whether\nthe recommendation will be implemented\nand where it is not providing the\nreasons for that determination.\nFor the full list of findings and\nrecommendations, you can go to BOCC's\nwebsite.\nNext, regarding the suspension of the\nboard's minimum standards, since 2021,\nsuccessive mayoral emergency executive\norders have suspended significant\nportions of the board of corrections\nminimum standards, often for extended\nand recurring periods. These suspensions\nwere initially justified by staffing\nabsenteeism and later by staff\nattrition, but available data does not\nsupport staffing levels as an ongoing\nbasis for suspending the minimum\nstandards.\nWhile some standards remain suspended by\ncourt order in the Nunes litigation,\nadditional provisions, including those\ngoverning restrictive housing, punitive\nsegregation, due process protections,\nclassification, case management,\nrestorative units, and the use of\nrestraints are currently suspended by\nexecutive order.\nThese prolonged suspensions have\ncoincided with serious operational\nchallenges, including the opening of new\nrestrictive housing units without full\nalignment with established oversight,\ndue process, and notification\nrequirements.\nWhen standards are suspended, whether by\nexecutive order or court order, the\nboard's enforcement tools, particularly\nthe variance process, are largely\nunavailable. Oversight continues, but\nwithout an enforcable regulatory\nbaseline for certain conditions of\nconfinement.\nThe board acknowledges and appreciates\nthe administration's decision to move\naway from the extended use of emergency\nexecutive orders suspending the board's\nminimum standards and to focus instead\non achieving full compliance.\nEmergency executive order number one\nreflects an intent to establish a\ndefined timeline for the department to\nreach compliance with the board's\nminimum standards and other applicable\nlegal requirements.\nLooking forward, the board strongly\nencourages restoration of the suspended\nminimum standards and reliance on the\nboard's variance process to address\nnon-compliance.\nThe variance framework provides\noperational flexibility while preserving\ntransparency, accountability, and public\noversight.\nThe board looks forward to working with\nthe department, the administration, and\nthe remediation manager to restore and\nstrengthen the minimum standards,\nsupport systemwide compliance, advance\nsafe and lawful transition away from\nRiker's Island, and reinforce public\ntrust.\nFinally, I'll briefly summarize board\nstaff observations regarding the\ndepartment's use of constant supervision\nat West facility, specifically in CDU9.\nDuring the week of December 4th, 2025,\nthe board received information raising\nconcerns about conditions in the West\nfacility contagious disease unit known\nas the CDU sprungs.\nIn response, board staff conducted an\nindependent review, including on-site\nobservations on December 11 and a census\nand document review on December 12th.\nWhat board staff observed raised\nsignificant concerns about how constant\nyou supervision was being applied and\nreviewed\nunder DOC directive 400 4021. Constant\nsupervision is intended to be a\ntemporary narrowly tailored safety\nmeasure. It is not designed to function\nas a long-term housing status. However,\nduring the board's December\nobservations, individuals in CDU9 were\nheld on constant supervision for\nextended periods, weeks, and in some\ncases close to two months without clear\ndocumentation demonstrating that such\nrestrictive conditions remain necessary.\nDuring this time, individuals were\nconfined to smoks and disposable\nundergarments denied facilityisssued\nclothing and personal property and\nexperienced inconsistent access to\nmandated services. These restrictions\nwere imposed even when individuals were\nnot on suicide watch and did not present\na documented risk to themselves or\nothers.\nCDU9 is a cell-based housing area, not a\ndormatory designated solely for constant\nsupervision. The directive, however, is\nsilent on how constant supervision\nshould operate and sell housing.\nDespite this, individuals on constant\nsupervision housed in CDU9 were required\nto surrender clothing and linens\nrestrictions that the directive\nexplicitly applies only in dormatory\nsettings designated for constant\nsupervision.\nOn December 12th, 2025, CDU9 housed 13\nindividuals, including four on constant\nsupervision. General population\nindividuals housed in the same unit were\nobserved wearing standard facility\nclothing. Board staff observed limited\naccess to recreation, religious\nservices, law library services,\ngrievance forms, and out of cell time.\nThese conditions affected all\nindividuals housed in CDU9, not only\nindividuals on constant supervision,\nraising broader concerns about\ncompliance with the board's minimum\nAlso concerning is the lack of a\nstructured review process for constant\nsupervision placements. At the time of\nBOC's observations, there was no con\nconsistent documentation identifying who\nauthorized placement, no regular\nreassessment of continued need, and no\nclear timeline for removal. Clinical\nstaff in the facility raised concerns\nabout the deteriorating mental health of\nindividuals on constant supervision and\ndid not support continued placement.\nThose concerns were not immediately\nacted upon. Individuals were ultimately\nremoved from constant supervision\napproximately 10 days after the board\nraised these issues with facility\nleadership.\nConstant supervision is an important\nsafety tool when used as intended. What\nthe board observed in December 2025\nhighlights the need for clearer\nstandards, regular review, meaningful\nclinical input, and stronger due process\nprotections.\nThe board shared the following\nrecommendations with the department in\nDecember. Constant supervision must be\ntimelmited and subject to regular\ndocumented review. Directive 4021 should\nbe clarified particularly with respect\nto cell-based housing.\nClinical input must meaningfully\nmeaningfully inform decisions about\ncontinuation or removal. and basic due\nprocess and access to mandated services\nmust be ensured.\nThe board looks forward to continued\nengagement with the department on these\nissues and to ensuring that constant\nsupervision is used appropriately,\nhumanely, and in compliance with\ngoverning standards.\nThat completes BOC staff's update.\n&gt;&gt; Thank you uh Jasmine for your executive\nuh report. Uh just uh two quick comments\non it. Uh with respect to the census, if\nwe can uh as in the past have a\nmonth-to-month\nuh as to the delta on uh PIC population,\nthat just gives a sense of the trends uh\nthat might be happening for the board to\nuh to have a quick ove ting with Mr. Demo\nto advance our shared goals of improving\nconditions for those working and living\non Riker's Island.\nOn behalf of our chair,\non behalf of the New York City Board of\nCorrection, I am honored to extend our\nheartfelt congratulations to Stanley\nRichard. on his appointment as the\ncommissioner of the New York City\nDepartment of Correction. Incoming\nCommissioner Richards brings to this\nrole a blend of lived experience,\nprofessional expertise, and commitment\nto justice centered reform. Having\nserved on this board from May 15, May\nthrough June 2021, including most\nrecently as vice chair, Commissioner\nRichards was instrumental in advancing\nthe board's mission to ensure safe,\nhumane, and equitable conditions in our\ncity's jails. Commissioner Rich's\nappointment is historic,\nmarking the first time a formerly\nincarcerated individual has been\nentrusted with leading the Department of\nCorrection as the department undertakes\ncritical work to improve safety, support\nstaff, and advance a more just system.\nThe board thanks Commissioner McGimi\nLitty for her service to the department\nand we look forward to working\ncollaboratively with the incoming\nCommissioner Richards in this next\nchapter. And I'd like to offer a\npersonal welcome to Commissioner\nRichards on his appointment. I recognize\nhis long-standing leadership in\nadvancing re-entry initiatives,\nalternatives to incarceration and\ncorrectional programming positions him\nwell for this role. He brings extensive\nexperience in criminal justice policy\nand practice affecting both incarcerated\nindividuals and those returning to the\ncommunity. I too would like to extend my\nmy appreciation to Commissioner McGinney\nLitty for her service and dedication to\nthe department and we look forward to\nworking constructively with Commissioner\nRiches in the month ahead. And\npersonally, I want to personally welcome\nsomeone with lived experience in a\nposition as such because we have lived\nexperience because our lived experience\nhas been translated and transformed into\nprofessional lived expertise because we\nwas there and we know how it is from\nboth sides of the table. It is time to\nlet lived experience and professional\nlived expertise lead the way to a new\nand reformed and transformed system and\nthat is personally from one lived\nexperience leader to another.\n&gt;&gt; Thank you uh vice chair. I I just also\nwanted to just personally uh thank you.\nI know it's in in written form and I\nthank you for for delivering that vice\nchair. Uh but uh I'd like to thank the\ncommissioner and her team uh because I\nknow that uh your services\nto the department have been really\ncommitted and continue to be committed\nand um\nduring this transition.\nif this board can support in any efforts\nthat uh\nmake that transition smoother without\ninterruption of services or and that's\njust not for PIC that's staff and\nadministration it's it's our body that\nsupposed to set the policy and the tone\nfor the department and and that means\nyou know the leadership as well. So we\ntake that very seriously here as a board\nand and please uh just as we get input\nfrom any public uh body we like input\nfrom the department to make this process\nbetter. So Jasmine please the\nresolution.\nResolution of the board of correction,\nFebruary 10th, 2026 public meeting.\nWhereas New York City Charter section\n626, subdivision Euthorizes the board to\nestablish minimum standards for the\ncare, custody, correction, treatment,\nsupervision, and discipline of all\npersons held or confined under the\njurisdiction of the Department of\nCorrection. Whereas chapter 4 of title\n40 of the rules of the city of New York\nallows for any person or entity to\npetition the board to consider the\nadoption of a rule and sets forth the\nprocedures for submission,\nconsideration, and disposition of such\npetitions.\nWhereas on December 12th, 2025, the\nboard received a joint petition for\nrulemaking concerning proposed rules\nrelating to access to counsel from New\nYork County Defender Services, Brooklyn\nDefender Services, the Bron Defend Bronx\nDefenders, Neighborhood Defender Service\nof Harlem, and the Legal Aid Society\nCriminal Defense. Whereas on February 6,\n2026, the board's chair notified the\npetitioners of the board's intention to\ninitiate rulemaking at its regular\nmeeting on February 10th, 2026 with\nregard to the petition submitted. Now,\ntherefore, be it resolved that the board\nauthorizes board staff to draft these\nproposed rules for the board's\nconsideration and undertake all aspects\nof rulemaking pursuant to the citywide\nadministrative procedure act. And it is\nfurther resolved that the board shall\nnot be bound by the language proposed,\nbut may amend modify such and or modify\nsuch proposed language, and neither\nshall the board be bound to enact the\nsubstance of the submitted petition.\nAnd it is further and finally resolved\nthat a copy of this resolution be posted\nconspicuously on the board's website.\n&gt;&gt; Board members, you have heard the\nresolution. Is there a motion? So moved.\n&gt;&gt; Is there any discussion on the\nresolution?\n&gt;&gt; All in favor say I.\n&gt;&gt; I.\n&gt;&gt; Oppose.\nThe resolution passes.\nWe will now hear updates from the\ndepartment on the agenda items.\nUh DOC update, emergency preparedness,\npower outage, service disruptions, and\nwinter storm.\n&gt;&gt; Good afternoon again, members of the\nboard. My name is Francis Torres and I\nserve as the first deputy commissioner\nat the New York City Department of\nCorrection. I am here today to provide\nan update on emergency preparedness,\npower and service disruptions, and\nBeginning in October 2025, the\ndepartment initiated its cold weather\nprotocols to safeguard the well-being of\nstaff and those assigned to our care.\nfor persons in our care. These measures\nincluded the preemptive distribution of\nwtergrade\nuniforms for persons in custody,\ncontinuous temperature monitoring across\nall housing areas with staff prepared to\ntake immediate action should\ntemperatures fall below 68°.\nAdditional information regarding our\ncold weather plan is available on our\npublic website.\nThis year, the city has had more snow\nprecipitation than in previous years.\nIn the days preceding multiple snowfalls\nand winter storms, the department\nthrough coordination led by the\npreparedness and resilience unit\nmobilized its emergency operations\ncenter to facilitate realtime\ncommunication and resource coordination.\nMaintenance teams commenced salting\noperations ahead of each storm,\ndeploying specialized equipment to\nensure that all pathways remain passible\nfor the secure movement of staff,\npersons in custody and visitors.\nSimultaneously, facilities maintenance\nand repair division known as FMRD\nstaff conducted comprehensive exterior\nintegrity checks to identify and address\npotential structural hazards and\nconditions evolved.\ndespised\nthese extensive preparations.\nThe subsequent weather conditions\ncreating an unforeseen challenge beyond\nthe department's control.\nOn Thursday, January 22nd, the\naccumulation of moisture from the\nsnowstorm on January 18th, combined with\nnecessary islandwide salting operations\nin anticipation for a severe snowstorm\nexpecting expected that upcoming weekend\nimpacted\nour external utility infrastructure.\nThe combination of melting snow and road\nsalt infiltrating underground systems\ncorroded electrical cables and cause\nequipment failure.\nThis issue was not unique to Riker's\nIsland and contributed to similar\nlocalized service disruptions citywide.\nIn response, FMRD took immediate action\nto mitigate impacts to the department's\npower systems.\nThis rapid mobilization ensured that\nfacility operations remain stable and\nthat the safety of individuals in\ncustody was never compromised by these\nexternal factors.\nIn response to the disruption, emergency\ngenerators were automatically activated\nacross all facilities,\nsuccessfully resolving power issues as\nthey arose.\nHeating services remain uninterrupted\nthroughout the event as steam and heat\nare supplied by the main powerhouse\nand supplemented by radiant heating\nsystems. FMRD teams were deployed on\nsite to address individual power issues\nin real time, providing both technical\nmitigation and status verification.\nOut of an abundance of caution within 24\nhours, the department also secured and\ninstalled additional rental generators\nto serve as secondary backups.\nFollowing these efforts, Connecticut\nsuccessfully restored shore power to the\nisland on Friday afternoon. However,\ntelecommunications remain impacted until\nFriday night.\nTo be clear, the power and service\ndisruption we managed did not result\nfrom the subsequent snowstorm. These\nwere two distinct events. Preparation\nfor the snowstorm on January 25th was\nextensive. In advance of the storm, the\npreparedness and resilience unit was\nactively monitoring weather conditions\nthrough ongoing coordination with New\nYork City Emergency Management, the\nNational Weather Service, and the city's\nmeteorologist, allowing the department\nto anticipate the timing of the storm\nand the nature of its expected impacts.\nCoordinated by preparedness and\nresilience unit, the department\ncommunicated across divisions to ensure\noperational readiness, including\ninspecting snow removal equipment,\nbackup generators, heating systems, and\npower infrastructure to confirm that all\nwere stage and fully operational.\nVerifying that adequate fuel, salt, and\nbrine were on hand,\nstaff began bringing and and brining and\npre-saltting critical access points\nseveral hours in advance of forecasted\nsnowfall and resources were staged to\nsupport snow removal across all\nfacilities. The department also ensured\nthat additional staff were on site\nthroughout the event, including skilled\ntrades people such as plumbers, oilers,\nelectricians, heavy equipment operators,\nand stationary engineers to immediately\naddress any emergencies that arose.\nIn addition, the department confirmed\nthat heating systems were operational\nand that protocols were in place to\nensure that any reports of temperature\nor water issues in housing areas would\nbe promptly escalated for review.\nEssential supplies were stocked in both\nthe central house and facilities in\nadvance of the storm, including cuts,\nlinen, cold weather gear, lighting\nequipment, and water to support both\nstaff and persons in our care.\nFacilities confirmed adequate supplies\nand additional provisions were provided\nto the facilities in need.\nThe department also ensured that\nvehicles were prepared for court\noperations and that kitchen equipment\nwas operational.\nMessaging was prepared for families of\npeople in custody through the\ndepartment's public facing website,\nsocial media, and 311.\nThe department also communicated with\nstaff through internal communications.\nDuring the snowstorm, the department\nensured continuous service delivery,\noffering sheltering for essential\npersonnel on site, including uniform\nstaff, kitchen staff, and facility\nmaintenance personnel.\nThis proactive staffing strategy ensured\nthat nutritious\nhot meals were provided without\ninterruption, island roadways were\nremain or remain accessible and all\ncritical critical posts remain fully\nstaffed. In addition, the department\nimplemented a complimentary shuttle\nservice to support the safe and reliable\ntransportation of members of service to\nand from Riker's Island.\nWhile safety concerns necessitated the\ntemporary suspension of certain\nin-person services on Sunday, January\n25th, the department used its digital\ntablet platform to ensure continuity of\nessential services.\nThis platform provided realtime updates\nregarding courts closures and mandated\nprogramming ensuring individuals in\ncustody remain fully informed through\npartnerships with securious technologies\nand adobo application. The department\nprovided a wide variety of supplemental\nservices including academic courses,\nworkforce readiness training and digital\nlibrary with mental health and wellness\nresources.\nTo further support recreational needs\nduring the storm, complimentary movie\naccess was provided for from January\n23rd through January 30th. In addition\nto access to other idleness reduction\nopportunities\nfollowing the conclusion of the storm\nresponse, all operations and in-person\nservices resumed without delay. The\ndepartment remains committed to\nleveraging both personnel and technology\nto maintain the continued reliability of\nessential services. We're also committed\nto learning from these events and are\nactively engaged with external partners\nto secure funding needed to address\nlong-term infrastructure challenges\nand strengthen the reliability of\nessential services for our staff and\nthose in our care. Thank you.\n&gt;&gt; Thank you very much. Uh\nfirst uh deputy commissioner we'll now\nlook for the briefing for first any\nquestions\nfor member Staso and then vice chair\nskipper.\n&gt;&gt; Yeah.\n&gt;&gt; Hi.\n&gt;&gt; How are you?\n&gt;&gt; Um I'm good. Thanks. Is is my mic\nworking? Can you hear me?\n&gt;&gt; Um thank you for that. I um sounds like\nyou did an enormous amount of\npreparation and really worked hard to\nmake sure that services remained in\nplace. Um, I I was I was hoping you\ncould describe a little bit more sort of\nwhat uh how continuous temperature\nmonitoring works. Um, I'm curious\nspecifically about what areas are\nmonitored, dorms, cells, common areas,\nintake areas. I I remember from my time\nat Riker that um some areas are quite\nwarm, other areas do seem to get quite\ncold. I know there must be challenges\nwith the physical plant in terms of\nkeeping the heating, you know,\nconsistent throughout, but um I'm\ncurious also about, you know, is the\nmeasuring happening at night when the\ntemperatures drop? What happens when the\ntemperatures drop below 68 degrees? How\ndoes that get escalated? What do you do\nabout it? It'd be great.\n&gt;&gt; So, let me bring our acting assistant\nchief um Caputo to give you a little bit\nmore detail on that. I do tell you that\nimmediately when it is going below 68,\nthe commands are expected to make\nnotification to our facility\nmaintenance, meaning the FMRD team\nassigned to the jail. Usually and\ntraditionally that happens to be our\nsupervisor of mechanics assigned to the\njail and they are the ones who actually\num respond to the emergency to abate the\nsituation.\n&gt;&gt; Good afternoon members of the board and\nthank you for the question. There's\nspecific policies in place as far as\ntemperature monitoring. It has to do\nwith the time of year and the season. So\nin in the winter months the temperatures\ntaken at night when the sun is down and\nthe expectation would be it would be\ncolder. Um there's a certain percentage\nof the facility that is required to to\nhave temperatures taken. Um your\nquestion is correct as far as areas of\nconcern. We take it in dormitories. We\ntake it in cells and it's it's changed.\nSo it's not always the same areas and in\nthe same place. Um they take it in\ncommon areas as well. Then that\ninformation is um given to the deputy\ncommissioner of the um environmental\nhealth and it is monitored and tracked.\nIf there's an area that is of concern\nbelow the temperature that's required,\nthey put remediation uh um into place. U\nmaintenance, emergency maintenance is\nnotified and if it can't be rectified,\nthen alternative housing would be then\nput into place. Individuals would be\nremoved from the area.\nAnd then if you in listening to my\ntestimony, I did mention the emergency\noperations center which falls under the\npurview of our senior deputy\ncommissioner. It is activated\num at a specific time and all of the\nareas are to submit to the EOC\nanything that requires attention by our\nSo it is not only captured inside the\njail in real time but also is captured\nby the EOC assigned to the senior deputy\ncommissioner's office.\n&gt;&gt; Would it be possible I'm I'm assuming\nyou don't know this off the top of your\nhead right now, but maybe to share with\nus afterwards how many times\ntemperatures have been recorded to drop\nbelow 68 degrees in this\nover the last couple weeks. That would\nbe great. Um, and then just as a\nfollow-up to that, it it came to my\nattention that this week there was a\nchange in the policy about thermals uh\nbeing permitted in packages. Um, sort of\nnot great timing g, you know, given how\ncold it is outside. But I was just\ncurious if someone might be able to\ncomment on uh the reason for that change\nin policy and uh if thermals are being\nprovided if someone could give us a\nlittle bit more information about what\nis being provided how many sets how you\nknow is it something that's being\nprovided automatically or something that\nuh people\n&gt;&gt; to be quite honest with you I don't have\nknowledge of it I know that when it\ncomes to us right now we do have\nthermals available for our individ\nindividuals assigned to our care and\nCaputo may have an answer as well.\n&gt;&gt; Appreciate it.\n&gt;&gt; How you doing? I'm sorry and thank you\nfor the question again. Um that came to\nlight when we were updating our policies\nas far as the in in-person delivery of\npackages. So items that we distribute\nand we have available to give to the\npopulation is something that we preclude\nfrom being included in the packages. So\nwe have over 30,000 p of thermals ready\nto be distributed and being distributed\num for everyone that's in our custody.\nSo that was the reasoning behind it.\nI understand that, you know, the timing\nwasn't ideal, but you know, we were\ntrying to make sure that we get back the\ninerson package delivery um and and\ntrying to make sure that we afford\neverybody the thermals. So, we have\nample supply and we've given them out to\neveryone.\n&gt;&gt; Okay. I it it just sounds like a lot of\npeople are asking and distressed by the\nfact that they can no longer get these\nin packages. It are they warm? What are\nthe thermals you're giving out made of?\nI mean,\n&gt;&gt; I mean, I think the thermals are\nrelatively standard. I mean, they're\nregular they're regular thermals. We're\nhappy to show you them when you want to\nsee them.\n&gt;&gt; Okay. Just trying to get to the bottom\nof why there's such distress, you know,\naround.\n&gt;&gt; I think that when something is changed,\nit it creates concern. And then, you\nknow, you couple that with the\ntemperatures, but we got the message out\nto everybody that they're, you know,\nbeing given for free, which is, you\nknow, I think better than having to put\nthe burden on the families to have to\nbuy them and deliver them.\n&gt;&gt; Okay. Thank you, Bo Mustaso. Vice Chair\nSkip.\n&gt;&gt; Yes. Um, excuse me, sir.\nThank you. Um, in regards to this\nthermal issue,\nthis week and last week, we have been\nset upon in this city by unprecedented\ncold. So to hear you say that they are\nbeing distributed, which leads me to\nbelieve that not everyone has gotten\nthem that should have them. We have been\nbetween zero and 10° for the last two\nweeks since the snowstorm.\nI need to know how many people have\nthermals,\nwhat is the procedure for issuing the\nthermals, how many sets they have, and\nare you doing and how how do you\ndistribute? Do you do this by facility,\nby housing area? Like what is going on?\nWe've been at zero for the last two\nweeks. And to hear that people don't\nhave thermals and you are not allowing\nthem in through the packages where their\nfamily can buy them from them. This is\ndisturbing to me. It's very disturbing.\nSo, I really would like to have those\nanswers by the next board meeting. Thank\n&gt;&gt; Okay. Definitely. Thank you.\nBut if I may add to his response, um,\nco-chair,\nin preparation for the winter and\nsignificantly for the freezing\ntemperatures that we were expecting, not\nonly did we stock up the thermals at our\nstorehouse, but we made sure that all of\nthe facilities came in to pick up\nthermals\nto have internally in their areas. So\nmuch so that we made the necessary\narrangements to have the storehouse in\nthe event that any of the facilities ran\nlow and the only requirement, the only\nthing a person assigned to our care had\nto do was ask the housing area officer.\nI think I needed to share that with you.\n&gt;&gt; Thank you so much, First Deb. And that\nseems like a very good plan. What I need\nto know was was that plan followed\nthrough.\n&gt;&gt; What are the numbers behind it?\n&gt;&gt; We can confirm.\n&gt;&gt; Thank you so much.\n&gt;&gt; Sure thing.\n&gt;&gt; I'm going to miss you too. First step.\n&gt;&gt; Member Franco.\n&gt;&gt; Hi Torres. Um we heard a lot today about\nblankets and clothing. Can you explain a\nlittle bit more about why it's not not\ngetting to folks from the reports that\nwe heard?\n&gt;&gt; So to be quite honest, we will have to\nlook into it because what I think it's\nmy obligation to share with you in\npreparing for any storm.\nWe always put online\ninternal phone calls, not just with the\nmembers of the executive team, but every\nmember who leads a jail from a warden to\nan assistant commissioner to deputy\nwardens. And as part of our\nexpectations, we convey to them the\nimportance of ensuring that number one,\npersons assigned to our care have their\nwarm clothing, that windows are closed,\nthat they are very specific\nand basic\nneeds that have to be met. Those phone\ncalls are ongoing and they go for the\nentire duration of a storm. We ask live,\nis there anything that you need from any\nof us in order for us to report and\nsupport whether it is our storehouse\nstaff that is assigned for that evening\nto actually pack up the necessary items\nthat are being requested by the jail and\ndelivered to the command or have the\ncommand do a pickup of the items?\n&gt;&gt; Very simple question. So if if we go to\nany of the jails, they have blankets and\nextra clothing available as well.\n&gt;&gt; Yeah, expected to.\n&gt;&gt; Mhm.\n&gt;&gt; Question.\n&gt;&gt; Yes. Uh go ahead.\n&gt;&gt; Thank you. Thank you. First, deputy. Um\nI had a question about the reason for\nthe power outage. You had stated that it\nwas due to the corroding of electrical\nlines. Mhm.\n&gt;&gt; Um and it sounds as if you've taken\nexhaustive measures to, you know,\nmitigate that. Are there any contingency\nplans in the future to prevent that from\nhappening?\n&gt;&gt; So, we are always prepared. for an\nexample.\nNot only have we relied on the\ngenerators that we currently have\n&gt;&gt; in addition to the backup generators, we\nalso increased the number of rental\ngenerators that we have. When it comes\nto the situation that we experienced,\nwhich is not uncommon, our FMRD in\nconsultation and direct work with\nConetison continue to address just to\nmake sure that our cabling is intact and\nit is an ongoing process.\n&gt;&gt; Sure.\n&gt;&gt; Board member Stassel,\n&gt;&gt; just one followup question about\nsomething you just said about the\nwindows. Um, my understanding from the\nlast Benjamin monitor report was that\nthere were, I think, hundreds of\ninoperable windows. I'm wondering if it\nwould be possible to get us sort of an\nupdated count on that and have a better\nunderstanding of how that may be\ncontributing to low temperatures and,\nyou know, what gets done in terms of\nwork to try to fix those. That would be\ngreat. Thank you.\nin in that report and follow up to board\nmember Staceel, I've observed just\nthrough personal encounters that some\nPIC's demand that windows remain open.\nSo is there refusal in that report as\nwell or do you mandate that they be\nclosed during? So, we actually work with\neverybody to make sure that the windows\nare closed because it throws off not\njust their cell but the entire housing\narea. Um, but we will look into what it\nis that we have available to share with\n&gt;&gt; Okay. Thank you. And now we'll look at\nthe DOC briefing implementation of de\ndeath report recommendations.\nAll right. Good afternoon again, uh,\nmembers of the board. Um, my name is\nJoseph Caputo. Currently, I serve as the\nacting assistant chief of facility\noperations and also the criminal justice\nbureau. Um, I'm here today to provide an\nupdate on the department's\nimplementation of the board of\ncorrections death report\nrecommendations.\nMany of the recommendations uh on\ntoday's agenda pertain to long-standing\ndepartment policies that are designed to\nensure safe and secure environment for\nall persons in custody. These policies\nare routinely reinforced through various\nmeasures to ensure facility operations\nfunction safely and effectively.\nWith respect to the supervision, touring\nand logbook compliance, as I mentioned\nat our November meeting, touring remains\na core correctional practice. All\nuniform staff receive training on\ntouring and supervision beginning in the\ncorrection academy. That training is\nreinforced for newly promoted captains,\nassistant deputy wardens who are\nresponsible for overseeing mentoring the\nstaff that they supervise. I can tell\nyou from direct experience. As someone\nwho moved up through the ranks, the\nagency has never wavered from our focus\non ensuring staff are touring. Touring\nexpectations are further reinforced at\nroll calls, through departmentwide telet\ntypes, and through active supervision\nwithin our housing areas. Supervisors\nare required to tour housing areas\nregularly and ensure that staff complete\ntheir required rounds. During these\ntours, supervisors reinforce key\nexpectations, including remaining on\npost, prohibiting unauthorized\nindividuals from entering that post, and\nensuring compliance with single cell\noccupancy requirements. When policies\nare not adhered to, supervisors take\ncorrective actions, and officers may be\nsubject to discipline.\nIn addition to the direct supervision,\nthe tour wan system allows the\ndepartment to utilize technology as an\nadditional tool to monitor compliance\nwithin housing areas and touring\nrequirements. The video monitoring unit.\nThis unit also serves as a supplemental\noversight tool, but is not designed to\nprovide continuous monitoring of all\nhousing areas. The department\nprioritizes active and direct\nsupervision and care on the ground.\nofficers who are physically present in\nthe housing areas and are able to\nrespond immediately to emergencies and\nsupport the people in custody in real\ntime. This is particularly important\ncritical post including those within\nprogram for accelerated clinical\neffectiveness or our PACE units.\nFacility leadership is consistently\nreminded to prioritize maintaining\nappropriate staffing levels required by\npolicy. And in December of 2025, the\nPACE units were fully staffed\napproximately 76% of the time. While\nstaffing challenges persist, the\ndepartment continues aggressive\nrecruitment efforts to strengthen\nstaffing levels and sustain appropriate\nThe department also recognizes that\nstaff are its most critical resource and\nthat effective training is essential to\nensuring timely and appropriate\nresponses during emergency situations.\nOfficers receive training in\ncardopulmonary resuscitation, automated\nex external defibrillator use and also\nNarcan administration as well as first\naid,\nsuicide prevention and intervention and\nconflict resolution, crisis intervention\nduring uh and and also they receive\ntraining during uh regarding crisis\nintervention. In addition, last year the\ntraining and development division\ncreated and delivered a specialized\ntraining titled preventing and\nresponding to deaths and medical\nemergencies. This was given to the newly\npromoted assistant deputy wardens. The\ndepartment has also developed a\ncomprehensive medical emergency\ncurriculum which was approved by the\nfederal monitor at the end of January.\nAnd the training and development uh\ndepartment is currently developing and\nimplementing a plan for inservice\ntraining for staff and a current recruit\nclasses class is respected is expected\nto receive this training. Collectively,\nthese efforts reflect steady progress in\nthe department's work to enhance safety\nfor people in custody and as well as\nstaff. We recognize that there is more\nwork to do and the department remains\ncommitted to pursuing thoughtful\npractices that support safe and\nwell-maintained jails and well-managed\njails. As we stand in the shadow of the\nbur burrow-based jail initiative, the\ndepartment will be exploring a deeper\nassessment of all our policies to ensure\nthat we are clear and align with the\nbest correctional practices. Again, real\nmeaningful and sustainable change must\nbe ongoing for it to have a lasting\nimpact. We continue to welcome the board\nsupport and transform and modernize our\nagency. I welcome any additional\nquestions that you may have.\n&gt;&gt; Board member Stu,\n&gt;&gt; I appreciate that there's training about\nthis, that there's supervision about\nthis, that there are some systems that\nare trying to do surveillance to make\nsure that the touring is happening. But\nit's not happening. It hasn't been\nhappening consistently or adequately for\nyears. I've been reviewing the\nsurveillance in a variety of capacities\nfor the last 6 years and continuously\nseeing hours go by on these units where\npeople are supposed to be being checked\non every 15 minutes and they're not\nbeing checked on. So, I I don't have a\ngood sense of what the problem is here.\neither this is a supervisory issue where\nthe people who are making these rules\nand feeling that it's important that\nthis should be happening are not aware\nor it's an accountability issue where\nthe people who are actually doing it\ndon't care what their supervisors think.\nSo, I don't know how to sort of push\nthis more aggressively, but I think that\nthere really needs to be a corrective\naction plan in place, starting with an\nacknowledgment that whatever's been\ngoing on is not working and and this\nreally needs to be looked at. I mean,\ndeaths that I've reviewed over and over\nagain for years, this has been really a\ncentral failure that the the baseline\nmonitoring, just eyes on somebody with a\nregular frequency in accordance with\nyour policies is not happening. So, I\nreally would like to see steps taken to\naddress this in a little bit of a more\nrobust way.\n&gt;&gt; Um, I don't know if that was a question,\nit was more of a statement, I think. So,\nDo do you want a response to that or\n&gt;&gt; um can you give me some reassurance that\nyou're really going to work on this?\n&gt;&gt; I I mean the reassurance can be that we\nwe give this the utmost level of\npriority, right? We have mechanisms in\nplace that hold staff accountable and\nand listen, you you can't\na problem of this magnitude as you're\ndescribing it, it's not solved strictly\nby discipline. You can't discipline your\nway out of every single problem, right?\nSo it's it's it's ensuring that people\nare doing what they need to do and doing\ntheir job what's required of them. We\nhave mechanisms in place that track and\nmonitor that. Um you know some I know\nyou guys like the video monitoring unit.\nI don't think that's the answer but it's\na tool. Um we have the towan system\nthat's a very valuable tool as well. Um\nbut the most valuable resource is that\ncorrection officer that's on the ground\nand doing the job and and and doing\ntheir rounds. Um, listen, unfortunately,\nsome of these negative events that have\noccurred, um, there was lapses in tours,\npossibly discovered in the research, but\nif if an officer is required to tour\nevery half hour or in some units every\n15 minutes, as you alluded to, based\nupon staffing levels, um,\nthere there's individual ething that will help to make a\ndifference as well. Um, just leading by\n&gt;&gt; Fair enough. Thank you.\nU executive director.\nI think our our plan not plan obligation\nis to respond to the individual\n&gt;&gt; Stand standowns meaning from\n&gt;&gt; they're under investigation from the\nexternal oversight bodies,\n&gt;&gt; right? And they told you to not\ninvestigate yourself.\n&gt;&gt; Yeah, that's that's kind of how that\nhappens when it's a referral. We wait\nfor a, you know, a notification from\nthem that they've completed or will not\nbe undertaking a further investigation.\n&gt;&gt; Okay,\nwe'll follow up.\n&gt;&gt; Yep.\n&gt;&gt; Thank you. Any other questions in this\nsubject area, board members? Touch.\n&gt;&gt; So, thank you. And uh so now D briefing\nconstant supervision uh operations\nGood afternoon. Fritz Fra, senior deputy\ncommissioner for uh Department of\nCorrections.\nGood afternoon, members of the board. My\nname is Fritz Fra and I serve as a\nsenior deputy commissioner at the\nDepartment of Corrections. I am here to\ntoday to provide an update on the\ndepartment's constant supervision\noperations.\nWe appreciate the board raising concerns\nregarding constant supervision within\nWest facility leadership on December\n5th, 2025.\nUpon being notified, facility leadership\nescalated the matter to executive\nleadership. After the matter was\nescalated internally, executive leisure\nconducted a review of the department's\nconstant supervision directive as well\nas ethical board of corrections and\nstate corrections of state commission of\ncorrection standards.\nBased on a review, the department\ndetermined that the individuals\nin question should not have been issued\nsmok\nand corrective action was taken.\ndepartment issued clothing was returned\nand the individuals were removed from\nconstant supervision at West facility\nand transferred to other facilities on\nDecember 15th. Currently, persons in\ncustody who are placed on con\nsupervision and who are not on suicide\nwatch are being placed are not being\nplaced in Smoxs.\nWhile constant supervision protocols are\ndesigned to ensure the safety of both\npersons in custody and staff, the\ndepartment recognizes that the current\ndirective does not sufficiently\ndistinguish between procedures for\nconstant supervision and suicide watch\nand that the two may be conflated. The\ndepartment agrees that additional\nclarity is needed to to ensure that\npractice aligns with intent and\napplicable standards and appreciates the\nboard's recommendations regarding\npotential updates to the directive.\nThose recommendations will inform future\npolicy reviews and revisions.\nThe department's policy and procedure\nunit reviewed directives to ensure that\npolicies are operationally sound and\nalign with oversight standards. As part\nof this review, the department will\nconsider how clinical input from CHS\ncan be incorporated into any updates of\nthe constant supervision directive.\nAs the board is aware, the department is\ncurrently in a transition period. In the\ncoming weeks, we will be meeting\ninternally to do a review of this\ndirective and the issues presented. We\nwill provide updates to the board after\na complete full review is conducted.\nWe appreciate the board's continued\nengagement of this and look forward to\nongoing collaboration as we work to\nstrengthen and clarify the policies. I\nwelcome any additional questions the\nboard may have.\nBoard members, any questions?\nBoard meas.\n&gt;&gt; Thank you. Um, can you tell us how many\npeople are under constant supervision\nright now? Constant Yeah.\n&gt;&gt; I can get the exact numbers as who I'm\nwe're discussing the four concerns that\nyou have, but I can get you the exact\nnumber of who's in constant supervision\nuh shortly. Yeah, I mean I understand\nthat you're doing a more thorough\ninvestigation into this. You're going to\nshare policies and you know the telet\ntypes with us. That's great. I guess in\nthe meantime it would be helpful to know\nhow many people now how many facilities\nwhere people are being housed in\nconstant supervision. Um and also\nwhether there's um a mechanism in place\nfor someone to ask to come off of\nconstant supervision and how that works\num in the system. Um,\nI'm also wondering about whether there\nare other\nsituations in which general population\nfolks would be housed in the springs.\nEither is this just for constant\nsupervision? Are there other situations\nin which DOC houses general population\ninmates in the in the springs?\n&gt;&gt; Uh, the first question uh the first\nquestion I'll answer is reference to is\nthere a procedure to review? We since uh\nthe BOC made the recommendations we have\nput a procedure to review which will be\nupdated in the policy once the new\nadministration comes in and we can uh\nupdate the policy to PPU. Currently,\nright now, anytime anyone is put in\nconstant supervision, every two weeks,\nthe facility manager, which in this case\nbe the warden, will coordinate with\nCMCMU and OSIU and the executive\nleadership and discuss if it's still\nwarranted based on intelligence, based\non findings, whether we continue or we\ntake them off based on those standards.\nSo, there is a review process. It's not\nofficially in reference to PPU in the\ndirective because that's going to come\nin the future once we finalize all those\ndetails.\n&gt;&gt; Okay? And the second question,\n&gt;&gt; uh, the second question was about, uh,\nreason for GP folks to be in the CDU\nsprungs.\n&gt;&gt; There could be various reasons. They\ncould be involved in very serious\noffenses, constantly attacking officers.\nThey could have other issues that there\nmay be a reason to put them. Some were\nseveral we could manage them more. Like\nwe had a individual that was\nconsistently attacking officers and they\ncause injuries. So we they were in the\nsprungs and then we ended up getting\nthem uh sent to another facility because\nthere was so much violence of this other\nofficers. So there it it' be a totality\nof circumstances aso intelligence and uh\nstatus uh SRG status concerns for their\nsafety and officer safety. But uh if you\nwant the exact detail of who and when we\ncan provide that at a future date. Well,\nI'm concerned that that that would be an\nexample of the Sprungs being used as\nrestrictive housing.\n&gt;&gt; No, not necessarily. Well, in this case,\nwe only had one instance I'm telling you\nabout where uh I forgot the individual's\nname. We got him put out. He attacked\nseveral officers and he was pending\ncourt and threatened to uh to kill\npeople. In fact, when we went to the\ncourt, he was violent and the judge\nwanted him secured in another facility\nand we moved him to I believe Suffach\nCounty for that purpose. That was the\nonly instance that I'm aware of that\nsomething was put there, but I'll check\non any other instances. But that was a\npublicly announced instance. The the\njudge set the order down to us to put\nthem in some other location. That's the\nonly instance where I've known they\nmoved somebody to there. But I'll check\non any other barriers we may have.\n&gt;&gt; Okay. And under those circumstances,\nwould there be any changes in terms of\nprogramming someone was entitled to or,\nyou know, attire or belongings?\n&gt;&gt; No, it wouldn't be it wouldn't be if we\nwere segregated. It was just for safety\nconcerns for him and officers. this\ncase, I think three or four officers got\nbitten and then there was attacks and\nthen we ended up having it he was\ncharged through our criminal\nintelligence squad CIB and then when he\nwent to court he had several cases and\nthat was a distinct case. I don't have\nhis name in hand but it was a popular\ncase that went forward. That's the only\ntime that happened and it was extreme\ncircumstances to the reason why it\nhappened.\n&gt;&gt; Yeah. and and name is not necessary, but\nI can tell you that I I witnessed part\nof the incident, sociated\nwith the facilities and having\nconversations to make sure we can close\nthose gap that regardless of when an\nemail comes in that that information is\nforwarded to us timely to make\nadjustments and move uh the PIC's in and\nagain we agreed with the recommendation\nit's just a matter of the interpretation\nof two conflicting uh directives that\nthey assume that they were uh that that\nthis can be done we agreed with the\nboard's recommendation and follow them\naccordingly from the deed that I\nreceived\n&gt;&gt; I appreciate that and I certainly\ncertainly appreciate that it may take\ntime to fully investigate a concern like\nthat and to escalate it appropriately\nand to decide what to do. I think some\nacknowledgement that it's being looked\ninto, you know, in in less time than a\nweek would be appreciated by our staff.\n&gt;&gt; Yes, ma'am. Thank you.\n&gt;&gt; Question. Go ahead.\n&gt;&gt; Thank you. Um, quickly, does being under\nconstant supervision affect lockout and\naccess to commissary and access to pro\nprogramming?\n&gt;&gt; No, not necessarily. In fact, when I\nthink there was a request, I think they\nreceived Lola the entire the entire time\nthey were there. I just checked recently\non um wreck, they were offered and some\nwere afforded wreck. So, the notion that\nthey weren't afforded programs is not\nnecessarily 100% accurately true.\nSometimes they refuse wreck. uh persons\nthat are in those areas of\nconstitutional supervision. Now, I would\nput a policy in place instead of just\ncoordinating going in asking who wants\nto go to wreck. We're going to we're\ngoing to ensure that we're going to use\nthe body cameras to our advantage and\nmake sure that they go specifically with\nbody camera footages asking do you want\nto go to wreck? Do you want to go to\nthese areas to ensure that when there's\nan issue, we can follow up with proof\nthat that these were afforded? But I\nknow for a fact that law library was\nafforded. they they they got to enging environment.\nUh the first area I'm going to talk\nabout is the are the processes to ensure\nconsistent identification, documentation\nand referral of individuals requiring\nhospital level of care.\nCHS uh next slide please.\nAnd next slide please.\nuh CHS has simp systems, procedures and\npolicies in place to ensure that\npatients are appropriately referred to\nhospital level of care. Uh it's within\nthis structure that individual providers\nmake deci clinical decisions about each\npatient. DHS policy is that patients who\nrequire a higher level of care that is\nthan is offered in the jail setting\nshould be immediately transferred to an\nacute psychiatric hospital for\nevaluation and possible admission.\nUh next slide please.\nUh there are a number of potential\nclinical indications for which a patient\ncould be referred to the hospital but\nthese are the most common ones. They\ninclude an immediate danger to self due\nto psychiatric symptoms or uh an\nimmediate danger to others due to\nsymptoms of mental illness or an\ninability to take care of oneself in\nsuch a grievous manner uh that\njeopardizes a patient's safety due to\nmental illness.\nCHS uh works to ensure that hospital\nreferrals are consistent through a\nvariety of measures uh including\neducation, collaboration with our\nproviders and supervision.\nWe provide to staff caring for our\npatients trainings on hospital referral\nprocedures\nuh education about the involuntary\nhospital admission criteria as well as\nvarious guides, handouts um and\npolicies.\nWhen providers meet with patients during\nevery clinical encounter, they are\nexpected and do consider\nuh the assigned level of mental health\ncare. Uh these are also discussed during\ntreatment team meetings\nat every level of care and within each\nfacility.\nuh all mental health clinicians,\nclinical supervisors, psychiatric\nproviders, mental health unit chiefs and\nmedical providers are able to make\nhospital referrals. Uh we also provide\num supervision to managers and direct\ncare providers to ensure adherence\nconsistently to policies and procedures\nregarding escalation of care. Uh and\nwhen providers are uncertain about\nwhether a patient may benefit from\npotential hospital referral uh they\nconsult with a supervisor or if not\navailable an on call administrator.\nNext slide please.\nWithin every clinical note that CHS\nproviders complete, they document the\nconsideration of the assigned level of\ncare and consider\nlevels of care. Um, we have also\ndeveloped a new standardized clinical\nrisk assessment template uh for all of\nour clinical encounters to further\nsupport the documentation of risk\nassessments and consideration of higher\nlevel of levels of care.\nUm and uh additionally we have a number\nof various uh reports that managers use\nto monitor clinical factors which\ninclude things like medication\nadherence, clinical stability and\nself-care.\nUh and just a note that while we do\nrefer many patients to the hospital when\nwhen we feel that it's clinically\nappropriate, it is ultimately the\ndecision of uh clinical staff working at\nthese hospitals as to whether or not\npatients are admitted. So a very large\nnumber of of patients who we believe uh\nmay meet hospital criteria are um\nultimately not admitted to the hospital.\nUm so this ends my first part of the\npresentation. I'm happy to take\nquestions on on this portion.\n&gt;&gt; Vice Ch.\n&gt;&gt; Yeah. You said that um it is up to the\nhospital to actually admit even though\nyou guys have already done your\ndocumentation and due diligence and are\ntransporting them to the hospital. So\nthen what happens next?\n&gt;&gt; It's very very challenging situations to\nto navigate.\n&gt;&gt; Tell me about it. You know, it it varies\non a case-by- case basis. Our clinical\nteams meet to try to develop plans to\nthe extent that are possible to work\ntogether and be creative in in ways, you\nknow, that\ncan be developed. We work with our DOC\ at with us. Um, and also maybe some of\nthe monitoring reports that you're using\nnow, um, to sort of facilitate\nsupervision. I think, um, you know, to\nme the most concerning group is, um, not\nnecessarily the folks who are imminently\ndanger dangerous to themselves and\nothers. you know, those are a little bit\nmore of a slam dunk, but the folks who\nare really struggling to care for\nthemselves in the jail setting, which,\nyou know, I think um many people who\nspend years working in the jails can be\nsort of can become sort of inured, you\nknow, to those observations. And um\nthat's a real challenge. So, you know, I\num I think it's great that you guys are\ncommitted to sort of an ongoing um\naccountability, you know, for providers\nto be able to sort of recognize those\nchallenges. And um I'm curious about\nwhether there are any particular\nchallenges that you've identified um in\nterms of being able to sort of catch\nthose folks um and escalate them to a\nhigher level of care um whether that's\nfrom sort of a supervis supervisory\noversight perspective or education that\nyou're doing with the clinicians on the\nground.\nYeah, thank you uh for the comments and\nand questions and we can definitely work\nto um get you those materials that that\nwe're working on to to review. Um you\nknow, I think it's it's challenged and\nwe have you know a lot a lot of\nproviders and and a lot of uh very sick\npatients and so\none of the areas that we have been\nfocusing on has been exactly this\ninability to care for herself. I think\nit is the most vulnerable group of\npatients. And so, um, when we share with\nyou these changes that we've made, we\ncan show you some of the specific, um,\ntweaks that we've made to really focus\non that specific cohort of of of\npatients.\n&gt;&gt; Michael,\n&gt;&gt; yes. Yes.\n&gt;&gt; Um, this code is is it more cognitive\nissues or is more mental health? I mean\nyou said that you're looking at patients\nwho cannot take care of themselves. Um\ ate constant\nobservation uh when there is concern uh\nfor risk for a particular patient.\nNext slide.\nWhen patients are under suicide watch,\nCHS uh intensively treats and monitors\npatients uh those patients to reduce the\nrisk of self-injury.\nUh patients who are housed in restricted\nhousing areas uh receive daily clinical\nrounding and are referred to the mental\nhealth service as appropriate, including\nif any evidence of suicidal ideation\narises. Patients who continue to be at a\nhigh risk for serious self injury while\non suicide watch are considered for\nhospital referral.\nUh in terms of procedures for\ndiscontinuing suicide watch, um the\nmental health service is the only\nservice that has the authority to\ndiscontinue suicide watch and make this\nbased off of the individual risk factors\nuh that apply to that patient at that\ntime. Um, in order for a patient to be\ndiscontinued from suicide watch, uh, the\ncase has to be, uh, the decision has to\nbe approved by a clinical supervisor,\num, in all cases. And that decision must\nbe documented clinically within the\nmedical record.\nAnd that's all I have prepared on that,\nbut I'm happy to answer any questions.\n&gt;&gt; Yes, vice.\n&gt;&gt; Yes. I'm a little confused about\nlanguage. You talked about suicide\nwatch. We asked you about constant\nsupervision. Is this one and the same?\nAre these terms interchangeable?\n&gt;&gt; So the uh CHS, the mental health\nservice, we uh initiate uh through\nclinical decision making this idea the\nthe concept of suicide watch. Um my\nunderstanding is that constant\nobservation is more of a departmental\nterm.\n&gt;&gt; Okay. So we we asked you about your role\nin assessment placement and removal\ndecisions for individuals under constant\nsupervision\nnot suicide watch.\n&gt;&gt; So\n&gt;&gt; so if you have no role just let us know.\n&gt;&gt; We we my understanding is that constant\nsupervision occurs when we apply suicide\nwatch but when we do not activate\nsuicide watch we don't have a role with\nthe initiation of constant supervision.\nOkay,\ngo ahead. Uh, Dr. Otanakar, the when doc\ninitiates constant observation for an\nindividual that they are concerned about\nfor suicidality that is uh accompanied\nby a referral to mental health for an\nevaluation. Is that right?\n&gt;&gt; Correct. We we frequently receive\nreferrals for immediate safety concerns\nand we would evaluate a patient and give\na recommendation as to whether or not we\nthink that\n&gt;&gt; So is it is it reasonable to say that um\nthe constant supervision discussion\nwe've been having at this meeting is\ndistinct from this practice\n&gt;&gt; of suicide watch. Yes.\nAnd one one more question. You said\ndepending moving to a type of housing\narea of what types of housing areas are\nmore conducive for\nsuicide watch? Is it cells? Is it dorm\nareas?\n&gt;&gt; So patients can be on suicide watch in\nboth cell and dorm units. Uh but\npatients cannot remain on suicide watch\nin a general population. So anytime\nsomebody needs suicide watch, we would\ntransfer them to an area that that is uh\nable to be implemented. Typically uh\ntherapeutic housing units such as mental\nobservation units or PACE units.\nAny other questions board member on this\narea?\nOkay. We'll go to overview of the city's\nuh reopening of the just home program\ngoals and implementation plans.\n&gt;&gt; So, I'm going to I'm going to keep\nsmiling here. Um but before I do that, I\njust want to acknowledge uh DOC. We\ndon't know where we're going, but uh we\ncan't do anything without you. So, thank\nyou. Uh thanks. Um, okay. So, just home,\nuh, I'm just going to give a preamble,\nwhich is, uh, back when in 2016 when\ncorrectional health services came over\nto Health and Hospitals, it became\napparent to us that that, uh, we had\npatients whose criminal charges had been\nadjudicated, but they were still in jail\nfor lack of a safe discharge plan. And\nat the same and and on the other hand,\nwe had people who had been released, but\nwere returning to jail for because of\nunstable circumstances in the in the\ncommunity. And for way too many people\nfor unrelated reasons that they were in\njail, we were the place where they would\nget their meds, they would find a bed\nand they would be fed. Um, as new\nmembers of Health and Hospitals, the\nobvious solution was to create permanent\nsupportive housing that was close to as\nclose as possible to Health and\nHospitals, medical facilities, and care.\nAnd that's that's where Just Home was\nborn. Um and for the next many years uh\nwe embarked on working on that on this\nconcept. Um and it took us that long to\nsort of identify a feasible location,\nsecure the financing that would make the\nproject feasible and sustainable and\nviable. Um and to find a partner and in\nfact we found the dream partner um to to\nuh to be with us in this endeavor. Um\nthere's a lot to still do um to make\njust home a reality. Um it is\ngroundbreaking uh in that uh it would be\nit will be not would it will be New York\nCity's first permanent supportive\nhousing for people with a range of\nmedical issues much less for people\nspecifically who are who are released\nfrom Rikers. Um it being groundbreaking\nmeans there's still a lot of possible\nspeed bumps uh ahead. Um but we are\nabsolutely delighted 10 years later to\nbe standing here and tell you the story\nof just home so far. Um I will tell you\nthat it's a story uh you'll forgive me\nthat uh be uh you know began once upon a\ntime and there's like all kinds of fairy\ntale characters in in in those 10 years\nthat that entered the picture. Um but uh\nwe believe firmly that with everyone's\nsupport, unfl flagging support, um we\nwill we will we will get this we will\nget this done and um you know uh we will\nbe able to offer our patients some of\nour most vulnerable patients\nif not the chance to you know live\nhappily ever after uh at least to start\na new with a safe and a dignified way to\nenter
