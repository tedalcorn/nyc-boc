ecificity, resulting in a rule that would be broader than\nthe prior variances and lacks critical protections for people with the most need.\nThe long-standing variance to the Mental Health Standards extends psychiatry follow-\nup timeframes from 14 days to 28 days for “stable adult patients on psychotropic medication in\ngeneral population.”1 When seeking the variance, Correctional Health Services (CHS) made clear that\nthe extension sought did not apply to those individuals held in mental observation units, “where, by\n[CHS] policy, orders are for 14 days or less.”2 This limitation formed part of the basis for the Board’s\ngranting the variance. However, the proposed rule contains no such limitation, but instead applies to\n“every person in custody” who is “stabilized” on psychotropic medication, without reference to\nhousing area. Any amended rule should retain the 14-day psychiatry follow-up cadence for people\nin mental observation and other specialized mental health units who require a higher level of mental\nhealth care. We understand CHS’ current internal policy may be to provide such 14-day follow-ups,\nbut such policies are subject to change without Board oversight or public input and are therefore no\nsubstitute for robust protections in the Board’s Minimum Standards.\nSimilarly, in support of renewing the existing variance, CHS has asserted that “CHS by policy\ndoes not consider GP inmates stable for a 28-day prescription until they have received a follow-up\nvisit from a mental health provider who has determined there is no need for a medication\nadjustment.”3 This definition should likewise be incorporated into the Minimum Standards to ensure\nthat changes to medication orders and psychiatry follow-up are appropriate and consistent.\nThe rule amended to incorporate these recommendations could read:\n(2) Psychotropic medication shall be dispensed only when clinically indicated, consistent with\nthe treatment plan:\n(i) all prescriptions for psychotropic medication must include a stop order; no prescription\nfor psychotropic medication shall be valid for longer than two weeks for persons in persons in\ncustody in mental observation or specialized mental health units and four weeks\nfor other persons;\n(ii) every [inmate] person in custody receiving psychotropic medication shall be seen and\nevaluated by the prescribing psychiatrist, or, in cases of emergency when a physician other\nthan a psychiatrist prescribes medication under 40 RCNY § [2-05(b)(1)(i)] 2-06(b)(1)(i) by the\n\nPage 3\nreviewing psychiatrist, at least once a week until stabilized and thereafter shall be seen by\nmedical personnel at least every two weeks for persons in custody in mental observation or\nspecialized mental health units and at least every four weeks for persons in\ncustody elsewhere [by medical personnel];\n(iii) A person in custody shall not be considered stabilized for the purpose of receiving a\nfour-week prescription until they have received a follow-up visit from a psychiatrist who has\ndetermined there is no need for a medication adjustment and the person in custody agrees with\nthat determination;\n2. Mental Health Standard § 2-07; Seclusion and Restraints\nSeclusion. Legal Aid appreciates that CHS does not permit the use of seclusion as a matter of\npolicy, and we recognize the Board’s intent to harmonize the Minimum Standards with CHS’\nconclusion that the practice should not be utilized. But simply removing the seclusion regulations does\nnot achieve this. If the Board has concluded that seclusion should never be utilized,\nthe amended standard should reflect this conclusion and prohibit it. To the extent CHS may later\nchange its policy or authorize seclusion on an ad hoc basis in exceptional circumstances, it is essential\nthat the Minimum Standards regulate the practice.\nRestraints. The Board’s proposed rule eliminates one of four determinations that a psychiatrist\nmust make before restraints may be used in a mental health setting under § 2-03(3)(iii), specifically\nthat restraints “are absolutely necessary to avert the danger and will be therapeutically beneficial.”\nThis change is proposed without any explanation. It is possible that there are legitimate reasons\njustifying this change, but they are not presented for the public to evaluate and comment on. Lowering\nthe threshold for the use of restraints on people experiencing mental health crises without justification\nor meaningful opportunity for public comment is inappropriate.\n3. Mental Health Standard § 2-03(d); Observation Aides\nLegal Aid appreciates the Board’s attentiveness to the important role that Observation Aides play\nin reducing self-harm and suicide, and ensuring that they are present in all areas where people are at\nheightened risk. In addition to the housing areas included in the amended rules, we recommend\nadditional language that would ensure that Observation Aides are present wherever people in custody\nmay be subjected to prolonged cell confinement, even if the unit in question is not designated for this\npurpose. We propose the following amendment to Minimum Standard § 2-03(d)(3), using a cell\nconfinement threshold (10 hours) consistent with Local Law 42:\n(3) Observation aides shall operate in all correctional facilities in the following housing\nareas: mental observation, [punitive segregation] wherever people in custody are held in cell\nconfinement for more than 10 hours per day or have limitations on their contact with other\nincarcerated people, including restrictive housing, administrative segregation, protective\n\nPage 4\ncustody, or the West Facility Contagious Disease Unit; intake areas, and new admission. They\nshall be employed in other areas as required.\n4. Mental Health Standard § 2-10; Variances\nLegal Aid appreciates the Board’s desire to synthesize variance requirements and processes for §\n1-15 and § 2-10. This does raise, however, serious concerns about the “continuing variance”\nmechanism that the Board should address in this rulemaking.\nContinuing variances should not be permitted to extend for an indefinite period of time, as § 1-\n15(a) and the proposed amendment for § 2-10(a)(2) would allow. If a variance does not have an end\ndate, it is no longer a variance—it is a rule change, and it should go through the necessary rulemaking\nprocess to allow for due consideration and input. If the goal of permitting a continuing variance is to\nensure that renewals are not required every six months, which may be reasonable in some\nlimited circumstances for which the additional showing such as the one found in § 1-15(c)(2) is\nnecessary, that goal can be accomplished by permitting a longer time period.\nThe Board should consider modifying § 1-15 and § 2-10 to permit only emergency or limited\nvariances, making clear the requirements of limited variances of shorter or longer durations. This\nwould require:\n1. Removing the term “continuing variance” from sections 1 and 2;\n2. Conforming the definition of “limited variance” in § 2-10 to the one in § 1-15(a) (“A\n\"limited variance\" is an exemption granted by the Board from full compliance with a\nparticular subdivision or section for a specified period of time”) rather than one limited\nto six months; and\n3. Indicating that the application requirements in § 1-15(c)(1) are appropriate for a\nlimited variance sought for a term of six months or less, while designating the\nrequirements in § 1-15(c)(2) as appropriate for a limited variance sought for a term of\nmore than six months.\nThis approach permits variances to remain variances, rather than de facto rulemaking. It also\npermits the Board to balance its obligation to oversee and enforce its Minimum Standards with\nthe necessary flexibility in permitting appropriate time frames.\nFinally, we appreciate the attempt to synthesize the variance procedures in sections 1 and 2 of the\nMinimum Standards. But by removing § 2-10(d-i) and relying only on the procedures in § 1-15(c-\nf), the Board strikes requirements to provide notice to the public and hearings on variance\nrequests within specific timeframes. Instead, § 1-15(c)(1) requires only that the variance application\nbe made “as soon as a determination is made that continued compliance will not be possible” and says\nin § 1-15(d)(2) that the Board need only hold public hearings “[w]henever practicable.” Explicit\nrequirements for both notice to the public and public hearings are necessary to be consistent with\n\nPage 5\nthe Board’s obligation in § 1-15(d)(1) to “consider the position of all interested parties, including\ncorrectional employees, prisoners and their representatives, other public officials and legal, religious\nand community organizations.” Absent such requirements—with specific timeframes—the\nDepartment is free to send variance requests the morning of a public meeting, thereby preventing any\nmeaningful discussion of that request by other stakeholders and the public. Indeed, DOC has done so\nin the past. The Board should require that non-emergency variance requests are submitted on a\nspecific timeframe and be discussed at a public hearing.\n***\nWe sincerely appreciate the opportunity to submit these comments to the Board, and look forward\nto the hearing on February 10, 2026. As always, we welcome questions from, and discussions with,\nthe Board on these important issues.\nRespectfully,\n/s/\nRiley Evans\nKayla Simpson\nMary Lynne Werlwas\nThe Legal Aid Society\nPrisoners’ Rights Project","16":"Testimony of\nNatalie Fiorenzo\nSenior Corrections Specialist\nNew York County Defender Services\nBefore the New York City Board of Correction\nFebruary 10, 2026\nI. Power Outage\nOn January 23, 2026, one of our attorneys received an email from the “P.M.A / T.E.A.M.S. unit”\nin the Department of Correction indicating that video conferencing services were unavailable\nbecause Rikers Island was “experiencing an island wide power outage.” This power emergency\ncoincided with the record-breaking winter storm that beset our city days later.\nThis notification prompted immediate concern and a flurry of activity among defender offices to\ndetermine the scope and consequences of the power outage, particularly with respect to heat.\nSome defender offices were informed that blankets and thermal clothing were being distributed\nto mitigate a loss of heat, while others were told that these items were being provided merely as a\nprecautionary measure related to the storm. An NYCDS corrections specialist who was on Rikers\nIsland on January 23rd observed officers bringing in boxes of flashlights for distribution in the\nfacility, suggesting a possible lighting failure as well. Defender offices attempted to\ncommunicate with one another to gain clarity, but ultimately received conflicting and incomplete\ninformation from the Department of Correction and other public safety officials.\nThis incident underscores the extreme vulnerability of those in the custody of New York City’s\nDepartment of Corrections. Physically isolated from the rest of the city, and relying on archaic,\nanalog systems and infrastructure, those incarcerated on Rikers are in constant danger of\nsuffering in silence when the city faces extreme circumstances. With phone and\nvideoconferencing services unavailable, there was no way to know what our clients were\n\nexperiencing on this day, and no way to corroborate any limited information that came from the\nDepartment. It is no secret that the Department likes to conceal the worst of what occurs in their\nfacilities, and on this day this was eerily apparent when an officer on the island told staff from\nour office who were visiting “we like it quiet”.\nThis incident highlights the urgent need for a formal notification procedure to public defender\noffices whenever an emergency affects persons in custody. Such a procedure must include clear\nand timely information regarding the nature and cause of the emergency, the remediation plan\nand anticipated timeline, and most critically, which housing units are impacted. When\ninformation is communicated by the Department of Correction, it is often described in overly\nbroad terms, such as affecting the entire island or an entire building. But our clients\nindividualized needs vary significantly from housing unit to housing unit, depending on physical\nand mental health vulnerabilities and assigned levels of supervision. More specificity regarding\nthe facilities impacted would allow our staff to better triage and deliver support to the individuals\nwho are affected.\nIn addition to posting information about the nature of an emergency on the Department’s website\nin the interest of transparency, the Department of Correction should designate an individual\nliaison responsible for communicating directly with a point of contact at each defender office,\nand for responding promptly to all relevant inquiries.\nII. Chronic heat failures\nThis winter has been marked by sustained, severe cold across New York City, with temperatures\nremaining far below seasonal norms for weeks on end. This enduring cold front has laid bare the\nfundamentally faulty, inadequate heating system that people in custody and advocates have\ncomplained about for years. City agencies have issued repeated advisories to the public warning\nthem that extreme cold can be life-threatening and urging people to seek warmth and shelter.1 For\npeople in custody, who cannot control or regulate their environment or take basic steps to protect\nthemselves from the cold, the failures in heating systems and building conditions have immediate\nand serious health consequences.\nThroughout this period, our office has received a continuous stream of reports of heating failures\nat nearly every facility on Rikers Island. The frequency and consistency of these reports indicate\nsystemic problems with immediate health implications. Not dissimilar to DOC’s failure at\n1 As of February 9, 2026, 18 people have died in New York City from the extreme cold. This demonstrates\nthe need for appropriate heat to be provided for our clients. Erica Brosnan, Outdoor death toll in NYC\nrises to 18 amid extreme cold, Spectrum News NY 1 (Feb. 9 2026) at\nhttps://ny1.com/nyc/all-boroughs/news/2026/02/09/death-toll-in-new-york-city-rises-to-18-after-extreme-co\nld#:~:text=Outdoor%20death%20toll%20in%20New%20York%20City%20rises%20to%2018%20amid%20\nextreme%20cold&text=Another%20person%20was%20found%20dead,Seymour%20Avenue%20in%20th\ne%20Bronx\n\ntemperature regulation every summer, the absence of reliable and effective heat constitutes a\nserious threat to the health and well-being of people in custody.\nAt the North Infirmary Command (NIC), a client reported that there was no heat at all in the\nhousing area and that he was freezing. NIC is designed to house individuals with significant\nmedical needs, including those receiving treatment, recovering from illness or injury, or\nrequiring heightened medical supervision for long-term conditions, and this client was no\nexception. For this vulnerable population, prolonged exposure to cold temperatures is\nparticularly dangerous and can exacerbate existing medical issues, interfere with recovery, and\npose a serious and possibly fatal threat to health and safety.\nAt the Robert N. Davoren Center (RNDC), a client reported a different but equally troubling\npattern: when individuals complain about the cold, corrections officers turn the heat on\ntemporarily, but then turn it back off shortly thereafter. Another client observed that even when\nthe heat is on in their housing area, the wind coming in through the poorly insulated windows\nleaves cells frigid. These risks are compounded by an inexplicable recent restriction on sending\nthermal garments to people in custody, an issue discussed in greater detail below.\nThese failures are not isolated or resolved incidents, but part of a persistent and ongoing problem\nthat persists today. Yesterday, Monday, February 9, our organization received reports that the\nWest Facility was lacking heat. This morning, we reported complaints that OBCC’s windows\nwere broken, leading to freezing temperatures in the 3 upper housing area.\nWe have raised these concerns directly with DOC’s legal department, the Office of Constituent\nand Grievance Services, facility leadership, and Board staff, yet the reports of inadequate heat\ncontinue pouring in. The continued receipt of such reports after DOC has been notified raises\nserious concerns about the adequacy of corrective measures and the ability of existing systems to\nensure safe housing conditions during extreme cold.\nHeat is a basic necessity, not a discretionary comfort. The continued failure to provide consistent,\nadequate heating across Rikers facilities, whether due to outright system failure or structural\ndeficiencies, reflects a systemic problem that demands immediate and sustained intervention.\nIII. Continued chaos in package rules\nIn January, the Department updated its online list of “permissible items.” This list narrowed what\nfamilies and organizations are allowed to send to people in custody and, as discussed above, now\nprevents the sending of thermal clothing. In practice, these policy shifts have been accompanied\nby widespread confusion and inconsistent implementation across facilities. DOC’s new package\npolicy, and its conflicting implementation have completely undermined the ability of families\nand service providers to meet even basic needs.\n\nOne area of concern with the new permissible items list is footwear. The updated policy lists two\nspecific styles of name-brand Vans as the only permissible shoe option. These shoes are\nexpensive and cost-prohibitive for many families and organizations providing these items.\nNotably, they are not available for purchase on Amazon, adding to the difficulties of mailing\ncompliant shoes. Despite repeated efforts, we have not received clear guidance on whether\ngeneric or equivalent shoes in the same style are permissible, and some facilities do not even\nseem aware that the policy has been changed to Vans only.\nThis specific change has had direct and harmful consequences for individual clients. In one\ninstance, an individual injured his foot months ago and was placed in a medical boot. His injury\nhas since healed, but DOC has inexplicably not given him a second shoe, despite requests from\nour office and the client himself. We cannot remedy the situation ourselves, due to our packages\nbeing rejected. As a result, he has been forced to keep the medical boot on continuously, not\nbecause it is medically required but because he has no other footwear available.\nIn another case, a client reported that he has only sandals and has been unable to attend\nrecreation for months because his footwear is inadequate for colder weather. We have also not\nbeen able to send him a replacement pair of shoes due to the new policy. In both instances, the\ninability to access basic, permissible footwear has resulted in prolonged discomfort and basic\nhuman indignity.\nNotably, since the updated permissible items list was published, our office has observed that\nitems have consistently been rejected in nearly every package we have attempted to send, often\nwithout any discernible explanation or citation to the posted policy. The shoes our clients need\nare only one example of the types of packages being rejected. These rejections vary widely\nacross facilities or even within the same facility, depending on who is working, suggesting that\nthe package rules are not being uniformly understood or consistently applied in practice.\nThe consequences of these rejections are significant. Rejected items are not automatically\nreturned to our organization, or to whomever sent the package, as DOC requires that people in\ncustody use their commissary funds to pay for return shipping. Many of our clients lack\nsufficient commissary funds to do so, and our office does not have the budget to continually\nreplace lost items. As a result, essential items are effectively destroyed or permanently withheld,\nfurther depriving people in custody of basic necessities.\nIn response to this uncertainty, our correction specialists have spent hours contacting individual\nfacilities to determine which items can and cannot be sent. We have documented these efforts,\nwhich reveal stark inconsistencies not only between facilities, but also between the guidance\nprovided by staff and DOC’s own posted policy. This information has been sent to the Board for\nyour awareness. This lack of uniformity has created delays, wasted resources, and preventable\nhardships for people in custody and those attempting to support them.\n\nIV. Response to Deaths in Custody Report\nThe Board’s Second Deaths in Custody Report reveals the unacceptable care provided to\nvulnerable populations at Rikers Island. We hope this harrowing report, which documents an\nunconscionable number of preventable deaths of people suffering from acute mental health and\nsubstance use challenges, prompts a reckoning within the Department. There must be a serious\nassessment of how much oversight in custody settings is exercised by correction officers as\nopposed to clinicians, and whether there is sufficient capacity for clinicians to be onsite more\nconsistently. The report reflects a troubling reluctance to transfer individuals to the PACE unit,\nwhere access to clinical care is significantly greater. Instead, people with mental health\nchallenges often experience repeated interactions with correction officers rather than medical\nprofessionals, even when there is a well documented history of severe and intractable mental\nillness and multiple prior incidents.\nThe case of Mr. Benjamin Kelly is disturbingly illustrative of this failure. While in custody, he\nexperienced what was clearly a severe mental health episode that resulted in a use of force\nresponse. Although the Department has invested in specialized training programs such as\nIntegrating Communications, Assessment, and Tactics (ICAT) and Crisis Intervention Teams\n(CIT) to better equip officers to respond to mental health crises, officers should be a last resort\nwhen dealing with individuals with mental health challenges. Experience both inside and outside\nof jails consistently demonstrates that the fewer interactions between correction officers and\npeople experiencing mental health crises, the better the outcomes. Yet, of the five individuals\nwith mental health issues identified in the deaths in custody report, only one was housed in a\nPACE unit.\nThe report also reveals systemic failures in required touring and staffing practices. Not only were\ntours frequently not conducted as required, but when they did occur, they were often cursory and\nsuperficial. In one alarming instance, officers repeatedly passed by an individual without\nrealizing he was deceased. Meaningful touring would have prevented the majority of the seven\ndeaths listed in this report. Officers must be required to visually confirm breathing and\nmovement and to engage in brief verbal interaction to assess an individual’s condition,\nparticularly when staff are already on notice that the person has mental health challenges.\nOfficers must also be properly trained to recognize warning signs and should err on the side of\ncaution by escalating to a medical professional. Instead, the report documents repeated failures to\nreport concerns when red flags were present.\nBOC places significant reliance on the Video Monitoring Unit (VMU) as an oversight\nmechanism to compensate for negligent staff practices. The Board notes that real time\n\nmonitoring can be “a crucial tool in identifying poor touring practices, deficient supervision,\nunsecured and covered cell doors, as well as other incidents that pose a risk to individuals in\ncustody and staff alike.” But this assumes that the VMU teams are not impacted by the pervasive\nculture of indifference and lax accountability among corrections staff.\nThere must be a systemic evaluation of what drives this persistent failure to perform the most\nbasic responsibilities of a correction officer’s job, and what must be done to change it. The\nfailure to conduct tours, to secure cell doors, and to maintain accurate logbooks has resulted in an\nunconscionable number of deaths, and continues to put lives at risk at this very moment.","17":"February 10, 2026\nBY EMAIL\nDwayne C. Sampson, Chair\nMembers of the Board\nBoard of Correction\n2 Lafayette Street, Room 1221\nNew York, NY 10007\nRe: Public Comment on Mental Health and Health Care Standards Rulemaking\nDear Chair Sampson and members of the Board:\nThe Jails Action Coalition and HALT Solitary Campaign submit this comment regarding the Board’s\nproposed amendments to the Mental Health and Health Care Minimum Standards in New York City’s jail\nfacilities.\nFirst, we urge the Board to conduct a comprehensive overhaul of the Mental Health and Health Care\nMinimum Standards and adopt amendments that provide clear requirements about the health care that\nmust be provided to people incarcerated in New York City jails. The Board’s current proposed\namendments are unnecessarily limited in scope. We know that well over half of the people held in our\nCity’s jails have mental health conditions; that nearly a quarter are diagnosed with a serious mental\nillness; and that over a quarter are diagnosed with substance use disorders. Many people in our jails\nhave chronic medical conditions, such as pulmonary, cardiovascular, and neurological conditions that\nrequire consistent medical care. As the Board knows, the Department of Correction (DOC) routinely fails\nto provide the mental and physical health care that people in custody need.\nThe proposed amendments do not ensure that appropriate care is reliably available and administered.\nGiven the importance of this issue to the health and safety of persons in custody, we call on the Board to\nconduct a thorough, plenary review of the Mental Health and Health Care Minimum Standards. That\nreview must include input from people in custody, health care experts, advocates, and other community\nmembers.\n\nSecond, we would like to request a meeting with you at your earliest convenience to discuss our\ncomments below and how to more meaningfully address the mental and physical health needs of people\nin custody. The Minimum Standards are in need of significant revision to adequately address the many\nphysical and mental health needs of the people in our City’s jails, and we are eager to work with the\nBoard as soon as possible to initiate those changes.\nIn addition to our comments regarding the specific substantive amendments proposed, below we\nprovide our recommendations about how the standards can be strengthened.\nI. THE BOARD MUST UPDATE THE MINIMUM STANDARDS ON MENTAL HEALTH AND HEALTH\nCARE IN THEIR ENTIRETY\nThe Board must commit to updating the Minimum Standards on Mental Health and Health Care in their\nentirety, rather than focusing on a small number of discrete topics at a time. In many areas, the\nstandards lack clarity and uniformity, which can contribute to the provision of inadequate care, or even a\nfailure to provide care at all. Below are some examples.\nA. The current standards are too vague and lack definitions for critical roles and functions. Terms\nlike “close supervision” and “special housing” appear in the standards regarding treatment of\npeople with mental or emotional health issues (Section 2-05(c)(1)), but lack a precise definition.\nB. The Board should review the timeframes for referrals, evaluations, and other practices and\nprocedures. Throughout the Minimum Standards, these timeframes lack precision, which can\nlead to treatment delays. More clarity is needed to ensure that people who need treatment\nreceive it as soon as possible, especially in emergent situations. For example, Section 2-04(b)(4)\ndirects DOC to escort people in custody to mental health services staff on “the same day,” and in\nall cases “within twenty-four hours” of the request for evaluation. This time limit must be\nshortened, and DOC must be directed to provide the requested mental health care “as soon as\npossible.” Additionally, where the Minimum Standards require that DOC take an action\n“immediately,” they should include a time limit, such as “but no longer than fifteen minutes,”\ndepending upon the circumstances, to ensure that DOC has concrete guidance on how quickly\nstaff must act.\nC. The Board must address the lack of transparency and process for reviewing and revising required\npolicies and procedures. In several sections of the Mental Health and Health Care Minimum\nStandards, the Board proposes changing the language requiring specific programs, policies, and\n2\n\nprocedures from “design and implement” or “develop” to “maintain.”1 Although the Board does\nnot specify the reason for the amendment, the language change implies that the Board is\nsatisfied that such a program, policy, or procedure already exists, and the requirement now is\nthat it simply be maintained. Our concern is that this implication is incorrect, and that this\nchange will condone a continued lack of transparency around those programs, policies, and\nprocedures. Even if those programs, policies, and procedures exist, there is certainly no\nguarantee that they are adequate. The Minimum Standards should include a requirement that\nthe relevant policies and procedures are provided to the Board so that the Board can consider\nwhether they are adequate. In addition, the Health Authority and DOC should be required to\nreview the policies annually, update them as needed, and inform the Board of all revisions.\nII. COMMENTS ON THE PROPOSED AMENDMENTS\nA. Psychotropic Medication (Mental Health Standard § 2-06(b)(2)(i-ii)2)\nThe Board’s proposed amendment is much broader than the variance which has been renewed\nrepeatedly since it was first granted on November 10, 2005. In requesting the variance which the Board\nnow seeks to codify, Correctional Health Services (CHS) made clear that the variance request was to\nallow “psychiatrists to see and evaluate stable adult patients on psychotropic medication in general\npopulation at least every 28 days, rather than every 14 days.”3 CHS policy requires that psychotropic\nmedication orders be written for 14 days or less for people housed in mental observation units.4\nAccording to CHS policy, a person in custody in general population is not considered “stable for a 28-day\nprescription until they have received a follow-up visit from a mental health provider who has determined\n1 See proposed §§ 2-02 (mental health program), 2-03(b)(3) (screening), 2-03(c)(3)(i) (training), 2-03(d)(2)\n(observation aides), 2-04(a) (evaluation and referral), 2-04(b)(4) (DOC escorts), 2-05(b)(1) (mental health staff,\nsupplies, and equipment), 2-05(b)(2) (space for housing and treatment), 2-05(c)(1)(ii) (CO training curriculum),\n2-05(c)(2) (mental observation housing admission and discharge), 2-05(c)(3)(iv) (treatment plan), 2-05(d) (informed\nconsent), 2-05(e)(5) (treatment refusal), 2-06(b)(1) (medication), 2-06(c)(2) (storage of medication and supplies),\n2-07(a), 2-08(b)(2) (correction personnel notification), 2-09(b)(1) (infractions in mental observation housing),\n3-01(b) (health care program), 3-02(b)(8) (second medical opinions), 3-02(d)(3) (emergency services), 3-02(e)(2)\n(infirmaries), 3-02(f)(2) (special clinics), 3-02(g)(5) (medical isolation), 3-02(h) (special needs), 3-04(a) (screening\nprocedures), 3-05(a) (pharmaceutical services), 3-06(d) (vision and eye care), 3-06(f)(1) (diagnostic services),\n3-06(h)(1) (special diets), 3-06(m)(2) (HIV treatment and prevention), 3-10 (notification of deaths in custody),\n3-12(a) (shackling), 3-14(a) (injuries).\n2 Throughout our comments, the Mental Health Minimum Standards in Title 40 of the Rules of City of New York are\ncited as proposed to be renumbered by the proposed rule.\n3 January 6, 2026 letter from Joseph Otonichar, DO, Chief of Service, Mental Health, Correctional Health Services, to\nJasmine Georges-Yilla, Executive Director, NYC Board of Correctional available at\nhttps://www.nyc.gov/assets/boc/downloads/pdf/BOC_Psych_Med_variance_JAN-2026_signed.pdf.\n4 See, June 1, 2021 memo from Bipin Subedi, M.D., Co-Chief of Service, Mental Health, to Margaret Egan, Esq.,\nExecutive Director, NYC Board of Correction available at\nhttps://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2021/June/4a.%20CHS%20Psychotropic%20Meds%20V\nariance%20Letter.pdf/\n3\n\nthere is no need for a medication adjustment.”5 Thus, to codify this variance, the proposed amendment\nshould be revised to specify that only people who are stable and housed in general population can be\nseen less frequently than required by the current standard.\nWe urge the Board to revise the proposed language as follows:\n(2) Psychotropic medication shall be dispensed only when clinically indicated, consistent with the\ntreatment plan:\n(i) all prescriptions for psychotropic medication must include a stop order; no prescription for\npsychotropic medication shall be valid for longer than two weeks for persons in persons in\ncustody in specialized mental health units and four weeks for persons in custody in general\npopulation;\n(ii) every [inmate] person in custody receiving psychotropic medication shall be seen and\nevaluated by the prescribing psychiatrist, or, in cases of emergency when a physician other than\na psychiatrist prescribes medication under 40 RCNY § [2-05(b)(1)(i)] 2-06(b)(1)(i) by the\nreviewing psychiatrist, at least once a week until stabilized and thereafter at least every two\nweeks for persons in custody in specialized mental health units and at least every four weeks for\npersons in custody in general population by medical personnel;\n(iii) A person in custody in general population shall not be considered stabilized for the\npurpose of receiving a four-week prescription until they have received a follow-up visit from a\npsychiatrist who has determined there is no need for a medication adjustment and the person in\ncustody agrees with that determination;\nB. Psychiatric Provider (Mental Health Standard § 2-01(e))\nThe Board does not set forth the reason for defining “psychiatric provider” and substituting it for\n“psychiatrist” in several sections of the Mental Health Minimum Standards in its Statement of Basis and\nPurpose of Rules. Yet, the proposed rules include these amendments.6 Allowing professionals who have\nless training and medical expertise to provide treatment to people in custody is not a decision that\nshould be taken lightly. In some circumstances a psychiatric nurse practitioner or psychiatric physician\nassistant may be qualified to carry out the responsibilities which the current standards reserve for\npsychiatrists to perform. However, the expertise that psychiatrists have regarding the provision of mental\nhealth care should be available to people in DOC custody, and the standards should include a required\nminimum staffing level for psychiatrists. The standards should also require that treatment teams in\nspecialized mental health units include a psychiatrist and that psychiatrists provide secondary review of\nprescriptions for psychotropic medication in certain situations.\n5 Id.\n6 See §§ 2-05(c)(3)(i-ii), 2-06(b)(1)(i), 2-06(b)(2)(ii), 2-07(b)(iii), 2-07(c)(2-3), 2-07(c)(6-7).\n4\n\nAs stated above, the Board should conduct a full review of the Mental Health Care Standards and\npropose comprehensive amendments. A thorough discussion of which responsibilities should be\nrequired solely of psychiatrists rather than psychiatric providers generally should be part of that\nrulemaking process. In addition, the Board should consider adopting limits on the number of persons in\ncustody assigned to each psychiatric provider.7 The Board has not adequately considered its proposed\namendments to replace psychiatrists with psychiatric providers. Thus, we urge the Board not to make\nthese amendments at this time, but instead to consider them in the context of comprehensive changes\nto the Mental Health Minimum Standards as a whole.\nC. Restraints and Seclusion (Mental Health Standard § 2-07)\n1. Seclusion\nWe appreciate that CHS does not authorize or order the use of seclusion, which essentially is a form of\nsolitary confinement, and we support the Board amending the standards related to this practice.\nHowever, simply removing the provisions that regulate the use of seclusion is inadequate. Unless the\npractice is explicitly prohibited, limits on its use must be preserved. To ensure that CHS’ current practice\nof not using seclusion is maintained, the Board should adopt an amendment that clearly prohibits it.\nWe recommend that the Board amend Section 2-07 as follows:\n(a) Policy. The [Departments] Department of Correction and [Health] the Health Authority shall\n[develop and implement] maintain procedures [subject to the review of the Department of\nMental Health, Mental Retardation and Alcoholism Services] governing the physical restraint\n[and seclusion of inmates] of people in custody being observed or treated for mental or\nemotional [disorders] health issues. Consistent with the New York State Mental Hygiene Law,\nrestraints [or seclusion] shall not be used as punishment, for the convenience of staff, or as a\nsubstitute for treatment programs. The Health Authority shall not authorize or order the use of\nany form of seclusion under any circumstances.\nIn addition, we recommend the Board maintain the definition of seclusion in Section 2-07 (b) but\neliminate (b)(i) and (b)(ii).\n2. Restraints\nThe Board provides no justification for other amendments proposed to Section 2-07. However, two\nsubstantive changes are proposed:\n1) an amendment to the definition section (2-07(b)(iii)) replacing “an inmate presents a clear\nand present danger to himself or others” with “an individualized determination is made that\nrestraints are necessary to prevent an imminent risk of self-injury or injury to other people” and\n7 Currently some psychiatric nurse practitioners are assigned to provide treatment to all persons in custody on two\nseparate PACE units, which can total as many as 100 people.\n5\n\n2) an amendment to the procedures section (2-07(c)(3)(iii)) eliminating “these measures are\nabsolutely necessary to avert the danger and will be therapeutically beneficial” as one of the\nfour determinations that must be made before a person can be placed in restraints and changing\nthe person making the determination from a psychiatrist to a psychiatric provider.\nAmending the standards which limit the use of restraints should take place in the context of a\ncomprehensive review of the Mental Health Minimum Standards. The Board certainly should not change\nthe procedures without explaining the reason for the amendment.\nD. Variances (Mental Health Standard § 2-10(b))\nRegarding any application for a variance by the Commissioner of the Department of Correction or the\nHealth Authority, the Board proposes to remove the requirement of an at-least-forty-five day notice\nperiod prior to the implementation date of any such requested variance. In its place, the Board proposed\nthat any such application must be made “as soon as a determination is made that continued compliance\nwill not be possible.”\nIn order to maintain at least some guarantee of a notice period, we propose the addition of language to\nrequire public notice of the requested variance and a minimum period of time -- e.g. 10 business days --\nbetween the date of any application and the date on which the Board meets to hear from the requesting\nparty and members of the public prior to any vote.\nIII. SPECIFIC ADDITIONAL CHANGES TO THE MINIMUM STANDARDS ON MENTAL HEALTH AND\nHEALTH CARE\nThe Minimum Standards seek to safeguard the provision of physical and mental health treatment in the\njails. However, based upon the experience of people in custody and those who represent and advocate\nfor them, we believe that a comprehensive overhaul of the standards should include the following\ndiscrete amendments to address persistent problems in practice.\nA. The Need for Escorts Must Not Prevent People from Receiving Treatment\nThe current Health Care Minimum Standards bar the Department from delaying or denying health care\nas punishment and require adequate staffing to meet all minimum standards (Section 3-02(b)). They also\nrequire prompt escorts for people who need medical evaluation outside their housing area (Section\n3-02(g)).\nAn additional provision is needed to address the particular staffing demands created by Department\nclassification statuses that require special escorts. In particular, Department policy states that people\nassigned Centrally Monitored Case (CMC) status require a Captain escort, and we have repeatedly seen\nthe Department fail to bring CMC-designated people to necessary hospital care because such escorts\nwere not readily available.\n6\n\nB. People in Custody Should Be Allowed to Communicate Privately with Health Care Staff\nThe current Mental Health and Health Care Minimum Standards include protections about ensuring\nconfidentiality and privacy in health care (Sections 2-08 and 3-08). However, in practice, often people in\ncustody cannot communicate privately with their treatment provider as they are seen cellside and must\nshare information about their condition through the cell door. Such encounters expose confidential\ninformation to people incarcerated in cells nearby and correction staff stationed in the housing area. The\nBoard should amend the standards to require that health care staff ensure that people in custody can\ncommunicate about their physical and mental health conditions in private and that cellside encounters\ncan be used only to inspect the person’s cell and ask them to come out to speak privately with health\ncare staff. In addition, the standards should give health care staff the authority to require DOC to escort a\nperson in custody who wants to meet with health care staff to a location that allows for private\ncommunication between health care staff and the person in custody.\nC. The Standards Should Monitor Dental Services for Over-reliance on Extractions\nDental care is governed by Section 3-06(c), which requires treatment when a person’s health or comfort\nwould otherwise be unreasonably affected and includes a non-exhaustive list of treatments that may be\noffered. The list includes “repair of injured or carious teeth.”\nWe recommend adding a reporting requirement so the Health Authority tracks how often common\nservices, and particularly tooth extractions, are performed. Extractions may be routine but they have\nlong-term effects on employment, self-esteem, and successful reentry,8 and should be monitored to\nensure alternatives are used whenever appropriate.\nD. The Standards Must Improve Screening and Treatment of People with Developmental\nDisabilities or Cognitive Impairments\nDue to longstanding issues with the screening, identification, and treatment of people with\ndevelopmental disabilities and cognitive impairments in NYC jails, there are likely many people with\ndevelopmental disabilities on Rikers who have not been diagnosed.9 For example, if someone was not\ndiagnosed with a developmental disability at a young age, their medical records may not include this\ninformation. It can also be more difficult to identify individuals with developmental disabilities who do\nnot have co-occurring mental health diagnoses. This hinders CHS’ ability to provide proper care to these\nindividuals and has led to instances in which the Department has failed to protect people with\ndevelopmental disabilities.\n8 See Eldridge, Taylor Elizabeth. “Another Hurdle For Former Inmates: Their Teeth.” June 28, 2018, The Marshall\nProject. Available at\nhttps://www.themarshallproject.org/2018/06/28/another-hurdle-for-former-inmates-their-teeth.\n9 Ben Hattem, NYC Jails Fail to Identify Prisoners With Cognitive Problems, City Limits, Oct. 27, 2016,\nhttps://citylimits.org/nyc-jails-fail-to-identify-prisoners-with-cognitive-problems/.\n7\n\nWe recommend that the Board review the current screening (Section 2-03(b)(3)) and staff training\n(Section 2-03(c)(1)(iv)) protocols regarding people with developmental disabilities.10 The Board should\nalso consider whether there are other areas in the standards that inappropriately overlook people with\ndevelopmental disabilities or improperly group them with people with mental health diagnoses.\nE. The Standards Should Require Specialized Mental Health Units and Discharge Planning\nSince the Mental Health Minimum Standards were implemented in 1985, the mental health treatment\nprovided to people in the NYC jails has changed significantly. The standards require special housing areas\nfor mental observation, specify staffing and treatment planning requirements, and give the mental\nhealth service responsibility for admission and discharge from special housing (Section 2-05(c)). For\ndecades mental observation housing areas were the only alternative to general population for people\nwith significant mental health treatment needs. But in 2015, CHS and DOC began developing PACE\n(Program to Accelerate Clinical Effectiveness) units which have a full complement of mental health staff\nstationed on the unit and offer a range of therapeutic interventions. Early evaluations of these units\ndemonstrated that they had fewer uses of force and self-harm incidents and that they improved clinical\noutcomes. These units are essential to treat people in custody who need a higher level of mental health\ncare. We are concerned that these units currently do not operate as originally designed. To restore them\nand ensure their continued operation, the standards should be amended to require this higher level of\ncare and include staffing requirements and other essential components of the PACE model. The\nstandards should also require a sufficient number of PACE beds to meet the needs of the jail population.\nSimilarly, discharge planning services were not available to people receiving mental health treatment in\nthe jails until they were mandated, first as a result of a preliminary injunction and then through a\nsettlement agreement, in Brad H. v. City of New York. Although CHS currently offers these services,\nnothing in the standards requires them to do so. The standards should be amended to require this\nfundamental component of mental health treatment as well as the specific services that must be\noffered.\nF. The Requirements for Observation Aides Should Be Expanded\nThe requirement that the NYC jails have an observation aide program that employs persons in custody\ntrained to monitor individuals identified as potential suicide risks was a key element of the Mental\nHealth Minimum Standards when they were adopted. The program was credited with reducing suicides\nin NYC jails and was replicated in other systems. The proposed rule expands the housing areas in which\nobservation aides must operate, but additional amendments are needed to improve and modernize the\nobservation aide program.\n10 For example, the Board could consider whether the Department and Correctional Health Services are employing\nthe best practices put forth by the Council of State Governments Justice Center. Jazmone Wilkerson, Felicia\nLopez-Wright, and Leigh Ann Davis, Improving Outcomes for People in Contact with the Criminal Justice System\nWho Have Intellectual or Developmental Disabilities, Council of State Governments Justice Center (April 2022),\nhttps://csgjusticecenter.org/publications/improving-outcomes-for-people-in-contact-with-the-criminal-justice-syste\nm-who-have-intellectual-or-developmental-disabilities/.\n8\n\nThe standards should specify how CHS and DOC provide supervision and support for these peer workers\nas well as require mandatory debriefing for observation aides who witness suicides and suicide attempts.\nObservation aides should also carry and be trained to administer naloxone. The standards should require\nprocedures for periodic refresher training and for observation aides to report staff misconduct or\nretaliation. Considering the level of responsibility observation aides are given, they should be paid at\nleast the NYC minimum wage for their work, and when appropriate, given a letter of recommendation or\nsome other certification toward future employment. The Board should survey persons in custody about\nthe observation aide program to determine additional amendments needed to strengthen the program.\nG. The Standards Should Require Data Collection and Review to Promote Compliance\nThe current standards include many important requirements related to physical and mental health care\nthat are not being followed. For example, Section 2-03(c)(3) of the Mental Health Minimum Standards\nrequires training for all correction officers, and Section 2-05(c)(1)(ii) requires additional training for\ncorrection officers assigned to steady posts in the mental observation housing areas. Proper training\nequips staff to handle situations effectively, promoting the safety and well-being of all involved. When\nstaff are well-prepared, they can respond to crises more efficiently and provide better care for people in\ncustody, leading to improved outcomes. Enhancing these standards by focusing on continuous education\nand support for the staff can further improve the quality of care in mental health units. Ongoing training\nsessions and workshops can help staff stay updated with the latest practices and techniques. This not\nonly boosts their confidence but also enhances their ability to manage complex situations with greater\nease.\nTo ensure that the Department provides training, continuing education, and steady staffing, regular data\nreporting and monitoring should be required. This is especially crucial in places like mental health units,\nwhere having a stable team of correctional staff is necessary. Consistency in staffing ensures that the\nteam can work smoothly together and understand the needs of the individuals they serve. Ensuring that\nstaff receive thorough training and are prepared to deal with the unique challenges that arise in these\nenvironments is another critical requirement that needs attention.\nThe Board’s Elimination of Sexual Abuse and Sexual Harassment in Correctional Facilities Minimum\nStandards include robust data reporting and monitoring requirements (Section 5-40). Similar\nrequirements to collect and report data on key elements of the Mental Health and Health Care standards\nshould be adopted.\nIV. THE BOARD MUST ENGAGE IN AN INCLUSIVE PROCESS TO UPDATE THE MENTAL HEALTH AND\nHEALTH CARE STANDARDS\nTo effectively address pressing health care issues, it is essential to engage in a comprehensive process.\nThe people whom the Minimum Standards are intended to protect must have a central role in this\nprocess. This process should blend insights from both external experts and the concerns of those directly\ninvolved, including people in custody, families of people in custody, and advocates. By doing so, we can\ntackle these challenges more thoroughly. It is important to listen to these varied voices, as they provide a\n9\n\nrange of perspectives that contribute to crafting well-rounded and effective solutions. The key to\novercoming health care challenges lies in fostering a collaborative environment where diverse\nviewpoints are not only heard but valued. By incorporating the knowledge of professionals from outside\nthe health care system and considering the experiences and apprehensions of those within it, we create\na foundation for meaningful change. This collaborative approach ensures that the solutions we develop\nare not one-sided but instead reflect a balanced understanding of the issues at hand.\n* * * * *\nIn conclusion, JAC and the HALT Campaign urge the Board to recognize the need for a large-scale revision\nof the Minimum Standards on Health Care and Mental Health. In addition to the suggestions above, the\nBoard must commit to closely monitoring and enforcing DOC’s and CHS’ compliance with the Minimum\nStandards to ensure that every New Yorker in our City’s jails receives the care that they need and\ndeserve. We welcome any questions the Board has, and are eager to meet with you to discuss our\nsuggestions further.\n10","18":"February 10, 2026\nBY EMAIL\nDwayne C. Sampson, Chair\nMembers of the Board\nBoard of Correction\n2 Lafayette Street, Room 1221\nNew York, NY 10007\nboc@boc.nyc.gov\nRe: Public Comment on Mental Health and Health Care Standards Rulemaking\nDear Chair Sampson and Members of the Board:\nWe join with the Jails Action Coalition (JAC) and HALT Solitary Campaign (HALT) in calling\non the Board to conduct a comprehensive review of the Mental Health and Health Care\nMinimum Standards, engage the expertise of a broad range of stakeholders, and amend the\nstandards to improve access to and quality of care for people in Department of Correction (DOC)\ncustody. The current rulemaking process is too narrowly focused, and as JAC and HALT point\nout, some of the amendments make substantive changes to the standards without any justification\nand without any engagement with people in custody, community members, advocates, or health\ncare professionals regarding the consequences of these changes. Even the Board’s proposed\namendments regarding psychotropic medication (Mental Health Standard § 2-06(b)(2)(i-ii) (as\nrenumbered in the Proposed Rules)), as currently drafted, do not accomplish the goal of\ncodifying the long-standing variance, but instead reduce the standard of care for everyone\nreceiving psychotropic medication. We urge the Board to revise this proposed change as\nindicated below.\nFor more than 25 years, the Urban Justice Center Mental Health Project has advocated for people\nwith mental health concerns involved in the criminal legal system. We are deeply familiar with\nthe difficulties people with mental health concerns have within correctional facilities and in\naccessing essential mental health services, housing, and benefits upon release. We represent the\nBrad H. Class, all incarcerated individuals who receive mental health treatment while in City\njails. Currently the Brad H. Class includes almost 60% of the jail population.\nThe mental health treatment provided to people in custody has changed dramatically since the\nBrad H. litigation was filed in 1999, including the provision of discharge planning services.\nHowever, none of those advances are enshrined in the Mental Health Minimum Standards, and\nDOC and Correctional Health Services (CHS) are not required to maintain them. As a result,\n40 Rector St, 9th Fl, New York, NY 10006\nTel: 646.602.5600 | Fax: 212.533.4598\nurbanjustice.org | @urbanjustice\n\nsome of the improvements to the specialized mental health units adopted more than a decade ago\nhave been significantly eroded. In fact, many of the deaths of people in custody occurred in\nmental observation and PACE (Program for Accelerated Clinical Effectiveness) housing units.\nMoreover, these units have been the site of some of the most inhumane and restrictive uses of\nsolitary confinement, in the form of deadlocking. It is vital that the Board ensure a level of\nmental health treatment that meets the needs of the jail population, especially people with serious\nmental illness which is now about 22% of people in custody. To do so, the Board should engage\nin a comprehensive rulemaking process.\nWe are eager to engage with the Board regarding various amendments to the standards which\nshould be considered in such a rulemaking process, including the need for reporting requirements\nso that the Board can provide meaningful oversight of the standards.\nIn these comments we focus on the need for the Board to amend the proposed changes to Mental\nHealth Standard § 2-06(b)(2)(i-ii).\nThe Board’s proposed amendment to Mental Health Standard § 2-06(b)(2)(i-ii) is much broader\nthan the variance first granted on November 10, 2005, and repeatedly renewed since then.\nInstead of limiting the circumstances in which people in custody who are prescribed\npsychotropic medication must be seen and evaluated by a psychiatrist, the proposed amendment\nreduces the required two-week evaluation to four weeks for everyone in custody.\nThis amendment to the standard is not in keeping with the approved variance. CHS limited its\nvariance request to stable adult patients on psychotropic medication in general population. CHS\npolicy requires that psychotropic medication orders be written for 14 days or less for people\nhoused in mental observation units. According to CHS policy, a person in custody in general\npopulation is not considered “stable for a 28-day prescription until they have received a follow-\nup visit from a mental health provider who has determined there is no need for a medication\nadjustment.”1 Because of the limited scope of the variance to people who had been stabilized on\nmedication and housed in general population, the Board agreed to allow the required timeframe\nfor seeing a psychiatrist for a medication reevaluation to be extended from two weeks to four\nweeks. Thus, to codify this variance, the standard should specify that only people who are stable\nand housed in general population can be seen less frequently than every two weeks.\nWe urge the Board to revise the proposed language as follows:\n(2) Psychotropic medication shall be dispensed only when clinically indicated, consistent\nwith the treatment plan:\n(i) all prescriptions for psychotropic medication must include a stop order; no\nprescription for psychotropic medication shall be valid for longer than two weeks\nfor persons in persons in custody in specialized mental health units and four\nweeks for persons in custody in general population;\n1 See, June 1, 2021 memo from Bipin Subedi, M.D., Co-Chief of Service, Mental Health, to Margaret Egan, Esq.,\nExecutive Director, NYC Board of Correction available at\nhttps://www.nyc.gov/assets/boc/downloads/pdf/Meetings/2021/June/4a.%20CHS%20Psychotropic%20Meds%20Va\nriance%20Letter.pdf.\n2\n\n(ii) every [inmate] person in custody receiving psychotropic medication shall be\nseen and evaluated by the prescribing psychiatrist, or, in cases of emergency when\na physician other than a psychiatrist prescribes medication under 40 RCNY § [2-\n05(b)(1)(i)] 2-06(b)(1)(i) by the reviewing psychiatrist, at least once a week until\nstabilized and thereafter at least every two weeks for persons in custody in\nspecialized mental health units and at least every four weeks for persons in\ncustody in general population by medical personnel;\n(iii) A person in custody in general population shall not be considered stabilized\nfor the purpose of receiving a four-week prescription until they have received a\nfollow-up visit from a psychiatrist who has determined there is no need for a\nmedication adjustment and the person in custody agrees with that determination;\nThe Board’s proposed amendment also changes the requirement regarding who must provide the\nmedication reevaluation. Rather than psychiatrists being responsible for this and many other\nobligations set forth in the Mental Health Minimum Standards, psychiatric providers, which\ninclude psychiatric nurse practitioners and psychiatric physician assistants, are authorized to\nprovide this care. Such a change should not be adopted without more robust discussion of the\nrole of psychiatrists in providing health care to people in custody. The Board should consider the\ncircumstances when a psychiatrist should be involved in reviewing the care provided to people\nwith the most significant mental health treatment needs. The standards may need to be amended\nto require a minimum level of staffing, such as a certain ratio of psychiatrists to people\ndiagnosed with serious mental illness, or to require that a psychiatrist review prescribing\npractices in the mental observation and PACE units. Certainly, the Board should not simply\nreplace psychiatrists wholesale with psychiatric nurse practitioners and psychiatric physician\nassistants without any explanation of this amendment in the notice of rulemaking. It seems that\nthe Board has not fully considered the ramifications of such an amendment.\nWe encourage the Board to revise the amendments to Mental Health Standard § 2-06(b)(2)(i-ii)\nas indicated above and to defer adopting the change from “psychiatrist” to “psychiatric provider”\nuntil the Board conducts a comprehensive review of the Mental Health Minimum Standards and\nengages in a holistic rulemaking process that allows for the views of people in custody, their\nfamilies, advocates, mental health care professionals, and the broader community to be\nconsidered.\nThank you for considering our comments. We look forward to a more substantive discussion\nabout how mental health care can be improved for people incarcerated in the City jails.\nSincerely,\nJennifer J. Parish\nDirector of Criminal Justice Advocacy\nMental Health Project\n(646) 602-5644\njparish@urbanjustice.org\n3","19":"Dwayne C. Sampson, Chair\nHelen Skipper, Vice Chair\nHon. Barr y A. Coz ier (Ret .)\nFelipe Franco\nBOARD OF CORRECTION\nLauren Stossel, M.D.\nJude Torchenaud CITY OF NEW YORK\n2 LAFAYETTE STREET, SUITE 1221\nNEW YORK, NY 10007\nJasmine Georges-Yilla\nExecutive Director\n212 669-7900 (Office)\nMental Health and Health Standards Proposed Rules\nFebruary 10, 2026 Public Hearing Oral Testimony\nJennifer Parish- JAC/HALT\nJennifer Parish stated that the proposed changes should reflect the narrow tailoring of\nthe language used in CHS’ longstanding variances to make clear that the change only\napplies to stabilized individuals in general population units. Additionally, Ms. Parish\nsuggested including references to other mental health professionals and undergoing a\ncomprehensive review of the entire health and mental health minimum standards.\nMichael Klinger- Brooklyn Defenders\nMichael Klinger proposed additional edits to minimum standard sections that deal with\nclinic production escorting. Additionally, Mr. Klinger proposes a reporting requirement\nbe added to the standards, especially regarding dental care.\nJennifer Nicole Alameda\nJennifer Nicole Alameda stressed the importance of reassessing psychiatric patients\nand mandating that services be provided to these populations, especially in the form of\neducation and healthy food.\nKayla Simpson- Legal Aid Society\nKayla Simpson stated that comprehensive reviews of the mental health standards\nshould also be completed. Regarding the current proposed changes, Ms. Simpson\nsuggested altering the proposed language regarding variance procedures to ensure that\nspecific notice requirements remain in place. Additionally, Ms. Simpson proposed\neliminating the continuing variance mechanism to avoid the possibility of indefinite\nvariances that have not properly undergone the rulemaking process.","20":"BOARD OF CORRECTION\nCITY OF NEW YORK\nNOTICE OF RULEMAKING\nCONCERNING MENTAL HEALTH\nAND HEALTH CARE STANDARDS IN NYC CORRECTIONAL\nFACILITIES\nNotice of Public Hearing and Opportunity to Comment on Proposed Rules\nWhat are we proposing?\nThe New York City Board of Correction (the “Board”) is proposing to amend §§ 2-\n05(b)(2)(i-ii) and 3-04(b)(2)(v)(A) of Title 40 of the Rules of the City of New York (“RCNY”),\non psychotropic medication and tuberculosis screening, respectively, to codify long-\nstanding variances. The Board also proposes to amend Chapters 2 and 3 of Title 40 of\nthe RCNY (hereinafter referred to as the Board’s “Minimum Standards” or “Standards”)\nto correct outdated language, such as references to “inmates” and “Department of Mental\nHealth, Mental Retardation and Alcoholism Services,” align variance procedures across\nall sections of the Standards, and remove references to seclusion.\nWhen and where is the hearing?\nThe Board will hold a public hearing on the proposed rules. The public hearing will take\nplace at 1:00 pm on February 10, 2026. The hearing will be held 125 Worth Street,\nSecond Floor Auditorium, New York, NY 10007. The public will be able to comment via\naudio and video on Microsoft Teams. The hearing will also be streamed live on the\nBoard’s website and YouTube page.\nFebruary 10, 2026, 1:00 pm Public Hearing\nOnline Registration: NYC Board of Correction February 2026 Public Hearing and Public\nMeeting | Meeting-Join | Microsoft Teams\nOr\nCall-In Number: +1 646-893-7101 and Access Code: 405 599 849#\nHow do I comment on the proposed rules?\nAnyone can comment on the proposed rules by:\nPage 1 of 56\n\n• Website. You can submit comments to the Board through the NYC rules website\nat http://rules.cityofnewyork.us.\n• E-mail. You can e-mail comments to the Board at boc@boc.nyc.gov.\n• Mail. You can mail comments to the Board, Attn: Jemarley McFarlane, 2 Lafayette\nStreet, Room 1221, New York, NY 10007.\n• Fax. You can fax comments to the Board at 212-669-7980.\n• Voicemail. You can call 212-669-7900 and choose option 2 to leave a voicemail\ncomment on the proposed rule. People in custody can leave a voicemail at 212-\n266-4320 (English) or 212-266-4321 (Spanish).\n• By speaking at the hearing. If you are interested in speaking in person, you can\nsign up to testify immediately upon entering the auditorium. If you are interested in\nspeaking during the public comment period at the hearing online, please go to the\nonline registration link and indicate this on the registration form. Please register to\nspeak by 9:00 am on February 10, 2026. The Board cannot guarantee that you will\nbe called to testify if you complete the registration form after 9:00 am on the\nmorning of the hearing. Comments are limited to three (3) minutes per attendee.\nPlease note that the hearing is for accepting oral testimony only and is not held in\na “Question and Answer” format.\nIs there a deadline to submit comments?\nYes, you must submit comments by the close of business on February 10, 2026.\nDo you need assistance to participate in the hearing?\n• Wheelchair Access. The venue has an accessible entrance on\nLafayette Street and elevators. There are accessible bathrooms on the\nfirst floor of the building.\n• Assistive Listening Systems (ALS). ALS is not currently in place at\nthe 125 Worth Street Second Floor Auditorium.\n• Communication Access Realtime Translation (CART). CART is not currently\navailable.\n• Sign Language Interpretation. If you require language interpretation,\nor sign language interpretation to participate in the hearing, please\nemail boc@boc.nyc.gov or call 212-669-7900 by February 3, 2026 to\nallow sufficient time to determine if accommodations can be arranged.\n• To request any other accommodations, please email boc@boc.nyc.gov or call\n212-669-7900 at least 48 hours before the hearing.\nCan I review the comments made on the proposed rules?\nYou can review the comments made online on the proposed rules by going to the Board’s\nwebsite. One week after the hearing, copies of the written comments will be available to\nthe public on the Board’s website.\nWhat authorizes the Board of Correction to make these rules?\nSections 626 and 1043 of the New York City Charter authorize the Board to propose\nthese rules.\nPage 2 of 56\n\nWhere can I find the Board of Correction’s rules?\nThe Board’s rules are in Title 40 of the Rules of the City of New York, and are also\navailable on the Board’s website under the “Jail Regulations” tab.\nWhat requirements govern the rulemaking process?\nThe Board must meet the requirements of Section 1043 of the City Charter when creating\nor amending rules. This notice is made according to the requirements of Section 1043 of\nthe City Charter.\nWhy weren’t these proposed rules on the Board’s 2025 regulatory agenda?\nThe Board is proposing these rules pursuant to a rulemaking proposal submitted by\nCorrectional Health Services on July 29, 2025.\nPage 3 of 56\n\nStatement of Basis and Purpose of Rules\nNew York City Charter §626(e) authorizes the Board of Correction (“BOC” or “Board”) to\n“establish minimum standards for the care, custody, correction, treatment, supervision,\nand discipline of all persons held or confined under the jurisdiction” of the Department of\nCorrection (“DOC” or the “Department”).\nThe Board first implemented standards on mental health care (now Chapter 2 of the\nMinimum Standards) in 1985, becoming the first jurisdiction in the country to voluntarily\nrequire the provision of appropriate mental health staffing and resources to incarcerated\nindividuals. The implementation of health care minimum standards (now Chapter 3)\nfollowed in 1991, requiring the provision of health care services consistent with\n“accepted professional standards and sound professional judgment and practice.” It is\nthis same goal of aligning mental health and health care afforded in the City’s jails with\ncurrent professional and clinical standards that has prompted the Board to propose\nthese amendments to our Minimum Standards.\n1. Codifying Long-standing Variances (§§2-05(b)(2)(i-ii) and 3-04(b)(2)(v)(A))\nSections 2-09 and 3-13 of Title 40 of the RCNY allow the health care body designated\nby New York City as the agency responsible for health services for people in the care\nand custody of DOC (currently Correctional Health Services or “CHS”) or DOC to submit\na variance from a specific section or subdivision of the Minimum Standards to the Board\nwhen compliance cannot be achieved or continued.\nOn November 10, 2005, the Board approved a limited six-month variance from §2-\n05(b)(2)(i-ii) (previously §5.2(b)(i-ii)). The variance authorizes psychiatrists to see and\nevaluate stable patients on psychotropic medication in general population at least every\n28 days, rather than every 14 days as required by the standard. The Board has granted\nthis variance every six months since its initial approval. In July 2025, CHS proposed\namending the relevant Standard to incorporate this long-standing variance.\nAs recognized in 2005, the Board continues to believe that the variance helps improve\npatient care and make psychotropic medication prescription practices consistent with\ncurrent mental health care standards. The variance allows for appropriate follow-up of\ngeneral population patients receiving mental health services. The variance minimizes\nredundancy since follow-ups with stable patients who respond positively to their\nmedication are not required. For these reasons, the Board proposes to codify this\nvariance.\nOn September 13, 2010, the Board approved a limited six-month variance sought by the\nDepartment of Health and Mental Hygiene, then the health care provider in the jails,\nfrom §3-04(b)(2)(v)(A). This health care standard requires that a tuberculin skin test\n(TST) be administered during the intake screening for people in custody who do not\nhave prior history of a positive reaction to the test. The variance authorizes the use of\ninterferon gamma release assays instead of a tuberculin skin test for tuberculosis\nPage 4 of 56\n\nscreening. The variance also exempts persons who have a documented negative test in\nthe six months prior to their admission from repeat screening. Understanding that health\ncare practices evolve and improve over time, the Board granted this variance every six\nmonths since 2010, with the last extension being approved for a full year in January\n2025.\nIn July 2025, CHS requested that this Standard be amended to incorporate the\nallowance for alternative tuberculosis screening practices authorized by the variance.\nGiven the successful implementation of this variance over the last 15 years, the Board\nis proposing the requested amendment. Further, to account for future advancements in\ntuberculosis screening, the Board proposes amending the relevant Standard to allow for\nthe use of other tuberculosis screening methods that meet current standards of clinical\npractice.\n2. Aligning Variance Procedures (§§2-09 and 3-13)\nThrough the years, DOC and CHS have utilized the procedures for variance requests\nset forth in §1-15 of the Board’s Minimum Standards. However, §§2-09 and 3-13 set\nforth other procedures for requesting variances, which contain procedural, non-\nsubstantive differences from the requirements in §1-15, such as setting out the process\nfor submitting variance requests prior to the implementation of the original rules. This\nduplication can lead to confusion and inconsistent application. The duplication is also\nunnecessary as §1-15 appropriately addresses all aspects of the variance process\nhistorically used by the Board. Accordingly, the Board proposes amending the variance\nprocedures in §§2-09 and 3-13 to mirror those set forth in §1-15.\nThe proposed rule also defines the three types of variances that are granted by the\nBoard:\n• Limited Variance – limited time period\n• Continuing Variance – indefinite time period\n• Emergency Variance – up to 30 days\n3. Removing Unused “Seclusion” Practices (§2-06)\nSection 2-06 authorizes DOC and CHS to implement procedures governing the physical\nrestraint and seclusion of persons in custody being observed or treated for mental or\nemotional health issues. The Standard defines “seclusion” as “the placing of [people in\ncustody] in their cells, or a seclusion room from which they cannot leave at will, during a\nnormal lock-out period when other [people in custody] in the housing area are given the\noption to lock out of their cells.” Among other requirements about the use of seclusion,\nand the monitoring and release of individuals in seclusion, section 2-06 provides that\n“[p]hysical restraint or seclusion may be used only upon the direct written order of a\npsychiatrist which includes the reasons for taking such action.”\nPage 5 of 56\n\nHowever, in current practice, CHS neither authorizes nor orders the use of seclusion.\nAccordingly, the Board proposes removing references to the use of seclusion from §2-\n06.\n4. Non-Substantive Language Amendments (Chapters 2 and 3)\nIn 2021, the Board made a commitment to employ person-first language in its Minimum\nStandards and communications by deleting references to “inmates” in favor of person-\nfirst terms such as “people in custody” and using gender inclusive language in Chapter\n1 of the Minimum Standards. The Board proposes continuing this vital effort in Chapters\n2 and 3.\nPage 6 of 56\n\nProposed Rules\nNew material is underlined.\n[Deleted material is in brackets.]\n“Shall” and “must” denote mandatory requirements and may be used interchangeably in\nthe rules of the Board of Correction, unless otherwise specified or unless the context\nclearly indicates otherwise.\n§ 1. Sections 2-01, 2-02, 2-03, 2-04, 2-05, 2-06, 2-07, 2-08, and 2-09 of Title 40 of the\nRules of the City of New York are renumbered as sections 2-02, 2-03, 2-04, 2-05, 2-\n06, 2-07, 2-08, 2-09, and 2-10 respectively.\n§ 2. Title 40 of the Rules of the City of New York is amended to add a new section\n2-01 to read as follows:\n§ 2-01 Definitions.\n(a) “Facility” means any jail which operates as its own command or any jail annex\nwhich is not within walking distance of the parent facility.\n(b) “Health Authority” means a health care body designated by New York City as\nthe agency or agencies responsible for health services for people in custody in the care\nand custody of the New York City Department of Correction. This term applies regardless\nof whether this responsibility is contractually shared with an outside provider.\n(c) “Health record” means a single medical record that contains all available\ninformation pertaining to a person in custody’s medical, mental health and dental care.\nUnless otherwise specified, a health record refers to a record maintained by a jail, not a\nrecord maintained by a hospital.\n(d) “Mental health services staff” means a mental health professional employed by\nthe Health Authority who, by virtue of education, credentials, and experience, is permitted\nby law to evaluate and care for patients within the scope of their professional practice.\n(e) “Psychiatric provider” means a psychiatrist, psychiatric nurse practitioner, or\npsychiatric physician assistant who diagnoses and treats mental and emotional health\nissues.\n§ 3. The opening paragraph of section 2-02 of Title 40 of the Rules of the City of\nNew York, as renumbered by this rule, is amended to read as follows:\n§ 2-02 Service Calls.\nServices for the detection, diagnosis and treatment of mental illness shall be provided to\nthose persons in the care and custody of the New York City Department of Correction.\nThe [New York City Department of Health or a contracted service provider,] Health\nAuthority and the Department of Correction[, with the approval of the Department of\nPage 7 of 56\n\nMental Health, Mental Retardation and Alcoholism Services] shall [design and implement]\nmaintain a mental health program to provide:\n***\n§ 4. Section 2-03 of Title 40 of the Rules of the City of New York, as renumbered by\nthis rule, is amended to read as follows:\n§ 2-03 Identification and Detection.\n(a) Policy. Procedures shall be developed and implemented which promote the\ntimely identification of [inmates] people in custody requiring mental health evaluation.\n(b) Receiving screening.\n(1) Screening for mental and emotional [disorders] health issues is to be performed\non all [inmates] people in custody before they are placed in general population. This\ninitial screening shall take place within twenty-four hours after [an inmate's arrival] a\nperson in custody arrives at the correctional facility.\n(2) Screening shall be performed by mental health services personnel or by\nappropriately trained medical personnel. Screening may be incorporated within the\nmedical intake procedure.\n(3) The [Department of Health] Health Authority[, with the approval of the\nDepartment of Mental Health, Mental Retardation and Alcoholism Services] shall\n[develop] maintain written procedures setting the topics to be reviewed in receiving\nscreening. The review shall include, but need not be limited to: psychiatric history,\nincluding neuropsychiatric hospitalizations, contacts with mental health professionals,\nsuicidal and violent behavior, history or presence of delusions or hallucinations, and an\nassessment based on behavioral observations of mood, orientation, impaired\nconsciousness, indications of [gross mental retardation] intellectual disability and\nsignificant presenting complaints.\n(4) The professionals conducting intake screening shall record their findings in a\nstandard, written mental health intake form [which the Department of Health shall\ndevelop with the approval of the Department of Mental Health, Mental Retardation and\nAlcoholism Services] maintained by the Health Authority for use in all facilities.\n(5) Receiving screening shall include a description of available mental health\nservices and the procedures for access to those services:\n(i) [inmates] people in custody shall receive a written communication in English\nand Spanish describing available mental health services, the confidentiality of those\nservices and the procedures for gaining access to them;\n(ii) the Department of Correction shall make provisions to assist in assuring that\nthe procedures for gaining access to mental health services are verbally explained to\n[illiterate inmates] people in custody who have difficulty with reading and writing, and\nPage 8 of 56\n\nthat [inmates] people in
